/* ═══ 데이터 삭제 모달 컴포넌트 ═══ */
function DataDeleteModal({table,label,count,onClose,onDone,source}){
  const[delFrom,setDelFrom]=useState('');
  const[delTo,setDelTo]=useState('');
  const[deleting,setDeleting]=useState(false);
  const dateField=table==='sales'?'sale_date':'purchase_date';

  const doDelete=async(mode)=>{
    const confirmMsg=mode==='all'
      ?label+' 전체 데이터('+count+'건)를 삭제합니다. 되돌릴 수 없습니다!'
      :'선택 기간('+delFrom+' ~ '+delTo+')의 '+label+' 데이터를 삭제합니다.';
    if(!confirm(confirmMsg))return;
    setDeleting(true);
    try{
      let q=sbClient.from(table).delete();
      if(source)q=q.eq('source',source);
      if(mode==='range'){
        if(!delFrom||!delTo){alert('기간을 선택해주세요');setDeleting(false);return;}
        q=q.gte(dateField,delFrom).lte(dateField,delTo);
      }else{
        q=q.gt(dateField,'1900-01-01');
      }
      const{error}=await q;
      if(error)throw error;
      alert('삭제 완료');
      onDone&&onDone();
      onClose();
    }catch(e){alert('삭제 실패: '+(e.message||String(e)));}
    setDeleting(false);
  };

  return R(Modal2,{title:'\uD83D\uDDD1 '+label+' 데이터 삭제',onClose,
    footer:R('div',{style:{display:'flex',gap:6,width:'100%'}},
      R('button',{className:'btn bs',onClick:onClose,style:{flex:1}},'\ucde8\uc18c'),
      R('button',{onClick:()=>doDelete('range'),disabled:deleting,style:{flex:2,padding:'9px',background:'#F59E0B',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700,fontSize:12}},deleting?'\uc0ad\uc81c \uc911...':'\uD83D\uDCC5 \uAE30\uAC04 \uc0ad\uc81c'),
      R('button',{onClick:()=>doDelete('all'),disabled:deleting,style:{flex:2,padding:'9px',background:'#EF4444',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700,fontSize:12}},deleting?'\uc0ad\uc81c \uc911...':'\u26A0\uFE0F \uc804\uccb4 \uc0ad\uc81c')
    )},
    R('div',null,
      R('div',{style:{background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:8,padding:'10px 14px',fontSize:11,color:'#991B1B',marginBottom:14}},'\u26A0\uFE0F \uc0ad\uc81c\ub41c \ub370\uc774\ud130\ub294 \ubcf5\uad6c\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4'),
      R('div',{style:{fontSize:12,fontWeight:700,marginBottom:8}},'\uD83D\uDCC5 \uAE30\uAC04 \uc120\ud0dd (\uc120\ud0dd \ud6C5 \uAE30\uAC04 \uc0ad\uc81c \uBC84\ud2bc \ud074\ub9AD)'),
      R('div',{style:{display:'flex',gap:8,alignItems:'center',marginBottom:12}},
        R('input',{type:'date',value:delFrom,onChange:e=>setDelFrom(e.target.value),className:'inp',style:{flex:1}}),
        R('span',{style:{color:'var(--tm)'}},'~'),
        R('input',{type:'date',value:delTo,onChange:e=>setDelTo(e.target.value),className:'inp',style:{flex:1}})
      ),
      R('div',{style:{fontSize:11,color:'var(--tm)'}},'\ud604\uc7ac '+label+' \ub370\uc774\ud130: ',count,'\uAC74')
    )
  );
}

/* ═══ 공통: 매출/매입 import 헬퍼 ═══════════════════ */
function ImportModal({type,onClose,onDone,source='adm'}){
  const[previewData,setPreviewData]=useState(null);
  const[previewHeaders,setPreviewHeaders]=useState([]);
  const[importing,setImporting]=useState(false);
  const[errorLog,setErrorLog]=useState('');
  const fileRef=useRef();

  const parseFile=(file)=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      try{
        let data=[];
        if(file.name.toLowerCase().endsWith('.csv')){
          let text;try{text=new TextDecoder('euc-kr').decode(ev.target.result);}catch(e){text=new TextDecoder('utf-8').decode(ev.target.result);}
          const lines=text.split(/\r?\n/).filter(l=>l.trim());
          let hIdx=0;while(hIdx<lines.length&&!/일자|날짜|date|거래처|품명|품목|No\./i.test(lines[hIdx]))hIdx++;
          if(hIdx>=lines.length)hIdx=0;
          const headers=lines[hIdx].split(',').map(h=>h.trim().replace(/^["']|["']$/g,''));
          data=lines.slice(hIdx+1).filter(l=>l.trim()).map(line=>{const vals=line.split(',').map(v=>v.trim().replace(/^["']|["']$/g,''));const obj={};headers.forEach((h,i)=>{if(h)obj[h]=vals[i]||'';});return obj;}).filter(r=>Object.values(r).some(v=>v));
        }else{
          const wb=XLSX.read(ev.target.result,{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const rawRows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
          let headerRowIdx=0;
          for(let i=0;i<Math.min(10,rawRows.length);i++){const j=rawRows[i].join('|');if(/일자|날짜|date|거래처|품명|품목|No\./i.test(j)){headerRowIdx=i;break;}}
          const headers=rawRows[headerRowIdx].map(h=>String(h).trim()).filter(h=>h);
          data=rawRows.slice(headerRowIdx+1).filter(r=>r.some(c=>c!=='')).map(row=>{const obj={};headers.forEach((h,i)=>{obj[h]=row[i]!==undefined?String(row[i]).trim():'';});return obj;}).filter(r=>Object.values(r).some(v=>v&&v!==''));
        }
        if(!data.length){setErrorLog('데이터 행이 없습니다');return;}
        setPreviewHeaders(Object.keys(data[0]));
        setPreviewData({rows:data,file:file.name});
        setErrorLog('');
      }catch(e){setErrorLog('파일 읽기 실패: '+e.message);}
    };
    reader.readAsArrayBuffer(file);
  };

  const mapDate=r=>{
    let v=r['일자-No.']||r['일자No']||r['일자']||r['날짜']||r['거래일']||r['판매일']||r['매입일']||'';
    if(!v)return today2();
    let str=String(v).replace(/\s+-?\d+\s*$/,'').trim();
    const n=Number(str);
    if(!isNaN(n)&&n>40000)return new Date(Math.round((n-25569)*86400*1000)).toISOString().slice(0,10);
    str=str.replace(/[.\/]/g,'-');
    const result=str.slice(0,10);
    if(/^\d{4}-\d{1,2}-\d{1,2}$/.test(result)){
      const parts=result.split('-');
      return parts[0]+'-'+parts[1].padStart(2,'0')+'-'+parts[2].padStart(2,'0');
    }
    return today2();
  };
  const mapStr=(r,...keys)=>String(keys.reduce((acc,k)=>acc||r[k],'')||'').trim();
  const mapNum=(r,...keys)=>parseFloat(String(keys.reduce((acc,k)=>acc||r[k],'')||'0').replace(/[,\s]/g,''))||0;

  const doImport=async()=>{
    if(!previewData)return;
    setImporting(true);setErrorLog('');
    try{
      let mapped;
      if(type==='sales'){
        mapped=previewData.rows.map(r=>{
          const rawName=mapStr(r,'품명','품목명','제품명','품목명(규격)','품목명(요약)','상품명','품명 및 규격','품목');
          return{
            sale_date:mapDate(r),
            customer_name:mapStr(r,'거래처명','거래처','고객사','구매처명','구매처','매출처','매출처명','판매처','거래처(상호)'),
            product_code:mapStr(r,'품목코드','코드','상품코드','제품코드'),
            product_name:cleanItemName(rawName),
            quantity:mapNum(r,'수량','수량합계','수량(EA)','EA'),
            unit_price:mapNum(r,'단가(vat포함)','단가','판매단가','단가(VAT포함)'),
            amount:mapNum(r,'공급가액','금액','금액합계','합계','Amount','매출액','판매금액'),
            cost:mapNum(r,'원가','매입원가'),
            source:source
          };
        }).filter(r=>r.product_name||r.customer_name);
      }else{
        mapped=previewData.rows.map(r=>{
          const rawName=mapStr(r,'품명','품목명','품목명(규격)','품목명(요약)','품명 및 규격','품목','제품명','상품명');
          const qty=mapNum(r,'수량','수량합계','수량(EA)','EA');
          const amt=mapNum(r,'금액','금액합계','공급가액','합계','매입금액','구매금액');
          return{
            purchase_date:mapDate(r),
            supplier_name:mapStr(r,'거래처','거래처명','매입처','공급처','구매처명','구매처','매입처명','공급처명','거래처(상호)'),
            item_code:mapStr(r,'품목코드','코드','상품코드','제품코드'),
            item_name:cleanItemName(rawName),
            quantity:qty,
            unit_price:mapNum(r,'단가','매입단가','공급단가')||(qty>0?amt/qty:0),
            amount:amt,
            source:source
          };
        }).filter(r=>r.item_name||r.supplier_name);
      }

      if(mapped.length===0){
        const foundCols=previewHeaders.join(', ');
        const needCols=type==='sales'
          ? '품명/품목명/품명 및 규격, 거래처명/구매처명/매출처 등'
          : '품명/품목명/품명 및 규격, 거래처/매입처/구매처명/공급처 등';
        setErrorLog('❌ 변환 가능한 행이 없습니다.\n\n📋 엑셀 파일의 컬럼명:\n   '+foundCols+'\n\n💡 필요한 컬럼:\n   '+needCols+'\n\n위 컬럼 중 하나라도 일치해야 변환됩니다.\n엑셀에서 컬럼명을 수정하거나, 어떤 컬럼명을 사용하시는지 알려주세요.');
        setImporting(false);
        return;
      }

      /* 실제 저장 - 클라이언트 사이드 중복 필터링 (가장 빠름)
         1) 업로드 데이터의 날짜 범위 안 기존 DB 데이터를 한 번에 가져옴
         2) 클라이언트에서 중복 체크 → 신규만 추출
         3) 신규 데이터만 INSERT
         속도: 2,459건 → 약 2~3초 (DB 왕복 최소화) */
      const tableName=type==='sales'?'sales':'purchases';
      const dateField=type==='sales'?'sale_date':'purchase_date';
      let savedCount=0;
      let duplicateCount=0;
      let lastError=null;
      
      /* 1단계: 업로드 데이터의 날짜 범위 추출 */
      const dates=mapped.map(r=>r[dateField]||'').filter(d=>d).sort();
      const minDate=dates[0]||'1900-01-01';
      const maxDate=dates[dates.length-1]||'2100-12-31';
      
      /* 2단계: DB에서 같은 기간의 기존 데이터 가져오기 */
      const fetchCols=type==='sales'
        ?'sale_date,customer_name,product_name,quantity,amount,source'
        :'purchase_date,supplier_name,item_name,quantity,amount,source';
      let existingRows=[];
      try{
        const{data:existing,error:fErr}=await sbClient
          .from(tableName)
          .select(fetchCols)
          .gte(dateField,minDate)
          .lte(dateField,maxDate)
          .limit(100000);
        if(fErr)throw fErr;
        existingRows=existing||[];
      }catch(e){
        console.warn('기존 데이터 조회 실패 (중복 체크 없이 진행):',e);
        /* 조회 실패해도 일단 업로드는 시도 */
      }
      
      /* 3단계: 중복 키 집합 만들기 */
      const makeKey=type==='sales'
        ?(r=>r.sale_date+'|'+(r.customer_name||'')+'|'+(r.product_name||'')+'|'+r.quantity+'|'+r.amount+'|'+(r.source||''))
        :(r=>r.purchase_date+'|'+(r.supplier_name||'')+'|'+(r.item_name||'')+'|'+r.quantity+'|'+r.amount+'|'+(r.source||''));
      const existingKeys=new Set(existingRows.map(makeKey));
      
      /* 4단계: 신규 데이터만 필터링 (DB에 없는 것만) */
      const seenInBatch=new Set();
      const newRows=mapped.filter(r=>{
        const k=makeKey(r);
        if(existingKeys.has(k)){duplicateCount++;return false;}
        if(seenInBatch.has(k)){duplicateCount++;return false;}  /* 업로드 파일 안에서 중복도 제거 */
        seenInBatch.add(k);
        return true;
      });
      
      console.log('[업로드 사전 분석] 전체:',mapped.length,'/ 신규:',newRows.length,'/ 중복:',duplicateCount);
      
      /* 5단계: 신규 데이터를 200건씩 배치로 INSERT */
      if(newRows.length>0){
        const totalBatches=Math.ceil(newRows.length/200);
        for(let i=0;i<newRows.length;i+=200){
          const batch=newRows.slice(i,i+200);
          const batchNum=Math.floor(i/200)+1;
          const{data:resp,error}=await sbClient.from(tableName).insert(batch).select();
          if(error){
            /* DB 레벨 UNIQUE 위반 (드물게 발생 가능) → upsert로 재시도 */
            if(error.code==='23505'||(error.message&&error.message.includes('duplicate'))){
              const onConflictCols=type==='sales'
                ?'sale_date,customer_name,product_name,quantity,amount,source'
                :'purchase_date,supplier_name,item_name,quantity,amount,source';
              const{data:r2,error:e2}=await sbClient
                .from(tableName)
                .upsert(batch,{onConflict:onConflictCols,ignoreDuplicates:true})
                .select();
              if(e2){lastError=e2;break;}
              const insertedNow=r2?r2.length:0;
              savedCount+=insertedNow;
              duplicateCount+=(batch.length-insertedNow);
            }else{
              lastError=error;
              break;
            }
          }else{
            savedCount+=(resp?resp.length:batch.length);
          }
          console.log('[업로드] 배치',batchNum,'/',totalBatches,'완료 - 저장 누적:',savedCount);
        }
      }

      if(lastError){
        let msg='저장 실패: '+lastError.message;
        if(lastError.message&&(lastError.message.includes('does not exist')||lastError.message.includes('relation'))){
          msg+='\n\n⚠️ '+tableName+' 테이블이 Supabase에 없습니다.\nSupabase SQL Editor에서 setup_advanced.sql을 실행해주세요.';
        }
        if(lastError.message&&lastError.message.includes('row-level security')){
          msg+='\n\n⚠️ RLS 정책 오류. setup_advanced.sql의 정책을 다시 실행해주세요.';
        }
        setErrorLog(msg);
        setImporting(false);
        return;
      }

      /* 결과 알림 - 중복 건수도 함께 표시 */
      let resultMsg='✅ '+(type==='sales'?'매출':'매입')+' 업로드 완료\n\n';
      resultMsg+='📥 신규 저장: '+savedCount+'건\n';
      if(duplicateCount>0){
        resultMsg+='⏭️ 중복 제외: '+duplicateCount+'건 (이미 DB에 있는 거래)\n';
      }
      resultMsg+='📊 전체 처리: '+(savedCount+duplicateCount)+'건\n';
      resultMsg+='🏷️ 저장 위치: '+(source==='hq'?'본사 (🏢 비엔에프글로벌 본사)':'관리자 (⚙️ 관리자)')+'\n';
      resultMsg+='📅 데이터 기간: '+minDate+' ~ '+maxDate;
      if(duplicateCount>0&&savedCount===0){
        resultMsg+='\n\n⚠️ 모든 데이터가 이미 DB에 있어요.\n혹시 다른 source(hq/adm)에서 보고 계신가요?';
      }else if(duplicateCount>0){
        resultMsg+='\n\n💡 중복은 자동으로 제외되었습니다.';
      }
      alert(resultMsg);
      /* 매입 → 재고 자동 반영: item_code로 매칭해 supplier/price 업데이트 */
      if(type!=='sales'){
        try{
          const{data:asData}=await sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle();
          if(asData&&asData.state_data&&asData.state_data.mats){
            /* 매입 데이터에서 코드별 최저단가/주거래처 집계 */
            const codeMap={};
            mapped.forEach(r=>{
              const code=r.item_code||(r.item_name||'').trim();
              if(!code)return;
              if(!codeMap[code])codeMap[code]={supplier:r.supplier_name||'',prices:[]};
              if(r.unit_price>0)codeMap[code].prices.push(r.unit_price);
              if(r.supplier_name)codeMap[code].supplier=r.supplier_name;
            });
            const newMats=asData.state_data.mats.map(m=>{
              const byCode=codeMap[m.c]||codeMap[m.n.trim()];
              if(!byCode)return m;
              const upd={...m};
              if(byCode.supplier)upd.supplier=byCode.supplier;
              if(byCode.prices.length){upd.price=Math.min(...byCode.prices);}
              return upd;
            });
            await sbClient.from('app_state').upsert({id:1,state_data:{...asData.state_data,mats:newMats},updated_at:new Date().toISOString()});
            console.log('✅ 재고 매입처/단가 자동 반영 완료');
          }
        }catch(syncErr){console.warn('재고 반영 실패:',syncErr);}
      }
      setImporting(false);
      onDone&&onDone();
      onClose();
    }catch(e){
      setErrorLog('예외 발생: '+(e.message||e));
      setImporting(false);
    }
  };

  return R(Modal2,{title:(type==='sales'?'📊 매출장부':'📦 매입장부')+' Excel Import',onClose,
    footer:R('div',{style:{display:'flex',gap:8,width:'100%'}},
      R('button',{className:'btn bs',onClick:onClose,style:{flex:1}},'취소'),
      previewData&&R('button',{className:'btn bp',onClick:doImport,disabled:importing,style:{flex:2}},importing?'⏳ 저장 중...':'✅ '+previewData.rows.length+'건 저장')
    )},
    R('input',{ref:fileRef,type:'file',accept:'.xlsx,.xls,.csv',style:{display:'none'},onChange:e=>{const f=e.target.files[0];if(f){parseFile(f);e.target.value='';}}}),
    R('div',{
      onDragOver:e=>{e.preventDefault();e.currentTarget.style.background='#FFF0E8';},
      onDragLeave:e=>{e.currentTarget.style.background='#FFF8F4';},
      onDrop:e=>{e.preventDefault();e.currentTarget.style.background='#FFF8F4';const f=e.dataTransfer.files[0];if(f)parseFile(f);},
      onClick:()=>fileRef.current&&fileRef.current.click(),
      style:{border:'2.5px dashed #D94F1E',borderRadius:12,padding:'24px',textAlign:'center',cursor:'pointer',background:'#FFF8F4',marginBottom:14}
    },
      R('div',{style:{fontSize:32,marginBottom:6}},'📂'),
      R('div',{style:{fontSize:13,fontWeight:700,color:'#D94F1E'}},type==='sales'?'매출장부':'매입장부',' 파일 드래그/클릭'),
      R('div',{style:{fontSize:11,color:'#666',marginTop:4}},'.xlsx .xls .csv (이카운트 자동 인식)')
    ),
    errorLog&&R('div',{style:{background:'#FEE2E2',border:'1px solid #FCA5A5',color:'#991B1B',borderRadius:8,padding:'10px 14px',fontSize:11,marginBottom:10,whiteSpace:'pre-wrap',lineHeight:1.5}},errorLog),
    previewData&&R('div',null,
      R('div',{style:{fontSize:11,color:'var(--tm)',marginBottom:6}},'📋 ',previewData.file,' · ',previewData.rows.length,'행 인식'),
      R('div',{style:{overflow:'auto',maxHeight:240,border:'1px solid var(--bd)',borderRadius:8}},
        R('table',{style:{fontSize:10}},
          R('thead',null,R('tr',null,...previewHeaders.slice(0,8).map(h=>R('th',{key:h,style:{padding:'5px',background:'#F8F9FA',whiteSpace:'nowrap'}},h)))),
          R('tbody',null,...previewData.rows.slice(0,8).map((r,i)=>R('tr',{key:i},...previewHeaders.slice(0,8).map(h=>R('td',{key:h,style:{padding:'4px',whiteSpace:'nowrap',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis'}},String(r[h]||''))))))
        )
      )
    )
  );
}

/* ═══════════════════════════════════════════════════════════
   🌐 통합 경영 대시보드 (본사 + 관리자 합산)
   ═══════════════════════════════════════════════════════════ */
function PageTotalDashboard({user,subPage='total_dash'}){
  /* 변동률 표시 헬퍼 - 컴포넌트 최상단에 정의 */
  const pct=(a,b)=>{if(!b||b===0)return null;return (a-b)/b*100;};
  const Diff=({a,b})=>{
    const v=pct(a,b);
    if(v===null)return null;
    const up=v>=0;
    return R('span',{style:{fontSize:9,fontWeight:700,color:up?'#22C55E':'#EF4444',marginLeft:4,padding:'1px 5px',background:up?'#F0FDF4':'#FEF2F2',borderRadius:20}},(up?'▲+':'▼')+Math.abs(v).toFixed(1)+'%');
  };
  
  const[hqSales,setHqSales]=useState([]);
  const[admSales,setAdmSales]=useState([]);
  const[hqPurchases,setHqPurchases]=useState([]);
  const[admPurchases,setAdmPurchases]=useState([]);
  const[hqFc,setHqFc]=useState([]);
  const[admFc,setAdmFc]=useState([]);
  const[loading,setLoading]=useState(true);
  const chartRef=useRef(null);
  const chartInstance=useRef(null);
  
  const load=async()=>{
    setLoading(true);
    try{
      const[hs,as,hp,ap,fc]=await Promise.all([
        sbClient.from('sales').select('*').eq('source','hq').order('sale_date',{ascending:false}).limit(20000),
        sbClient.from('sales').select('*').eq('source','adm').order('sale_date',{ascending:false}).limit(20000),
        sbClient.from('purchases').select('*').eq('source','hq').order('purchase_date',{ascending:false}).limit(20000),
        sbClient.from('purchases').select('*').eq('source','adm').order('purchase_date',{ascending:false}).limit(20000),
        sbClient.from('fixed_costs').select('*').order('year').order('month').then(r=>r).catch(()=>({data:[]}))
      ]);
      setHqSales(hs.data||[]);
      setAdmSales(as.data||[]);
      setHqPurchases(hp.data||[]);
      setAdmPurchases(ap.data||[]);
      /* 고정비 분리 */
      const fcAll=fc.data||[];
      setHqFc(fcAll.filter(i=>(i.source||'adm')==='hq'));
      setAdmFc(fcAll.filter(i=>(i.source||'adm')==='adm'));
    }catch(e){console.warn(e);}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);
  
  const now=new Date();
  const Y=now.getFullYear(),M=now.getMonth()+1;
  const prevY=M===1?Y-1:Y,prevM=M===1?12:M-1;
  const ms=(y,m)=>y+'-'+String(m).padStart(2,'0');
  const sumBy=(arr,dk,ak,s,e)=>arr.filter(r=>{const d=r[dk]||'';return d>=s&&d<=e;}).reduce((t,r)=>t+(+r[ak]||0),0);
  const fcMonth=(arr,y,m)=>arr.filter(f=>+f.year===y&&+f.month===m).reduce((s,f)=>s+(+f.amount||0),0);
  
  /* ─── 합산 데이터 ─── */
  const tot=useMemo(()=>{
    const c={};
    /* 이번달 */
    c.mHqS=sumBy(hqSales,'sale_date','amount',ms(Y,M)+'-01',ms(Y,M)+'-31');
    c.mAdmS=sumBy(admSales,'sale_date','amount',ms(Y,M)+'-01',ms(Y,M)+'-31');
    c.mS=c.mHqS+c.mAdmS;
    c.mHqP=sumBy(hqPurchases,'purchase_date','amount',ms(Y,M)+'-01',ms(Y,M)+'-31');
    c.mAdmP=sumBy(admPurchases,'purchase_date','amount',ms(Y,M)+'-01',ms(Y,M)+'-31');
    c.mP=c.mHqP+c.mAdmP;
    c.mHqFC=fcMonth(hqFc,Y,M);
    c.mAdmFC=fcMonth(admFc,Y,M);
    c.mFC=c.mHqFC+c.mAdmFC;
    c.mOp=c.mS-c.mP-c.mFC;
    /* 전월 */
    c.pmS=sumBy(hqSales.concat(admSales),'sale_date','amount',ms(prevY,prevM)+'-01',ms(prevY,prevM)+'-31');
    c.pmP=sumBy(hqPurchases.concat(admPurchases),'purchase_date','amount',ms(prevY,prevM)+'-01',ms(prevY,prevM)+'-31');
    c.pmFC=fcMonth(hqFc,prevY,prevM)+fcMonth(admFc,prevY,prevM);
    c.pmOp=c.pmS-c.pmP-c.pmFC;
    /* YTD */
    const ytdE=Y+'-'+String(M).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    c.ytdHqS=sumBy(hqSales,'sale_date','amount',Y+'-01-01',ytdE);
    c.ytdAdmS=sumBy(admSales,'sale_date','amount',Y+'-01-01',ytdE);
    c.ytdS=c.ytdHqS+c.ytdAdmS;
    c.ytdHqP=sumBy(hqPurchases,'purchase_date','amount',Y+'-01-01',ytdE);
    c.ytdAdmP=sumBy(admPurchases,'purchase_date','amount',Y+'-01-01',ytdE);
    c.ytdP=c.ytdHqP+c.ytdAdmP;
    c.ytdHqFC=hqFc.filter(f=>+f.year===Y&&+f.month<=M).reduce((s,f)=>s+(+f.amount||0),0);
    c.ytdAdmFC=admFc.filter(f=>+f.year===Y&&+f.month<=M).reduce((s,f)=>s+(+f.amount||0),0);
    c.ytdFC=c.ytdHqFC+c.ytdAdmFC;
    c.ytdOp=c.ytdS-c.ytdP-c.ytdFC;
    /* 연간 (1-12월 모두) */
    c.yHqS=sumBy(hqSales,'sale_date','amount',Y+'-01-01',Y+'-12-31');
    c.yAdmS=sumBy(admSales,'sale_date','amount',Y+'-01-01',Y+'-12-31');
    c.yS=c.yHqS+c.yAdmS;
    c.yHqP=sumBy(hqPurchases,'purchase_date','amount',Y+'-01-01',Y+'-12-31');
    c.yAdmP=sumBy(admPurchases,'purchase_date','amount',Y+'-01-01',Y+'-12-31');
    c.yP=c.yHqP+c.yAdmP;
    c.yHqFC=hqFc.filter(f=>+f.year===Y).reduce((s,f)=>s+(+f.amount||0),0);
    c.yAdmFC=admFc.filter(f=>+f.year===Y).reduce((s,f)=>s+(+f.amount||0),0);
    c.yFC=c.yHqFC+c.yAdmFC;
    c.yOp=c.yS-c.yP-c.yFC;
    return c;
  },[hqSales,admSales,hqPurchases,admPurchases,hqFc,admFc,Y,M]);
  
  /* 월별 데이터 (차트용) */

      const pu=hqP+adP;
      const fc=hqFCm+adFCm;

      arr.push({m,sl,pu,fc,op,hqS,adS,hqP,adP,hqFC:hqFCm,adFC:adFCm,margin:sl>0?op/sl*100:0});

          )
        )
      )
    ),
    
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    /* 월별 통합 손익 표 (상세) */
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    R('div',{className:'card',style:{padding:0,overflow:'hidden',borderRadius:12}},
      R('div',{style:{padding:'12px 16px',borderBottom:'1px solid var(--bd)'}},
        R('div',{style:{fontSize:13,fontWeight:800}},'📅 '+Y+'년 월별 통합 손익 상세'),
        R('div',{style:{fontSize:10,color:'var(--tm)',marginTop:2}},'본사 + 관리자 합산 (단위: 만원)')
      ),
      R('div',{style:{overflowX:'auto'}},
        R('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:11,minWidth:780}},
          R('thead',null,R('tr',{style:{background:'#F9FAFB'}},
            R('th',{style:{padding:'8px 10px',fontWeight:700,color:'#6B7280',width:48}},'월'),
            R('th',{style:{padding:'8px 10px',textAlign:'right',fontWeight:700,color:'#D94F1E'}},'통합매출'),
            R('th',{style:{padding:'8px 10px',textAlign:'right',fontWeight:600,color:'#9CA3AF',fontSize:9}},'(본사)'),
            R('th',{style:{padding:'8px 10px',textAlign:'right',fontWeight:600,color:'#9CA3AF',fontSize:9}},'(관리자)'),
            R('th',{style:{padding:'8px 10px',textAlign:'right',fontWeight:700,color:'#6B7280'}},'매입'),
            R('th',{style:{padding:'8px 10px',textAlign:'right',fontWeight:700,color:'#9CA3AF'}},'고정비'),
            R('th',{style:{padding:'8px 10px',textAlign:'right',fontWeight:700}},'영업이익'),
            R('th',{style:{padding:'8px 10px',textAlign:'right',fontWeight:700,color:'#6B7280'}},'이익률')
          )),
          R('tbody',null,...monthData.map(d=>{
            const isThis=d.m===M;
            return R('tr',{key:d.m,style:{background:isThis?'#FFF8F4':d.m%2?'#FAFAFA':'#fff',borderBottom:'1px solid #F3F4F6'}},
              R('td',{style:{padding:'8px 10px',fontWeight:isThis?800:600,color:isThis?'var(--p)':'#374151',textAlign:'center'}},d.m,'월'),
              R('td',{style:{padding:'8px 10px',textAlign:'right',fontWeight:700,color:'var(--p)'}},fN(Math.round(d.sl/10000))),
              R('td',{style:{padding:'8px 10px',textAlign:'right',fontSize:10,color:'#9CA3AF'}},fN(Math.round(d.hqS/10000))),
              R('td',{style:{padding:'8px 10px',textAlign:'right',fontSize:10,color:'#9CA3AF'}},fN(Math.round(d.adS/10000))),
              R('td',{style:{padding:'8px 10px',textAlign:'right',color:'#6B7280'}},fN(Math.round(d.pu/10000))),
              R('td',{style:{padding:'8px 10px',textAlign:'right',color:'#9CA3AF'}},fN(Math.round(d.fc/10000))),
              R('td',{style:{padding:'8px 10px',textAlign:'right',fontWeight:800,color:d.op>=0?'#15803D':'#DC2626'}},
                (d.op>=0?'+':'')+fN(Math.round(d.op/10000))
              ),
              R('td',{style:{padding:'8px 10px',textAlign:'right',fontWeight:700,fontSize:10,color:d.margin>=15?'#22C55E':d.margin>=5?'#F59E0B':d.margin<0?'#DC2626':'#9CA3AF'}},
                d.sl>0?d.margin.toFixed(1)+'%':'-'
              )
            );
          }),
          /* 합계 행 */
          R('tr',{style:{background:'#FEF3C7',borderTop:'2px solid #FDE68A',fontWeight:900}},
            R('td',{style:{padding:'10px',color:'#92400E'}},'합계'),
            R('td',{style:{padding:'10px',textAlign:'right',color:'var(--p)'}},fN(Math.round(tot.yS/10000))),
            R('td',{style:{padding:'10px',textAlign:'right',fontSize:10,color:'#92400E'}},fN(Math.round(tot.yHqS/10000))),
            R('td',{style:{padding:'10px',textAlign:'right',fontSize:10,color:'#92400E'}},fN(Math.round(tot.yAdmS/10000))),
            R('td',{style:{padding:'10px',textAlign:'right',color:'#92400E'}},fN(Math.round(tot.yP/10000))),
            R('td',{style:{padding:'10px',textAlign:'right',color:'#92400E'}},fN(Math.round(tot.yFC/10000))),
            R('td',{style:{padding:'10px',textAlign:'right',color:tot.yOp>=0?'#15803D':'#DC2626'}},
              (tot.yOp>=0?'+':'')+fN(Math.round(tot.yOp/10000))
            ),
            R('td',{style:{padding:'10px',textAlign:'right',color:'var(--p)'}},
              yRate!=null?yRate.toFixed(1)+'%':'-'
            )
          )
          )
        )
      )
    )
  );
}


/* ═══ 경영 대시보드 (요약만) ═══════════════════════ */
function PageDashboard({user,variant='hq'}){
  const[sales,setSales]=useState([]);
  const[purchases,setPurchases]=useState([]);
  const[fixedCosts,setFixedCosts]=useState([]);
  const[plantOps,setPlantOps]=useState([]);
  const[loading,setLoading]=useState(true);
  const[diagInfo,setDiagInfo]=useState(null);
  const chartRef=useRef(null);
  const chartInstance=useRef(null);

  const load=async()=>{
    setLoading(true);
    try{
      const[s,p,f,po]=await Promise.all([
        sbClient.from('sales').select('*').eq('source',variant).order('sale_date',{ascending:false}).limit(20000),
        sbClient.from('purchases').select('*').eq('source',variant).order('purchase_date',{ascending:false}).limit(20000),
        sbClient.from('fixed_costs').select('*').order('year').order('month').then(r=>r).catch(()=>({data:[]})),
        sbClient.from('plant_operations').select('*').order('year').order('month').then(r=>r).catch(()=>({data:[]}))
      ]);
      /* ⚠️ 중요: 고정비는 variant(hq/adm)별로 분리해야 함 (본사 vs 관리자) */
      const fcAll=f.data||[];
      const fcFiltered=fcAll.filter(i=>{
        /* source 컬럼이 없는(NULL) 옛 데이터는 adm으로 간주 */
        const src=i.source||'adm';
        return src===variant;
      });
      /* 진단: source별 항목 수 콘솔에 출력 */
      const srcCount={};
      fcAll.forEach(i=>{const k=i.source||'(NULL)';srcCount[k]=(srcCount[k]||0)+1;});
      console.log('[경영대시보드 진단] variant='+variant+', 전체 고정비 항목='+fcAll.length+', 필터 후='+fcFiltered.length,', source별 분포=',srcCount);
      
      /* 가동률도 동일 분리 */
      const poFiltered=(po.data||[]).filter(i=>{
        const src=i.source||'adm';
        return src===variant;
      });
      setSales(s.data||[]);setPurchases(p.data||[]);setFixedCosts(fcFiltered);setPlantOps(poFiltered);
      /* 진단 정보를 state에 저장하여 화면 표시 */
      setDiagInfo({variant,fcTotal:fcAll.length,fcFiltered:fcFiltered.length,fcBySource:srcCount});
    }catch(e){console.warn(e);}
    setLoading(false);
  };
  useEffect(()=>{load();},[variant]);

  const now=new Date();
  const Y=now.getFullYear(),M=now.getMonth()+1;
  const prevY=M===1?Y-1:Y,prevM=M===1?12:M-1;

  const sumBy=(arr,dk,ak,s,e)=>arr.filter(r=>{const d=r[dk]||'';return d>=s&&d<=e;}).reduce((t,r)=>t+(+r[ak]||0),0);
  const ms=(y,m)=>y+'-'+String(m).padStart(2,'0');
  const fcMonth=(y,m)=>fixedCosts.filter(f=>+f.year===y&&+f.month===m).reduce((s,f)=>s+(+f.amount||0),0);
  const opMonth=(y,m)=>{const r=plantOps.find(o=>+o.year===y&&+o.month===m);return r?(+r.rate||0):0;};

  /* 이번달 */
  const mS=sumBy(sales,'sale_date','amount',ms(Y,M)+'-01',ms(Y,M)+'-31');
  const mP=sumBy(purchases,'purchase_date','amount',ms(Y,M)+'-01',ms(Y,M)+'-31');
  const mFC=fcMonth(Y,M);
  const mOp=mS-mP-mFC;
  const mRate=opMonth(Y,M);

  /* 전월 */
  const pmS=sumBy(sales,'sale_date','amount',ms(prevY,prevM)+'-01',ms(prevY,prevM)+'-31');
  const pmP=sumBy(purchases,'purchase_date','amount',ms(prevY,prevM)+'-01',ms(prevY,prevM)+'-31');
  const pmFC=fcMonth(prevY,prevM);
  const pmOp=pmS-pmP-pmFC;
  const pmRate=opMonth(prevY,prevM);

  /* YTD */
  const ytdE=Y+'-'+String(M).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const ytdS=sumBy(sales,'sale_date','amount',Y+'-01-01',ytdE);
  const ytdP=sumBy(purchases,'purchase_date','amount',Y+'-01-01',ytdE);
  const ytdFC=fixedCosts.filter(f=>+f.year===Y&&+f.month<=M).reduce((s,f)=>s+(+f.amount||0),0);
  const ytdOp=ytdS-ytdP-ytdFC;

  /* 연간 */
  const yS=sumBy(sales,'sale_date','amount',Y+'-01-01',Y+'-12-31');
  const yP=sumBy(purchases,'purchase_date','amount',Y+'-01-01',Y+'-12-31');
  const yFC=fixedCosts.filter(f=>+f.year===Y).reduce((s,f)=>s+(+f.amount||0),0);
  const yOp=yS-yP-yFC;
  /* 연평균 가동률 (값이 있는 월만 평균) */
  const yRate=(()=>{const rs=plantOps.filter(o=>+o.year===Y&&(+o.rate)>0);if(rs.length===0)return 0;return rs.reduce((s,o)=>s+(+o.rate||0),0)/rs.length;})();

  /* 월별 데이터 (1~현재월) */
  const monthData=useMemo(()=>{
    const res=[];
    for(let m=1;m<=M;m++){
      const mStr=ms(Y,m);
      const sl=sumBy(sales,'sale_date','amount',mStr+'-01',mStr+'-31');
      const pu=sumBy(purchases,'purchase_date','amount',mStr+'-01',mStr+'-31');
      const fc=fcMonth(Y,m);
      const rt=opMonth(Y,m);
      res.push({m,sl,pu,fc,op:sl-pu-fc,margin:sl>0?((sl-pu-fc)/sl*100):0,rt});
    }
    return res;
  },[sales,purchases,fixedCosts,plantOps,M,Y]);

  /* 손익 차트 */
  useEffect(()=>{
    if(loading||!chartRef.current||monthData.length===0||typeof Chart==='undefined')return;
    if(chartInstance.current){try{chartInstance.current.destroy();}catch(e){}}
    chartInstance.current=new Chart(chartRef.current,{
      type:'bar',
      data:{
        labels:monthData.map(d=>d.m+'월'),
        datasets:[
          {label:'매출',data:monthData.map(d=>Math.round(d.sl/10000)),backgroundColor:'rgba(217,79,30,0.85)',borderRadius:4,order:2},
          {label:'매입',data:monthData.map(d=>Math.round(d.pu/10000)),backgroundColor:'rgba(107,114,128,0.7)',borderRadius:4,order:3},
          {label:'고정비',data:monthData.map(d=>Math.round(d.fc/10000)),backgroundColor:'rgba(156,163,175,0.6)',borderRadius:4,order:4},
          {type:'line',label:'영업이익',data:monthData.map(d=>Math.round(d.op/10000)),borderColor:'#15803D',backgroundColor:'rgba(21,128,61,0.1)',borderWidth:2.5,tension:0.3,fill:false,pointRadius:5,pointBackgroundColor:'#15803D',pointBorderColor:'#fff',pointBorderWidth:2,order:1}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{position:'top',labels:{font:{size:11},boxWidth:14,padding:12,usePointStyle:true}},
          tooltip:{callbacks:{label:c=>c.dataset.label+': '+fN(c.parsed.y)+'만원'}}
        },
        scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.04)'},ticks:{callback:v=>fN(v)+'만',font:{size:10}}},x:{grid:{display:false},ticks:{font:{size:10}}}}
      }
    });
    return()=>{if(chartInstance.current){try{chartInstance.current.destroy();}catch(e){}chartInstance.current=null;}};
  },[monthData,loading]);

  const pct=(a,b)=>{if(!b||b===0)return null;return (a-b)/b*100;};
  const Diff=({a,b})=>{
    const v=pct(a,b);
    if(v===null)return null;
    const up=v>=0;
    return R('span',{style:{fontSize:9,fontWeight:700,color:up?'#22C55E':'#EF4444',marginLeft:4,padding:'1px 5px',background:up?'#F0FDF4':'#FEF2F2',borderRadius:20}},(up?'▲+':'▼')+Math.abs(v).toFixed(1)+'%');
  };

  /* KPI 카드 */
  const Kpi=({label,value,unit,sub,color,bg,icon,trend,onClick})=>R('div',{
    className:'card',
    onClick,
    style:{padding:'14px 16px',position:'relative',borderTop:'3px solid '+color,cursor:onClick?'pointer':'default',transition:'transform .15s,box-shadow .15s',background:bg||'#fff'}
  },
    R('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:6}},
      R('span',{style:{fontSize:18,lineHeight:1}},icon),
      R('span',{style:{fontSize:11,color:'var(--tm)',fontWeight:700,letterSpacing:-0.2}},label)
    ),
    R('div',{style:{fontSize:22,fontWeight:900,color,letterSpacing:-0.5,lineHeight:1.1}},
      value,unit&&R('span',{style:{fontSize:11,color:'var(--tm)',fontWeight:600,marginLeft:3}},unit)
    ),
    sub&&R('div',{style:{fontSize:10,color:'var(--tm)',marginTop:4}},sub),
    trend&&R('div',{style:{position:'absolute',top:14,right:14}},trend)
  );

  /* 손익 비율 바 */
  const ProfitBar=({sales,purchase,fc,op})=>{
    if(sales<=0)return R('div',{style:{fontSize:10,color:'var(--tm)',padding:'8px 0'}},'매출 데이터 없음');
    const pP=(purchase/sales*100);
    const pF=(fc/sales*100);
    const pO=op>0?(op/sales*100):0;
    return R('div',null,
      R('div',{style:{display:'flex',height:24,borderRadius:6,overflow:'hidden',background:'#FEE2E2'}},
        R('div',{title:'매입 '+fN(Math.round(purchase/10000))+'만',style:{width:Math.min(100,pP)+'%',background:'rgba(107,114,128,0.85)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:9,fontWeight:700,minWidth:0}},pP>10?pP.toFixed(0)+'%':''),
        R('div',{title:'고정비 '+fN(Math.round(fc/10000))+'만',style:{width:Math.min(100-pP,pF)+'%',background:'rgba(156,163,175,0.85)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:9,fontWeight:700,minWidth:0}},pF>10?pF.toFixed(0)+'%':''),
        op>=0&&R('div',{title:'영업이익 '+fN(Math.round(op/10000))+'만',style:{width:Math.min(100-pP-pF,pO)+'%',background:'#15803D',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:9,fontWeight:700,minWidth:0}},pO>10?pO.toFixed(0)+'%':'')
      ),
      R('div',{style:{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--tm)',marginTop:4,fontWeight:600}},
        R('span',null,'매입 ',pP.toFixed(1),'%'),
        R('span',null,'고정비 ',pF.toFixed(1),'%'),
        R('span',{style:{color:op>=0?'#15803D':'#DC2626',fontWeight:800}},op>=0?'이익 '+(op/sales*100).toFixed(1)+'%':'손실 '+(Math.abs(op)/sales*100).toFixed(1)+'%')
      )
    );
  };

  const Col=({label,value,sub,color,bold})=>
    R('div',{style:{textAlign:'right',padding:'0 6px'}},
      R('div',{style:{fontSize:9,color:'#9CA3AF',marginBottom:3,fontWeight:600}},label),
      R('div',{style:{fontSize:bold?16:13,fontWeight:bold?900:600,color:color||'#1F2937',letterSpacing:-0.3}},
        value>=0?(fN(Math.round(value/10000))+'만'):(R('span',{style:{color:'#EF4444'}},fN(Math.round(Math.abs(value)/10000))+'만손'))
      ),
      sub&&R('div',{style:{fontSize:9,color:'#D1D5DB',marginTop:1}},sub)
    );

  const PeriodRow=({label,s,p,fc,op,prevS,prevOp,bg,highlight})=>{
    const rate=s>0?(op/s*100):null;
    return R('div',{style:{display:'grid',gridTemplateColumns:'72px 1fr 1fr 1fr 1fr 80px',gap:0,background:bg||'#fff',borderBottom:'1px solid #F3F4F6',alignItems:'center',padding:'10px 14px',borderRadius:highlight?'0 0 12px 12px':0,boxShadow:highlight?'0 4px 12px rgba(217,79,30,0.08)':null}},
      R('div',{style:{fontSize:highlight?13:11,fontWeight:highlight?800:600,color:highlight?'var(--p)':'#6B7280',display:'flex',flexDirection:'column',gap:2}},
        label,
        prevS&&R(Diff,{a:s,b:prevS})
      ),
      R(Col,{label:'매출',value:s,color:highlight?'var(--p)':'#374151',bold:highlight}),
      R(Col,{label:'매입',value:p,color:'#6B7280'}),
      R(Col,{label:'고정비',value:fc,color:'#9CA3AF'}),
      R('div',{style:{textAlign:'right',padding:'0 6px'}},
        R('div',{style:{fontSize:9,color:'#9CA3AF',marginBottom:3,fontWeight:600}},'영업이익'),
        R('div',{style:{display:'flex',alignItems:'center',justifyContent:'flex-end',gap:4}},
          R('div',{style:{fontSize:highlight?17:14,fontWeight:900,color:op>=0?'#15803D':'#DC2626'}},
            op>=0?('+'+fN(Math.round(op/10000))+'만'):(fN(Math.round(Math.abs(op)/10000))+'만손')
          ),
          prevOp!==undefined&&R(Diff,{a:op,b:prevOp})
        )
      ),
      /* 이익률 단독 컬럼 */
      R('div',{style:{textAlign:'right',padding:'0 6px',borderLeft:'1px solid #F3F4F6'}},
        R('div',{style:{fontSize:9,color:'#9CA3AF',marginBottom:3,fontWeight:600}},'이익률'),
        rate!==null?R('div',{style:{fontSize:highlight?16:13,fontWeight:900,color:rate>=15?'#22C55E':rate>=10?'#15803D':rate>=5?'#F59E0B':rate>=0?'#EF4444':'#DC2626'}},
          (rate>=0?'':'')+rate.toFixed(1)+'%'
        ):R('div',{style:{fontSize:12,color:'#D1D5DB'}},'-')
      )
    );
  };

  if(loading)return R('div',{className:'pg fa',style:{display:'flex',alignItems:'center',justifyContent:'center',height:300}},'⏳ 로딩 중...');

  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},
      R('div',null,
        R('div',{className:'pg-title'},(variant==='adm'?'⚙️':'🏢')+' 경영 대시보드'),
        R('div',{style:{fontSize:11,color:'var(--tm)',marginTop:2}},(variant==='adm'?'관리자':'본사')+' · '+Y+'년 '+M+'월 기준 · 실시간')
      ),
      R('button',{className:'btn bs btn-sm',onClick:load,style:{display:'flex',alignItems:'center',gap:4}},'🔄 새로고침')
    ),

    /* 🔍 진단 정보 (고정비 분리 상태 확인) */
    diagInfo&&R('div',{style:{padding:'10px 14px',background:'#FEF3C7',border:'1px solid #FDE68A',borderRadius:10,marginBottom:14,fontSize:11,color:'#92400E'}},
      R('div',{style:{fontWeight:800,marginBottom:4}},'🔍 고정비 분리 진단 (',variant==='hq'?'본사':'관리자',' 화면)'),
      R('div',{style:{display:'flex',gap:14,flexWrap:'wrap'}},
        R('span',null,'• DB 전체: ',R('b',null,diagInfo.fcTotal,'개')),
        R('span',null,'• 이 화면(',variant,')에 보이는: ',R('b',{style:{color:'#15803D'}},diagInfo.fcFiltered,'개')),
        R('span',null,'• 분포: ',Object.entries(diagInfo.fcBySource).map(([k,v])=>k+'='+v+'개').join(', '))
      ),
      diagInfo.fcBySource['(NULL)']>0&&R('div',{style:{marginTop:6,fontWeight:700,color:'#DC2626'}},'⚠️ ',diagInfo.fcBySource['(NULL)'],'개 항목이 source=NULL입니다. 이런 항목은 관리자(adm)로 간주됩니다. 본사용을 따로 만들려면 [본사 → 고정비 관리]에서 새로 입력하거나 SQL로 source를 hq로 바꿔주세요.')
    ),

    /* ─── 이번달 KPI 카드 6개 ─── */
    R('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(140px, 1fr))',gap:10,marginBottom:14}},
      R(Kpi,{label:'이번달 매출',value:fN(Math.round(mS/10000)),unit:'만',sub:M+'월 1일~오늘',color:'#D94F1E',icon:'💰',trend:R(Diff,{a:mS,b:pmS})}),
      R(Kpi,{label:'이번달 매입',value:fN(Math.round(mP/10000)),unit:'만',sub:M+'월 1일~오늘',color:'#6B7280',icon:'🛒',trend:R(Diff,{a:mP,b:pmP})}),
      R(Kpi,{label:'이번달 고정비',value:fN(Math.round(mFC/10000)),unit:'만',sub:'임대·인건비 등',color:'#9CA3AF',icon:'🏢'}),
      R(Kpi,{label:'이번달 영업이익',value:(mOp>=0?'+':'-')+fN(Math.round(Math.abs(mOp)/10000)),unit:'만',sub:mS>0?'이익률 '+(mOp/mS*100).toFixed(1)+'%':'-',color:mOp>=0?'#15803D':'#DC2626',icon:mOp>=0?'📈':'📉',trend:R(Diff,{a:mOp,b:pmOp})}),

/* ═══ 매출 분석 (매출 전용) ═══════════════════════ */
function PageSalesAnalysis({user,variant='hq'}){
  const[sales,setSales]=useState([]);
  const[loading,setLoading]=useState(true);
  const[period,setPeriod]=useState('thisMonth');
  const[showImport,setShowImport]=useState(false);
  const[showDelete,setShowDelete]=useState(false);
  const[searchProd,setSearchProd]=useState('');  /* 품목 검색 */
  const[searchCust,setSearchCust]=useState(''); /* 거래처 검색 */
  const[selectedProd,setSelectedProd]=useState(null);  /* 클릭한 품목 */
  const[selectedCust,setSelectedCust]=useState(null);  /* 클릭한 거래처 */
  const productRef=useRef();
  const customerRef=useRef();
  const dailyRef=useRef();

  const load=async()=>{
    setLoading(true);
    try{
      const{data}=await sbClient.from('sales').select('*').eq('source',variant).order('sale_date',{ascending:false}).limit(10000);
      setSales(data||[]);
    }catch(e){console.warn(e);}
    setLoading(false);
  };
  useEffect(()=>{load();},[variant]);

  const periodFilter=useMemo(()=>{
    const now=new Date();const y=now.getFullYear(),m=now.getMonth();
    if(period==='thisMonth')return{start:new Date(y,m,1),end:new Date(y,m+1,0,23,59,59),label:y+'년 '+(m+1)+'월'};
    if(period==='lastMonth')return{start:new Date(y,m-1,1),end:new Date(y,m,0,23,59,59),label:y+'년 '+m+'월'};
    if(period==='thisYear')return{start:new Date(y,0,1),end:new Date(y,11,31,23,59,59),label:y+'년'};
    if(period==='last30')return{start:new Date(Date.now()-30*86400000),end:now,label:'최근 30일'};
    return{start:new Date(0),end:now,label:'전체'};
  },[period]);
  const fSales=useMemo(()=>sales.filter(s=>{const d=new Date(s.sale_date);return d>=periodFilter.start&&d<=periodFilter.end;}),[sales,periodFilter]);

  const totalSales=fSales.reduce((s,x)=>s+(+x.amount||0),0);
  const totalQty=fSales.reduce((s,x)=>s+(+x.quantity||0),0);

  const topProducts=useMemo(()=>{
    const m=new Map();
    fSales.forEach(s=>{const k=s.product_name||'기타';if(!m.has(k))m.set(k,{name:k,amount:0,qty:0,count:0});const v=m.get(k);v.amount+=(+s.amount||0);v.qty+=(+s.quantity||0);v.count+=1;});
    return Array.from(m.values()).sort((a,b)=>b.amount-a.amount).slice(0,15);
  },[fSales]);

  const topCustomers=useMemo(()=>{
    const m=new Map();
    fSales.forEach(s=>{const k=s.customer_name||'기타';if(!m.has(k))m.set(k,{name:k,amount:0,count:0});const v=m.get(k);v.amount+=(+s.amount||0);v.count+=1;});
    return Array.from(m.values()).sort((a,b)=>b.amount-a.amount).slice(0,10);
  },[fSales]);

  const dailySales=useMemo(()=>{
    const m=new Map();
    fSales.forEach(s=>{const k=s.sale_date;if(!m.has(k))m.set(k,{date:k,amount:0});m.get(k).amount+=(+s.amount||0);});
    return Array.from(m.values()).sort((a,b)=>a.date.localeCompare(b.date));
  },[fSales]);

  useEffect(()=>{
    if(!window.Chart||loading)return;
    if(productRef.current&&topProducts.length>0){
      const ex=Chart.getChart(productRef.current);if(ex)ex.destroy();
      new Chart(productRef.current,{type:'bar',data:{labels:topProducts.slice(0,10).map(p=>p.name.slice(0,20)),datasets:[{label:'매출',data:topProducts.slice(0,10).map(p=>p.amount),backgroundColor:'rgba(217,79,30,0.85)',borderRadius:5}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>(v/10000).toFixed(0)+'만'}}}}});
    }
    if(customerRef.current&&topCustomers.length>0){
      const ex=Chart.getChart(customerRef.current);if(ex)ex.destroy();
      const colors=['#D94F1E','#F59E0B','#22C55E','#3B82F6','#8B5CF6','#EF4444','#14B8A6','#EC4899','#6366F1','#84CC16'];
      new Chart(customerRef.current,{type:'doughnut',data:{labels:topCustomers.slice(0,8).map(c=>c.name),datasets:[{data:topCustomers.slice(0,8).map(c=>c.amount),backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:12}}}}});
    }
    if(dailyRef.current&&dailySales.length>0){
      const ex=Chart.getChart(dailyRef.current);if(ex)ex.destroy();
      new Chart(dailyRef.current,{type:'line',data:{labels:dailySales.map(d=>d.date.slice(5)),datasets:[{label:'일별 매출',data:dailySales.map(d=>d.amount),borderColor:'#D94F1E',backgroundColor:'rgba(217,79,30,0.1)',borderWidth:2,fill:true,tension:0.3,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>(v/10000).toFixed(0)+'만'}}}}});
    }
  },[loading,topProducts,topCustomers,dailySales]);

  if(loading)return R('div',{className:'pg fa',style:{display:'flex',alignItems:'center',justifyContent:'center',height:200}},'⏳ 로딩 중...');

  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},
      R('div',null,R('div',{className:'pg-title'},(variant==='adm'?'⚙️':'🏢')+' 매출 분석'),R('div',{style:{fontSize:12,color:'var(--tm)',marginTop:2}},periodFilter.label)),
      R('div',{style:{display:'flex',gap:6}},R('button',{className:'btn bp btn-sm',onClick:()=>setShowImport(true)},'📥 Import'),R('button',{className:'btn bs btn-sm',onClick:()=>setShowDelete(true),style:{color:'#EF4444',border:'1px solid #EF4444'}},'🗑 삭제'))
    ),
    R('div',{className:'tab-row',style:{marginBottom:14}},
      ...[['thisMonth','이번 달'],['lastMonth','지난 달'],['thisYear','올해'],['last30','최근 30일'],['all','전체']].map(([k,l])=>
        R('button',{key:k,className:'tab'+(period===k?' act':''),onClick:()=>setPeriod(k)},l)
      )
    ),
    R('div',{className:'g3',style:{marginBottom:14}},
      R('div',{className:'card'},R('div',{style:{fontSize:11,color:'var(--tm)'}},'총 매출'),R('div',{style:{fontSize:24,fontWeight:900,color:'var(--p)',marginTop:4}},fN(Math.round(totalSales)),'원')),
      R('div',{className:'card'},R('div',{style:{fontSize:11,color:'var(--tm)'}},'거래 건수'),R('div',{style:{fontSize:24,fontWeight:900,color:'#3B82F6',marginTop:4}},fSales.length,'건')),
      R('div',{className:'card'},R('div',{style:{fontSize:11,color:'var(--tm)'}},'총 수량'),R('div',{style:{fontSize:24,fontWeight:900,color:'#7C3AED',marginTop:4}},fN(Math.round(totalQty))))
    ),
    R('div',{className:'card',style:{marginBottom:14}},
      R('div',{className:'card-title',style:{marginBottom:10}},'📈 일별 매출 추이'),
      R('div',{style:{height:240}},R('canvas',{ref:dailyRef}))
    ),
    R('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(320px,1fr))',gap:12,marginBottom:14}},
      R('div',{className:'card'},
        R('div',{className:'card-title',style:{marginBottom:10}},'🏆 TOP 제품 매출'),
        R('div',{style:{height:320}},R('canvas',{ref:productRef}))
      ),
      R('div',{className:'card'},
        R('div',{className:'card-title',style:{marginBottom:10}},'🏢 고객사별 매출'),
        R('div',{style:{height:320}},R('canvas',{ref:customerRef}))
      )
    ),
    /* 🔍 품목/거래처 통합 검색 영역 */
    R('div',{className:'card',style:{marginBottom:14,padding:14}},
      R('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:10}},
        R('span',{style:{fontSize:14,fontWeight:800}},'🔍 매출 검색'),
        R('span',{style:{fontSize:10,color:'var(--tm)'}},'· 품목/거래처 클릭 시 상세 정보 보기')
      ),
      R('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
        R('div',null,
          R('label',{style:{fontSize:11,fontWeight:600,color:'var(--tm)',display:'block',marginBottom:4}},'📦 품목 검색'),
          R('input',{value:searchProd,onChange:e=>setSearchProd(e.target.value),placeholder:'품목명 입력...',style:{width:'100%',padding:'8px 12px',border:'1.5px solid var(--bd)',borderRadius:8,fontSize:12,fontFamily:'inherit'}}),
          searchProd&&R('div',{style:{maxHeight:200,overflow:'auto',marginTop:6,border:'1px solid var(--bd)',borderRadius:8,background:'#fff'}},
            ...topProducts.filter(p=>p.name.toLowerCase().includes(searchProd.toLowerCase())).slice(0,15).map(p=>
              R('div',{key:p.name,onClick:()=>{setSelectedProd(p);setSearchProd('');},style:{padding:'8px 10px',cursor:'pointer',borderBottom:'1px solid #F3F4F6',display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:11,transition:'background 0.15s'},
                onMouseEnter:e=>e.currentTarget.style.background='#FFF8F4',
                onMouseLeave:e=>e.currentTarget.style.background='transparent'
              },
                R('span',{style:{flex:1,fontWeight:600,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.name),
                R('span',{style:{color:'var(--p)',fontWeight:700,fontSize:10}},fN(Math.round(p.amount/10000))+'만')
              )
            ),
            topProducts.filter(p=>p.name.toLowerCase().includes(searchProd.toLowerCase())).length===0&&R('div',{style:{padding:14,textAlign:'center',color:'var(--tm)',fontSize:11}},'결과 없음')
          )
        ),
        R('div',null,
          R('label',{style:{fontSize:11,fontWeight:600,color:'var(--tm)',display:'block',marginBottom:4}},'🏢 거래처 검색'),
          R('input',{value:searchCust,onChange:e=>setSearchCust(e.target.value),placeholder:'거래처명 입력...',style:{width:'100%',padding:'8px 12px',border:'1.5px solid var(--bd)',borderRadius:8,fontSize:12,fontFamily:'inherit'}}),
          searchCust&&R('div',{style:{maxHeight:200,overflow:'auto',marginTop:6,border:'1px solid var(--bd)',borderRadius:8,background:'#fff'}},
            ...topCustomers.filter(c=>c.name.toLowerCase().includes(searchCust.toLowerCase())).slice(0,15).map(c=>
              R('div',{key:c.name,onClick:()=>{setSelectedCust(c);setSearchCust('');},style:{padding:'8px 10px',cursor:'pointer',borderBottom:'1px solid #F3F4F6',display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:11,transition:'background 0.15s'},
                onMouseEnter:e=>e.currentTarget.style.background='#FFF8F4',
                onMouseLeave:e=>e.currentTarget.style.background='transparent'
              },
                R('span',{style:{flex:1,fontWeight:600,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},c.name),
                R('span',{style:{color:'var(--p)',fontWeight:700,fontSize:10}},fN(Math.round(c.amount/10000))+'만')

    const found=new Set();
    ingredients.forEach(ing=>{
      const name=(ing.name||'').toLowerCase();
      Object.entries(ALLERGEN_KEYWORDS).forEach(([allergen,kws])=>{
        if(kws.some(kw=>name.includes(kw)))found.add(allergen);

  };

function PageData({mats,prods,orders,hqItems,cats,quote,pqty,onImport}){
  const impRef=useRef(null);
  const exportData=()=>{
    const data=JSON.stringify({version:'6.0',exportedAt:getNow(),mats,prods,orders,hqItems,cats,quote,pqty},null,2);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='BNF_데이터_'+new Date().toLocaleDateString('ko-KR').replace(/[\s.]/g,'')+'.json';
    a.click();
    URL.revokeObjectURL(url);
  };
  const onFile=e=>{
    const f=e.target.files[0];
    if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        onImport(d);
        alert('데이터 복원 완료! 버전: '+(d.version||'?'));
      }catch{alert('파일 오류');}
    };
    reader.readAsText(f);
    e.target.value='';
  };
  return R('div',{className:'pg fa'},
    R('div',{style:{fontSize:14,fontWeight:700,marginBottom:14}},'데이터 관리'),
    R('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}},
      ...[{l:'전체 품목',v:mats.length},{l:'등록 제품',v:prods.length},{l:'발주 건수',v:orders.length},{l:'본사재고 추적',v:hqItems.length}].map((k,i)=>R('div',{key:i,style:{background:'#f8fafc',borderRadius:10,padding:'12px'}},
        R('div',{style:{fontSize:11,color:'#94a3b8',marginBottom:3}},k.l),
        R('div',{style:{fontSize:22,fontWeight:800,color:'#0f172a'}},k.v+'건')
      ))
    ),
    R('div',{className:'card',style:{marginBottom:12}},
      R('div',{style:{fontSize:13,fontWeight:700,marginBottom:8}},'📤 데이터 내보내기 (핸드폰 연동)'),
      R('div',{style:{fontSize:12,color:'#64748b',marginBottom:10}},'현재 데이터를 JSON 파일로 저장. 핸드폰에 전송 후 불러오기로 동기화.'),
      R('button',{className:'btn bp',style:{width:'100%',padding:12,fontSize:14},onClick:exportData},'💾 데이터 파일 저장')
    ),
    R('div',{className:'card',style:{marginBottom:12}},
      R('div',{style:{fontSize:13,fontWeight:700,marginBottom:8}},'📥 데이터 불러오기'),
      R('div',{style:{fontSize:12,color:'#dc2626',marginBottom:8}},'⚠ 현재 데이터가 덮어씌워집니다'),
      R('input',{ref:impRef,type:'file',accept:'.json',style:{display:'none'},onChange:onFile}),
      R('button',{className:'btn bw',style:{width:'100%',padding:12,fontSize:14},onClick:()=>impRef.current.click()},'📂 데이터 파일 불러오기')
    ),
    R('div',{className:'card',style:{background:'#FFF5F0',border:'1px solid #FCC8B0'}},
      R('div',{style:{fontSize:13,fontWeight:700,color:'#D94F1E',marginBottom:8}},'📱 핸드폰 연동 방법'),
      ...[
        '① PC에서 "데이터 파일 저장" 클릭',
        '② 카카오톡/이메일/클라우드로 핸드폰 전송',
        '③ 핸드폰 브라우저에서 bnf_intranet_v6.html 열기',

function loadNavSections(){
  try{
    const saved=localStorage.getItem('bnf_nav_sections_v11');
    if(saved){
      const p=JSON.parse(saved);
      if(Array.isArray(p)&&p.length>0){
        /* 경영지원팀에 shipSched 없으면 자동 추가 (마이그레이션) */
        let updated=false;
        p.forEach(sec=>{
          if(sec.subSections){
            sec.subSections.forEach(sub=>{
              if(sub.label&&sub.label.includes('경영지원팀')&&sub.items){
                const hasShip=sub.items.some(x=>x.id==='shipSched');
                if(!hasShip){
                  const schedIdx=sub.items.findIndex(x=>x.id==='sched');
                  if(schedIdx>=0){
                    sub.items.splice(schedIdx+1,0,{id:'shipSched',l:'출고 스케줄',ic:'🚚'});
                  }else{
                    sub.items.push({id:'shipSched',l:'출고 스케줄',ic:'🚚'});
                  }
                  updated=true;
                }
              }
            });
          }
        });
        if(updated){localStorage.setItem('bnf_nav_sections_v11',JSON.stringify(p));}
        return p;
      }
    }
  }catch(e){}
  return DEFAULT_NAV_SECTIONS;
}

function LoginPage({onLogin}){
  const sv=JSON.parse(localStorage.getItem('bnf_cred')||'{}');
  const[email,setEmail]=useState(sv.email||'');
  const[pw,setPw]=useState(sv.pw||'');
  const[remem,setRemem]=useState(!!sv.email);
  const[err,setErr]=useState('');const[loading,setLoading]=useState(false);
  const login=async()=>{
    if(!email||!pw){setErr('아이디(사번/이메일)와 비밀번호를 입력하세요');return;}
    setLoading(true);setErr('');
    try{
      /* 사번 또는 이메일로 로그인 시도 */
      const input=email.trim();
      let resp=await db('emp').select('*,depts(name)').eq('emp_no',input).maybeSingle();
      let data=resp.data;
      
      /* 사번으로 없으면 이메일로도 시도 */
      if(!data){
        resp=await db('emp').select('*,depts(name)').eq('email',input).maybeSingle();
        data=resp.data;
      }
      
      if(!data){setErr('사번 또는 이메일이 존재하지 않습니다');setLoading(false);return;}
      if(data.password!==pw){setErr('비밀번호가 올바르지 않습니다');setLoading(false);return;}
      if(data.status==='inactive'){setErr('비활성화된 계정입니다');setLoading(false);return;}
      if(remem)localStorage.setItem('bnf_cred',JSON.stringify({email:input,pw}));
      else localStorage.removeItem('bnf_cred');
      
      /* 세션 토큰 생성 + 클라이언트 정보 수집 */
      const sessionToken='sess_'+Date.now()+'_'+Math.random().toString(36).substr(2,12);
      const ua=navigator.userAgent;
      const isMobile=/iPhone|iPad|iPod|Android/i.test(ua);
      const isTablet=/iPad|Tablet/i.test(ua);
      const deviceType=isTablet?'tablet':(isMobile?'mobile':'desktop');
      const browser=/Edg/i.test(ua)?'Edge':/Chrome/i.test(ua)?'Chrome':/Safari/i.test(ua)?'Safari':/Firefox/i.test(ua)?'Firefox':'기타';
      const os=/Windows/i.test(ua)?'Windows':/iPhone|iPad/i.test(ua)?'iOS':/Android/i.test(ua)?'Android':/Mac/i.test(ua)?'macOS':/Linux/i.test(ua)?'Linux':'기타';
      
      /* IP는 외부 API로 조회 (실패해도 진행) */
      let ipAddr='-';
      try{
        const ipRes=await fetch('https://api.ipify.org?format=json',{signal:AbortSignal.timeout(3000)});
        const ipData=await ipRes.json();
        ipAddr=ipData.ip||'-';
      }catch(e){/* 무시 */}
      
      /* DB에 세션 기록 */
      try{
        await sbClient.from('active_sessions').insert({
          emp_id:data.id,emp_email:data.email,emp_name:data.name||data.email,
          ip_address:ipAddr,user_agent:ua.substring(0,500),
          device_type:deviceType,browser:browser,os:os,
          session_token:sessionToken
        });
      }catch(e){console.warn('세션 기록 실패 (테이블 미생성 가능):',e);}
      
      /* 영구 접속 이력에도 기록 */
      try{
        await sbClient.from('login_history').insert({
          emp_id:data.id,emp_email:data.email,emp_name:data.name||data.email,
          event_type:'login',
          ip_address:ipAddr,user_agent:ua.substring(0,500),
          device_type:deviceType,browser:browser,os:os,
          session_token:sessionToken
        });
      }catch(e){console.warn('접속 이력 기록 실패 (테이블 미생성 가능):',e);}
      
      const userWithMeta={...data,_login_at:new Date().toISOString(),_session_token:sessionToken};
      localStorage.setItem('bnf_user',JSON.stringify(userWithMeta));
      localStorage.setItem('bnf_session_token',sessionToken);
      onLogin(userWithMeta);
    }catch(e){setErr('오류: '+e.message);setLoading(false);}
  };
  return R('div',{style:{display:'flex',height:'100vh',background:'linear-gradient(135deg,#1A0C07 0%,#3D1A0E 100%)'}},
    R('div',{style:{margin:'auto',background:'#fff',borderRadius:20,padding:'42px 36px',width:'100%',maxWidth:390,boxShadow:'0 20px 60px rgba(0,0,0,.35)'}},
      R('div',{style:{textAlign:'center',marginBottom:30}},
        R('img',{src:LOGO_FULL,alt:'B&F GLOBAL',style:{width:200,maxWidth:'80%',objectFit:'contain',margin:'0 auto 14px',display:'block'}}),
        R('div',{style:{fontSize:22,fontWeight:900,color:'#1A1A1A',letterSpacing:-0.5}},'B&F Global'),
        R('div',{style:{fontSize:13,color:'#6B6B6B',marginTop:3}},'통합 인트라넷 + MES 시스템')
      ),
      R('div',{style:{display:'flex',flexDirection:'column',gap:10,marginBottom:16}},
        R('div',null,R('label',{style:{fontSize:11,fontWeight:700,color:'#6B6B6B',display:'block',marginBottom:4}},'아이디 (사번/이메일)'),R('input',{className:'inp',value:email,onChange:e=>setEmail(e.target.value),onKeyDown:e=>e.key==='Enter'&&login(),placeholder:'예: bnf001 또는 이메일',type:'text',autoComplete:'username'})),
        R('div',null,R('label',{style:{fontSize:11,fontWeight:700,color:'#6B6B6B',display:'block',marginBottom:4}},'비밀번호'),R('input',{className:'inp',type:'password',value:pw,onChange:e=>setPw(e.target.value),onKeyDown:e=>e.key==='Enter'&&login(),placeholder:'비밀번호 입력',autoComplete:'current-password'})),
        err&&R('div',{style:{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:'8px 12px',fontSize:13,color:'#991b1b'}},err),
        R('label',{style:{display:'flex',alignItems:'center',gap:7,cursor:'pointer',fontSize:13,color:'#6B6B6B'}},

          R('span',null,'아이디/비밀번호 저장')
        ),
        R('button',{onClick:login,disabled:loading,style:{width:'100%',padding:13,background:loading?'#ccc':'#D94F1E',color:'#fff',border:'none',borderRadius:9,cursor:loading?'default':'pointer',fontWeight:700,fontSize:15,fontFamily:'inherit'}},loading?'로그인 중...':'로그인')
      )
    )
  );
}

    }
  };

  const[page,setPageRaw]=useState('home');
  const[pageHistory,setPageHistory]=useState([]);  /* 뒤로가기용 페이지 스택 */
  const[loading,setLoading]=useState(true);
  const[showUserMenu,setShowUserMenu]=useState(false);
  const[sidebarOpen,setSidebarOpen]=useState(false);
  
  /* setPage 래퍼 - 페이지 변경 시 history 스택에 push */
  const setPage=(newPage)=>{
    setPageRaw(prev=>{
      if(prev!==newPage&&prev){
        setPageHistory(h=>[...h.slice(-19),prev]);  /* 최대 20개 유지 */
        /* 브라우저 history에도 push */
        try{window.history.pushState({page:newPage},'',window.location.pathname);}catch(e){}
      }
      return newPage;
    });
  };
  
  /* 뒤로가기 핸들러 */
  const goBack=()=>{
    setPageHistory(h=>{
      if(h.length===0){setPageRaw('home');return [];}
      const prev=h[h.length-1];
      setPageRaw(prev);
      return h.slice(0,-1);
    });
  };
  
  /* 브라우저 뒤로가기 버튼 처리 - 인터넷 브라우저의 ← 버튼과 연동 */
  useEffect(()=>{
    const handlePop=(e)=>{
      /* popstate 발생 시 페이지 히스토리에서 pop */
      setPageHistory(h=>{
        if(h.length===0){
          setPageRaw('home');
          return [];
        }
        const prev=h[h.length-1];
        setPageRaw(prev);
        return h.slice(0,-1);
      });
    };
    window.addEventListener('popstate',handlePop);
    /* 초기 history 진입 - 한 번 더 push해서 뒤로가기 동작 가능하게 */
    try{
      window.history.replaceState({page:'home',depth:0},'',window.location.pathname);
    }catch(e){}
    return()=>window.removeEventListener('popstate',handlePop);
  },[]);
  
  /* 📱 모바일 - iOS 스타일 왼쪽 가장자리 스와이프로 뒤로가기 */
  useEffect(()=>{
    if(typeof window==='undefined')return;
    /* 모바일 환경 체크 - 너비 768px 이하 또는 터치 지원 */
    const isMobileEnv=window.innerWidth<=768||('ontouchstart' in window);
    if(!isMobileEnv)return;
    
    let touchStartX=0;
    let touchStartY=0;
    let touchStartTime=0;
    let isEdgeSwipe=false;       /* 왼쪽 가장자리에서 시작했는가 */
    let indicator=null;          /* 시각 피드백 인디케이터 */
    let mainEl=null;             /* 페이지 전환 시 살짝 따라 움직일 메인 영역 */
    
    const EDGE_THRESHOLD=30;     /* 왼쪽 가장자리 30px 이내에서 시작해야 함 */
    const MIN_DISTANCE=70;       /* 최소 70px 이상 스와이프해야 뒤로가기 */
    const MAX_VERTICAL=80;       /* 수직 흔들림 80px 이내여야 함 (스크롤과 구분) */
    const MAX_DURATION=600;      /* 600ms 이내에 완료되어야 빠른 스와이프로 인식 */
    
    const onTouchStart=(e)=>{
      const t=e.touches[0];
      /* 드래그 가능한 카드/요소 위에서 시작한 터치는 스와이프 뒤로가기 무시 */
      const target=e.target;
      if(target&&target.closest&&target.closest('[draggable="true"]')){
        isEdgeSwipe=false;
        return;
      }
      /* input/textarea/select 위에서 시작한 터치도 무시 (입력 방해 방지) */
      if(target&&(target.tagName==='INPUT'||target.tagName==='TEXTAREA'||target.tagName==='SELECT')){
        isEdgeSwipe=false;
        return;
      }
      /* 왼쪽 가장자리에서 시작한 터치만 추적 */
      if(t.clientX<=EDGE_THRESHOLD){
        touchStartX=t.clientX;
        touchStartY=t.clientY;
        touchStartTime=Date.now();
        isEdgeSwipe=true;
        mainEl=document.querySelector('.main');
      }else{
        isEdgeSwipe=false;
      }
    };
    
    const onTouchMove=(e)=>{
      if(!isEdgeSwipe)return;
      const t=e.touches[0];
      const dx=t.clientX-touchStartX;
      const dy=Math.abs(t.clientY-touchStartY);
      
      /* 수직 흔들림 크면 일반 스크롤로 판단 - 추적 중단 */
      if(dy>MAX_VERTICAL){
        isEdgeSwipe=false;
        if(indicator){indicator.remove();indicator=null;}
        if(mainEl){mainEl.style.transform='';mainEl.style.transition='';mainEl.style.opacity='';}
        return;
      }
      
      /* 오른쪽으로 충분히 움직였으면 시각 피드백 */
      if(dx>15){
        /* 페이지를 약간 따라 움직임 (최대 60px) */
        if(mainEl){
          const offset=Math.min(dx*0.4,60);
          const opacity=Math.max(0.6,1-dx/300);
          mainEl.style.transform='translateX('+offset+'px)';
          mainEl.style.opacity=opacity;
          mainEl.style.transition='none';
        }
        /* 인디케이터 표시 - 왼쪽 가장자리 화살표 */
        if(!indicator){
          indicator=document.createElement('div');
          indicator.style.cssText='position:fixed;left:0;top:50%;transform:translateY(-50%);background:rgba(217,79,30,0.9);color:#fff;padding:12px 8px 12px 10px;border-radius:0 20px 20px 0;font-size:22px;font-weight:700;z-index:99999;pointer-events:none;transition:opacity 0.15s,transform 0.15s;box-shadow:2px 2px 12px rgba(0,0,0,0.2);';
          indicator.textContent='‹';
          document.body.appendChild(indicator);
        }
        /* 진행도에 따라 인디케이터 크기/색상 변화 */
        const progress=Math.min(dx/MIN_DISTANCE,1);
        if(indicator){
          indicator.style.transform='translateY(-50%) scale('+(0.8+progress*0.4)+')';
          indicator.style.background=progress>=1?'rgba(34,197,94,0.95)':'rgba(217,79,30,0.9)';
          indicator.textContent=progress>=1?'✓':'‹';
        }
        /* 가로 스크롤 방지 */
        if(e.cancelable)e.preventDefault();
      }
    };
    
    const onTouchEnd=(e)=>{
      if(!isEdgeSwipe){
        if(indicator){indicator.remove();indicator=null;}
        return;
      }
      const t=e.changedTouches[0];
      const dx=t.clientX-touchStartX;
      const dy=Math.abs(t.clientY-touchStartY);
      const dt=Date.now()-touchStartTime;
      
      /* 인디케이터 제거 */
      if(indicator){
        indicator.style.opacity='0';
        setTimeout(()=>{if(indicator){indicator.remove();indicator=null;}},200);
      }
      /* 페이지 원위치 복귀 (부드럽게) */
      if(mainEl){
        mainEl.style.transition='transform 0.25s ease, opacity 0.25s ease';
        mainEl.style.transform='';
        mainEl.style.opacity='';
        setTimeout(()=>{if(mainEl){mainEl.style.transition='';}},300);
      }
      
      /* 뒤로가기 조건 충족 확인 */
      const isValidSwipe=dx>=MIN_DISTANCE&&dy<=MAX_VERTICAL&&dt<=MAX_DURATION;
      if(isValidSwipe){
        /* 햅틱 피드백 (모바일에서 진동) */
        if(navigator.vibrate)try{navigator.vibrate(15);}catch(e){}
        /* 뒤로가기 실행 */
        goBack();
      }
      isEdgeSwipe=false;
    };
    
    const onTouchCancel=()=>{
      if(indicator){indicator.remove();indicator=null;}
      if(mainEl){
        mainEl.style.transition='transform 0.2s ease';
        mainEl.style.transform='';
        mainEl.style.opacity='';
      }
      isEdgeSwipe=false;
    };
    
    document.addEventListener('touchstart',onTouchStart,{passive:true});
    document.addEventListener('touchmove',onTouchMove,{passive:false});
    document.addEventListener('touchend',onTouchEnd,{passive:true});
    document.addEventListener('touchcancel',onTouchCancel,{passive:true});
    
    return()=>{
      document.removeEventListener('touchstart',onTouchStart);
      document.removeEventListener('touchmove',onTouchMove);
      document.removeEventListener('touchend',onTouchEnd);
      document.removeEventListener('touchcancel',onTouchCancel);
      if(indicator){indicator.remove();}
    };
  },[]);
  
  /* MES 상태 (기존 v6 그대로 유지) */
  const[cats,setCats]=useState(['원재료','포장지','부재료','반제품','제품','공정품']);

  const[saveStatus,setSaveStatus]=useState('');

  const shortCnt=useMemo(()=>mats.filter(m=>m.mu>0&&m.s<m.mu).length,[mats]);

  /* ═══ 앱 내 알림 뱃지 카운트 ═══ */

  const loadNotifications=async()=>{
    if(!user||!user.id)return;

      const items=[];
      /* 1. 본인 결재 대기 (step1_id===user.id && step1_status==='대기') 또는 (step2 동일) */

      let apCount=0;

        if(myStep){
          apCount++;
          items.push({type:'approval',id:a.id,title:'📋 '+(a.title||'결재 요청'),sub:'내 결재 대기 중',time:a.created_at,page:'approval'});
        }
      });
      /* 2. 안 읽은 공지사항 (최근 7일) */
      const since7=new Date(Date.now()-7*86400000).toISOString();
      const readNotices=JSON.parse(localStorage.getItem('bnf_read_notices')||'[]');
      const{data:ntData}=await sbClient.from('notices').select('id,title,is_important,created_at').gte('created_at',since7).order('created_at',{ascending:false}).limit(15);
      let ntCount=0;
      (ntData||[]).forEach(n=>{
        if(!readNotices.includes(n.id)){
          ntCount++;
          items.push({type:'notice',id:n.id,title:(n.is_important?'⚠ ':'📢 ')+n.title,sub:'새 공지사항',time:n.created_at,page:'notices'});
        }
      });
      /* 3. 재고 부족 - 이미 shortCnt로 별도 표시 (총 카운트엔 포함) */
      items.sort((a,b)=>new Date(b.time||0)-new Date(a.time||0));
      setNotifItems(items.slice(0,20));
      setNotif({approval:apCount,notice:ntCount,total:apCount+ntCount+shortCnt});
    }catch(e){/* 무시 - 테이블 없거나 권한 없으면 카운트 0 */}
  };
  
  useEffect(()=>{
    if(!user)return;
    loadNotifications();
    /* 30초마다 자동 갱신 */
    const timer=setInterval(loadNotifications,30000);
    return()=>clearInterval(timer);
  },[user,shortCnt]);
  
  const markNoticeRead=(id)=>{
    const read=JSON.parse(localStorage.getItem('bnf_read_notices')||'[]');
    if(!read.includes(id))read.push(id);
    localStorage.setItem('bnf_read_notices',JSON.stringify(read.slice(-200)));
    loadNotifications();
  };

  /* DB 로드 */
  useEffect(()=>{
    /* ───── 세션 버전 체크 (강제 로그아웃 메커니즘) ─────
       이 값을 바꾸고 새로 배포하면 모든 사용자가 자동 로그아웃됩니다.
       비밀번호 변경, 권한 정책 변경, 보안 사고 발생 등의 상황에서 사용. */
    const SESSION_VERSION='2026-05-11-v1';
    if(localStorage.getItem('bnf_session_v')!==SESSION_VERSION){
      localStorage.removeItem('bnf_user');
      localStorage.removeItem('bnf_cred');
      localStorage.setItem('bnf_session_v',SESSION_VERSION);
    }else{
      const saved=localStorage.getItem('bnf_user');
      if(saved){setUser(JSON.parse(saved));}
    }
    (async()=>{
      try{
        const{data,error}=await db('app_state').select('state_data').eq('id',1).single();
        if(!error&&data?.state_data?.mats?.length>0){
          const d=data.state_data;
          if(d.mats)setMats(d.mats);if(d.prods)setProds(d.prods);
          if(d.orders)setOrders(d.orders);if(d.hqItems)setHqItems(d.hqItems);
          if(d.cats)setCats(d.cats);if(d.quote)setQuote(d.quote);if(d.pqty)setPqty(d.pqty);
        }
      }catch(e){console.warn('DB 로드 실패');}
      setLoading(false);setTimeout(()=>setDbReady(true),200);
    })();
  },[]);

  /* 자동 저장 */
  useEffect(()=>{
    if(!dbReady)return;
    setSaveStatus('saving');
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    saveTimerRef.current=setTimeout(async()=>{
      try{
        await db('app_state').upsert({id:1,state_data:{mats,prods,orders,hqItems,cats,quote,pqty},updated_at:new Date().toISOString()});
        setSaveStatus('saved');setTimeout(()=>setSaveStatus(''),2000);
      }catch(e){setSaveStatus('error');console.warn('자동저장 실패:',e);}
    },500);
  },[dbReady,mats,prods,orders,hqItems,cats,quote,pqty]);

  /* ERP 업로드 - 견고한 버전 */
  const parseXL=f=>{
    if(!f){alert('파일이 선택되지 않았습니다.');return;}
    if(typeof XLSX==='undefined'){alert('엑셀 라이브러리 로딩 실패. 페이지를 새로고침해주세요.');return;}
    
    /* 파일 형식 검증 */
    const ext=f.name.toLowerCase().split('.').pop();
    if(!['xlsx','xls'].includes(ext)){
      alert('지원하지 않는 파일 형식입니다.\n.xlsx 또는 .xls 파일을 업로드해주세요.\n\n선택한 파일: '+f.name);
      return;
    }
    
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        if(!wb||!wb.SheetNames||wb.SheetNames.length===0){
          alert('엑셀 파일에 시트가 없습니다.');
          return;
        }
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        if(rows.length<3){
          alert('데이터가 부족합니다.\n최소 3행 이상 필요합니다.\n현재: '+rows.length+'행');
          return;
        }
        
        let upd=0,add=0,skipped=0,skippedList=[];
        const next=[...mats];
        rows.forEach((row,i)=>{
          if(i<2)return;
          const c=String(row[0]||'').trim();
          const raw=String(row[1]||'').trim();
          const qty=parseFloat(row[2])||0;
          if(!c||!raw){skipped++;skippedList.push({row:i+1,reason:'코드/품목명 비어있음',raw});return;}
          const cm=raw.match(/^\[([^\]]+)\]/);
          const g=cm?cm[1]:'기타';
          /* SKIP 카테고리 필터 제거 - 중복 외 모두 업로드 */
          const n=raw.replace(/^\[[^\]]+\]/,'').replace(/\[[a-zA-Z가-힣]+\]\s*$/,'').trim().slice(0,50);
          let unit='ea';
          const rl=raw.toLowerCase();
          if(rl.includes('[kg]'))unit='kg';
          else if(rl.includes('[l]'))unit='L';
          else if(rl.includes('[box]'))unit='box';
          else if(raw.includes('[롤]'))unit='롤';
          const idx=next.findIndex(m=>m.c===c);
          if(idx>=0){next[idx]={...next[idx],s:qty};upd++;}
          else{next.push({id:uid(),c,g,n,u:unit,s:qty,mu:0,supplier:'',contact:'',lead:3,price:0,addedAt:Date.now()});add++;}
        });
        
        if(upd===0&&add===0){
          alert('처리된 데이터가 없습니다.\n\n• 행 수: '+rows.length+'\n• 건너뜀: '+skipped+'\n\n[엑셀 형식 확인]\n1열: 품목코드\n2열: 품목명 ([분류명]포함)\n3열: 수량\n3행부터 데이터 시작');
          return;
        }
        
        setMats(next);
        setRk(r=>r+1);
        let skipDetail='';
        if(skipped>0){
          skipDetail='\n\n⚠️ 건너뜀: '+skipped+'건 (코드/품목명 비어있는 행)';
          if(skippedList.length<=5){

  useEffect(()=>{

    const checkSession=async()=>{
      try{
        const{data,error}=await db('emp').select('password,status,password_updated_at').eq('id',user.id).single();
        if(error||!data)return;
        const loginAt=user._login_at?new Date(user._login_at).getTime():0;
        const pwUpdatedAt=data.password_updated_at?new Date(data.password_updated_at).getTime():0;
        let shouldLogout=false;let reason='';
        if(pwUpdatedAt>loginAt){shouldLogout=true;reason='비밀번호가 변경되어 로그아웃됩니다.\n다시 로그인해주세요.';}
        else if(data.status==='inactive'){shouldLogout=true;reason='계정이 비활성화되어 로그아웃됩니다.';}
        
        /* 세션이 active_sessions에서 삭제되었는지 확인 (관리자 강제 로그아웃) */
        if(!shouldLogout&&sessionToken){
          try{
            const{data:sess}=await sbClient.from('active_sessions').select('id').eq('session_token',sessionToken).maybeSingle();
            if(!sess){shouldLogout=true;reason='관리자에 의해 로그아웃되었습니다.';}
            else{
              /* 세션 활성 → last_seen_at 갱신 */
              await sbClient.from('active_sessions').update({last_seen_at:new Date().toISOString()}).eq('session_token',sessionToken);
            }
          }catch(e){/* 테이블 없으면 무시 */}
        }
        
        if(shouldLogout){
          /* 영구 이력 기록 (자동 로그아웃) */
          try{
            const loginAt=user._login_at?new Date(user._login_at).getTime():null;
            const durSec=loginAt?Math.round((Date.now()-loginAt)/1000):null;
            await sbClient.from('login_history').insert({
              emp_id:user.id,emp_email:user.email,emp_name:user.name||user.email,
              event_type:'session_expired',
              session_token:sessionToken,duration_seconds:durSec
            });
          }catch(e){}
          localStorage.removeItem('bnf_user');
          localStorage.removeItem('bnf_cred');
          localStorage.removeItem('bnf_session_token');
          alert(reason);
          setUser(null);
        }
