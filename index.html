/* ═══ 출고 계획 (센터별 박스/팔레트 집계) ═══════════════ */
function PageShipSort(){
  const[parsed,setParsed]=useState(null);
  const[loading,setLoading]=useState(false);
  const[progress,setProgress]=useState('');
  const[shipDate,setShipDate]=useState('');
  const[loadedFromDB,setLoadedFromDB]=useState(false);
  const fileRef=useRef(null);
  const captureRef=useRef(null);

  /* 결과 영역을 이미지로 캡처 */
  const captureCanvas=async()=>{
    if(!captureRef.current||typeof html2canvas==='undefined')return null;
    return await html2canvas(captureRef.current,{scale:2,backgroundColor:'#ffffff',useCORS:true});
  };
  const saveImage=async()=>{
    const canvas=await captureCanvas();
    if(!canvas){alert('캡처 실패');return;}
    const link=document.createElement('a');
    link.download='출고계획_'+(shipDate||new Date().toISOString().slice(0,10))+'.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
  };
  const copyImage=async()=>{
    const canvas=await captureCanvas();
    if(!canvas){alert('캡처 실패');return;}
    try{
      canvas.toBlob(async(blob)=>{
        try{
          await navigator.clipboard.write([new window.ClipboardItem({'image/png':blob})]);
          alert('✅ 이미지가 복사되었습니다. 카톡·메일 등에 Ctrl+V로 붙여넣으세요.');
        }catch(e){alert('복사 실패: 이 브라우저는 이미지 복사를 지원하지 않습니다. "이미지 저장"을 이용하세요.');}
      },'image/png');
    }catch(e){alert('복사 실패: '+e.message);}
  };

  /* 저장된 출고계획 불러오기 (페이지 열 때) */
  useEffect(()=>{
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle().then(({data})=>{
      const sd=data&&data.state_data?data.state_data:{};
      if(sd.shipsort_data&&sd.shipsort_data.byCenter){
        setParsed(sd.shipsort_data);
        if(sd.shipsort_date)setShipDate(sd.shipsort_date);
      }
      setLoadedFromDB(true);
    }).catch(()=>setLoadedFromDB(true));
  },[]);

  /* parsed 변경 시 Supabase에 자동 저장 (불러온 직후 제외) */
  const saveShipsort=(data,date)=>{
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle().then(({data:r})=>{
      const ex=r&&r.state_data?r.state_data:{};
      sbClient.from('app_state').upsert({id:1,state_data:{...ex,shipsort_data:data,shipsort_date:date||''},updated_at:new Date().toISOString()});
    });
  };

  /* 센터명 정규화: 거래명세서 표기 → 표시용 짧은 이름 */
  const normCenter=(raw)=>{
    const s=(raw||'').replace(/\s/g,'');
    if(s.includes('김포'))return '김포(삼우)';
    if(s.includes('평택'))return '평택컬리';
    if(s.includes('창원'))return '창원물류대행';
    return raw||'기타';
  };

  /* PDF 텍스트에서 발주 정보 추출 */
  const parsePdfText=(text)=>{
    text=text.replace(/\x00/g,' ').replace(/\n/g,' ');
    /* 센터 */
    let center='기타';
    const cm=text.match(/(김포냉동|평택냉동|창원냉동)/);
    if(cm)center=normCenter(cm[1]);
    /* 입고일 */
    let date='';
    const dm=text.match(/입고[일차()]*[:\s]*(\d{4}-\d{2}-\d{2})/)||text.match(/(\d{4}-\d{2}-\d{2})/);
    if(dm)date=dm[1];
    /* 품목: 마스터코드 + 바코드 + (품명) + 총수량 (소)소비기한 박스 입수 규격g
       품명이 줄바꿈으로 흩어지므로 마스터코드 매핑 우선, 없으면 본문 품명 사용 */
    const NAME_MAP={
      'M00000041872':'[외할머니댁] 일산 털레기 수제비',
      'M00000672121':'[엄마밥상] 김치청국장',
      'MK0000048746':'[엄마밥상] 청국장',
      'MK0000131921':'[엄마밥상] 맑은곰탕'
    };
    const items=[];
    const re=/(M[K]?\d{8,})\s+(8\d{12})(.*?)(\d[\d,]*)\s*\(소\)\s*(\d{4}-\d{2}-\d{2})\s+(\d+)\s+(\d+)\s+\d+g/g;
    let m;
    while((m=re.exec(text))!==null){
      const mcode=m[1];
      const total=parseInt(m[4].replace(/,/g,''));
      const exp=m[5];
      const box=parseInt(m[6]);
      let name=NAME_MAP[mcode]||'';
      if(!name){
        const nm=m[3].match(/(\[[^\]]+\][^0-9]+)/);
        name=nm?nm[1].replace(/\s+/g,' ').trim():mcode;
      }
      if(name&&total>0)items.push({name,total,exp,box});
    }
    return{center,date,items};
  };

  /* 여러 PDF 파일 처리 */
  const handleFiles=async(fileList)=>{
    const files=Array.from(fileList).filter(f=>f.name.toLowerCase().endsWith('.pdf'));
    if(files.length===0){alert('PDF 파일을 선택하세요');return;}
    if(typeof pdfjsLib==='undefined'&&typeof window.pdfjsLib==='undefined'){alert('PDF 라이브러리 로딩 중입니다. 잠시 후 다시 시도하세요.');return;}
    const lib=window.pdfjsLib||pdfjsLib;
    lib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    setLoading(true);setProgress('PDF 분석 중...');
    const allOrders=[];
    let foundDate='';
    for(let fi=0;fi<files.length;fi++){
      setProgress('PDF 분석 중... ('+(fi+1)+'/'+files.length+')');
      try{
        const buf=await files[fi].arrayBuffer();
        const pdf=await lib.getDocument({data:buf}).promise;
        let fullText='';
        for(let p=1;p<=pdf.numPages;p++){
          const page=await pdf.getPage(p);
          const tc=await page.getTextContent();
          fullText+=' '+tc.items.map(it=>it.str).join(' ');
        }
        const order=parsePdfText(fullText);
        if(order.date&&!foundDate)foundDate=order.date;
        if(order.items.length>0)allOrders.push(order);
      }catch(e){console.error('PDF 파싱 실패:',files[fi].name,e);}
    }
    if(allOrders.length===0){setLoading(false);setProgress('');alert('발주 정보를 추출하지 못했습니다. PDF 형식을 확인하세요.');return;}
    if(foundDate)setShipDate(foundDate);
    aggregate(allOrders,foundDate);
    setLoading(false);setProgress('');
  };

  /* 센터별 집계 */
  const aggregate=(orders,dateStr)=>{
    const byCenter={};
    orders.forEach(o=>{
      if(!byCenter[o.center])byCenter[o.center]={items:{},totalBox:0};
      o.items.forEach(it=>{
        if(!byCenter[o.center].items[it.name]){
          byCenter[o.center].items[it.name]={box:0,total:0,exp:it.exp};
        }
        byCenter[o.center].items[it.name].box+=it.box;
        byCenter[o.center].items[it.name].total+=it.total;
        if(it.exp)byCenter[o.center].items[it.name].exp=it.exp;
        byCenter[o.center].totalBox+=it.box;
      });
    });
    /* 제품 총수량 */
    const prodTotal={};
    orders.forEach(o=>o.items.forEach(it=>{prodTotal[it.name]=(prodTotal[it.name]||0)+it.total;}));
    const result={byCenter,prodTotal};
    setParsed(result);
    saveShipsort(result,dateStr||shipDate); /* 새로고침해도 남도록 저장 */
  };

  const exportResult=()=>{
    if(!parsed)return;
    const rows=[[ (shipDate||'') +' 출고 예정 상품','','','','']];
    rows.push(['출고센터','제품명','박스수량','제품수량','소비기한']);
    Object.entries(parsed.byCenter).forEach(([center,d])=>{
      const its=Object.entries(d.items);
      its.forEach(([name,v],i)=>rows.push([i===0?center:'',name,v.box,v.total,v.exp]));
      rows.push(['','합계',d.totalBox,'','']);
      rows.push(['','박스',30,'','']);
      rows.push(['','팔레트 수',(d.totalBox/30).toFixed(6),'','']);
      rows.push(['','','','','']);
    });
    rows.push(['','','','','']);
    Object.entries(parsed.prodTotal).forEach(([name,t])=>rows.push([name,t,'ea','','']));
    exportXL(rows,'출고계획_'+(shipDate||new Date().toISOString().slice(0,10)),'출고계획');
  };

  const onDrop=(e)=>{e.preventDefault();if(e.dataTransfer.files.length)handleFiles(e.dataTransfer.files);};

  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},
      R('div',null,R('div',{className:'pg-title'},'📦 출고 계획'),R('div',{style:{fontSize:11,color:'var(--tm)',marginTop:2}},'컬리 거래명세서 PDF를 올리면 센터별로 자동 정리')),
      R('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
        parsed&&R('button',{className:'btn bp',onClick:exportResult},'엑셀'),
        parsed&&R('button',{className:'btn bs',onClick:saveImage},'🖼 이미지 저장'),
        parsed&&R('button',{className:'btn bs',onClick:copyImage},'📋 이미지 복사'),
        parsed&&R('button',{className:'btn bs',onClick:()=>{
          if(!confirm('저장된 출고 계획을 지울까요?'))return;
          setParsed(null);setShipDate('');saveShipsort(null,'');
        }},'초기화')
      )
    ),
    /* 업로드 영역 */
    R('div',{className:'card',style:{marginBottom:14}},
      R('div',{onDragOver:e=>e.preventDefault(),onDrop:onDrop,onClick:()=>fileRef.current&&fileRef.current.click(),
        style:{border:'2px dashed var(--p)',borderRadius:12,padding:'28px 16px',textAlign:'center',cursor:'pointer',background:'#FFF8F4'}},
        R('div',{style:{fontSize:36,marginBottom:8}},'📄'),
        R('div',{style:{fontSize:14,fontWeight:700,marginBottom:4}},loading?progress:'거래명세서 PDF 올리기'),
        R('div',{style:{fontSize:11,color:'var(--tm)'}},loading?'잠시만 기다려주세요':'여러 센터 PDF를 한 번에 선택하거나 드래그하세요')
      ),
      R('input',{ref:fileRef,type:'file',accept:'.pdf',multiple:true,onChange:e=>{handleFiles(e.target.files);e.target.value='';},style:{display:'none'}})
    ),
    /* 결과 */
    parsed&&R('div',{ref:captureRef,style:{background:'#fff'}},
      shipDate&&R('div',{style:{textAlign:'center',fontSize:15,fontWeight:800,color:'var(--p)',marginBottom:12}},shipDate+' 출고 예정 상품'),
      ...Object.entries(parsed.byCenter).map(([center,d])=>{
        const pallet=d.totalBox/30;
        /* 센터별 색상 (헤더 배경/합계 배경) */
        const colorMap={
          '김포(삼우)':{hdr:'#16A34A',hdrD:'#15803D',sum:'#F0FDF4',sumT:'#16A34A'},
          '평택컬리':{hdr:'#2563EB',hdrD:'#1D4ED8',sum:'#EFF6FF',sumT:'#2563EB'},
          '창원물류대행':{hdr:'#D94F1E',hdrD:'#B83E15',sum:'#FFF8F4',sumT:'#D94F1E'}
        };
        const c=colorMap[center]||{hdr:'#64748B',hdrD:'#475569',sum:'#F8FAFC',sumT:'#475569'};
        /* grid 4컬럼: 제품명(자동, 최대 260px) | 박스(40px) | 제품수량(60px) | 소비기한(85px) */
        const gridCols='minmax(180px,260px) 40px 60px 85px';
        const rowSty={display:'grid',gridTemplateColumns:gridCols,columnGap:'14px',alignItems:'center'};
        return R('div',{key:center,className:'card',style:{marginBottom:12,padding:0,overflow:'hidden',maxWidth:560}},
          R('div',{style:{padding:'10px 14px',background:'linear-gradient(135deg,'+c.hdr+','+c.hdrD+')',color:'#fff',fontWeight:800,fontSize:14}},center),
          /* 헤더 */
          R('div',{style:{...rowSty,padding:'5px 12px',background:'#FAFAFA',fontSize:10,color:'#64748b',fontWeight:600}},
            R('div',null,'제품명'),
            R('div',null,'박스'),
            R('div',null,'제품수량'),
            R('div',null,'소비기한')
          ),
          /* 데이터 행 */
          ...Object.entries(d.items).map(([name,v],i)=>R('div',{key:i,style:{...rowSty,padding:'5px 12px',borderTop:'1px solid #F1F5F9',fontSize:12}},
            R('div',{style:{fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},name),
            R('div',{style:{fontWeight:700}},v.box),
            R('div',{style:{color:'#64748b'}},fN(v.total)),
            R('div',{style:{color:'#DC2626',fontWeight:600}},v.exp||'-')
          )),
          /* 합계 행 - 데이터 행과 동일 grid로 왼쪽 정렬 */
          R('div',{style:{...rowSty,padding:'6px 12px',borderTop:'2px solid '+c.hdr,background:c.sum,fontSize:12}},
            R('div',{style:{fontWeight:800,color:c.sumT}},'합계'),
            R('div',{style:{fontWeight:800,color:c.sumT}},d.totalBox),
            R('div',{style:{fontWeight:700,color:c.sumT,whiteSpace:'nowrap',gridColumn:'3 / span 2'}},'팔레트 ',pallet.toFixed(2))
          )
        );
      }),
      /* 제품 총수량 */
      R('div',{className:'card',style:{marginTop:4,maxWidth:560}},
        R('div',{style:{fontSize:12,fontWeight:700,marginBottom:8}},'제품 총수량 (전 센터 합계)'),
        ...Object.entries(parsed.prodTotal).map(([name,t])=>R('div',{key:name,style:{display:'grid',gridTemplateColumns:'minmax(180px,260px) auto',columnGap:'14px',padding:'5px 0',borderBottom:'1px solid #F1F5F9',fontSize:12}},
          R('span',{style:{fontWeight:600}},name),
          R('span',{style:{fontWeight:700,color:'var(--p)'}},fN(t),' ea')
        ))
      ),
      R('div',{style:{fontSize:10,color:'var(--tm)',marginTop:8,padding:'0 4px'}},'※ PDF에서 자동 추출한 결과입니다. 팔레트는 30박스=1팔레트 기준입니다. 숫자가 틀리면 PDF 원본을 확인하세요.')
    )
  );
}

function App(){
  const[user,setUser]=useState(null);
  const[sbOpen,setSbOpen]=useState(false); /* 모바일 사이드바 토글 */
  /* ── 모바일 스와이프 제스처: 왼쪽 가장자리→오른쪽 = 메뉴 열기, 메뉴 열림 상태 왼쪽 스와이프 = 닫기 ── */
  useEffect(()=>{
    if(window.innerWidth>768)return; /* 모바일에서만 */
    let startX=0,startY=0,startT=0,tracking=false;
    const onStart=(e)=>{
      const t=e.touches[0];
      startX=t.clientX;startY=t.clientY;startT=Date.now();
      /* 메뉴 닫힘: 화면 왼쪽 30px 안에서 시작한 터치만 추적 (열기 제스처)
         메뉴 열림: 어디서든 추적 (닫기 제스처) */
      tracking = sbOpen || startX<=30;
    };
    const onEnd=(e)=>{
      if(!tracking)return;tracking=false;
      const t=e.changedTouches[0];
      const dx=t.clientX-startX, dy=t.clientY-startY, dt=Date.now()-startT;
      /* 가로 이동이 세로보다 충분히 크고, 빠르거나 충분히 멀면 동작 */
      if(Math.abs(dx)<60||Math.abs(dy)>Math.abs(dx)*0.8)return;
      if(dt>600)return;
      if(dx>60&&!sbOpen){setSbOpen(true);}       /* 오른쪽 스와이프 → 열기 */
      else if(dx<-60&&sbOpen){setSbOpen(false);} /* 왼쪽 스와이프 → 닫기 */
    };
    document.addEventListener('touchstart',onStart,{passive:true});
    document.addEventListener('touchend',onEnd,{passive:true});
    return ()=>{
      document.removeEventListener('touchstart',onStart);
      document.removeEventListener('touchend',onEnd);
    };
  },[sbOpen]);
  const[navSections,setNavSections]=useState(()=>loadNavSections());
  const[navEditMode,setNavEditMode]=useState(false);
  const[draggedItem,setDraggedItem]=useState(null);
  const[expandedFolders,setExpandedFolders]=useState(()=>{
    try{const saved=localStorage.getItem('bnf_expanded_folders');if(saved)return JSON.parse(saved);}catch(e){}
    return{hq:true,factory:true};
  });
  useEffect(()=>{try{localStorage.setItem('bnf_expanded_folders',JSON.stringify(expandedFolders));}catch(e){}},[expandedFolders]);
  const[showInstallTip,setShowInstallTip]=useState(false);
  const[isInstalled,setIsInstalled]=useState(false);
  useEffect(()=>{
    const seen=localStorage.getItem('bnf_install_seen');
    if(window._isStandalone){setIsInstalled(true);return;}
    if(!seen)setTimeout(()=>setShowInstallTip(true),3500);
  },[]);
  const installApp=async()=>{
    if(window._deferredPrompt){
      window._deferredPrompt.prompt();
      try{
        const{outcome}=await window._deferredPrompt.userChoice;
        if(outcome==='accepted'){setIsInstalled(true);setShowInstallTip(false);}
      }catch(e){}
      window._deferredPrompt=null;
    }else if(window._isIOS){
      alert('iPhone/iPad 설치 방법:\n\n1. Safari 하단 [공유] 버튼 (□↑) 누르기\n2. 아래로 스크롤\n3. "홈 화면에 추가" 누르기\n4. "추가" 버튼 누르기\n\n그러면 홈 화면에 B&F 아이콘 생깁니다!');
    }else{
      alert('Android Chrome 설치 방법:\n\n1. 우측 상단 메뉴 (⋮) 누르기\n2. "홈 화면에 추가" 또는 "앱 설치" 선택\n3. 설치 완료!');
    }
  };

  const[page,setPage]=useState('home');
  const[globalSearch,setGlobalSearch]=useState(false); /* Cmd+K 글로벌 검색 모달 */
  const[notifPanel,setNotifPanel]=useState(false); /* 알림 패널 */
  /* Cmd+K / Ctrl+K로 글로벌 검색 열기 */
  useEffect(()=>{
    const onKey=e=>{
      if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setGlobalSearch(true);}
      if(e.key==='Escape'){setGlobalSearch(false);setNotifPanel(false);}
    };
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[]);
  const[loading,setLoading]=useState(true);
  
  /* MES 상태 (기존 v6 그대로 유지) */
  const[cats,setCats]=useState(['원재료','포장지','부재료','반제품','제품','공정품']);
  const[mats,setMats]=useState(initMats);
  const[prods,setProds]=useState([]);
  const[hqItems,setHqItems]=useState([]);
  const[orders,setOrders]=useState([]);
  const[quote,setQuote]=useState({number:'2026-001',date:new Date().toLocaleDateString('ko-KR'),validity:'30일',delivery:'협의',payment:'발주 후 30일 이내',vat:true,company:{name:'',rep:'',bizNum:'',tel:'',fax:'',addr:''},iName:'(주)B&F글로벌',iRep:'',iBizNum:'',iTel:'',iFax:'',iAddr:'',items:[{id:uid(),name:'',spec:'',qty:1,unit:'ea',unitPrice:0,note:''}],note:'',closing:'위와 같이 견적합니다.'});
  const[rk,setRk]=useState(0);
  const[pqty,setPqty]=useState({});
  const[bomModal,setBomModal]=useState(false);
  const[imgModal,setImgModal]=useState(null);
  const[navOrder,setNavOrder]=useState(NAV_SECTIONS.flatMap(s=>s.items.map(i=>i.id)));
  const[navDragSrc,setNavDragSrc]=useState(null);
  const[navDragOver,setNavDragOver]=useState(null);
  const[saveStatus,setSaveStatus]=useState('');
  const[dbReady,setDbReady]=useState(false);
  const saveTimerRef=useRef(null);
  const fRef=useRef();
  
  const updMat=(id,k,v)=>setMats(p=>p.map(m=>m.id===id?{...m,[k]:v}:m));
  const shortCnt=useMemo(()=>mats.filter(m=>m.mu>0&&m.s<m.mu).length,[mats]);

  /* DB 로드 + 양방향 동기화 (PC↔모바일) */
  const isSavingRef=useRef(false);
  const reloadFromDB=async(silent=false)=>{
    /* 자동저장 진행 중이면 reloadFromDB 차단 (race condition 방지) */
    if(isSavingRef.current){console.log('[Sync] 저장 중 - reload 스킵');return;}
    try{
      const{data,error}=await db('app_state').select('state_data').eq('id',1).maybeSingle();
      if(error||!data||!data.state_data)return;
      /* 저장 중 상태가 다시 켜졌으면 그 사이의 변경사항이 더 최신일 수 있으므로 스킵 */
      if(isSavingRef.current){console.log('[Sync] 저장 진행 중 - 결과 적용 스킵');return;}
      const d=data.state_data;
      /* setState 콜백 내부에서 비교하여 closure 문제 회피 (의존성 배열 최소화) */
      if(d.mats)setMats(prev=>JSON.stringify(prev)!==JSON.stringify(d.mats)?d.mats:prev);
      if(d.prods)setProds(prev=>JSON.stringify(prev)!==JSON.stringify(d.prods)?d.prods:prev);
      if(d.orders)setOrders(prev=>JSON.stringify(prev)!==JSON.stringify(d.orders)?d.orders:prev);
      if(d.hqItems)setHqItems(prev=>JSON.stringify(prev)!==JSON.stringify(d.hqItems)?d.hqItems:prev);
      if(d.cats)setCats(prev=>JSON.stringify(prev)!==JSON.stringify(d.cats)?d.cats:prev);
      if(d.quote)setQuote(prev=>JSON.stringify(prev)!==JSON.stringify(d.quote)?d.quote:prev);
      if(d.pqty)setPqty(prev=>JSON.stringify(prev)!==JSON.stringify(d.pqty)?d.pqty:prev);
    }catch(e){if(!silent)console.warn('reloadFromDB:',e);}
  };
  useEffect(()=>{
    const saved=localStorage.getItem('bnf_user');
    if(saved){setUser(JSON.parse(saved));}
    (async()=>{
      try{
        const{data,error}=await db('app_state').select('state_data').eq('id',1).single();
        if(!error&&data?.state_data?.mats?.length>0){
          const d=data.state_data;
          if(d.mats)setMats(d.mats);if(d.prods)setProds(d.prods);
          if(d.orders)setOrders(d.orders);if(d.hqItems)setHqItems(d.hqItems);
          if(d.cats)setCats(d.cats);if(d.quote)setQuote(d.quote);if(d.pqty)setPqty(d.pqty);
        }
      }catch(e){console.warn('DB 로드 실패');}
      setLoading(false);setTimeout(()=>setDbReady(true),200);
    })();
  },[]);
  /* 양방향 동기화: Supabase Realtime + 백업 폴링 + 활성화 감지 */
  useEffect(()=>{
    if(!dbReady)return;
    /* 1. Realtime 구독 - app_state 테이블 변경 시 즉시 push */
    let channel=null;
    try{
      channel=sbClient.channel('app_state_sync_'+Date.now())
        .on('postgres_changes',{event:'*',schema:'public',table:'app_state',filter:'id=eq.1'},(payload)=>{
          console.log('[Realtime] app_state 변경 감지',payload.eventType);
          reloadFromDB(true);
        })
        .subscribe((status)=>{
          if(status==='SUBSCRIBED')console.log('[Realtime] 구독 성공 - 다른 기기 변경사항 즉시 반영');
          else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT')console.warn('[Realtime] 구독 실패, 폴링으로 fallback');
        });
    }catch(e){console.warn('[Realtime] 초기화 실패',e);}
    /* 2. 페이지 활성화 이벤트 - 즉시 동기화 */
    const onVis=()=>{if(!document.hidden)reloadFromDB(true);};
    const onFocus=()=>reloadFromDB(true);
    document.addEventListener('visibilitychange',onVis);

  },[dbReady]); /* 의존성 최소화 - state 변경 시 effect 재실행 방지 */

  useEffect(()=>{

  /* ERP 업로드 */
  const[xlPreview,setXlPreview]=useState(null); /* {rows, headerRow, codeCol, nameCol, qtyCol, fileName} */
  const parseXL=f=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        if(rows.length<2){alert('엑셀 데이터가 없습니다');return;}
        /* 헤더 자동 추정 - 코드/품목/재고 키워드가 가장 많이 일치하는 행을 헤더로 선택 */
        let headerRow=-1;let codeCol=-1;let nameCol=-1;let qtyCol=-1;
        const candidates=[];
        for(let r=0;r<Math.min(10,rows.length);r++){
          const row=rows[r];
          if(!row||row.length<2)continue;
          let score=0,cCode=-1,cName=-1,cQty=-1;
          row.forEach((cell,ci)=>{
            const v=String(cell||'').trim().replace(/\[.*?\]/g,'').trim();
            if(!v)return;
            /* 정확 매칭에 가중치 더 부여 */
            if(/^(품목코드|코드|품번|코드번호|자재코드)$/.test(v)){if(cCode<0){cCode=ci;score+=3;}}
            else if(/^(품목명|품명|품목|상품명|자재명|품목명\(규격\))$/.test(v)){if(cName<0){cName=ci;score+=3;}}
            else if(/^(재고수량|현재고|단위재고|재고량|현재량)$/.test(v)){if(cQty<0){cQty=ci;score+=3;}}
            else if(v==='수량'||v==='재고'){if(cQty<0){cQty=ci;score+=2;}}
            else if(/코드/.test(v)&&!/공급|매입|매출/.test(v)){if(cCode<0){cCode=ci;score+=1;}}
            else if(/품목|품명/.test(v)&&v.length<10){if(cName<0){cName=ci;score+=1;}}
            else if(/재고|수량/.test(v)&&!/입고|출고|안전|이전|이월|예정|회사명|매입|매출/.test(v)&&v.length<10){if(cQty<0){cQty=ci;score+=1;}}
          });
          /* 헤더 후보 최소 조건: code, name, qty 셋 중 2개 이상 매칭 + 데이터 행 존재 */
          const found=[cCode>=0,cName>=0,cQty>=0].filter(Boolean).length;
          if(found>=2&&rows.length>r+1){
            candidates.push({r,score,cCode,cName,cQty,found});
          }
        }
        /* 가장 높은 score의 후보 선택 (score 같으면 더 늦은 행 - 보통 회사명/날짜 뒤에 진짜 헤더) */
        if(candidates.length>0){
          candidates.sort((a,b)=>b.score-a.score||b.r-a.r);
          const best=candidates[0];
          headerRow=best.r;codeCol=best.cCode;nameCol=best.cName;qtyCol=best.cQty;
        }
        if(headerRow<0)headerRow=0;
        if(codeCol<0)codeCol=0;
        if(nameCol<0)nameCol=1;
        if(qtyCol<0)qtyCol=Math.max(2,(rows[headerRow]||[]).length-1);
        console.log('[ERP] 헤더 인식:',{headerRow,codeCol,nameCol,qtyCol,header:(rows[headerRow]||[]),candidates});
        /* 미리보기 모달 표시 - 사용자가 직접 컬럼 선택 가능 */
        setXlPreview({rows,headerRow,codeCol,nameCol,qtyCol,fileName:f.name});
      }catch(e){alert('파일 오류: '+e.message);console.error(e);}
    };
    reader.readAsArrayBuffer(f);
  };
  const confirmXlImport=(headerRow,codeCol,nameCol,qtyCol,mode='merge')=>{
    if(!xlPreview)return;
    /* 안전 검증: 코드/이름/재고가 같은 컬럼이거나 잘못 매핑된 경우 */
    if(codeCol===qtyCol){alert('⚠️ 코드 컬럼과 재고 컬럼이 같습니다!\n재고 수량 셀렉트에서 다른 컬럼을 선택해주세요.');return;}
    if(nameCol===qtyCol){alert('⚠️ 품목명 컬럼과 재고 컬럼이 같습니다!\n재고 수량 셀렉트에서 다른 컬럼을 선택해주세요.');return;}
    const{rows}=xlPreview;
    /* 추가 검증: 재고 컬럼 값이 코드와 동일한지 sampling (코드 컬럼을 잘못 선택한 경우 탐지) */
    let suspiciousCount=0;let sampleSize=0;
    for(let i=headerRow+1;i<Math.min(headerRow+10,rows.length);i++){
      const row=rows[i];if(!row)continue;
      const codeVal=String(row[codeCol]||'').trim();
      const qtyVal=String(row[qtyCol]||'').trim();
      if(!codeVal||!qtyVal)continue;
      sampleSize++;
      /* 코드와 재고 값이 같으면 의심 (코드 컬럼을 재고로 잘못 선택) */
      if(codeVal===qtyVal)suspiciousCount++;
    }
    if(sampleSize>=3&&suspiciousCount>=sampleSize*0.7){
      if(!confirm('⚠️ 경고: 재고 컬럼의 값이 품목코드와 거의 동일합니다.\n'+
        '재고 컬럼이 잘못 선택되었을 가능성이 높습니다.\n\n'+
        '예: 재고가 '+rows[headerRow+1][qtyCol]+' (코드와 동일)\n\n'+
        '그래도 진행할까요?'))return;
    }
    let upd=0,add=0,skip=0,zeroed=0;
    const SKIP=['공정품','기타','박스스티커','스티커','상품'];
    const startRow=headerRow+1;
    /* 엑셀에 있는 품목 코드 수집 */
    const xlCodes=new Set();
    const parsed=[];
    rows.forEach((row,i)=>{
      if(i<startRow)return;
      const c=String(row[codeCol]||'').trim();
      const raw=String(row[nameCol]||'').trim();
      const rawQty=row[qtyCol];
      const qty=parseFloat(String(rawQty||'').replace(/,/g,''))||0;
      if(!c||!raw){skip++;return;}
      const cm=raw.match(/^\[([^\]]+)\]/);const g=cm?cm[1]:'기타';
      if(SKIP.includes(g)){skip++;return;}
      const n=raw.replace(/^\[[^\]]+\]/,'').replace(/\[[a-zA-Z가-힣]+\]\s*$/,'').trim().slice(0,50);
      let unit='ea';const rl=raw.toLowerCase();
      if(rl.includes('[kg]'))unit='kg';else if(rl.includes('[l]'))unit='L';else if(rl.includes('[box]'))unit='box';else if(raw.includes('[롤]'))unit='롤';
      xlCodes.add(c);
      parsed.push({c,g,n,u:unit,s:qty});
    });
    let next;
    if(mode==='replace'){
      /* 완전 교체 - 기존 mats 전체 삭제 후 엑셀에 있는 것만 새로 생성 */
      /* (단 기존 품목의 mu, supplier, price, mat_id 등은 코드로 매칭하여 유지) */
      next=parsed.map(p=>{
        const existing=mats.find(m=>m.c===p.c);
        if(existing){upd++;return{...existing,n:p.n,g:p.g,u:p.u,s:p.s};}
        else{add++;return{id:uid(),c:p.c,g:p.g,n:p.n,u:p.u,s:p.s,mu:0,supplier:'',contact:'',lead:3,price:0,addedAt:Date.now()};}
      });
    }else{
      /* merge - 기존 mats 유지 + 엑셀에 있는 코드만 재고 업데이트 + 없는 코드 추가 */
      next=[...mats];
      parsed.forEach(p=>{
        const idx=next.findIndex(m=>m.c===p.c);
        if(idx>=0){next[idx]={...next[idx],s:p.s,n:p.n,g:p.g,u:p.u};upd++;}
        else{next.push({id:uid(),c:p.c,g:p.g,n:p.n,u:p.u,s:p.s,mu:0,supplier:'',contact:'',lead:3,price:0,addedAt:Date.now()});add++;}
      });
      /* zero-missing 모드: 엑셀에 없는 기존 품목의 재고를 0으로 (엑셀이 마지막 시점의 ground truth) */
      if(mode==='zero-missing'){
        next=next.map(m=>{
          if(!xlCodes.has(m.c)){zeroed++;return{...m,s:0};}
          return m;
        });
      }
    }
    setMats(next);setRk(r=>r+1);
    setXlPreview(null);
    const modeLabel=mode==='replace'?'완전 교체':mode==='zero-missing'?'엑셀 기준 갱신':'추가 업데이트';
    alert('✅ 업로드 완료 ('+modeLabel+')\n\n📊 결과:\n• 업데이트: '+upd+'건\n• 신규 추가: '+add+'건\n• 제외(공정품 등): '+skip+'건'+(zeroed>0?'\n• 재고 0 처리: '+zeroed+'건':'')+'\n• 전체: '+next.length+'개');
  };

    if(page==='attendance')return R(PageAttendance,{user});
    if(page==='leave')return R(PageLeave,{user});
    if(page==='admin')return R(PageAdmin,{user});
    return R('div',{className:'pg'},R('div',{className:'empty'},R('div',{className:'empty-ic'},'🚧'),'준비 중'));
  };

  const mobNav=[{id:'home',l:'홈',ic:'⊞'},{id:'inv',l:'재고',ic:'≡'},{id:'sched',l:'생산스케줄',ic:'📅'},{id:'orders',l:'발주',ic:'🚚'},{id:'notices',l:'공지',ic:'📢'}];

  /* ═ SVG 라인 아이콘 (lucide 스타일) ═ */
  const NavIcon=({name})=>{
    const props={width:22,height:22,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'};
    const paths={
      home:R('svg',props,R('path',{d:'M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1V9.5z'})),
      box:R('svg',props,
        R('path',{d:'M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z'}),
        R('polyline',{points:'3.27 6.96 12 12.01 20.73 6.96'}),
        R('line',{x1:12,y1:22.08,x2:12,y2:12})
      ),
      calendar:R('svg',props,
        R('rect',{x:3,y:4,width:18,height:18,rx:2}),
        R('line',{x1:16,y1:2,x2:16,y2:6}),
        R('line',{x1:8,y1:2,x2:8,y2:6}),
        R('line',{x1:3,y1:10,x2:21,y2:10})
      ),
      link:R('svg',props,
        R('path',{d:'M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71'}),
        R('path',{d:'M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71'})
      ),
      chat:R('svg',props,R('path',{d:'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z'})),
      menu:R('svg',props,R('line',{x1:3,y1:6,x2:21,y2:6}),R('line',{x1:3,y1:12,x2:21,y2:12}),R('line',{x1:3,y1:18,x2:21,y2:18})),
      alert:R('svg',props,R('path',{d:'M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z'}),R('line',{x1:12,y1:9,x2:12,y2:13}),R('line',{x1:12,y1:17,x2:12.01,y2:17})),
      user:R('svg',props,R('path',{d:'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'}),R('circle',{cx:12,cy:7,r:4})),
      logout:R('svg',props,R('path',{d:'M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4'}),R('polyline',{points:'16 17 21 12 16 7'}),R('line',{x1:21,y1:12,x2:9,y2:12}))
    };
    return paths[name]||null;
  };

  return R('div',{className:'app'},
    /* 헤더 */
    R('div',{className:'hdr'},
      /* 모바일 햄버거 (맨 왼쪽 - 메뉴 카테고리) */
      R('button',{
        onClick:()=>setSbOpen(true),
        className:'mobile-hdr-btn',
        style:{
          display:'none',
          background:'none',border:'none',cursor:'pointer',
          padding:'6px 8px',color:'#fff',
          borderRadius:8,lineHeight:0,marginRight:2
        },
        title:'메뉴'
      },R(NavIcon,{name:'menu'})),
      R('div',{style:{display:'flex',alignItems:'center',gap:8}},
        R('img',{src:LOGO_FULL,alt:'B&F GLOBAL',style:{height:34,objectFit:'contain',maxWidth:160,cursor:'pointer',filter:'brightness(0) invert(1)'},onClick:()=>setPage('home')}),
        R('span',{style:{background:'rgba(255,255,255,0.2)',color:'#fff',fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:4,letterSpacing:0.5}},'MES')
      ),
      R('div',{style:{flex:1}}),
      /* 우측 정보 - 1열로 나란히 (모바일에서도 한 줄, 줄바꿈 금지) */
      R('div',{className:'hdr-info',style:{display:'flex',alignItems:'center',gap:10,flexWrap:'nowrap',whiteSpace:'nowrap'}},
        /* 🔍 글로벌 검색 (Ctrl+K) */
        R('button',{onClick:()=>setGlobalSearch(true),title:'빠른 검색 (Ctrl+K)',className:'hdr-search-btn',style:{display:'flex',alignItems:'center',gap:6,padding:'5px 10px 5px 12px',background:'#fff',border:'1px solid var(--bd)',borderRadius:20,cursor:'pointer',fontSize:11,color:'#64748B',flexShrink:0,fontFamily:'inherit',transition:'all .15s'}},
          R('span',{style:{fontSize:12}},'🔍'),
          R('span',{className:'hdr-search-text'},'검색'),
          R('span',{style:{display:'inline-flex',alignItems:'center',gap:2,padding:'1px 5px',background:'#F3F4F6',borderRadius:4,fontSize:9,fontWeight:600,color:'#94a3b8',marginLeft:2}},'⌘K')
        ),
        /* 🔔 알림 */
        R('button',{onClick:()=>setNotifPanel(true),title:'알림',style:{position:'relative',width:32,height:32,background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.25)',borderRadius:'50%',cursor:'pointer',fontSize:14,flexShrink:0,fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}},'🔔',
          shortCnt>0&&R('span',{style:{position:'absolute',top:-2,right:-2,minWidth:16,height:16,padding:'0 4px',background:'linear-gradient(135deg,#EF4444,#DC2626)',color:'#fff',borderRadius:8,fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',border:'2px solid #D94F1E',boxShadow:'0 1px 4px rgba(220,38,38,0.4)'}},shortCnt>99?'99+':shortCnt)
        ),
        saveStatus==='saving'&&R('span',{style:{fontSize:10,color:'#fff',background:'rgba(255,255,255,0.2)',padding:'3px 9px',borderRadius:20,fontWeight:600,flexShrink:0,display:'inline-flex',alignItems:'center',gap:4},title:'서버 자동 저장 중'},R('span',{style:{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'#fff',animation:'pulse 1s ease infinite'}}),'저장중'),
        saveStatus==='saved'&&R('span',{style:{fontSize:10,color:'#fff',background:'rgba(34,197,94,0.4)',padding:'3px 9px',borderRadius:20,fontWeight:600,flexShrink:0},title:'서버에 저장 완료'},'✓ 저장됨'),
        saveStatus==='error'&&R('span',{style:{fontSize:10,color:'#fff',background:'rgba(239,68,68,0.5)',padding:'3px 9px',borderRadius:20,fontWeight:600,flexShrink:0,cursor:'help'},title:'저장 실패 - 네트워크 확인'},'✕ 저장실패'),
        R('div',{className:'hdr-name',style:{fontSize:12,flexShrink:0}},(user.name||'사용자')+' · '+(user.position||'')),
        (!isInstalled&&R('button',{onClick:installApp,style:{padding:'4px 10px',background:'rgba(255,255,255,0.2)',border:'1px solid rgba(255,255,255,0.3)',borderRadius:6,color:'#fff',fontSize:11,cursor:'pointer',fontFamily:'inherit',fontWeight:700,flexShrink:0}},'📱 앱설치')),
        R('button',{onClick:()=>{localStorage.removeItem('bnf_user');setUser(null);},style:{padding:'4px 10px',background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.25)',borderRadius:6,color:'#fff',fontSize:11,cursor:'pointer',fontFamily:'inherit',flexShrink:0}},'로그아웃')
      )
    ),
    /* 바디 */
    R('div',{className:'body'},
      /* 모바일 사이드바 오버레이 */
      sbOpen&&R('div',{className:'sb-overlay',onClick:()=>setSbOpen(false)}),
      /* 사이드바 */
      R('div',{className:'sb'+(sbOpen?' sb-open':'')},
        /* 편집 모드 토글 */
        isAdmin&&R('div',{style:{padding:'8px 12px',borderBottom:'1px solid rgba(255,255,255,0.06)',display:'flex',gap:6,alignItems:'center'}},
          R('button',{
            onClick:()=>setNavEditMode(!navEditMode),
            style:{flex:1,padding:'5px 8px',background:navEditMode?'#D94F1E':'rgba(255,255,255,0.08)',color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:10,fontWeight:600}
          },navEditMode?'✓ 편집 완료':'✎ 메뉴 편집'),
          navEditMode&&R('button',{
            onClick:()=>{
              const name=prompt('새 폴더 이름 (이모지 포함 가능):','📁 새 폴더');
              if(name){
                setNavSections(p=>{
                  const next=[...p,{label:name,type:'custom_'+Date.now(),items:[]}];
                  saveNavSections(next);
                  return next;
                });
              }
            },
            title:'폴더 추가',
            style:{padding:'5px 10px',background:'#22C55E',color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:10,fontWeight:700}
          },'+ 폴더'),
          navEditMode&&R('button',{
            onClick:()=>{
              if(confirm('메뉴를 기본값으로 초기화할까요?')){
                setNavSections(DEFAULT_NAV_SECTIONS);
                localStorage.removeItem('bnf_nav_sections_v3');
              }
            },
            title:'초기화',
            style:{padding:'5px 8px',background:'rgba(255,255,255,0.08)',color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:10}
          },'↻')
        ),
        navSections.filter(s=>!s.adminOnly||isAdmin).map((sec,secIdx)=>{
          const visibleItems=sec.items.filter(i=>{
            if(i.adminOnly&&!isAdmin)return false;
            if(i.id==='admin'&&!isAdmin)return false;
            if(user.menu_perms&&user.menu_perms[i.id]===false)return false;
            return true;
          });
          if(visibleItems.length===0&&!navEditMode)return null;
          const folderKey=sec.type||sec.label;
          const isOpen=expandedFolders[folderKey]!==false;
          const isActiveSection=visibleItems.some(i=>i.id===page);
          return R('div',{
            key:sec.label+secIdx,
            className:'sb-folder',
            style:{marginBottom:6},
            draggable:navEditMode,
            onDragStart:e=>{if(navEditMode){setDraggedItem({type:'folder',idx:secIdx});e.dataTransfer.effectAllowed='move';}},
            onDragOver:e=>{if(navEditMode&&draggedItem&&draggedItem.type==='folder'){e.preventDefault();e.dataTransfer.dropEffect='move';}},
            onDrop:e=>{
              if(navEditMode&&draggedItem&&draggedItem.type==='folder'&&draggedItem.idx!==secIdx){
                e.preventDefault();
                setNavSections(p=>{
                  const next=[...p];
                  const[moved]=next.splice(draggedItem.idx,1);
                  next.splice(secIdx,0,moved);
                  saveNavSections(next);
                  return next;
                });
                setDraggedItem(null);
              }
            }
          },
            R('div',{
              onClick:()=>!navEditMode&&setExpandedFolders(p=>Object.assign({},p,{[folderKey]:!isOpen})),
              style:{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',cursor:navEditMode?'grab':'pointer',background:isActiveSection?'rgba(217,79,30,0.12)':navEditMode?'rgba(255,255,255,0.04)':'transparent',color:isActiveSection?'#F0784A':'#FFF',fontSize:12,fontWeight:700,borderRadius:8,margin:'2px 8px',userSelect:'none'}
            },
              navEditMode&&R('span',{style:{fontSize:11,opacity:.5,cursor:'grab'}},'⋮⋮'),
              !navEditMode&&R('span',{style:{fontSize:9,opacity:.7,transition:'transform .2s',transform:isOpen?'rotate(90deg)':'rotate(0deg)',display:'inline-block',width:10}},'▶'),
              navEditMode
                ? R('input',{value:sec.label,
                    onChange:e=>{
                      const v=e.target.value;
                      setNavSections(p=>{
                        const next=p.map((s,i)=>i===secIdx?{...s,label:v}:s);
                        saveNavSections(next);
                        return next;
                      });
                    },
                    onClick:e=>e.stopPropagation(),
                    style:{flex:1,background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.15)',color:'#fff',padding:'2px 6px',borderRadius:4,fontSize:11,fontFamily:'inherit',outline:'none'}
                  })
                : R('span',{style:{flex:1,letterSpacing:-0.2}},sec.label),
              navEditMode&&!sec.adminOnly&&R('button',{
                onClick:e=>{
                  e.stopPropagation();
                  if(confirm('"'+sec.label+'" 폴더를 삭제할까요? (안의 메뉴들도 함께 삭제됩니다)')){
                    setNavSections(p=>{
                      const next=p.filter((_,i)=>i!==secIdx);
                      saveNavSections(next);
                      return next;
                    });
                  }
                },
                style:{background:'none',border:'none',color:'#fca5a5',cursor:'pointer',fontSize:11,padding:'0 3px'}
              },'🗑')
            ),
            isOpen&&navEditMode&&R('button',{
              onClick:()=>{
                const id=prompt('새 메뉴 ID (영문):','menu_'+Date.now());
                if(!id)return;
                const label=prompt('메뉴 이름:','새 메뉴');
                if(!label)return;
                const ic=prompt('아이콘 (이모지):','📌')||'📌';
                setNavSections(p=>{
                  const next=p.map((s,i)=>i===secIdx?{...s,items:[...s.items,{id,l:label,ic}]}:s);
                  saveNavSections(next);return next;
                });
              },
              style:{margin:'4px 12px 6px 24px',padding:'4px 10px',background:'rgba(34,197,94,0.15)',border:'1px dashed #22C55E',color:'#86EFAC',borderRadius:6,cursor:'pointer',fontSize:10,fontWeight:600,width:'calc(100% - 36px)'}
            },'+ 메뉴 추가'),
            isOpen&&R('div',{
              style:{paddingLeft:8,marginBottom:4,minHeight:navEditMode?20:0,background:navEditMode?'rgba(255,255,255,0.02)':'transparent',borderRadius:6,padding:'2px 4px'},
              onDragOver:e=>{if(navEditMode&&draggedItem&&draggedItem.type==='item'){e.preventDefault();}},
              onDrop:e=>{
                if(navEditMode&&draggedItem&&draggedItem.type==='item'){
                  e.preventDefault();
                  setNavSections(p=>{
                    const next=JSON.parse(JSON.stringify(p));
                    const[moved]=next[draggedItem.fromSecIdx].items.splice(draggedItem.itemIdx,1);
                    next[secIdx].items.push(moved);
                    saveNavSections(next);
                    return next;
                  });
                  setDraggedItem(null);
                }
              }
            },
              ...visibleItems.map((n,itemIdx)=>{
                const realIdx=sec.items.indexOf(n);
                if(navEditMode){
                  return R('div',{
                    key:n.id+'_'+itemIdx,
                    style:{display:'flex',alignItems:'center',gap:4,padding:'4px 8px 4px 24px',background:'rgba(255,255,255,0.05)',borderRadius:4,marginBottom:2,cursor:'grab',position:'relative'},
                    draggable:true,
                    onDragStart:e=>{e.stopPropagation();setDraggedItem({type:'item',fromSecIdx:secIdx,itemIdx:realIdx});e.dataTransfer.effectAllowed='move';},
                    onDragOver:e=>{if(draggedItem&&draggedItem.type==='item'){e.preventDefault();e.stopPropagation();}},
                    onDrop:e=>{
                      if(draggedItem&&draggedItem.type==='item'){
                        e.preventDefault();e.stopPropagation();
                        if(draggedItem.fromSecIdx===secIdx&&draggedItem.itemIdx===realIdx){setDraggedItem(null);return;}
                        setNavSections(p=>{
                          const next=JSON.parse(JSON.stringify(p));
                          const[moved]=next[draggedItem.fromSecIdx].items.splice(draggedItem.itemIdx,1);
                          const insertAt=draggedItem.fromSecIdx===secIdx&&draggedItem.itemIdx<realIdx?realIdx-1:realIdx;
                          next[secIdx].items.splice(insertAt,0,moved);
                          saveNavSections(next);
                          return next;
                        });
                        setDraggedItem(null);
                      }
                    }
                  },
                    R('span',{style:{fontSize:9,opacity:.4,cursor:'grab'}},'⋮⋮'),
                    R('input',{value:n.ic,onChange:e=>{
                      const v=e.target.value;
                      setNavSections(p=>{const next=p.map((s,i)=>i===secIdx?{...s,items:s.items.map((it,j)=>j===realIdx?{...it,ic:v}:it)}:s);saveNavSections(next);return next;});
                    },style:{width:30,background:'rgba(0,0,0,0.2)',border:'1px solid rgba(255,255,255,0.1)',color:'#fff',padding:'2px 4px',borderRadius:4,fontSize:11,textAlign:'center',outline:'none'},title:'아이콘'}),
                    R('input',{value:n.l,onChange:e=>{
                      const v=e.target.value;
                      setNavSections(p=>{const next=p.map((s,i)=>i===secIdx?{...s,items:s.items.map((it,j)=>j===realIdx?{...it,l:v}:it)}:s);saveNavSections(next);return next;});
                    },style:{flex:1,background:'rgba(0,0,0,0.2)',border:'1px solid rgba(255,255,255,0.1)',color:'#fff',padding:'2px 6px',borderRadius:4,fontSize:11,outline:'none'},title:'메뉴 이름'}),
                    R('button',{onClick:()=>{
                      if(confirm('"'+n.l+'" 메뉴를 삭제할까요?')){
                        setNavSections(p=>{const next=p.map((s,i)=>i===secIdx?{...s,items:s.items.filter((_,j)=>j!==realIdx)}:s);saveNavSections(next);return next;});
                      }
                    },title:'삭제',style:{background:'none',border:'none',color:'#fca5a5',cursor:'pointer',fontSize:12,padding:'0 4px'}},'✕')
                  );
                }
                return R('div',{
                  key:n.id+'_'+itemIdx,
                  className:'ni'+(page===n.id?' act':''),
                  onClick:()=>{setPage(n.id);setSbOpen(false);},
                  style:{paddingLeft:24,cursor:'pointer'}
                },
                  R('span',{className:'ic'},n.ic),
                  R('span',null,n.l)
                );
              })
            )
          );
        }),
        R('div',{style:{padding:'10px 12px',borderTop:'1px solid rgba(255,255,255,.07)',fontSize:10,color:'rgba(255,255,255,.2)',marginTop:'auto',display:'flex',justifyContent:'space-between',alignItems:'center'}},
          R('span',null,mats.length+'개 품목 · B&F Global'),
          R('button',{onClick:()=>setSbOpen(false),style:{background:'rgba(255,255,255,0.1)',border:'none',color:'rgba(255,255,255,0.5)',padding:'4px 8px',borderRadius:6,cursor:'pointer',fontSize:11}},'✕ 닫기')
        )
      ),
      /* 메인 */
      R('div',{className:'main'},renderPage())
    ),
    /* 모바일 하단 네비 - 컬리 스타일 */
    R('nav',{className:'mobile-nav'},
      ...[
        {id:'home',icon:'home',l:'홈'},
        {id:'inv',icon:'box',l:'재고'},
        {id:'sched',icon:'calendar',l:'스케줄'},
        {id:'links',icon:'link',l:'바로가기'},
        {id:'board',icon:'chat',l:'게시판'}
      ].map(item=>R('button',{key:item.id,className:'mnav-item'+(page===item.id?' act':''),onClick:()=>setPage(item.id)},
        R(NavIcon,{name:item.icon}),
        R('span',{className:'mnav-lbl'},item.l)
      )),
      /* 메뉴 - 사이드바 토글 */
      R('button',{className:'mnav-item'+(sbOpen?' act':''),onClick:()=>setSbOpen(!sbOpen)},
        R(NavIcon,{name:'menu'}),
        R('span',{className:'mnav-lbl'},'메뉴')
      )
    ),
    showInstallTip&&!isInstalled&&R('div',{style:{position:'fixed',bottom:70,left:14,right:14,zIndex:1000,maxWidth:480,margin:'0 auto'}},
      R('div',{style:{background:'#fff',borderRadius:14,padding:'12px 16px',boxShadow:'0 8px 30px rgba(0,0,0,0.25)',border:'2px solid #D94F1E',display:'flex',alignItems:'center',gap:10}},
        R('div',{style:{width:38,height:38,background:'#D94F1E',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:20,flexShrink:0}},'📱'),
        R('div',{style:{flex:1,minWidth:0}},
          R('div',{style:{fontSize:13,fontWeight:800}},'B&F Global을 앱으로 사용'),
          R('div',{style:{fontSize:11,color:'var(--tm)',marginTop:2}},'홈 화면 추가 → 앱처럼 빠르게')
        ),
        R('button',{onClick:installApp,style:{padding:'7px 13px',background:'#D94F1E',color:'#fff',border:'none',borderRadius:7,fontWeight:700,fontSize:12,cursor:'pointer',whiteSpace:'nowrap'}},'설치'),
        R('button',{onClick:()=>{setShowInstallTip(false);localStorage.setItem('bnf_install_seen','1');},style:{background:'none',border:'none',cursor:'pointer',color:'var(--tm)',fontSize:18,padding:'2px 4px'}},'×')
      )
    ),
    bomModal&&R(BOMModal,{mats,cats,editProd:null,onSave:p=>setProds(pv=>[...pv,p]),onClose:()=>setBomModal(false)}),
    imgModal&&R(ImgModal,{data:imgModal,onClose:()=>setImgModal(null),genImg}),
    xlPreview&&R(XlPreviewModal,{preview:xlPreview,onClose:()=>setXlPreview(null),onConfirm:confirmXlImport}),
    globalSearch&&R(GlobalSearchModal,{mats,prods,user,onClose:()=>setGlobalSearch(false),onGoPage:(p,extra)=>{setPage(p);setGlobalSearch(false);}}),
    notifPanel&&R(NotifPanel,{mats,user,onClose:()=>setNotifPanel(false),onGoPage:(p)=>{setPage(p);setNotifPanel(false);}})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(R(App));

</script>
