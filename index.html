/* ═══════════════ 연구개발일지 (게시판형 + 이미지 복붙 + 파일첨부) ═══════════════ */
function PageResearchJournal({user}){
  const[entries,setEntries]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[editEntry,setEditEntry]=useState(null);
  const[selectedEntry,setSelectedEntry]=useState(null);
  const[search,setSearch]=useState('');
  const[filterCategory,setFilterCategory]=useState('all');
  const defaultForm={title:'',category:'연구',date:today2(),content:'',tags:user.name||user.email||''};
  const[form,setForm]=useState(defaultForm);
  const[attachments,setAttachments]=useState([]);
  const[uploading,setUploading]=useState(false);
  const editorRef=useRef(null);
  const attachInputRef=useRef(null);
  const imageInputRef=useRef(null);
  const isAdmin=['superadmin','admin'].includes(user.role);
  const CATEGORIES=[
    {v:'연구',c:'#A855F7',bg:'#FAF5FF'},
    {v:'실험',c:'#3B82F6',bg:'#EFF6FF'},
    {v:'레시피',c:'#F59E0B',bg:'#FFFBEB'},
    {v:'테스트',c:'#10B981',bg:'#ECFDF5'},
    {v:'기타',c:'#6B7280',bg:'#F9FAFB'}
  ];
  
  useEffect(()=>{load();},[]);
  const load=async()=>{
    setLoading(true);
    try{
      const{data,error}=await sbClient.from('research_journal').select('*,emp:writer_id(name)').order('entry_date',{ascending:false});
      if(error)throw error;
      setEntries(data||[]);
    }catch(e){
      console.warn('연구일지 로드:',e);
      if(e.message&&e.message.includes('does not exist')){
        alert('⚠️ research_journal 테이블이 없습니다.\n_통합SQL_한번에실행.sql을 실행해주세요.');
      }
    }
    setLoading(false);
  };

  /* Storage 업로드 유틸 (이미지/파일 공통) */
  const uploadToStorage=async(file,kind)=>{
    try{
      const safeName=(file.name||'paste.png').replace(/[^a-zA-Z0-9._-]/g,'_');
      const path='journal/'+kind+'/'+Date.now()+'_'+Math.random().toString(36).slice(2,7)+'_'+safeName;
      const{data,error}=await sbClient.storage.from('bnf-files').upload(path,file,{
        cacheControl:'3600',upsert:false,contentType:file.type||'application/octet-stream'
      });
      if(error){
        if(error.message&&(error.message.includes('Bucket not found')||error.message.includes('not found'))){
          alert('❌ Storage "bnf-files" 버킷이 없습니다.\nSupabase Dashboard → Storage → 버킷 생성 필요');
        }else if(error.message&&error.message.includes('policy')){
          alert('❌ Storage 정책 차단됨.\nSupabase → Storage → bnf-files → Policies 확인');
        }else alert('업로드 실패: '+error.message);
        return null;
      }
      const{data:urlData}=sbClient.storage.from('bnf-files').getPublicUrl(path);
      return{path,url:urlData?.publicUrl||''};
    }catch(e){alert('업로드 오류: '+e.message);return null;}
  };

  /* 클립보드 이미지 붙여넣기 핸들러 */
  const handlePaste=async(e)=>{
    const items=e.clipboardData&&e.clipboardData.items;
    if(!items)return;
    for(let i=0;i<items.length;i++){
      const item=items[i];
      if(item.type&&item.type.startsWith('image/')){
        e.preventDefault();
        const file=item.getAsFile();
        if(!file)continue;
        setUploading(true);
        const result=await uploadToStorage(file,'image');
        setUploading(false);
        if(result&&result.url){
          /* 커서 위치에 이미지 삽입 + 자동 줄바꿈(이미지 밑에 바로 글 쓸 수 있게) */
          document.execCommand('insertHTML',false,
            '<img src="'+result.url+'" data-path="'+result.path+'" style="max-width:100%;height:auto;display:block;margin:8px 0;border-radius:6px;" alt="첨부이미지" /><div><br></div>'
          );
        }
      }
    }
    /* 이미지가 없으면 기본 텍스트 붙여넣기 동작 */
  };

  /* 파일 선택으로 이미지 삽입 (본문 내부 인라인 이미지) */
  const insertImageFromFile=async(file)=>{
    if(!file)return;
    if(!file.type.startsWith('image/')){alert('이미지 파일만 업로드 가능합니다 (jpg, png, gif 등)');return;}
    if(file.size>20*1024*1024){alert('❌ 이미지 크기 초과 (20MB 이하만 가능)');return;}
    setUploading(true);
    const result=await uploadToStorage(file,'image');
    setUploading(false);
    if(result&&result.url){
      /* 에디터에 포커스 */
      if(editorRef.current){
        editorRef.current.focus();
        /* 빈 상태일 때 플레이스홀더 제거 */
        if(editorRef.current.innerHTML.includes('연구/실험 내용을 자세히 기록')){
          editorRef.current.innerHTML='';
        }
      }
      /* 커서 위치에 이미지 + 줄바꿈 삽입 → 이미지 밑에서 바로 타이핑 가능 */
      document.execCommand('insertHTML',false,
        '<img src="'+result.url+'" data-path="'+result.path+'" style="max-width:100%;height:auto;display:block;margin:8px 0;border-radius:6px;" alt="첨부이미지" /><div><br></div>'
      );
    }
  };

  /* 파일 첨부 추가 */
  const addAttachment=async(file)=>{
    if(!file)return;
    if(file.size>50*1024*1024){alert('❌ 파일 크기 초과 (50MB 이하만)');return;}
    setUploading(true);
    const result=await uploadToStorage(file,'file');
    setUploading(false);
    if(result){
      setAttachments(p=>[...p,{name:file.name,path:result.path,size:file.size,type:file.type||''}]);
    }
  };
  const removeAttachment=async(idx)=>{
    const att=attachments[idx];
    if(att&&att.path){try{await sbClient.storage.from('bnf-files').remove([att.path]);}catch(e){}}
    setAttachments(p=>p.filter((_,i)=>i!==idx));
  };
  const downloadAttachment=(a)=>{
    try{
      const{data}=sbClient.storage.from('bnf-files').getPublicUrl(a.path);
      if(data&&data.publicUrl){
        const link=document.createElement('a');
        link.href=data.publicUrl;link.download=a.name;link.target='_blank';
        document.body.appendChild(link);link.click();document.body.removeChild(link);
      }
    }catch(e){alert('다운로드 실패: '+e.message);}
  };

  const save=async()=>{
    const contentHTML=editorRef.current?editorRef.current.innerHTML:form.content;
    const plainText=editorRef.current?(editorRef.current.innerText||'').trim():form.content;
    if(!form.title.trim()||!plainText){alert('제목과 내용을 입력해주세요');return;}
    try{
      const payload={
        title:form.title.trim(),
        category:form.category,
        entry_date:form.date,
        content:contentHTML,
        tags:form.tags,
        writer_id:user.id,
        attachments:attachments
      };
      let resp;
      if(editEntry){
        resp=await sbClient.from('research_journal').update(payload).eq('id',editEntry.id);
      }else{
        resp=await sbClient.from('research_journal').insert(payload);
      }
      if(resp.error){
        if(resp.error.message&&resp.error.message.includes('attachments')){
          alert('⚠️ attachments 컬럼이 없습니다.\n\nSupabase SQL Editor에서 실행:\nALTER TABLE research_journal ADD COLUMN IF NOT EXISTS attachments JSONB DEFAULT \'[]\'::jsonb;');
          return;
        }
        throw resp.error;
      }
      setShowForm(false);setEditEntry(null);setForm(defaultForm);setAttachments([]);
      load();
    }catch(e){alert('저장 실패: '+(e.message||e));}
  };
  const del=async(id)=>{
    if(!confirm('이 일지를 삭제할까요?'))return;
    await sbClient.from('research_journal').delete().eq('id',id);
    load();
  };
  const startEdit=(en)=>{
    setEditEntry(en);
    setForm({title:en.title,category:en.category||'연구',date:en.entry_date,content:en.content||'',tags:en.tags||''});
    setAttachments(en.attachments||[]);
    setShowForm(true);
    setSelectedEntry(null);
  };
  const openNew=()=>{
    setEditEntry(null);setForm({...defaultForm,date:today2()});setAttachments([]);setShowForm(true);
  };
  
  const filtered=entries.filter(e=>{
    if(filterCategory!=='all'&&e.category!==filterCategory)return false;
    if(search){
      const q=search.toLowerCase();
      const plain=(e.content||'').replace(/<[^>]+>/g,'');
      if(!(e.title.toLowerCase().includes(q)||plain.toLowerCase().includes(q)))return false;
    }
    return true;
  });
  const catColor=(c)=>{const f=CATEGORIES.find(x=>x.v===c);return f?f.c:'#6B7280';};
  /* HTML에서 텍스트만 추출 (목록 미리보기용) */
  const stripHTML=(html)=>{
    if(!html)return '';
    const tmp=document.createElement('div');tmp.innerHTML=html;
    return(tmp.innerText||tmp.textContent||'').replace(/\s+/g,' ').trim();
  };
  
  if(loading)return R('div',{className:'pg fa'},'⏳ 로딩...');
  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},
      R('div',null,R('div',{className:'pg-title'},'📔 연구개발일지'),R('div',{style:{fontSize:11,color:'var(--tm)',marginTop:2}},entries.length+'개의 일지')),
      R('button',{className:'btn bp',onClick:openNew},'+ 새 일지')
    ),
    /* 필터 */
    R('div',{style:{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}},
      R('input',{className:'inp',value:search,onChange:e=>setSearch(e.target.value),placeholder:'🔍 검색',style:{maxWidth:240}}),
      R('select',{className:'inp',value:filterCategory,onChange:e=>setFilterCategory(e.target.value),style:{maxWidth:140}},
        R('option',{value:'all'},'전체 분류'),
        ...CATEGORIES.map(c=>R('option',{key:c.v,value:c.v},c.v))
      )
    ),
    /* 일지 목록 */
    R('div',{style:{display:'flex',flexDirection:'column',gap:10}},
      filtered.length===0
        ? R('div',{className:'card',style:{padding:40,textAlign:'center',color:'var(--tm)'}},
            R('div',{style:{fontSize:48,marginBottom:10}},'📔'),
            R('div',null,'아직 작성된 일지가 없습니다'),
            R('div',{style:{fontSize:11,marginTop:6,color:'#9CA3AF'}},'우측 상단 [+ 새 일지] 버튼으로 추가')
          )
        : filtered.map(en=>{
            const preview=stripHTML(en.content);
            const hasImg=en.content&&en.content.indexOf('<img')>=0;
            const attCnt=(en.attachments||[]).length;
            return R('div',{key:en.id,className:'card',style:{padding:14,cursor:'pointer',borderLeft:'4px solid '+catColor(en.category)},onClick:()=>setSelectedEntry(en)},
              R('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}},
                R('div',null,
                  R('span',{style:{display:'inline-block',padding:'2px 8px',background:catColor(en.category),color:'#fff',fontSize:10,borderRadius:10,fontWeight:700,marginRight:8}},en.category||'기타'),
                  R('span',{style:{fontSize:14,fontWeight:700}},en.title)
                ),
                R('div',{style:{fontSize:10,color:'var(--tm)'}},en.entry_date)
              ),
              R('div',{style:{fontSize:11,color:'#6B7280',lineHeight:1.5,maxHeight:50,overflow:'hidden'}},preview.slice(0,150)+(preview.length>150?'...':'')),
              R('div',{style:{fontSize:10,color:'#9CA3AF',marginTop:6,display:'flex',gap:10,flexWrap:'wrap'}},
                R('span',null,'✍ ',en.tags||en.emp?.name||'-'),
                hasImg&&R('span',{style:{color:'#A855F7'}},'🖼 이미지'),
                attCnt>0&&R('span',{style:{color:'#A855F7'}},'📎 ',attCnt)
              )
            );
          })
    ),
    /* 작성/수정 모달 */
    showForm&&R(Modal2,{title:editEntry?'일지 수정':'새 연구개발일지',onClose:()=>{setShowForm(false);setEditEntry(null);setAttachments([]);},size:780,
      footer:R('div',{style:{display:'flex',gap:8,width:'100%',alignItems:'center'}},
        uploading&&R('span',{style:{fontSize:11,color:'#A855F7',fontWeight:700}},'⏳ 업로드 중...'),
        R('button',{className:'btn bs',onClick:()=>{setShowForm(false);setEditEntry(null);setAttachments([]);},style:{flex:1}},'취소'),
        R('button',{className:'btn bp',onClick:save,style:{flex:2},disabled:uploading},editEntry?'수정':'저장')
      )
    },
      R('div',{className:'fg'},
        R('div',{className:'fr'},R('label',{className:'lbl'},'분류'),
          R('select',{className:'inp',value:form.category,onChange:e=>setForm(p=>({...p,category:e.target.value}))},
            ...CATEGORIES.map(c=>R('option',{key:c.v,value:c.v},c.v))
          )
        ),
        R('div',{className:'fr'},R('label',{className:'lbl'},'날짜'),R('input',{type:'date',className:'inp',value:form.date,onChange:e=>setForm(p=>({...p,date:e.target.value}))})),
        R('div',{className:'fr',style:{gridColumn:'1/-1'}},R('label',{className:'lbl'},'제목'),R('input',{className:'inp',value:form.title,onChange:e=>setForm(p=>({...p,title:e.target.value})),placeholder:'예: 라면 스프 배합 실험 - 2026.05.14'})),
        R('div',{className:'fr',style:{gridColumn:'1/-1'}},R('label',{className:'lbl'},'작성자'),R('input',{className:'inp',value:form.tags,onChange:e=>setForm(p=>({...p,tags:e.target.value})),placeholder:'작성자 이름'})),
        /* 내용 - contentEditable (이미지 복붙 + 파일 삽입) */
        R('div',{className:'fr',style:{gridColumn:'1/-1'}},
          R('label',{className:'lbl',style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}},
            R('span',null,'내용'),
            R('div',{style:{display:'flex',gap:6,alignItems:'center'}},
              R('button',{type:'button',className:'btn bs',style:{padding:'4px 12px',fontSize:11,margin:0,background:'#FAF5FF',color:'#7C3AED',borderColor:'#DDD6FE'},onClick:()=>imageInputRef.current&&imageInputRef.current.click(),disabled:uploading},'🖼 이미지 삽입'),
              R('span',{style:{fontSize:10,color:'#9CA3AF'}},'또는 Ctrl+V로 복붙')
            )
          ),
          R('input',{ref:imageInputRef,type:'file',accept:'image/*',style:{display:'none'},onChange:e=>{if(e.target.files[0]){insertImageFromFile(e.target.files[0]);e.target.value='';}}}),
          R('div',{
            ref:editorRef,
            contentEditable:true,
            suppressContentEditableWarning:true,
            onPaste:handlePaste,
            className:'inp',
            style:{minHeight:300,maxHeight:600,overflow:'auto',padding:12,whiteSpace:'pre-wrap',lineHeight:1.7,fontSize:13,fontFamily:'inherit',cursor:'text'},
            dangerouslySetInnerHTML:{__html:form.content||'<div style="color:#9CA3AF;">연구/실험 내용을 자세히 기록하세요.<br>이미지는 🖼 버튼 또는 Ctrl+V로 삽입 → 이미지 아래에 바로 글 작성 가능</div>'},
            onFocus:e=>{
              /* 플레이스홀더 제거 (처음 포커스 시) */
              if(e.currentTarget.innerHTML.includes('연구/실험 내용을 자세히 기록'))e.currentTarget.innerHTML='';
            }
          })
        ),
        /* 파일 첨부 (본문 외 별도 첨부) */
        R('div',{className:'fr',style:{gridColumn:'1/-1'}},
          R('label',{className:'lbl',style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
            R('span',null,'📎 파일 첨부 ',R('span',{style:{fontSize:10,color:'#9CA3AF',fontWeight:500}},'(본문에 안 들어가는 별도 첨부)')),
            R('button',{type:'button',className:'btn bs',style:{padding:'4px 12px',fontSize:11,margin:0},onClick:()=>attachInputRef.current&&attachInputRef.current.click(),disabled:uploading},'+ 파일 추가')
          ),
          R('input',{ref:attachInputRef,type:'file',style:{display:'none'},onChange:e=>{if(e.target.files[0]){addAttachment(e.target.files[0]);e.target.value='';}}}),
          attachments.length===0
            ? R('div',{style:{fontSize:11,color:'var(--tm)',padding:'10px',background:'#F9FAFB',borderRadius:6,textAlign:'center'}},'첨부 파일 없음 (50MB 이하)')
            : R('div',{style:{display:'flex',flexDirection:'column',gap:4}},
                ...attachments.map((a,i)=>R('div',{key:i,style:{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:'#FAF5FF',borderRadius:6,fontSize:11,borderLeft:'3px solid #A855F7'}},
                  R('span',null,'📎'),
                  R('span',{style:{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:600}},a.name),
                  R('span',{style:{color:'#9CA3AF',fontSize:10}},((a.size||0)/1024).toFixed(1)+' KB'),
                  R('button',{type:'button',onClick:()=>removeAttachment(i),style:{background:'none',border:'none',color:'#FCA5A5',cursor:'pointer',fontSize:14,padding:'2px 6px'}},'✕')
                ))
              )
        )
      )
    ),
    /* 상세 보기 */
    selectedEntry&&R(Modal2,{title:selectedEntry.title,onClose:()=>setSelectedEntry(null),size:780,
      footer:R('div',{style:{display:'flex',gap:8,width:'100%'}},
        R('button',{className:'btn bs',onClick:()=>setSelectedEntry(null),style:{flex:1}},'닫기'),
        (selectedEntry.writer_id===user.id||isAdmin)&&R('button',{className:'btn bp',onClick:()=>startEdit(selectedEntry),style:{flex:1}},'수정'),
        (selectedEntry.writer_id===user.id||isAdmin)&&R('button',{className:'btn bs',onClick:()=>{del(selectedEntry.id);setSelectedEntry(null);},style:{flex:1,background:'#FEE2E2',color:'#991B1B'}},'삭제')
      )
    },
      R('div',null,
        R('div',{style:{display:'flex',gap:10,marginBottom:14,paddingBottom:10,borderBottom:'1px solid var(--bd)',flexWrap:'wrap'}},
          R('span',{style:{padding:'3px 10px',background:catColor(selectedEntry.category),color:'#fff',fontSize:11,borderRadius:10,fontWeight:700}},selectedEntry.category),
          R('span',{style:{fontSize:12,color:'var(--tm)'}},selectedEntry.entry_date),
          R('span',{style:{fontSize:12,color:'#7C3AED',fontWeight:600}},'✍ '+(selectedEntry.tags||selectedEntry.emp?.name||'-'))
        ),
        /* 본문 (HTML 렌더) */
        R('div',{
          style:{lineHeight:1.7,fontSize:13,color:'#1F2937'},
          dangerouslySetInnerHTML:{__html:selectedEntry.content||''}
        }),
        /* 첨부파일 */
        selectedEntry.attachments&&selectedEntry.attachments.length>0&&R('div',{style:{marginTop:18,padding:12,background:'#FAF5FF',borderRadius:8,borderLeft:'3px solid #A855F7'}},
          R('div',{style:{fontSize:11,color:'#A855F7',fontWeight:700,marginBottom:8}},'📎 첨부파일 ('+selectedEntry.attachments.length+'개)'),
          ...selectedEntry.attachments.map((a,i)=>R('div',{key:i,style:{display:'flex',alignItems:'center',gap:8,padding:'6px 0',fontSize:12,borderTop:i>0?'1px solid #EDE9FE':'none'}},
            R('span',null,'📎'),
            R('span',{onClick:()=>downloadAttachment(a),style:{flex:1,color:'#7C3AED',textDecoration:'underline',cursor:'pointer',fontWeight:600}},a.name),
            R('span',{style:{color:'#9CA3AF',fontSize:10}},((a.size||0)/1024).toFixed(1)+' KB')
          ))
        )
      )
    )
  );
}

/* ═══════════════ 운영 방향 (관리자 - 경영/영업 방침 게시판) ═══════════════ */
function PageOperationStrategy({user}){
  const[entries,setEntries]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[editEntry,setEditEntry]=useState(null);
  const[selectedEntry,setSelectedEntry]=useState(null);
  const[search,setSearch]=useState('');
  const[filterCategory,setFilterCategory]=useState('all');
  const defaultForm={title:'',category:'경영',content:'',writer_name:user.name||user.email||''};
  const[form,setForm]=useState(defaultForm);
  const[attachments,setAttachments]=useState([]);
  const[uploading,setUploading]=useState(false);
  const editorRef=useRef(null);
  const attachInputRef=useRef(null);
  const imageInputRef=useRef(null);
  const isAdmin=['superadmin','admin'].includes(user.role);
  const CATEGORIES=[
    {v:'경영',c:'#3B82F6',bg:'#EFF6FF'},
    {v:'영업',c:'#10B981',bg:'#ECFDF5'},
    {v:'생산',c:'#F59E0B',bg:'#FFFBEB'},
    {v:'인사/조직',c:'#A855F7',bg:'#FAF5FF'},
    {v:'재무',c:'#EF4444',bg:'#FEF2F2'},
    {v:'기타',c:'#6B7280',bg:'#F9FAFB'}
  ];
  
  useEffect(()=>{load();},[]);
  const load=async()=>{
    setLoading(true);
    try{
      const{data,error}=await sbClient.from('operation_strategy').select('*,emp:writer_id(name)').order('updated_at',{ascending:false});
      if(error)throw error;
      setEntries(data||[]);
    }catch(e){
      console.warn('운영방향 로드:',e);
      if(e.message&&e.message.includes('does not exist')){
        alert('⚠️ operation_strategy 테이블이 없습니다.\n\nSupabase SQL Editor에서 실행:\n\nCREATE TABLE IF NOT EXISTS operation_strategy (\n  id BIGSERIAL PRIMARY KEY,\n  title TEXT NOT NULL,\n  category TEXT DEFAULT \'경영\',\n  content TEXT,\n  attachments JSONB DEFAULT \'[]\'::jsonb,\n  writer_id TEXT,\n  writer_name TEXT,\n  created_at TIMESTAMPTZ DEFAULT NOW(),\n  updated_at TIMESTAMPTZ DEFAULT NOW()\n);\nALTER TABLE operation_strategy DISABLE ROW LEVEL SECURITY;');
      }
    }
    setLoading(false);
  };

  const uploadToStorage=async(file,kind)=>{
    try{
      const safeName=(file.name||'paste.png').replace(/[^a-zA-Z0-9._-]/g,'_');
      const path='strategy/'+kind+'/'+Date.now()+'_'+Math.random().toString(36).slice(2,7)+'_'+safeName;
      const{data,error}=await sbClient.storage.from('bnf-files').upload(path,file,{
        cacheControl:'3600',upsert:false,contentType:file.type||'application/octet-stream'
      });
      if(error){
        if(error.message&&(error.message.includes('Bucket not found')||error.message.includes('not found'))){
          alert('❌ Storage "bnf-files" 버킷이 없습니다.\nSupabase Dashboard → Storage → 버킷 생성 필요');
        }else if(error.message&&error.message.includes('policy')){
          alert('❌ Storage 정책 차단됨.\nSupabase → Storage → bnf-files → Policies 확인');
        }else alert('업로드 실패: '+error.message);
        return null;
      }
      const{data:urlData}=sbClient.storage.from('bnf-files').getPublicUrl(path);
      return{path,url:urlData?.publicUrl||''};
    }catch(e){alert('업로드 오류: '+e.message);return null;}
  };

  const handlePaste=async(e)=>{
    const items=e.clipboardData&&e.clipboardData.items;
    if(!items)return;
    for(let i=0;i<items.length;i++){
      const item=items[i];
      if(item.type&&item.type.startsWith('image/')){
        e.preventDefault();
        const file=item.getAsFile();
        if(!file)continue;
        setUploading(true);
        const result=await uploadToStorage(file,'image');
        setUploading(false);
        if(result&&result.url){
          document.execCommand('insertHTML',false,
            '<img src="'+result.url+'" data-path="'+result.path+'" style="max-width:100%;height:auto;display:block;margin:8px 0;border-radius:6px;" alt="첨부이미지" /><div><br></div>'
          );
        }
      }
    }
  };

  const insertImageFromFile=async(file)=>{
    if(!file)return;
    if(!file.type.startsWith('image/')){alert('이미지 파일만 업로드 가능합니다');return;}
    if(file.size>20*1024*1024){alert('❌ 이미지 크기 초과 (20MB 이하만)');return;}
    setUploading(true);
    const result=await uploadToStorage(file,'image');
    setUploading(false);
    if(result&&result.url){
      if(editorRef.current){
        editorRef.current.focus();
        if(editorRef.current.innerHTML.includes('회사 운영 방향'))editorRef.current.innerHTML='';
      }
      document.execCommand('insertHTML',false,
        '<img src="'+result.url+'" data-path="'+result.path+'" style="max-width:100%;height:auto;display:block;margin:8px 0;border-radius:6px;" alt="첨부이미지" /><div><br></div>'
      );
    }
  };

  const addAttachment=async(file)=>{
    if(!file)return;
    if(file.size>50*1024*1024){alert('❌ 50MB 이하만');return;}
    setUploading(true);
    const result=await uploadToStorage(file,'file');
    setUploading(false);
    if(result){
      setAttachments(p=>[...p,{name:file.name,path:result.path,size:file.size,type:file.type||''}]);
    }
  };
  const removeAttachment=async(idx)=>{
    const att=attachments[idx];
    if(att&&att.path){try{await sbClient.storage.from('bnf-files').remove([att.path]);}catch(e){}}
    setAttachments(p=>p.filter((_,i)=>i!==idx));
  };
  const downloadAttachment=(a)=>{
    try{
      const{data}=sbClient.storage.from('bnf-files').getPublicUrl(a.path);
      if(data&&data.publicUrl){
        const link=document.createElement('a');
        link.href=data.publicUrl;link.download=a.name;link.target='_blank';
        document.body.appendChild(link);link.click();document.body.removeChild(link);
      }
    }catch(e){alert('다운로드 실패: '+e.message);}
  };

  const save=async()=>{
    const contentHTML=editorRef.current?editorRef.current.innerHTML:form.content;
    const plainText=editorRef.current?(editorRef.current.innerText||'').trim():form.content;
    if(!form.title.trim()||!plainText){alert('제목과 내용을 입력해주세요');return;}
    try{
      const payload={
        title:form.title.trim(),
        category:form.category,
        content:contentHTML,
        writer_id:user.id,
        writer_name:form.writer_name||user.name||'',
        attachments:attachments,
        updated_at:new Date().toISOString()
      };
      let resp;
      if(editEntry){
        resp=await sbClient.from('operation_strategy').update(payload).eq('id',editEntry.id);
      }else{
        resp=await sbClient.from('operation_strategy').insert(payload);
      }
      if(resp.error)throw resp.error;
      setShowForm(false);setEditEntry(null);setForm(defaultForm);setAttachments([]);
      load();
    }catch(e){alert('저장 실패: '+(e.message||e));}
  };
  const del=async(id)=>{
    if(!confirm('이 항목을 삭제할까요?'))return;
    await sbClient.from('operation_strategy').delete().eq('id',id);
    load();
  };
  const startEdit=(en)=>{
    setEditEntry(en);
    setForm({title:en.title,category:en.category||'경영',content:en.content||'',writer_name:en.writer_name||''});
    setAttachments(en.attachments||[]);
    setShowForm(true);
    setSelectedEntry(null);
  };
  const openNew=()=>{
    setEditEntry(null);setForm({...defaultForm});setAttachments([]);setShowForm(true);
  };

  const filtered=entries.filter(e=>{
    if(filterCategory!=='all'&&e.category!==filterCategory)return false;
    if(search){
      const q=search.toLowerCase();
      const plain=(e.content||'').replace(/<[^>]+>/g,'');
      if(!(e.title.toLowerCase().includes(q)||plain.toLowerCase().includes(q)))return false;
    }
    return true;
  });
  const catColor=(c)=>{const f=CATEGORIES.find(x=>x.v===c);return f?f.c:'#6B7280';};
  const stripHTML=(html)=>{
    if(!html)return '';
    const tmp=document.createElement('div');tmp.innerHTML=html;
    return(tmp.innerText||tmp.textContent||'').replace(/\s+/g,' ').trim();
  };
  /* 관리자만 접근 - 안전 가드 */
  if(!isAdmin)return R('div',{className:'pg fa'},R('div',{className:'card',style:{padding:40,textAlign:'center'}},'⛔ 관리자 전용 페이지입니다.'));
  if(loading)return R('div',{className:'pg fa'},'⏳ 로딩...');
  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},
      R('div',null,R('div',{className:'pg-title'},'🧭 운영 방향'),R('div',{style:{fontSize:11,color:'var(--tm)',marginTop:2}},'회사 운영 방향 · 영업 방침 · 정책 정리 · '+entries.length+'건')),
      R('button',{className:'btn bp',onClick:openNew},'+ 새 작성')
    ),
    R('div',{style:{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}},
      R('input',{className:'inp',value:search,onChange:e=>setSearch(e.target.value),placeholder:'🔍 검색',style:{maxWidth:240}}),
      R('select',{className:'inp',value:filterCategory,onChange:e=>setFilterCategory(e.target.value),style:{maxWidth:140}},
        R('option',{value:'all'},'전체 분류'),
        ...CATEGORIES.map(c=>R('option',{key:c.v,value:c.v},c.v))
      )
    ),
    R('div',{style:{display:'flex',flexDirection:'column',gap:10}},
      filtered.length===0
        ? R('div',{className:'card',style:{padding:40,textAlign:'center',color:'var(--tm)'}},
            R('div',{style:{fontSize:48,marginBottom:10}},'🧭'),
            R('div',null,'아직 작성된 운영 방향이 없습니다'),
            R('div',{style:{fontSize:11,marginTop:6,color:'#9CA3AF'}},'우측 상단 [+ 새 작성] 으로 추가')
          )
        : filtered.map(en=>{
            const preview=stripHTML(en.content);
            const hasImg=en.content&&en.content.indexOf('<img')>=0;
            const attCnt=(en.attachments||[]).length;
            const author=en.writer_name||en.emp?.name||'-';
            return R('div',{key:en.id,className:'card',style:{padding:14,cursor:'pointer',borderLeft:'4px solid '+catColor(en.category)},onClick:()=>setSelectedEntry(en)},
              R('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}},
                R('div',null,
                  R('span',{style:{display:'inline-block',padding:'2px 8px',background:catColor(en.category),color:'#fff',fontSize:10,borderRadius:10,fontWeight:700,marginRight:8}},en.category||'기타'),
                  R('span',{style:{fontSize:14,fontWeight:700}},en.title)
                ),
                R('div',{style:{fontSize:10,color:'var(--tm)'}},(en.updated_at||en.created_at||'').slice(0,10))
              ),
              R('div',{style:{fontSize:11,color:'#6B7280',lineHeight:1.5,maxHeight:50,overflow:'hidden'}},preview.slice(0,150)+(preview.length>150?'...':'')),
              R('div',{style:{fontSize:10,color:'#9CA3AF',marginTop:6,display:'flex',gap:10,flexWrap:'wrap'}},
                R('span',null,'✍ ',author),
                hasImg&&R('span',{style:{color:'#3B82F6'}},'🖼 이미지'),
                attCnt>0&&R('span',{style:{color:'#3B82F6'}},'📎 ',attCnt)
              )
            );
          })
    ),
    /* 작성/수정 모달 */
    showForm&&R(Modal2,{title:editEntry?'운영 방향 수정':'새 운영 방향 작성',onClose:()=>{setShowForm(false);setEditEntry(null);setAttachments([]);},size:780,
      footer:R('div',{style:{display:'flex',gap:8,width:'100%',alignItems:'center'}},
        uploading&&R('span',{style:{fontSize:11,color:'#3B82F6',fontWeight:700}},'⏳ 업로드 중...'),
        R('button',{className:'btn bs',onClick:()=>{setShowForm(false);setEditEntry(null);setAttachments([]);},style:{flex:1}},'취소'),
        R('button',{className:'btn bp',onClick:save,style:{flex:2},disabled:uploading},editEntry?'수정':'저장')
      )
    },
      R('div',{className:'fg'},
        R('div',{className:'fr'},R('label',{className:'lbl'},'분류'),
          R('select',{className:'inp',value:form.category,onChange:e=>setForm(p=>({...p,category:e.target.value}))},
            ...CATEGORIES.map(c=>R('option',{key:c.v,value:c.v},c.v))
          )
        ),
        R('div',{className:'fr'},R('label',{className:'lbl'},'작성자'),R('input',{className:'inp',value:form.writer_name,onChange:e=>setForm(p=>({...p,writer_name:e.target.value})),placeholder:'작성자 이름'})),
        R('div',{className:'fr',style:{gridColumn:'1/-1'}},R('label',{className:'lbl'},'제목'),R('input',{className:'inp',value:form.title,onChange:e=>setForm(p=>({...p,title:e.target.value})),placeholder:'예: 2026 영업 전략 - 거래처 다변화 방향'})),
        R('div',{className:'fr',style:{gridColumn:'1/-1'}},
          R('label',{className:'lbl',style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}},
            R('span',null,'내용'),
            R('div',{style:{display:'flex',gap:6,alignItems:'center'}},
              R('button',{type:'button',className:'btn bs',style:{padding:'4px 12px',fontSize:11,margin:0,background:'#EFF6FF',color:'#1D4ED8',borderColor:'#BFDBFE'},onClick:()=>imageInputRef.current&&imageInputRef.current.click(),disabled:uploading},'🖼 이미지 삽입'),
              R('span',{style:{fontSize:10,color:'#9CA3AF'}},'또는 Ctrl+V로 복붙')
            )
          ),
          R('input',{ref:imageInputRef,type:'file',accept:'image/*',style:{display:'none'},onChange:e=>{if(e.target.files[0]){insertImageFromFile(e.target.files[0]);e.target.value='';}}}),
          R('div',{
            ref:editorRef,
            contentEditable:true,
            suppressContentEditableWarning:true,
            onPaste:handlePaste,
            className:'inp',
            style:{minHeight:300,maxHeight:600,overflow:'auto',padding:12,whiteSpace:'pre-wrap',lineHeight:1.7,fontSize:13,fontFamily:'inherit',cursor:'text'},
            dangerouslySetInnerHTML:{__html:form.content||'<div style="color:#9CA3AF;">회사 운영 방향 / 영업 전략 / 정책 등을 자유롭게 작성하세요.<br>이미지는 🖼 버튼 또는 Ctrl+V로 삽입 가능</div>'},
            onFocus:e=>{
              if(e.currentTarget.innerHTML.includes('회사 운영 방향'))e.currentTarget.innerHTML='';
            }
          })
        ),
        R('div',{className:'fr',style:{gridColumn:'1/-1'}},
          R('label',{className:'lbl',style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
            R('span',null,'📎 파일 첨부 ',R('span',{style:{fontSize:10,color:'#9CA3AF',fontWeight:500}},'(별도 첨부)')),
            R('button',{type:'button',className:'btn bs',style:{padding:'4px 12px',fontSize:11,margin:0},onClick:()=>attachInputRef.current&&attachInputRef.current.click(),disabled:uploading},'+ 파일 추가')
          ),
          R('input',{ref:attachInputRef,type:'file',style:{display:'none'},onChange:e=>{if(e.target.files[0]){addAttachment(e.target.files[0]);e.target.value='';}}}),
          attachments.length===0
            ? R('div',{style:{fontSize:11,color:'var(--tm)',padding:'10px',background:'#F9FAFB',borderRadius:6,textAlign:'center'}},'첨부 파일 없음 (50MB 이하)')
            : R('div',{style:{display:'flex',flexDirection:'column',gap:4}},
                ...attachments.map((a,i)=>R('div',{key:i,style:{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:'#EFF6FF',borderRadius:6,fontSize:11,borderLeft:'3px solid #3B82F6'}},
                  R('span',null,'📎'),
                  R('span',{style:{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:600}},a.name),
                  R('span',{style:{color:'#9CA3AF',fontSize:10}},((a.size||0)/1024).toFixed(1)+' KB'),
                  R('button',{type:'button',onClick:()=>removeAttachment(i),style:{background:'none',border:'none',color:'#FCA5A5',cursor:'pointer',fontSize:14,padding:'2px 6px'}},'✕')
                ))
              )
        )
      )
    ),
    /* 상세 보기 */
    selectedEntry&&R(Modal2,{title:selectedEntry.title,onClose:()=>setSelectedEntry(null),size:780,
      footer:R('div',{style:{display:'flex',gap:8,width:'100%'}},
        R('button',{className:'btn bs',onClick:()=>setSelectedEntry(null),style:{flex:1}},'닫기'),
        (selectedEntry.writer_id===user.id||isAdmin)&&R('button',{className:'btn bp',onClick:()=>startEdit(selectedEntry),style:{flex:1}},'수정'),
        (selectedEntry.writer_id===user.id||isAdmin)&&R('button',{className:'btn bs',onClick:()=>{del(selectedEntry.id);setSelectedEntry(null);},style:{flex:1,background:'#FEE2E2',color:'#991B1B'}},'삭제')
      )
    },
      R('div',null,

/* ═══════════════ 전자계약 ═══════════════ */
function PageContract({user}){
  const[contracts,setContracts]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[editContract,setEditContract]=useState(null);
  const[selectedContract,setSelectedContract]=useState(null);
  const[signing,setSigning]=useState(false);
  const[signature,setSignature]=useState('');
  const isAdmin=['superadmin','admin'].includes(user.role);
  const defaultForm={
    title:'',contract_type:'general',
    party_a_name:'',party_a_contact:'',party_a_email:'',
    party_b_name:'',party_b_contact:'',party_b_email:'',
    start_date:today2(),end_date:'',
    amount:0,currency:'KRW',
    content:'',terms:''
  };
  const[form,setForm]=useState(defaultForm);
  const TYPES=[
    {v:'general',l:'일반계약'},
    {v:'service',l:'용역계약'},
    {v:'supply',l:'납품계약'},
    {v:'employment',l:'근로계약'},
    {v:'nda',l:'비밀유지(NDA)'},
    {v:'lease',l:'임대차계약'}
  ];
  const STATUS_COLORS={
    '작성중':'#9CA3AF',
    '서명대기':'#F59E0B',
    '체결완료':'#10B981',
    '만료':'#6B7280',
    '취소':'#EF4444'
  };
  
  useEffect(()=>{load();},[]);
  const load=async()=>{
    setLoading(true);
    try{
      let q=sbClient.from('contracts').select('*,emp:writer_id(name)');
      if(!isAdmin){
        /* 일반 직원: 본인이 작성한 것 + 본인이 당사자인 것만 */
        q=q.or(`writer_id.eq.${user.id},party_a_email.eq.${user.email||''},party_b_email.eq.${user.email||''}`);
      }
      const{data,error}=await q.order('created_at',{ascending:false});
      if(error)throw error;
      setContracts(data||[]);
    }catch(e){
      console.warn('계약 로드:',e);
      if(e.message&&e.message.includes('does not exist')){
        alert('⚠️ contracts 테이블이 없습니다.\n_통합SQL_한번에실행.sql을 실행해주세요.');
      }
    }
    setLoading(false);
  };
  const save=async()=>{
    if(!form.title.trim()||!form.party_a_name||!form.party_b_name){
      alert('제목, 갑(A), 을(B) 정보는 필수입니다.');return;
    }
    try{
      const payload={...form,writer_id:user.id,status:'작성중'};
      let resp;
      if(editContract){
        resp=await sbClient.from('contracts').update(payload).eq('id',editContract.id);
      }else{
        resp=await sbClient.from('contracts').insert(payload);
      }
      if(resp.error)throw resp.error;
      setShowForm(false);setEditContract(null);setForm(defaultForm);
      load();
      alert('✅ 계약서 저장 완료\n\n다음 단계: 당사자에게 [서명 요청]을 보내세요.');
    }catch(e){alert('저장 실패: '+(e.message||e));}
  };
  const sendForSign=async(contract)=>{
    if(!confirm('"'+contract.title+'"\n\n양 당사자에게 서명을 요청할까요?\n상태가 "서명대기"로 변경됩니다.'))return;
    await sbClient.from('contracts').update({status:'서명대기',sent_for_sign_at:now2()}).eq('id',contract.id);
    load();
    alert('✅ 서명 요청 완료\n\n각 당사자는 이 시스템에서 [서명] 버튼으로 서명할 수 있습니다.');
  };
  const sign=async(contract,party)=>{
    if(!signature.trim()){alert('서명을 입력해주세요 (이름 또는 도장 텍스트)');return;}
    const updates={};
    updates[`party_${party}_signature`]=signature;
    updates[`party_${party}_signed_at`]=now2();
    /* 양쪽 모두 서명되면 체결완료 */
    const other=party==='a'?'b':'a';
    const otherSigned=contract[`party_${other}_signature`];
    if(otherSigned)updates.status='체결완료';
    await sbClient.from('contracts').update(updates).eq('id',contract.id);
    setSigning(false);setSignature('');setSelectedContract(null);
    load();
    alert(otherSigned?'🎉 계약 체결 완료!\n양 당사자 서명이 완료되었습니다.':'✅ 서명 완료\n상대방 서명을 기다립니다.');
  };
  const cancelContract=async(contract)=>{
    if(!confirm('정말 취소하시겠습니까?'))return;
    await sbClient.from('contracts').update({status:'취소'}).eq('id',contract.id);
    load();
  };
  const del=async(id)=>{
    if(!confirm('이 계약서를 삭제할까요?'))return;
    await sbClient.from('contracts').delete().eq('id',id);
    load();
  };
  const fNum=n=>(+n||0).toLocaleString();
  
  if(loading)return R('div',{className:'pg fa'},'⏳ 로딩...');
  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},
      R('div',null,R('div',{className:'pg-title'},'✍️ 전자계약'),R('div',{style:{fontSize:11,color:'var(--tm)',marginTop:2}},contracts.length+'건의 계약')),
      R('button',{className:'btn bp',onClick:()=>{setEditContract(null);setForm(defaultForm);setShowForm(true);}},'+ 새 계약')
    ),
    /* 통계 */
    R('div',{className:'g4',style:{marginBottom:14}},
      ...['작성중','서명대기','체결완료','만료'].map(s=>{
        const cnt=contracts.filter(c=>c.status===s).length;
        return R('div',{key:s,className:'card',style:{padding:'10px 14px',borderLeft:'3px solid '+(STATUS_COLORS[s]||'#9CA3AF')}},
          R('div',{style:{fontSize:10,color:'var(--tm)'}},s),
          R('div',{style:{fontSize:22,fontWeight:800,color:STATUS_COLORS[s]||'#000'}},cnt)
        );
      })
    ),
    /* 목록 */
    R('div',{className:'card',style:{padding:0,overflow:'hidden'}},
      contracts.length===0
        ? R('div',{style:{padding:40,textAlign:'center',color:'var(--tm)'}},
            R('div',{style:{fontSize:48,marginBottom:10}},'✍️'),
            R('div',null,'아직 작성된 계약이 없습니다')
          )
        : R('table',null,
            R('thead',null,R('tr',null,
              R('th',{style:{width:80}},'구분'),
              R('th',null,'제목'),
              R('th',{style:{width:120}},'갑(A)'),
              R('th',{style:{width:120}},'을(B)'),
              R('th',{style:{width:100,textAlign:'right'}},'금액'),
              R('th',{style:{width:90}},'상태'),
              R('th',{style:{width:90}},'기간'),
              R('th',{style:{width:80}},'')
            )),
            R('tbody',null,...contracts.map(c=>R('tr',{key:c.id,style:{cursor:'pointer'},onClick:()=>setSelectedContract(c)},
              R('td',{style:{fontSize:11}},TYPES.find(t=>t.v===c.contract_type)?.l||'-'),
              R('td',null,R('div',{style:{fontWeight:600}},c.title)),
              R('td',{style:{fontSize:11}},c.party_a_name,c.party_a_signature&&R('span',{style:{color:'#10B981',marginLeft:4}},'✓')),
              R('td',{style:{fontSize:11}},c.party_b_name,c.party_b_signature&&R('span',{style:{color:'#10B981',marginLeft:4}},'✓')),
              R('td',{style:{fontSize:11,textAlign:'right',fontWeight:600}},c.amount?fNum(c.amount)+' '+(c.currency||'KRW'):'-'),
              R('td',null,R('span',{style:{display:'inline-block',padding:'2px 8px',background:STATUS_COLORS[c.status]||'#9CA3AF',color:'#fff',fontSize:10,borderRadius:10,fontWeight:700}},c.status||'작성중')),
              R('td',{style:{fontSize:10,color:'var(--tm)'}},c.start_date+(c.end_date?' ~ '+c.end_date:''))
            )))
          )
    ),
    /* 작성/수정 모달 */
    showForm&&R(Modal2,{title:editContract?'계약 수정':'새 전자계약 작성',onClose:()=>{setShowForm(false);setEditContract(null);},size:720,
      footer:R('div',{style:{display:'flex',gap:8,width:'100%'}},
        R('button',{className:'btn bs',onClick:()=>setShowForm(false),style:{flex:1}},'취소'),
        R('button',{className:'btn bp',onClick:save,style:{flex:2}},editContract?'수정':'저장')
      )
    },
      R('div',{className:'fg'},
        R('div',{className:'fr'},R('label',{className:'lbl'},'계약 종류'),R('select',{className:'inp',value:form.contract_type,onChange:e=>setForm(p=>({...p,contract_type:e.target.value}))},...TYPES.map(t=>R('option',{key:t.v,value:t.v},t.l)))),
        R('div',{className:'fr'},R('label',{className:'lbl'},'계약 금액 (KRW)'),R('input',{type:'number',className:'inp',value:form.amount,onChange:e=>setForm(p=>({...p,amount:+e.target.value}))})),
        R('div',{className:'fr',style:{gridColumn:'1/-1'}},R('label',{className:'lbl'},'제목 *'),R('input',{className:'inp',value:form.title,onChange:e=>setForm(p=>({...p,title:e.target.value})),placeholder:'예: ㈜B&F글로벌-ABC식품 OEM 공급계약'})),
        R('div',{className:'fr',style:{gridColumn:'1/-1',padding:10,background:'#FFF8F4',borderRadius:8}},
          R('label',{className:'lbl',style:{fontWeight:700,color:'#D94F1E'}},'📋 갑(A) 정보'),
          R('div',{className:'fg',style:{marginTop:6}},
            R('input',{className:'inp',value:form.party_a_name,onChange:e=>setForm(p=>({...p,party_a_name:e.target.value})),placeholder:'회사명/이름 *'}),
            R('input',{className:'inp',value:form.party_a_contact,onChange:e=>setForm(p=>({...p,party_a_contact:e.target.value})),placeholder:'담당자 연락처'}),
            R('input',{className:'inp',value:form.party_a_email,onChange:e=>setForm(p=>({...p,party_a_email:e.target.value})),placeholder:'담당자 이메일',style:{gridColumn:'1/-1'}})

        ),
        R('div',{className:'fr',style:{gridColumn:'1/-1',padding:10,background:'#F0F9FF',borderRadius:8}},
          R('label',{className:'lbl',style:{fontWeight:700,color:'#0369A1'}},'📋 을(B) 정보'),
          R('div',{className:'fg',style:{marginTop:6}},

            R('input',{className:'inp',value:form.party_b_contact,onChange:e=>setForm(p=>({...p,party_b_contact:e.target.value})),placeholder:'담당자 연락처'}),
            R('input',{className:'inp',value:form.party_b_email,onChange:e=>setForm(p=>({...p,party_b_email:e.target.value})),placeholder:'담당자 이메일',style:{gridColumn:'1/-1'}})
          )
        ),
        R('div',{className:'fr'},R('label',{className:'lbl'},'시작일'),R('input',{type:'date',className:'inp',value:form.start_date,onChange:e=>setForm(p=>({...p,start_date:e.target.value}))})),
        R('div',{className:'fr'},R('label',{className:'lbl'},'종료일'),R('input',{type:'date',className:'inp',value:form.end_date,onChange:e=>setForm(p=>({...p,end_date:e.target.value}))})),
