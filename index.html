function PageLinks({user}){
  const[myLinks,setMyLinks]=useState([]);
  const[sharedLinks,setSharedLinks]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[editLink,setEditLink]=useState(null);
  const ICON_PRESETS=['🔗','🏢','📊','📦','💰','📋','🚀','⚙️','📝','🌐','💻','📱','🎯','📈','🛒','💼','🔑','📂'];
  const defaultForm={title:'',url:'',icon:'🔗',color:'#D94F1E',category:'업무'};
  const[form,setForm]=useState(defaultForm);
  const isAdmin=['superadmin','admin'].includes(user.role);

  useEffect(()=>{load();},[]);

  const load=async()=>{
    setLoading(true);
    try{
      const[{data:my},{data:sh}]=await Promise.all([
        sbClient.from('user_links').select('*').eq('user_id',user.id).order('created_at'),
        sbClient.from('shared_links').select('*').order('created_at')
      ]);
      setMyLinks(my||[]);setSharedLinks(sh||[]);
    }catch(e){console.warn(e);}
    setLoading(false);
  };

  const save=async()=>{
    if(!form.title.trim()||!form.url.trim()){alert('이름과 URL을 입력해주세요');return;}
    let url=form.url.trim();
    if(!url.startsWith('http'))url='https://'+url;

    try{
      if(editLink){
        const{error}=await sbClient.from('user_links').update({title:form.title.trim(),url,icon:form.icon,color:form.color,category:form.category}).eq('id',editLink.id);
        if(error)throw error;
      }else{
        const{error}=await sbClient.from('user_links').insert({user_id:user.id,title:form.title.trim(),url,icon:form.icon,color:form.color,category:form.category});
        if(error)throw error;
      }
      setShowForm(false);setEditLink(null);setForm(defaultForm);
      await load();
    }catch(e){
      if(e.message&&(e.message.includes('does not exist')||e.message.includes('schema cache'))){
        alert('⚠️ user_links 테이블이 없습니다.\nSupabase SQL Editor에서 setup_all_tables.sql을 실행해주세요.');

  };

        R('button',{onClick:e=>{e.stopPropagation();del(link.id,tbl);},style:{background:'none',border:'none',cursor:'pointer',fontSize:10,padding:'1px 3px',color:'#fca5a5'}},'✕')
      ),
      /* 파비콘 스타일 아이콘 */
      R('div',{style:{width:52,height:52,borderRadius:12,background:link.color||'#D94F1E',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,boxShadow:'0 2px 8px rgba(0,0,0,0.12)',flexShrink:0}},link.icon||'🔗'),
      R('div',{style:{fontSize:10,fontWeight:600,textAlign:'center',color:'#374151',maxWidth:76,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',lineHeight:1.3}},link.title)
    );

  if(loading)return R('div',{className:'pg fa',style:{display:'flex',justifyContent:'center',paddingTop:40}},'⏳');

  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},
      R('div',null,R('div',{className:'pg-title'},'🔗 바로가기'),R('div',{style:{fontSize:11,color:'var(--tm)',marginTop:2}},'크롬 바로가기처럼 빠르게 접속')),
      R('button',{className:'btn bp btn-sm',onClick:()=>{setEditLink(null);setForm(defaultForm);setShowForm(true);}},'+  추가')
    ),

    /* 내 바로가기 */
    R('div',{className:'card',style:{marginBottom:14}},
      R('div',{style:{fontSize:12,fontWeight:700,marginBottom:14,color:'#374151'}},'⭐ 내 바로가기'),
      myLinks.length===0
        ? R('div',{style:{padding:'20px 0',textAlign:'center',color:'var(--tm)',fontSize:12}},'+ 추가 버튼으로 바로가기를 등록하세요')

            ...myLinks.map(l=>R(LinkCard,{key:l.id,link:l,tbl:'user_links',owned:true}))

    sharedLinks.length>0&&R('div',{className:'card'},
      R('div',{style:{fontSize:12,fontWeight:700,marginBottom:14,color:'#374151'}},'🏢 공용 바로가기'),

        ...sharedLinks.map(l=>R(LinkCard,{key:l.id,link:l,tbl:'shared_links',owned:isAdmin}))

    /* 추가/수정 폼 */
    showForm&&R(Modal2,{title:editLink?'바로가기 수정':'바로가기 추가',onClose:()=>{setShowForm(false);setEditLink(null);setForm(defaultForm);},

        R('button',{className:'btn bp',onClick:save,style:{flex:2}},editLink?'수정':'저장')

      R('div',{style:{display:'flex',flexDirection:'column',gap:12}},
        /* 미리보기 */
        R('div',{style:{display:'flex',justifyContent:'center',marginBottom:4}},
          R('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'12px 16px'}},
            R('div',{style:{width:52,height:52,borderRadius:12,background:form.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,boxShadow:'0 2px 8px rgba(0,0,0,0.12)'}},form.icon),

        /* 아이콘 선택 */
        R('div',null,
          R('div',{style:{fontSize:11,fontWeight:700,marginBottom:6}},'아이콘'),
          R('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
            ...ICON_PRESETS.map(ic=>R('button',{key:ic,onClick:()=>setForm(p=>({...p,icon:ic})),style:{width:34,height:34,fontSize:18,background:form.icon===ic?'var(--p)':' #F3F4F6',border:form.icon===ic?'2px solid var(--p)':'1px solid var(--bd)',borderRadius:8,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}},ic))

        R('div',null,R('label',{style:{fontSize:11,fontWeight:700,display:'block',marginBottom:4}},'URL'),R('input',{className:'inp',value:form.url,onChange:e=>setForm(p=>({...p,url:e.target.value})),placeholder:'https://...',style:{width:'100%'}})),
        R('div',null,
          R('label',{style:{fontSize:11,fontWeight:700,display:'block',marginBottom:4}},'색상'),
          R('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},

  );

/* ═══ 자동 발주 제안 ════════════════════════════ */
function PageAutoOrder({user,mats,onCreateOrder}){
  const[rules,setRules]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState('');
  
  useEffect(()=>{load();},[]);
  const load=async()=>{setLoading(true);try{const{data}=await sbClient.from('auto_order_rules').select('*');setRules(data||[]);}catch(e){}setLoading(false);};
  
  const suggestions=useMemo(()=>{
    return mats.map(mat=>{
      const rule=rules.find(r=>r.item_code===mat.c);
      const safety=rule&&rule.safety_stock?rule.safety_stock:(mat.mu||0)*0.5;
      const reorder=rule&&rule.reorder_point?rule.reorder_point:(mat.mu||0)*0.7;
      const need=safety>0&&mat.s<reorder;
      const recommendQty=rule&&rule.reorder_qty?rule.reorder_qty:Math.max(0,(mat.mu||0)*1.5-mat.s);
      return Object.assign({},mat,{rule,safety,reorder,need,recommendQty,supplier:(rule&&rule.preferred_supplier)||mat.supplier||''});
    }).filter(s=>s.need).sort((a,b)=>(a.s/a.reorder)-(b.s/b.reorder));
  },[mats,rules]);
  
  const filtered=suggestions.filter(s=>!search||s.n.includes(search));
  
  const updRule=async(itemCode,changes)=>{
    const existing=rules.find(r=>r.item_code===itemCode);
    if(existing){await sbClient.from('auto_order_rules').update(changes).eq('id',existing.id);}
    else{await sbClient.from('auto_order_rules').insert(Object.assign({item_code:itemCode},changes));}
    load();
  };
  
  const createOrder=(s)=>{
    if(!s.supplier)return alert('매입처를 먼저 설정하세요');
    if(onCreateOrder){onCreateOrder({matCode:s.c,matName:s.n,qty:s.recommendQty,supplier:s.supplier,unit:s.u});alert('✅ 발주현황 페이지에 추가되었습니다');}
  };
  
  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},R('div',null,R('div',{className:'pg-title'},'🤖 자동 발주 제안'),R('div',{style:{fontSize:12,color:'var(--tm)',marginTop:2}},'안전재고 기준 자동 추천'))),
    R('div',{className:'card',style:{background:'linear-gradient(135deg,#fff,#FFF5F0)',border:'1px solid #FCC8B0',marginBottom:14}},
      R('div',{style:{display:'flex',gap:14,alignItems:'center'}},
        R('div',{style:{fontSize:32}},'🤖'),
        R('div',null,R('div',{style:{fontSize:13,fontWeight:700,marginBottom:4}},'AI 발주 제안 시스템'),R('div',{style:{fontSize:11,color:'var(--tm)',lineHeight:1.6}},'• 재발주점 = 월사용량 × 0.7',R('br'),'• 안전재고 = 월사용량 × 0.5',R('br'),'• 추천 주문량 = 월사용량 × 1.5 - 현재고'))
      )
    ),
    R('div',{style:{display:'flex',gap:8,marginBottom:14}},R('input',{className:'inp',value:search,onChange:e=>setSearch(e.target.value),placeholder:'🔍 품목 검색',style:{maxWidth:280}})),
    loading?R('div',{style:{textAlign:'center',padding:30}},'로딩 중...'):
    filtered.length===0?R('div',{className:'empty'},R('div',{className:'empty-ic'},'✅'),'발주 필요 품목 없음'):
    R('div',{className:'tw'},
      R('table',null,
        R('thead',null,R('tr',null,R('th',null,'품목'),R('th',{style:{textAlign:'right',width:70}},'현재고'),R('th',{style:{textAlign:'right',width:75}},'안전재고'),R('th',{style:{textAlign:'right',width:75}},'재발주점'),R('th',{style:{textAlign:'right',width:90,background:'#FFF5F0'}},'추천량'),R('th',{style:{width:130}},'매입처'),R('th',{style:{width:75}}))),
        R('tbody',null,
          ...filtered.map(s=>R('tr',{key:s.c,className:s.s===0?'dng':''},
            R('td',null,R('div',{style:{fontSize:12,fontWeight:600}},s.n),R('div',{style:{fontSize:10,color:'var(--tm)'}},s.c)),
            R('td',{style:{textAlign:'right',fontWeight:700,color:s.s===0?'#dc2626':'#1a1a1a'}},s.s,s.u),
            R('td',{style:{textAlign:'right'}},R('input',{type:'number',defaultValue:s.safety,onBlur:e=>updRule(s.c,{safety_stock:+e.target.value,item_name:s.n}),className:'ci',style:{textAlign:'right'}})),
            R('td',{style:{textAlign:'right'}},R('input',{type:'number',defaultValue:s.reorder,onBlur:e=>updRule(s.c,{reorder_point:+e.target.value,item_name:s.n}),className:'ci',style:{textAlign:'right'}})),
            R('td',{style:{textAlign:'right',fontWeight:800,color:'var(--p)',background:'#FFF5F0'}},R('input',{type:'number',defaultValue:s.recommendQty,onBlur:e=>updRule(s.c,{reorder_qty:+e.target.value,item_name:s.n}),className:'ci',style:{textAlign:'right',fontWeight:800,color:'var(--p)'}})),
            R('td',null,R('input',{defaultValue:s.supplier,onBlur:e=>updRule(s.c,{preferred_supplier:e.target.value,item_name:s.n}),className:'ci',placeholder:'매입처'})),
            R('td',null,R('button',{className:'btn bp btn-sm',onClick:()=>createOrder(s),style:{padding:'4px 10px'}},'발주생성'))
          ))
        )
      )
    )
  );
}

function PagePurchaseAnalysis({mats,variant='hq'}){
  const[purchases,setPurchases]=useState([]);
  const[loading,setLoading]=useState(true);
  const[yearFilter,setYearFilter]=useState(new Date().getFullYear());
  const[searchItem,setSearchItem]=useState('');
  const[viewMode,setViewMode]=useState('supplier');
  const[showImport,setShowImport]=useState(false);
  const[showDelete,setShowDelete]=useState(false);

  const reload=async()=>{
    setLoading(true);
    const{data}=await sbClient.from('purchases').select('*').eq('source',variant).gte('purchase_date',yearFilter+'-01-01').lte('purchase_date',yearFilter+'-12-31').order('purchase_date');
    setPurchases(data||[]);
    setLoading(false);
  };
  useEffect(()=>{reload();},[yearFilter]);

  /* 품목별 집계 */
  const itemStats=useMemo(()=>{
    const map={};
    purchases.forEach(p=>{
      const k=p.item_code||p.item_name;
      if(!k)return;
      if(!map[k])map[k]={code:p.item_code||'',name:p.item_name||'',suppliers:{},monthly:Array(12).fill(0),totalQty:0,totalAmt:0};
      const s=map[k];
      s.totalQty+=(+p.quantity||0);s.totalAmt+=(+p.amount||0);
      const mo=new Date(p.purchase_date).getMonth();if(mo>=0)s.monthly[mo]+=(+p.quantity||0);
      const sup=p.supplier_name||'미상';
      if(!s.suppliers[sup])s.suppliers[sup]={name:sup,qty:0,amt:0,prices:[]};
      s.suppliers[sup].qty+=(+p.quantity||0);s.suppliers[sup].amt+=(+p.amount||0);
      if(+p.unit_price>0)s.suppliers[sup].prices.push(+p.unit_price);
    });
    return Object.values(map).sort((a,b)=>b.totalAmt-a.totalAmt);
  },[purchases]);

  /* 거래처별 집계 */
  const supplierStats=useMemo(()=>{
    const map={};
    purchases.forEach(p=>{
      const sup=p.supplier_name||'미상';
      if(!map[sup])map[sup]={name:sup,items:new Set(),totalAmt:0,totalQty:0,monthly:Array(12).fill(0)};
      map[sup].totalAmt+=(+p.amount||0);map[sup].totalQty+=(+p.quantity||0);
      if(p.item_code||p.item_name)map[sup].items.add(p.item_code||p.item_name);
      const mo=new Date(p.purchase_date).getMonth();if(mo>=0)map[sup].monthly[mo]+=(+p.amount||0);
    });
    return Object.values(map).map(s=>({...s,items:s.items.size})).sort((a,b)=>b.totalAmt-a.totalAmt);
  },[purchases]);

  const filtered=searchItem?itemStats.filter(x=>x.name.includes(searchItem)||x.code.includes(searchItem)):itemStats;
  const totalAmt=purchases.reduce((s,p)=>s+(+p.amount||0),0);
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  if(loading)return R('div',{className:'pg fa',style:{display:'flex',alignItems:'center',justifyContent:'center'}},'⏳ 로딩 중...');

  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},
      R('div',null,R('div',{className:'pg-title'},(variant==='adm'?'⚙️':'🏢')+' 매입 분석'),R('div',{style:{fontSize:12,color:'var(--tm)',marginTop:2}},yearFilter+'년 · 거래처별/품목별/월별 비교')),
      R('div',{style:{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}},
        R('button',{className:'btn bp btn-sm',onClick:()=>setShowImport(true)},'📥 Import'),R('button',{className:'btn bs btn-sm',onClick:()=>setShowDelete(true),style:{color:'#EF4444',border:'1px solid #EF4444'}},'🗑 삭제'),
        R('button',{className:'btn bs btn-sm',onClick:()=>setYearFilter(yearFilter-1)},'◀'),
        R('span',{style:{fontSize:13,fontWeight:700,padding:'0 8px'}},yearFilter+'년'),
        R('button',{className:'btn bs btn-sm',onClick:()=>setYearFilter(yearFilter+1)},'▶')
      )
    ),
    R('div',{className:'g3',style:{marginBottom:14}},
      R('div',{className:'card'},R('div',{style:{fontSize:11,color:'var(--tm)'}},'총 매입금액'),R('div',{style:{fontSize:22,fontWeight:900,color:'var(--p)',marginTop:4}},fN(Math.round(totalAmt)),'원')),
      R('div',{className:'card'},R('div',{style:{fontSize:11,color:'var(--tm)'}},'거래처 수'),R('div',{style:{fontSize:22,fontWeight:900,color:'#3B82F6',marginTop:4}},supplierStats.length,'개')),
      R('div',{className:'card'},R('div',{style:{fontSize:11,color:'var(--tm)'}},'매입 품목 수'),R('div',{style:{fontSize:22,fontWeight:900,color:'#7C3AED',marginTop:4}},itemStats.length,'종'))
    ),
    R('div',{className:'tab-row',style:{marginBottom:14}},
      R('button',{className:'tab'+(viewMode==='supplier'?' act':''),onClick:()=>setViewMode('supplier')},'거래처별'),
      R('button',{className:'tab'+(viewMode==='monthly'?' act':''),onClick:()=>setViewMode('monthly')},'월별 매입량'),
      R('button',{className:'tab'+(viewMode==='compare'?' act':''),onClick:()=>setViewMode('compare')},'품목 단가 비교')
    ),
    viewMode==='supplier'&&R('div',{className:'card',style:{padding:0,overflow:'auto'}},

        R('input',{className:'inp',value:searchItem,onChange:e=>setSearchItem(e.target.value),placeholder:'🔍 품목 검색',style:{maxWidth:280}})
      ),
      R('table',null,
        R('thead',null,R('tr',null,R('th',null,'품목'),R('th',null,'코드'),...months.map(m=>R('th',{key:m,style:{textAlign:'right',width:60,fontSize:10}},m)),R('th',{style:{textAlign:'right'}},'합계'))),
        R('tbody',null,...filtered.slice(0,40).map(item=>R('tr',{key:item.code||item.name},
          R('td',{style:{fontSize:11,fontWeight:600,maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},item.name),

        )))
      )

    viewMode==='compare'&&R('div',null,
      R('div',{style:{display:'flex',gap:8,marginBottom:10}},
        R('input',{className:'inp',value:searchItem,onChange:e=>setSearchItem(e.target.value),placeholder:'🔍 품목 검색',style:{maxWidth:280}})
      ),
      ...filtered.filter(item=>Object.keys(item.suppliers).length>0).slice(0,20).map(item=>{
        const sups=Object.values(item.suppliers);

        const maxP=allPrices.length?Math.max(...allPrices):0;
        return R('div',{key:item.code||item.name,className:'card',style:{marginBottom:10}},

            sups.length>1&&minP>0&&R('div',{style:{background:'#FFF0E8',borderRadius:8,padding:'4px 10px',fontSize:11,color:'#D94F1E',fontWeight:700}},'단가 차이 ',((maxP-minP)/minP*100).toFixed(0),'%')

            ...sups.sort((a,b)=>{const ap=a.prices.length?Math.min(...a.prices):999999;const bp=b.prices.length?Math.min(...b.prices):999999;return ap-bp;}).map((sup,si)=>{

                R('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},

                ),
                R('div',{style:{fontSize:14,fontWeight:800,color:isLowest?'#15803D':'var(--p)'}},fN(Math.round(avgP))+'원'),
                R('div',{style:{fontSize:11,color:'var(--tm)'}},'총 ',sup.qty.toFixed(1),' / ',fN(Math.round(sup.amt)),'원')

    ),

  );
}

/* ═══ 데이터 삭제 모달 컴포넌트 ═══ */
function DataDeleteModal({table,label,count,onClose,onDone,source}){
  const[delFrom,setDelFrom]=useState('');
  const[delTo,setDelTo]=useState('');
  const[deleting,setDeleting]=useState(false);
  const dateField=table==='sales'?'sale_date':'purchase_date';

  const doDelete=async(mode)=>{
    const confirmMsg=mode==='all'
      ?label+' 전체 데이터('+count+'건)를 삭제합니다. 되돌릴 수 없습니다!'
      :'선택 기간('+delFrom+' ~ '+delTo+')의 '+label+' 데이터를 삭제합니다.';
    if(!confirm(confirmMsg))return;
    setDeleting(true);
    try{
      let q=sbClient.from(table).delete();
      if(source)q=q.eq('source',source);
      if(mode==='range'){
        if(!delFrom||!delTo){alert('기간을 선택해주세요');setDeleting(false);return;}
        q=q.gte(dateField,delFrom).lte(dateField,delTo);
      }else{
        q=q.gt(dateField,'1900-01-01');
      }
      const{error}=await q;
      if(error)throw error;
      alert('삭제 완료');
      onDone&&onDone();
      onClose();
    }catch(e){alert('삭제 실패: '+(e.message||String(e)));}
    setDeleting(false);
  };

  return R(Modal2,{title:'\uD83D\uDDD1 '+label+' 데이터 삭제',onClose,
    footer:R('div',{style:{display:'flex',gap:6,width:'100%'}},
      R('button',{className:'btn bs',onClick:onClose,style:{flex:1}},'\ucde8\uc18c'),
      R('button',{onClick:()=>doDelete('range'),disabled:deleting,style:{flex:2,padding:'9px',background:'#F59E0B',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700,fontSize:12}},deleting?'\uc0ad\uc81c \uc911...':'\uD83D\uDCC5 \uAE30\uAC04 \uc0ad\uc81c'),
      R('button',{onClick:()=>doDelete('all'),disabled:deleting,style:{flex:2,padding:'9px',background:'#EF4444',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700,fontSize:12}},deleting?'\uc0ad\uc81c \uc911...':'\u26A0\uFE0F \uc804\uccb4 \uc0ad\uc81c')
    )},
    R('div',null,
      R('div',{style:{background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:8,padding:'10px 14px',fontSize:11,color:'#991B1B',marginBottom:14}},'\u26A0\uFE0F \uc0ad\uc81c\ub41c \ub370\uc774\ud130\ub294 \ubcf5\uad6c\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4'),
      R('div',{style:{fontSize:12,fontWeight:700,marginBottom:8}},'\uD83D\uDCC5 \uAE30\uAC04 \uc120\ud0dd (\uc120\ud0dd \ud6C5 \uAE30\uAC04 \uc0ad\uc81c \uBC84\ud2bc \ud074\ub9AD)'),
      R('div',{style:{display:'flex',gap:8,alignItems:'center',marginBottom:12}},
        R('input',{type:'date',value:delFrom,onChange:e=>setDelFrom(e.target.value),className:'inp',style:{flex:1}}),
        R('span',{style:{color:'var(--tm)'}},'~'),
        R('input',{type:'date',value:delTo,onChange:e=>setDelTo(e.target.value),className:'inp',style:{flex:1}})
      ),
      R('div',{style:{fontSize:11,color:'var(--tm)'}},'\ud604\uc7ac '+label+' \ub370\uc774\ud130: ',count,'\uAC74')
    )
  );
}

/* ═══ 공통: 매출/매입 import 헬퍼 ═══════════════════ */
function ImportModal({type,onClose,onDone,source='adm'}){
  const[previewData,setPreviewData]=useState(null);
  const[previewHeaders,setPreviewHeaders]=useState([]);
  const[importing,setImporting]=useState(false);
  const[errorLog,setErrorLog]=useState('');
  const fileRef=useRef();

  const parseFile=(file)=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      try{
        let data=[];
        if(file.name.toLowerCase().endsWith('.csv')){
          let text;try{text=new TextDecoder('euc-kr').decode(ev.target.result);}catch(e){text=new TextDecoder('utf-8').decode(ev.target.result);}
          const lines=text.split(/\r?\n/).filter(l=>l.trim());
          let hIdx=0;while(hIdx<lines.length&&!/일자|날짜|date|거래처|품명|품목|No\./i.test(lines[hIdx]))hIdx++;
          if(hIdx>=lines.length)hIdx=0;
          const headers=lines[hIdx].split(',').map(h=>h.trim().replace(/^["']|["']$/g,''));
          data=lines.slice(hIdx+1).filter(l=>l.trim()).map(line=>{const vals=line.split(',').map(v=>v.trim().replace(/^["']|["']$/g,''));const obj={};headers.forEach((h,i)=>{if(h)obj[h]=vals[i]||'';});return obj;}).filter(r=>Object.values(r).some(v=>v));
        }else{
          const wb=XLSX.read(ev.target.result,{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const rawRows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
          /* 헤더 행 자동 감지 */
          let headerRowIdx=0;
          for(let i=0;i<Math.min(10,rawRows.length);i++){
            const j=rawRows[i].join('|');
            if(/일자|날짜|date|거래처|품명|품목|No\.|월별/i.test(j)){headerRowIdx=i;break;}
          }
          const headers=rawRows[headerRowIdx].map(h=>String(h).trim()).filter(h=>h);
          /* 월별/거래처별 형식 감지 (이카운트 판매현황/구매현황) */
          const isMonthlyFormat=headers.includes('월별')&&headers.includes('거래처별');
          if(isMonthlyFormat){
            /* 이카운트 월별 요약 형식 파싱 */
            let curMonth='';
            const parsed=[];
            rawRows.slice(headerRowIdx+1).forEach(row=>{
              const month=String(row[0]||'').trim();
              const customer=String(row[1]||'').trim();
              /* 월 업데이트 */
              if(month&&/\d{4}\/\d{2}/.test(month))curMonth=month.replace('/','-').trim().slice(0,7);
              /* '계' 행 스킵 */
              if(customer.endsWith(' 계')||customer.endsWith(' 계\t'))return;
              if(!customer||!row.some(c=>c!==''&&c!==0))return;
              const obj={};
              headers.forEach((h,i)=>{obj[h]=row[i]!==undefined?String(row[i]).trim():'';});
              obj['_month']=curMonth;  /* 이월된 월 저장 */
              parsed.push(obj);
            });
            data=parsed;
          }else{
            data=rawRows.slice(headerRowIdx+1).filter(r=>r.some(c=>c!=='')).map(row=>{
              const obj={};headers.forEach((h,i)=>{obj[h]=row[i]!==undefined?String(row[i]).trim():'';});return obj;
            }).filter(r=>Object.values(r).some(v=>v&&v!==''));
          }
        }
        if(!data.length){setErrorLog('데이터 행이 없습니다');return;}
        setPreviewHeaders(Object.keys(data[0]));
        setPreviewData({rows:data,file:file.name});
        setErrorLog('');
      }catch(e){setErrorLog('파일 읽기 실패: '+e.message);}
    };
    reader.readAsArrayBuffer(file);
  };

  const mapDate=r=>{
    /* 이카운트 월별 형식: _month 필드 우선 사용 */
    if(r['_month'])return r['_month']+'-01';
    let v=r['일자-No.']||r['일자No']||r['일자']||r['날짜']||r['거래일']||r['판매일']||r['매입일']||'';
    if(!v)return today2();
    let str=String(v).replace(/\s+-?\d+\s*$/,'').trim();
    const n=Number(str);
    if(!isNaN(n)&&n>40000)return new Date(Math.round((n-25569)*86400*1000)).toISOString().slice(0,10);
    str=str.replace(/[.\/]/g,'-');
    const result=str.slice(0,10);
    if(/^\d{4}-\d{1,2}-\d{1,2}$/.test(result)){
      const parts=result.split('-');
      return parts[0]+'-'+parts[1].padStart(2,'0')+'-'+parts[2].padStart(2,'0');
    }
    return today2();
  };
  const mapStr=(r,...keys)=>String(keys.reduce((acc,k)=>acc||r[k],'')||'').trim();
  const mapNum=(r,...keys)=>parseFloat(String(keys.reduce((acc,k)=>acc||r[k],'')||'0').replace(/[,\s]/g,''))||0;

  const doImport=async()=>{
    if(!previewData)return;
    setImporting(true);setErrorLog('');
    try{
      let mapped;
      if(type==='sales'){
        mapped=previewData.rows.map(r=>{
          const rawName=mapStr(r,'품명','품목명','제품명','품목명(규격)','품목명(요약)','상품명');
          return{
            sale_date:(mapStr(r,'월별')?mapStr(r,'월별').replace('/','-').slice(0,7)+'-01':mapDate(r)),
            customer_name:mapStr(r,'거래처명','거래처별','거래처','고객사','매입처'),
            product_code:mapStr(r,'품목코드','코드'),
            product_name:cleanItemName(rawName),
            quantity:mapNum(r,'수량','수량합계'),
            unit_price:mapNum(r,'단가'),
            amount:mapNum(r,'공급가액','금액합계','금액','합계','Amount'),
            cost:mapNum(r,'원가'),
            source:source
          };
        }).filter(r=>r.customer_name||r.amount>0);
      }else{
        mapped=previewData.rows.map(r=>{
          const rawName=mapStr(r,'품명','품목명','품목명(규격)','품목명(요약)');
          const qty=mapNum(r,'수량','수량합계');
          const amt=mapNum(r,'금액','금액합계','공급가액','합계');
          return{
            purchase_date:mapDate(r),
            supplier_name:mapStr(r,'거래처','거래처명','매입처','공급처'),
            item_code:mapStr(r,'품목코드','코드'),
            item_name:cleanItemName(rawName),
            quantity:qty,
            unit_price:mapNum(r,'단가')||(qty>0?amt/qty:0),
            amount:amt,
            source:source
          };
        }).filter(r=>r.item_name||r.supplier_name);
      }

      if(mapped.length===0){
        setErrorLog('변환 가능한 행이 없습니다. 컬럼명을 확인해주세요.');
        setImporting(false);
        return;
      }

      /* 실제 저장 - 배치당 응답 검증 */
      const tableName=type==='sales'?'sales':'purchases';
      let savedCount=0;
      let lastError=null;
      for(let i=0;i<mapped.length;i+=200){
        const batch=mapped.slice(i,i+200);
        const{data:resp,error}=await sbClient.from(tableName).insert(batch).select();
        if(error){
          lastError=error;
          break;
        }
        savedCount+=(resp?resp.length:batch.length);
      }

      if(lastError){
        let msg='저장 실패: '+lastError.message;
        if(lastError.message&&(lastError.message.includes('does not exist')||lastError.message.includes('relation'))){
          msg+='\n\n⚠️ '+tableName+' 테이블이 Supabase에 없습니다.\nSupabase SQL Editor에서 setup_advanced.sql을 실행해주세요.';
        }
        if(lastError.message&&lastError.message.includes('row-level security')){
          msg+='\n\n⚠️ RLS 정책 오류. setup_advanced.sql의 정책을 다시 실행해주세요.';
        }
        setErrorLog(msg);
        setImporting(false);
        return;
      }

      alert('✅ '+(type==='sales'?'매출':'매입')+' '+savedCount+'건 저장 완료');
      /* 매입 → 재고 자동 반영: item_code로 매칭해 supplier/price 업데이트 */
      if(type!=='sales'){
        try{
          const{data:asData}=await sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle();
          if(asData&&asData.state_data&&asData.state_data.mats){
            /* 매입 데이터에서 코드별 최저단가/주거래처 집계 */
            const codeMap={};
            mapped.forEach(r=>{
              const code=r.item_code||(r.item_name||'').trim();
              if(!code)return;
              if(!codeMap[code])codeMap[code]={supplier:r.supplier_name||'',prices:[]};
              if(r.unit_price>0)codeMap[code].prices.push(r.unit_price);
              if(r.supplier_name)codeMap[code].supplier=r.supplier_name;
            });
            const newMats=asData.state_data.mats.map(m=>{
              const byCode=codeMap[m.c]||codeMap[m.n.trim()];
              if(!byCode)return m;
              const upd={...m};
              if(byCode.supplier)upd.supplier=byCode.supplier;
              if(byCode.prices.length){upd.price=Math.min(...byCode.prices);}
              return upd;
            });
            await sbClient.from('app_state').upsert({id:1,state_data:{...asData.state_data,mats:newMats},updated_at:new Date().toISOString()});
            console.log('✅ 재고 매입처/단가 자동 반영 완료');
          }
        }catch(syncErr){console.warn('재고 반영 실패:',syncErr);}
      }
      setImporting(false);
      onDone&&onDone();
      onClose();
    }catch(e){
      setErrorLog('예외 발생: '+(e.message||e));
      setImporting(false);
    }
  };

  return R(Modal2,{title:(type==='sales'?'📊 매출장부':'📦 매입장부')+' Excel Import',onClose,
    footer:R('div',{style:{display:'flex',gap:8,width:'100%'}},
      R('button',{className:'btn bs',onClick:onClose,style:{flex:1}},'취소'),
      previewData&&R('button',{className:'btn bp',onClick:doImport,disabled:importing,style:{flex:2}},importing?'⏳ 저장 중...':'✅ '+previewData.rows.length+'건 저장')
    )},
    R('input',{ref:fileRef,type:'file',accept:'.xlsx,.xls,.csv',style:{display:'none'},onChange:e=>{const f=e.target.files[0];if(f){parseFile(f);e.target.value='';}}}),
    R('div',{
      onDragOver:e=>{e.preventDefault();e.currentTarget.style.background='#FFF0E8';},
      onDragLeave:e=>{e.currentTarget.style.background='#FFF8F4';},
      onDrop:e=>{e.preventDefault();e.currentTarget.style.background='#FFF8F4';const f=e.dataTransfer.files[0];if(f)parseFile(f);},
      onClick:()=>fileRef.current&&fileRef.current.click(),
      style:{border:'2.5px dashed #D94F1E',borderRadius:12,padding:'24px',textAlign:'center',cursor:'pointer',background:'#FFF8F4',marginBottom:14}
    },
      R('div',{style:{fontSize:32,marginBottom:6}},'📂'),
      R('div',{style:{fontSize:13,fontWeight:700,color:'#D94F1E'}},type==='sales'?'매출장부':'매입장부',' 파일 드래그/클릭'),
      R('div',{style:{fontSize:11,color:'#666',marginTop:4}},'.xlsx .xls .csv (이카운트 자동 인식)')
    ),
    errorLog&&R('div',{style:{background:'#FEE2E2',border:'1px solid #FCA5A5',color:'#991B1B',borderRadius:8,padding:'10px 14px',fontSize:11,marginBottom:10,whiteSpace:'pre-wrap',lineHeight:1.5}},errorLog),
    previewData&&R('div',null,
      R('div',{style:{fontSize:11,color:'var(--tm)',marginBottom:6}},'📋 ',previewData.file,' · ',previewData.rows.length,'행 인식'),
      R('div',{style:{overflow:'auto',maxHeight:240,border:'1px solid var(--bd)',borderRadius:8}},
        R('table',{style:{fontSize:10}},
          R('thead',null,R('tr',null,...previewHeaders.slice(0,8).map(h=>R('th',{key:h,style:{padding:'5px',background:'#F8F9FA',whiteSpace:'nowrap'}},h)))),
          R('tbody',null,...previewData.rows.slice(0,8).map((r,i)=>R('tr',{key:i},...previewHeaders.slice(0,8).map(h=>R('td',{key:h,style:{padding:'4px',whiteSpace:'nowrap',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis'}},String(r[h]||''))))))
        )
      )
    )
  );
}

/* ═══ 경영 대시보드 (요약만) ═══════════════════════ */
function PageDashboard({user,variant='hq'}){
  const[sales,setSales]=useState([]);
  const[purchases,setPurchases]=useState([]);
  const[fixedCosts,setFixedCosts]=useState([]);
  const[loading,setLoading]=useState(true);

  const load=async()=>{
    setLoading(true);
    try{
      const[s,p,f]=await Promise.all([
        sbClient.from('sales').select('*').eq('source',variant).order('sale_date',{ascending:false}).limit(20000),
        sbClient.from('purchases').select('*').eq('source',variant).order('purchase_date',{ascending:false}).limit(20000),
        sbClient.from('fixed_costs').select('*').order('year').order('month').then(r=>r).catch(()=>({data:[]}))
      ]);
      setSales(s.data||[]);setPurchases(p.data||[]);setFixedCosts(f.data||[]);
    }catch(e){console.warn(e);}
    setLoading(false);
  };
  useEffect(()=>{load();},[variant]);

  const now=new Date();
  const Y=now.getFullYear(),M=now.getMonth()+1;
  const prevY=M===1?Y-1:Y,prevM=M===1?12:M-1;

  const sumBy=(arr,dk,ak,s,e)=>arr.filter(r=>{const d=r[dk]||'';return d>=s&&d<=e;}).reduce((t,r)=>t+(+r[ak]||0),0);
  const ms=(y,m)=>y+'-'+String(m).padStart(2,'0');
  const fcMonth=(y,m)=>fixedCosts.filter(f=>+f.year===y&&+f.month===m).reduce((s,f)=>s+(+f.amount||0),0);

  /* 이번달 */
  const mS=sumBy(sales,'sale_date','amount',ms(Y,M)+'-01',ms(Y,M)+'-31');
  const mP=sumBy(purchases,'purchase_date','amount',ms(Y,M)+'-01',ms(Y,M)+'-31');
  const mFC=fcMonth(Y,M);
  const mOp=mS-mP-mFC;

  /* 전월 */
  const pmS=sumBy(sales,'sale_date','amount',ms(prevY,prevM)+'-01',ms(prevY,prevM)+'-31');
  const pmP=sumBy(purchases,'purchase_date','amount',ms(prevY,prevM)+'-01',ms(prevY,prevM)+'-31');
  const pmFC=fcMonth(prevY,prevM);
  const pmOp=pmS-pmP-pmFC;

  /* YTD */
  const ytdE=Y+'-'+String(M).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const ytdS=sumBy(sales,'sale_date','amount',Y+'-01-01',ytdE);
  const ytdP=sumBy(purchases,'purchase_date','amount',Y+'-01-01',ytdE);
  const ytdFC=fixedCosts.filter(f=>+f.year===Y&&+f.month<=M).reduce((s,f)=>s+(+f.amount||0),0);
  const ytdOp=ytdS-ytdP-ytdFC;

  /* 연간 */
  const yS=sumBy(sales,'sale_date','amount',Y+'-01-01',Y+'-12-31');
  const yP=sumBy(purchases,'purchase_date','amount',Y+'-01-01',Y+'-12-31');
  const yFC=fixedCosts.filter(f=>+f.year===Y).reduce((s,f)=>s+(+f.amount||0),0);
  const yOp=yS-yP-yFC;

  /* 월별 데이터 (1~현재월) */
  const monthData=useMemo(()=>{
    const res=[];
    for(let m=1;m<=M;m++){
      const mStr=ms(Y,m);
      const sl=sumBy(sales,'sale_date','amount',mStr+'-01',mStr+'-31');
      const pu=sumBy(purchases,'purchase_date','amount',mStr+'-01',mStr+'-31');
      const fc=fcMonth(Y,m);
      res.push({m,sl,pu,fc,op:sl-pu-fc,margin:sl>0?((sl-pu-fc)/sl*100):0});
    }
    return res;
  },[sales,purchases,fixedCosts,M]);

  const pct=(a,b)=>{if(!b||b===0)return null;return (a-b)/b*100;};
  const Diff=({a,b})=>{
    const v=pct(a,b);
    if(v===null)return null;
    const up=v>=0;
    return R('span',{style:{fontSize:9,fontWeight:700,color:up?'#22C55E':'#EF4444',marginLeft:4,padding:'1px 5px',background:up?'#F0FDF4':'#FEF2F2',borderRadius:20}},(up?'▲+':'▼')+Math.abs(v).toFixed(1)+'%');
  };

  const Col=({label,value,sub,color,bold})=>
    R('div',{style:{textAlign:'right',padding:'0 6px'}},
      R('div',{style:{fontSize:9,color:'#9CA3AF',marginBottom:3,fontWeight:600}},label),
      R('div',{style:{fontSize:bold?16:13,fontWeight:bold?900:600,color:color||'#1F2937',letterSpacing:-0.3}},
        value>=0?(fN(Math.round(value/10000))+'만'):(R('span',{style:{color:'#EF4444'}},fN(Math.round(Math.abs(value)/10000))+'만손'))
      ),
      sub&&R('div',{style:{fontSize:9,color:'#D1D5DB',marginTop:1}},sub)
    );

  const PeriodRow=({label,s,p,fc,op,prevS,prevOp,bg,highlight})=>
    R('div',{style:{display:'grid',gridTemplateColumns:'72px 1fr 1fr 1fr 1fr',gap:0,background:bg||'#fff',borderBottom:'1px solid #F3F4F6',alignItems:'center',padding:'10px 14px',borderRadius:highlight?'0 0 12px 12px':0,boxShadow:highlight?'0 4px 12px rgba(217,79,30,0.08)':null}},
      R('div',{style:{fontSize:highlight?13:11,fontWeight:highlight?800:600,color:highlight?'var(--p)':'#6B7280',display:'flex',flexDirection:'column',gap:2}},
        label,
        prevS&&R(Diff,{a:s,b:prevS})
      ),
      R(Col,{label:'매출',value:s,color:highlight?'var(--p)':'#374151',bold:highlight}),
      R(Col,{label:'매입',value:p,color:'#6B7280'}),
      R(Col,{label:'고정비',value:fc,color:'#9CA3AF'}),
      R('div',{style:{textAlign:'right',padding:'0 6px'}},
        R('div',{style:{fontSize:9,color:'#9CA3AF',marginBottom:3,fontWeight:600}},'영업이익'),
        R('div',{style:{display:'flex',alignItems:'center',justifyContent:'flex-end',gap:4}},
          R('div',{style:{fontSize:highlight?17:14,fontWeight:900,color:op>=0?'#15803D':'#DC2626'}},
            op>=0?('+'+fN(Math.round(op/10000))+'만'):(fN(Math.round(Math.abs(op)/10000))+'만손')
          ),
          prevOp!==undefined&&R(Diff,{a:op,b:prevOp})
        ),
        s>0&&R('div',{style:{fontSize:9,fontWeight:700,color:op/s>=0.15?'#22C55E':op/s>=0.05?'#F59E0B':'#EF4444'}},
          (op/s*100).toFixed(1)+'%'
        )
      )
    );

  if(loading)return R('div',{className:'pg fa',style:{display:'flex',alignItems:'center',justifyContent:'center',height:300}},'⏳ 로딩 중...');

  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},
      R('div',null,
        R('div',{className:'pg-title'},(variant==='adm'?'⚙️':'🏢')+' 경영 대시보드'),
        R('div',{style:{fontSize:11,color:'var(--tm)',marginTop:2}},(variant==='adm'?'관리자':'본사')+' · '+Y+'년 '+M+'월 기준')
      ),
      R('button',{className:'btn bs btn-sm',onClick:load},'🔄')
    ),

    /* 손익 요약 카드 */
    R('div',{className:'card',style:{padding:0,overflow:'hidden',marginBottom:14,borderRadius:12,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
      /* 헤더 */
      R('div',{style:{display:'grid',gridTemplateColumns:'72px 1fr 1fr 1fr 1fr',padding:'8px 14px',background:'#F9FAFB',borderBottom:'2px solid #E5E7EB'}},
        R('div',{style:{fontSize:9,color:'#9CA3AF',fontWeight:700}},'기간'),
        R('div',{style:{textAlign:'right',fontSize:9,color:'#9CA3AF',fontWeight:700,padding:'0 6px'}},'매출'),
        R('div',{style:{textAlign:'right',fontSize:9,color:'#9CA3AF',fontWeight:700,padding:'0 6px'}},'매입'),
        R('div',{style:{textAlign:'right',fontSize:9,color:'#9CA3AF',fontWeight:700,padding:'0 6px'}},'고정비'),
        R('div',{style:{textAlign:'right',fontSize:9,color:'#9CA3AF',fontWeight:700,padding:'0 6px'}},'영업이익')
      ),
      R(PeriodRow,{label:Y+'년',s:yS,p:yP,fc:yFC,op:yOp}),
      R(PeriodRow,{label:'YTD',s:ytdS,p:ytdP,fc:ytdFC,op:ytdOp}),
      R(PeriodRow,{label:prevM+'월',s:pmS,p:pmP,fc:pmFC,op:pmOp}),
      R(PeriodRow,{label:M+'월\n(이번달)',s:mS,p:mP,fc:mFC,op:mOp,prevS:pmS,prevOp:pmOp,bg:'linear-gradient(135deg,#FFFBF8,#FFF5F0)',highlight:true})
    ),

    /* 월별 데이터 테이블 */
    R('div',{className:'card',style:{padding:0,overflow:'hidden',borderRadius:12}},
      R('div',{style:{padding:'12px 16px',borderBottom:'1px solid var(--bd)',display:'flex',alignItems:'center',justifyContent:'space-between'}},
        R('div',{style:{fontSize:12,fontWeight:700}},'📅 '+Y+'년 월별 손익'),
        R('div',{style:{fontSize:10,color:'var(--tm)'}},Y+'년 1~'+M+'월')
      ),
      R('div',{style:{overflowX:'auto'}},
        R('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:11}},
          R('thead',null,R('tr',{style:{background:'#F9FAFB'}},
            R('th',{style:{padding:'8px 10px',fontWeight:700,color:'#6B7280',width:44}},'월'),
            R('th',{style:{padding:'8px 10px',textAlign:'right',fontWeight:700,color:'#D94F1E'}},'매출(만)'),
            R('th',{style:{padding:'8px 10px',textAlign:'right',fontWeight:700,color:'#6B7280'}},'매입(만)'),
            R('th',{style:{padding:'8px 10px',textAlign:'right',fontWeight:700,color:'#9CA3AF'}},'고정비(만)'),
            R('th',{style:{padding:'8px 10px',textAlign:'right',fontWeight:700}},'영업이익(만)'),
            R('th',{style:{padding:'8px 10px',textAlign:'right',fontWeight:700,color:'#6B7280'}},'이익률'),
            R('th',{style:{padding:'8px 10px',width:80}},'수익 바')
          )),
          R('tbody',null,...monthData.map(d=>{
            const barW=d.sl>0?Math.min(100,d.op/d.sl*100):0;
            const isThis=d.m===M;
            return R('tr',{key:d.m,style:{background:isThis?'#FFF8F4':d.m%2?'#FAFAFA':'#fff',borderBottom:'1px solid #F3F4F6'}},
              R('td',{style:{padding:'8px 10px',fontWeight:isThis?800:600,color:isThis?'var(--p)':'#374151',textAlign:'center'}},d.m),
              R('td',{style:{padding:'8px 10px',textAlign:'right',fontWeight:600,color:'var(--p)'}},fN(Math.round(d.sl/10000))),
              R('td',{style:{padding:'8px 10px',textAlign:'right',color:'#6B7280'}},fN(Math.round(d.pu/10000))),
              R('td',{style:{padding:'8px 10px',textAlign:'right',color:'#9CA3AF'}},fN(Math.round(d.fc/10000))),
              R('td',{style:{padding:'8px 10px',textAlign:'right',fontWeight:800,color:d.op>=0?'#15803D':'#DC2626'}},
                (d.op>=0?'+':'')+fN(Math.round(d.op/10000))
              ),
              R('td',{style:{padding:'8px 10px',textAlign:'right',fontSize:10,fontWeight:700,color:d.margin>=15?'#22C55E':d.margin>=5?'#F59E0B':'#EF4444'}},
                d.sl>0?d.margin.toFixed(1)+'%':'-'
              ),
              R('td',{style:{padding:'8px 10px'}},
                d.sl>0&&R('div',{style:{height:6,background:'#F3F4F6',borderRadius:3,overflow:'hidden'}},
                  R('div',{style:{height:'100%',width:Math.max(0,barW)+'%',background:barW>=15?'#22C55E':barW>=5?'#F59E0B':'#EF4444',borderRadius:3}})
                )
              )
            );
          }))
        )
      )
    )
  );
}


/* ═══ 매출 분석 (매출 전용) ═══════════════════════ */
function PageSalesAnalysis({user,variant='hq'}){
  const[sales,setSales]=useState([]);
  const[loading,setLoading]=useState(true);
  const[period,setPeriod]=useState('thisMonth');
  const[showImport,setShowImport]=useState(false);
  const[showDelete,setShowDelete]=useState(false);
  const productRef=useRef();
  const customerRef=useRef();
  const dailyRef=useRef();

  const load=async()=>{
    setLoading(true);
    try{
      const{data}=await sbClient.from('sales').select('*').eq('source',variant).order('sale_date',{ascending:false}).limit(10000);
      setSales(data||[]);
    }catch(e){console.warn(e);}
    setLoading(false);
  };
  useEffect(()=>{load();},[variant]);

  const periodFilter=useMemo(()=>{
    const now=new Date();const y=now.getFullYear(),m=now.getMonth();
    if(period==='thisMonth')return{start:new Date(y,m,1),end:new Date(y,m+1,0,23,59,59),label:y+'년 '+(m+1)+'월'};
    if(period==='lastMonth')return{start:new Date(y,m-1,1),end:new Date(y,m,0,23,59,59),label:y+'년 '+m+'월'};
    if(period==='thisYear')return{start:new Date(y,0,1),end:new Date(y,11,31,23,59,59),label:y+'년'};
    if(period==='last30')return{start:new Date(Date.now()-30*86400000),end:now,label:'최근 30일'};
    return{start:new Date(0),end:now,label:'전체'};
  },[period]);
  const fSales=useMemo(()=>sales.filter(s=>{const d=new Date(s.sale_date);return d>=periodFilter.start&&d<=periodFilter.end;}),[sales,periodFilter]);

  const totalSales=fSales.reduce((s,x)=>s+(+x.amount||0),0);
  const totalQty=fSales.reduce((s,x)=>s+(+x.quantity||0),0);

  const topProducts=useMemo(()=>{
    const m=new Map();
    fSales.forEach(s=>{const k=s.product_name||'기타';if(!m.has(k))m.set(k,{name:k,amount:0,qty:0,count:0});const v=m.get(k);v.amount+=(+s.amount||0);v.qty+=(+s.quantity||0);v.count+=1;});
    return Array.from(m.values()).sort((a,b)=>b.amount-a.amount).slice(0,15);
  },[fSales]);

  const topCustomers=useMemo(()=>{
    const m=new Map();
    fSales.forEach(s=>{const k=s.customer_name||'기타';if(!m.has(k))m.set(k,{name:k,amount:0,count:0});const v=m.get(k);v.amount+=(+s.amount||0);v.count+=1;});
    return Array.from(m.values()).sort((a,b)=>b.amount-a.amount).slice(0,10);
  },[fSales]);

  const dailySales=useMemo(()=>{
    const m=new Map();
    fSales.forEach(s=>{const k=s.sale_date;if(!m.has(k))m.set(k,{date:k,amount:0});m.get(k).amount+=(+s.amount||0);});
    return Array.from(m.values()).sort((a,b)=>a.date.localeCompare(b.date));
  },[fSales]);

  useEffect(()=>{
    if(!window.Chart||loading)return;
    if(productRef.current&&topProducts.length>0){
      const ex=Chart.getChart(productRef.current);if(ex)ex.destroy();
      new Chart(productRef.current,{type:'bar',data:{labels:topProducts.slice(0,10).map(p=>p.name.slice(0,20)),datasets:[{label:'매출',data:topProducts.slice(0,10).map(p=>p.amount),backgroundColor:'rgba(217,79,30,0.85)',borderRadius:5}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>(v/10000).toFixed(0)+'만'}}}}});
    }
    if(customerRef.current&&topCustomers.length>0){
      const ex=Chart.getChart(customerRef.current);if(ex)ex.destroy();
      const colors=['#D94F1E','#F59E0B','#22C55E','#3B82F6','#8B5CF6','#EF4444','#14B8A6','#EC4899','#6366F1','#84CC16'];
      new Chart(customerRef.current,{type:'doughnut',data:{labels:topCustomers.slice(0,8).map(c=>c.name),datasets:[{data:topCustomers.slice(0,8).map(c=>c.amount),backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:12}}}}});
    }
    if(dailyRef.current&&dailySales.length>0){
      const ex=Chart.getChart(dailyRef.current);if(ex)ex.destroy();
      new Chart(dailyRef.current,{type:'line',data:{labels:dailySales.map(d=>d.date.slice(5)),datasets:[{label:'일별 매출',data:dailySales.map(d=>d.amount),borderColor:'#D94F1E',backgroundColor:'rgba(217,79,30,0.1)',borderWidth:2,fill:true,tension:0.3,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>(v/10000).toFixed(0)+'만'}}}}});
    }
  },[loading,topProducts,topCustomers,dailySales]);

  if(loading)return R('div',{className:'pg fa',style:{display:'flex',alignItems:'center',justifyContent:'center',height:200}},'⏳ 로딩 중...');

  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},
      R('div',null,R('div',{className:'pg-title'},(variant==='adm'?'⚙️':'🏢')+' 매출 분석'),R('div',{style:{fontSize:12,color:'var(--tm)',marginTop:2}},periodFilter.label)),
      R('div',{style:{display:'flex',gap:6}},R('button',{className:'btn bp btn-sm',onClick:()=>setShowImport(true)},'📥 Import'),R('button',{className:'btn bs btn-sm',onClick:()=>setShowDelete(true),style:{color:'#EF4444',border:'1px solid #EF4444'}},'🗑 삭제'))
    ),
    R('div',{className:'tab-row',style:{marginBottom:14}},
      ...[['thisMonth','이번 달'],['lastMonth','지난 달'],['thisYear','올해'],['last30','최근 30일'],['all','전체']].map(([k,l])=>
        R('button',{key:k,className:'tab'+(period===k?' act':''),onClick:()=>setPeriod(k)},l)
      )
    ),
    R('div',{className:'g3',style:{marginBottom:14}},
      R('div',{className:'card'},R('div',{style:{fontSize:11,color:'var(--tm)'}},'총 매출'),R('div',{style:{fontSize:24,fontWeight:900,color:'var(--p)',marginTop:4}},fN(Math.round(totalSales)),'원')),
      R('div',{className:'card'},R('div',{style:{fontSize:11,color:'var(--tm)'}},'거래 건수'),R('div',{style:{fontSize:24,fontWeight:900,color:'#3B82F6',marginTop:4}},fSales.length,'건')),
      R('div',{className:'card'},R('div',{style:{fontSize:11,color:'var(--tm)'}},'총 수량'),R('div',{style:{fontSize:24,fontWeight:900,color:'#7C3AED',marginTop:4}},fN(Math.round(totalQty))))
    ),
    R('div',{className:'card',style:{marginBottom:14}},
      R('div',{className:'card-title',style:{marginBottom:10}},'📈 일별 매출 추이'),
      R('div',{style:{height:240}},R('canvas',{ref:dailyRef}))
    ),
    R('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(320px,1fr))',gap:12,marginBottom:14}},
      R('div',{className:'card'},
        R('div',{className:'card-title',style:{marginBottom:10}},'🏆 TOP 제품 매출'),
        R('div',{style:{height:320}},R('canvas',{ref:productRef}))
      ),
      R('div',{className:'card'},
        R('div',{className:'card-title',style:{marginBottom:10}},'🏢 고객사별 매출'),
        R('div',{style:{height:320}},R('canvas',{ref:customerRef}))
      )
    ),
    R('div',{className:'card'},
      R('div',{className:'card-title',style:{marginBottom:10}},'📋 제품별 상세'),
      R('div',{style:{maxHeight:400,overflow:'auto'}},
        R('table',{style:{fontSize:11}},
          R('thead',null,R('tr',null,R('th',null,'제품명'),R('th',{style:{textAlign:'right'}},'거래수'),R('th',{style:{textAlign:'right'}},'수량'),R('th',{style:{textAlign:'right'}},'매출액'),R('th',{style:{textAlign:'right'}},'평균단가'))),
          R('tbody',null,...topProducts.map(p=>R('tr',{key:p.name},
            R('td',{style:{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.name),
            R('td',{style:{textAlign:'right',color:'var(--tm)'}},p.count),
            R('td',{style:{textAlign:'right'}},fN(Math.round(p.qty))),
            R('td',{style:{textAlign:'right',fontWeight:700,color:'var(--p)'}},fN(Math.round(p.amount/10000)),'만'),
            R('td',{style:{textAlign:'right',fontSize:10,color:'var(--tm)'}},p.qty>0?fN(Math.round(p.amount/p.qty)):'-')
          )))
        )
      )
    ),
    showImport&&R(ImportModal,{type:'sales',source:variant,onClose:()=>setShowImport(false),onDone:()=>load()}),showDelete&&R(DataDeleteModal,{table:'sales',source:variant,label:'매출',count:sales.length,onClose:()=>setShowDelete(false),onDone:()=>load()})
  );
}


/* ═══ 레시피 표준화 ═════════════════════════════ */
function PageRecipes({user,mats,prods}){
  const[recipes,setRecipes]=useState([]);
  const[showForm,setShowForm]=useState(false);
  const[selRecipe,setSelRecipe]=useState(null);
  const[loading,setLoading]=useState(true);

function PageData({mats,prods,orders,hqItems,cats,quote,pqty,onImport}){
  const impRef=useRef(null);
  const exportData=()=>{
    const data=JSON.stringify({version:'6.0',exportedAt:getNow(),mats,prods,orders,hqItems,cats,quote,pqty},null,2);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='BNF_데이터_'+new Date().toLocaleDateString('ko-KR').replace(/[\s.]/g,'')+'.json';
    a.click();
    URL.revokeObjectURL(url);
  };
  const onFile=e=>{
    const f=e.target.files[0];
    if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        onImport(d);
        alert('데이터 복원 완료! 버전: '+(d.version||'?'));
      }catch{alert('파일 오류');}
    };
    reader.readAsText(f);
    e.target.value='';
  };
  return R('div',{className:'pg fa'},
    R('div',{style:{fontSize:14,fontWeight:700,marginBottom:14}},'데이터 관리'),
    R('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}},
      ...[{l:'전체 품목',v:mats.length},{l:'등록 제품',v:prods.length},{l:'발주 건수',v:orders.length},{l:'본사재고 추적',v:hqItems.length}].map((k,i)=>R('div',{key:i,style:{background:'#f8fafc',borderRadius:10,padding:'12px'}},
        R('div',{style:{fontSize:11,color:'#94a3b8',marginBottom:3}},k.l),
        R('div',{style:{fontSize:22,fontWeight:800,color:'#0f172a'}},k.v+'건')
      ))
    ),
    R('div',{className:'card',style:{marginBottom:12}},
      R('div',{style:{fontSize:13,fontWeight:700,marginBottom:8}},'📤 데이터 내보내기 (핸드폰 연동)'),
      R('div',{style:{fontSize:12,color:'#64748b',marginBottom:10}},'현재 데이터를 JSON 파일로 저장. 핸드폰에 전송 후 불러오기로 동기화.'),
      R('button',{className:'btn bp',style:{width:'100%',padding:12,fontSize:14},onClick:exportData},'💾 데이터 파일 저장')
    ),
    R('div',{className:'card',style:{marginBottom:12}},
      R('div',{style:{fontSize:13,fontWeight:700,marginBottom:8}},'📥 데이터 불러오기'),
      R('div',{style:{fontSize:12,color:'#dc2626',marginBottom:8}},'⚠ 현재 데이터가 덮어씌워집니다'),
      R('input',{ref:impRef,type:'file',accept:'.json',style:{display:'none'},onChange:onFile}),
      R('button',{className:'btn bw',style:{width:'100%',padding:12,fontSize:14},onClick:()=>impRef.current.click()},'📂 데이터 파일 불러오기')
    ),
    R('div',{className:'card',style:{background:'#FFF5F0',border:'1px solid #FCC8B0'}},
      R('div',{style:{fontSize:13,fontWeight:700,color:'#D94F1E',marginBottom:8}},'📱 핸드폰 연동 방법'),
      ...[
        '① PC에서 "데이터 파일 저장" 클릭',
        '② 카카오톡/이메일/클라우드로 핸드폰 전송',
        '③ 핸드폰 브라우저에서 bnf_intranet_v6.html 열기',
        '④ 데이터관리 → "데이터 파일 불러오기" 클릭',

    )

function loadNavSections(){
  try{
    const saved=localStorage.getItem('bnf_nav_sections_v3');
    if(saved){
      const p=JSON.parse(saved);
      if(Array.isArray(p)&&p.length>0){
        /* 본사(hq) 섹션 + 관리자 섹션에서 제거된 항목들 자동 정리 */
        const REMOVED_IDS=new Set(['adm_sales','adm_purchase','fixed_costs','adm_dash','hq_dash','hq_sales','hq_purchase','hq_fixed_costs','expiry','shipment','hygiene','vendors','quote','prodResult','autoOrder','orders']);
        let changed=false;
        const filtered=p.filter(s=>{if(s&&s.type==='hq'){changed=true;return false;}return true;}).map(s=>{
          if(s&&Array.isArray(s.items)){
            const newItems=s.items.filter(it=>!REMOVED_IDS.has(it.id));
            /* 관리자 섹션에 purchase_data 없으면 추가 */
            if(s.type==='admin'&&!newItems.find(it=>it.id==='purchase_data')){
              newItems.unshift({id:'purchase_data',l:'매입 자료',ic:'🛒'});
              changed=true;
            }
            /* factory 섹션에 mytasks 없으면 홈 다음에 추가 */
            if(s.type==='factory'&&!newItems.find(it=>it.id==='mytasks')){
              const homeIdx=newItems.findIndex(it=>it.id==='home');
              const item={id:'mytasks',l:'나의 업무',ic:'📌'};
              if(homeIdx>=0)newItems.splice(homeIdx+1,0,item);else newItems.unshift(item);
              changed=true;
            }
            /* factory 섹션에 workreq 없으면 홈 바로 다음에 추가 */
            if(s.type==='factory'&&!newItems.find(it=>it.id==='workreq')){
              const homeIdx=newItems.findIndex(it=>it.id==='home');
              const item={id:'workreq',l:'업무 현황',ic:'📋'};
              if(homeIdx>=0)newItems.splice(homeIdx+1,0,item);else newItems.unshift(item);
              changed=true;
            }
            /* 식품제조 신규 메뉴 자동 삽입 */
            if(s.type==='factory'){
              const newMenus=[
                {after:'sched',item:{id:'shipsort',l:'출고 계획',ic:'📦'}}
              ];
              newMenus.forEach(({after,item})=>{
                if(!newItems.find(it=>it.id===item.id)){
                  const idx=newItems.findIndex(it=>it.id===after);
                  if(idx>=0)newItems.splice(idx+1,0,item);else newItems.push(item);
                  changed=true;
                }
              });
            }
            if(newItems.length!==s.items.length){changed=true;return{...s,items:newItems};}
          }
          return s;
        });
        if(changed){try{localStorage.setItem('bnf_nav_sections_v3',JSON.stringify(filtered));}catch(e){}}
        return filtered.length>0?filtered:DEFAULT_NAV_SECTIONS;
      }
    }
  }catch(e){}
  return DEFAULT_NAV_SECTIONS;
}
function saveNavSections(arr){try{localStorage.setItem('bnf_nav_sections_v3',JSON.stringify(arr));}catch(e){}}
const NAV_SECTIONS=DEFAULT_NAV_SECTIONS;

function LoginPage({onLogin}){
  const sv=JSON.parse(localStorage.getItem('bnf_cred')||'{}');
  const[email,setEmail]=useState(sv.email||'');
  const[pw,setPw]=useState(sv.pw||'');
  const[remem,setRemem]=useState(!!sv.email);
  const[err,setErr]=useState('');const[loading,setLoading]=useState(false);
  const login=async()=>{
    if(!email||!pw){setErr('이메일과 비밀번호를 입력하세요');return;}
    setLoading(true);setErr('');
    try{
      const{data,error}=await db('emp').select('*,depts(name)').eq('email',email.trim()).single();
      if(error||!data){setErr('이메일이 존재하지 않습니다');setLoading(false);return;}
      if(data.password!==pw){setErr('비밀번호가 올바르지 않습니다');setLoading(false);return;}
      if(data.status==='inactive'){setErr('비활성화된 계정입니다');setLoading(false);return;}
      if(remem)localStorage.setItem('bnf_cred',JSON.stringify({email:email.trim(),pw}));
      else localStorage.removeItem('bnf_cred');
      localStorage.setItem('bnf_user',JSON.stringify(data));
      onLogin(data);
    }catch(e){setErr('오류: '+e.message);setLoading(false);}
  };
  return R('div',{style:{display:'flex',height:'100vh',background:'linear-gradient(135deg,#1A0C07 0%,#3D1A0E 100%)'}},
    R('div',{style:{margin:'auto',background:'#fff',borderRadius:20,padding:'42px 36px',width:'100%',maxWidth:390,boxShadow:'0 20px 60px rgba(0,0,0,.35)'}},

        R('div',{style:{fontSize:22,fontWeight:900,color:'#1A1A1A',letterSpacing:-0.5}},'B&F Global'),
        R('div',{style:{fontSize:13,color:'#6B6B6B',marginTop:3}},'통합 인트라넷 + MES 시스템')
      ),
      R('div',{style:{display:'flex',flexDirection:'column',gap:10,marginBottom:16}},
        R('div',null,R('label',{style:{fontSize:11,fontWeight:700,color:'#6B6B6B',display:'block',marginBottom:4}},'이메일'),R('input',{className:'inp',value:email,onChange:e=>setEmail(e.target.value),onKeyDown:e=>e.key==='Enter'&&login(),placeholder:'이메일 입력',type:'email',autoComplete:'email'})),

function GlobalSearchModal({mats,prods,user,onClose,onGoPage}){
  const[q,setQ]=useState('');
  const[selectedIdx,setSelectedIdx]=useState(0);
  const inputRef=useRef(null);
  const isAdmin=['superadmin','admin','manager'].includes(user.role);
  useEffect(()=>{if(inputRef.current)setTimeout(()=>inputRef.current.focus(),50);},[]);
  
  const results=useMemo(()=>{
    if(!q||!q.trim())return{pages:NAV_PAGES_INDEX.slice(0,6),mats:[],prods:[]};
    const lq=q.toLowerCase().trim();
    const pages=NAV_PAGES_INDEX.filter(np=>np.title.toLowerCase().includes(lq)||np.keys.some(k=>k.toLowerCase().includes(lq))).slice(0,6);
    const matResults=(mats||[]).filter(m=>(m.n||'').toLowerCase().includes(lq)||(m.c||'').includes(q)||(m.g||'').toLowerCase().includes(lq)).slice(0,8);
    const prodResults=(prods||[]).filter(p=>(p.name||'').toLowerCase().includes(lq)||(p.cat||'').toLowerCase().includes(lq)).slice(0,6);
    return{pages,mats:matResults,prods:prodResults};
  },[q,mats,prods]);
  
  const flatList=useMemo(()=>{
    const arr=[];
    results.pages.forEach(p=>arr.push({type:'page',data:p}));
    results.mats.forEach(m=>arr.push({type:'mat',data:m}));
    results.prods.forEach(p=>arr.push({type:'prod',data:p}));
    return arr;
  },[results]);
  
  useEffect(()=>{setSelectedIdx(0);},[q]);
  
  const handleSelect=(item)=>{
    if(item.type==='page')onGoPage(item.data.p);
    else if(item.type==='mat')onGoPage('inv');
    else if(item.type==='prod')onGoPage('bom');
  };
  
  const onKeyDown=e=>{
    if(e.key==='ArrowDown'){e.preventDefault();setSelectedIdx(i=>Math.min(i+1,flatList.length-1));}
    else if(e.key==='ArrowUp'){e.preventDefault();setSelectedIdx(i=>Math.max(0,i-1));}
    else if(e.key==='Enter'){e.preventDefault();if(flatList[selectedIdx])handleSelect(flatList[selectedIdx]);}
  };
  
  return R('div',{onClick:e=>{if(e.target===e.currentTarget)onClose();},style:{position:'fixed',inset:0,background:'rgba(15,23,42,0.45)',backdropFilter:'blur(8px)',display:'flex',alignItems:'flex-start',justifyContent:'center',zIndex:99999,padding:'10vh 16px 16px',animation:'fadeIn .15s ease'}},

/* ═══ 생산실적 (Lot 추적) ═══════════════════════════ */
function PageProdResult({user,prods,mats}){
  const[results,setResults]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[dateFrom,setDateFrom]=useState(()=>{const d=new Date();d.setDate(d.getDate()-30);return d.toISOString().slice(0,10);});
  const[dateTo,setDateTo]=useState(()=>new Date().toISOString().slice(0,10));
  const[search,setSearch]=useState('');
  const st=useRef(null);
  const load=()=>{
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle().then(({data})=>{
      if(data?.state_data?.prod_results)setResults(data.state_data.prod_results);
      setLoading(false);
    });
  };
  useEffect(()=>{load();const poll=setInterval(()=>{if(!document.hidden)load();},5000);return()=>clearInterval(poll);},[]);
  const save=(next)=>{
    setResults(next);
    if(st.current)clearTimeout(st.current);
    st.current=setTimeout(async()=>{
      const{data:cur}=await sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle();
      const ex=cur?.state_data||{};
      await sbClient.from('app_state').upsert({id:1,state_data:{...ex,prod_results:next},updated_at:new Date().toISOString()});
    },300);
  };
  const genLot=(date)=>{const d=(date||new Date().toISOString().slice(0,10)).replace(/-/g,'');const seq=(results.filter(r=>r.lot&&r.lot.startsWith(d)).length+1).toString().padStart(3,'0');return d+'-'+seq;};
  const filtered=results.filter(r=>{
    if(r.date<dateFrom||r.date>dateTo)return false;
    if(search&&!(r.prodName||'').toLowerCase().includes(search.toLowerCase())&&!(r.lot||'').includes(search))return false;
    return true;
  }).sort((a,b)=>(b.date+b.lot).localeCompare(a.date+a.lot));
  const totalQty=filtered.reduce((s,r)=>s+(+r.qty||0),0);
  const delResult=(id)=>{if(confirm('이 생산실적을 삭제할까요?'))save(results.filter(r=>r.id!==id));};
  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},
      R('div',null,R('div',{className:'pg-title'},'생산실적'),R('div',{style:{fontSize:11,color:'var(--tm)',marginTop:2}},'일자별 생산 기록과 LOT 번호 관리')),
      R('div',{style:{display:'flex',gap:6}},
        R('button',{className:'btn bs',onClick:()=>{
          if(filtered.length===0){alert('내보낼 생산 기록이 없습니다');return;}
          const rows=[['생산일','LOT번호','제품명','수량','담당자','비고']];
          filtered.forEach(r=>rows.push([r.date,r.lot,r.prodName,+r.qty||0,r.worker||'',r.memo||'']));
          exportXL(rows,'생산실적_'+dateFrom+'_'+dateTo,'생산실적');
        }},'엑셀 내보내기'),
        R('button',{className:'btn bp',onClick:()=>setShowForm(true)},'+ 생산 기록')
      )
    ),
    R('div',{style:{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}},
      R('input',{type:'date',value:dateFrom,onChange:e=>setDateFrom(e.target.value),style:{padding:'6px 10px',border:'1px solid var(--bd)',borderRadius:8,fontSize:12}}),
      R('span',{style:{color:'var(--tm)'}},'~'),
      R('input',{type:'date',value:dateTo,onChange:e=>setDateTo(e.target.value),style:{padding:'6px 10px',border:'1px solid var(--bd)',borderRadius:8,fontSize:12}}),
      R('input',{value:search,onChange:e=>setSearch(e.target.value),placeholder:'제품명 / LOT 검색',style:{flex:1,minWidth:140,padding:'6px 10px',border:'1px solid var(--bd)',borderRadius:8,fontSize:12}})
    ),
    R('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:10,marginBottom:14}},
      R('div',{className:'card'},R('div',{style:{fontSize:11,color:'var(--tm)'}},'기간 내 생산 건수'),R('div',{style:{fontSize:22,fontWeight:800,color:'var(--p)',marginTop:4}},filtered.length,'건')),
      R('div',{className:'card'},R('div',{style:{fontSize:11,color:'var(--tm)'}},'총 생산 수량'),R('div',{style:{fontSize:22,fontWeight:800,color:'#1F2937',marginTop:4}},fN(totalQty),'개')),
      R('div',{className:'card'},R('div',{style:{fontSize:11,color:'var(--tm)'}},'생산 품목 수'),R('div',{style:{fontSize:22,fontWeight:800,color:'#3B82F6',marginTop:4}},new Set(filtered.map(r=>r.prodId)).size,'종'))
    ),
    loading?R('div',{className:'card',style:{textAlign:'center',padding:30}},'로딩 중...'):
    filtered.length===0?R('div',{className:'card',style:{textAlign:'center',padding:'40px',color:'var(--tm)',border:'2px dashed var(--bd)'}},'생산 실적이 없습니다. [+ 생산 기록]으로 추가하세요'):
    R('div',{style:{background:'#fff',border:'1px solid var(--bd)',borderRadius:10,overflow:'auto'}},
      R('table',{style:{width:'100%',minWidth:680,borderCollapse:'collapse',fontSize:12}},
        R('thead',null,R('tr',{style:{background:'#F9FAFB',borderBottom:'2px solid var(--bd)'}},

        )))
      )
    ),
    showForm&&R(ProdResultForm,{prods,user,genLot,onClose:()=>setShowForm(false),onSave:(rec)=>{save([rec,...results]);setShowForm(false);}})
  );
}
function ProdResultForm({prods,user,genLot,onClose,onSave}){
  const[date,setDate]=useState(new Date().toISOString().slice(0,10));

  };
