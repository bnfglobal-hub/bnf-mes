      editMode&&R('div',{style:{position:'absolute',top:-10,left:14,background:'#D94F1E',color:'#fff',padding:'2px 10px',borderRadius:6,fontSize:10,fontWeight:700,zIndex:10}},'⠿ DRAG'),
      builder()
    );
  };

  return R('div',{className:'pg fa'},
    R('div',{style:{marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}},
      R('div',null,
        R('div',{style:{fontSize:20,fontWeight:800,color:'#1F2937'}},'관리자님, 안녕하세요 👋'),
        R('div',{style:{fontSize:12,color:'var(--tm)',marginTop:4}},new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'}))
      ),
      R('button',{onClick:()=>setEditMode(!editMode),style:{background:editMode?'#D94F1E':'#fff',color:editMode?'#fff':'#374151',border:'1px solid '+(editMode?'#D94F1E':'#E5E7EB'),borderRadius:8,padding:'7px 14px',cursor:'pointer',fontSize:12,fontWeight:600,whiteSpace:'nowrap'}},editMode?'✓ 완료':'⠿ 편집')
    ),
    editMode&&R('div',{style:{padding:'10px 14px',background:'#FFF8F4',borderRadius:8,marginBottom:14,fontSize:11,color:'#92400E',fontWeight:600}},'💡 박스를 드래그하여 위치를 변경하세요. 완료 버튼을 누르면 저장됩니다.'),
    /* 퀵메뉴 - 항상 최상단 고정 (마켓컬리 스타일) */
    R('div',{style:{marginBottom:14}},buildQuick()),
    ...sectionOrder.map((id,idx)=>renderSection(id,idx))
  );
}

function PageHQ({mats,hqItems,rk,onUpdHQ,onAddHQ,onDelHQ,onUpdMat}){
  const[search,setSearch]=useState('');const[showD,setShowD]=useState(false);
  const searchRef=useRef(null);
  const ignoreBlur=useRef(false);
  /* 폴더 시스템 */
  const[folders,setFolders]=useState(()=>{try{return JSON.parse(localStorage.getItem('bnf_hq_folders')||'null')||[{id:'_root',name:'기본',color:'#6B7280',order:0}];}catch(e){return[{id:'_root',name:'기본',color:'#6B7280',order:0}];}});
  const[selectedFolder,setSelectedFolder]=useState('_all'); /* _all | _root | folderId */
  const[collapsedFolders,setCollapsedFolders]=useState(()=>{try{return new Set(JSON.parse(localStorage.getItem('bnf_hq_collapsed')||'[]'));}catch(e){return new Set();}});
  const[draggedItem,setDraggedItem]=useState(null); /* {type:'item'|'folder', id} */
  const[dragOverFolder,setDragOverFolder]=useState(null);
  const[editingFolder,setEditingFolder]=useState(null); /* {id, name} */

  /* Supabase 동기화 - 폴더 정보를 app_state.hq_folders에, 품목별 폴더 매핑은 hqItems.folder 필드 사용 */
  useEffect(()=>{
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle()
      .then(({data})=>{
        const sd=data&&data.state_data?data.state_data:{};
        const localHasRealFolders=folders.filter(f=>f.id!=='_root').length>0;
        if(Array.isArray(sd.hq_folders)&&sd.hq_folders.filter(f=>f.id!=='_root').length>0){
          const remoteStr=JSON.stringify(sd.hq_folders);
          if(JSON.stringify(folders)!==remoteStr){
            setFolders(sd.hq_folders);
            localStorage.setItem('bnf_hq_folders',remoteStr);
          }
        }else if(localHasRealFolders){
          /* 서버엔 폴더 없는데 이 기기엔 있음 → 자동 업로드 (유실 방지) */
          sbClient.from('app_state').upsert({id:1,state_data:{...sd,hq_folders:folders},updated_at:new Date().toISOString()})
            .then(()=>console.log('[본사재고] 로컬 폴더를 서버에 자동 동기화 완료'));
        }
      }).catch(()=>{});
  },[]);

  const saveFolders=(next)=>{
    setFolders(next);
    localStorage.setItem('bnf_hq_folders',JSON.stringify(next));
    /* Supabase 백업 */
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle()
      .then(({data})=>{
        const existing=data&&data.state_data?data.state_data:{};
        sbClient.from('app_state').upsert({id:1,state_data:{...existing,hq_folders:next},updated_at:new Date().toISOString()});
      }).catch(()=>{});
  };

  const toggleCollapse=(fid)=>{
    setCollapsedFolders(prev=>{
      const next=new Set(prev);
      if(next.has(fid))next.delete(fid);else next.add(fid);
      try{localStorage.setItem('bnf_hq_collapsed',JSON.stringify([...next]));}catch(e){}
      return next;
    });
  };

  const addFolder=()=>{
    const name=prompt('새 폴더 이름:','폴더 '+(folders.length+1));
    if(!name||!name.trim())return;
    const colors=['#3B82F6','#10B981','#F59E0B','#EC4899','#06B6D4','#7C3AED','#EF4444','#8B5CF6','#14B8A6'];
    const used=new Set(folders.map(f=>f.color));
    const color=colors.find(c=>!used.has(c))||colors[folders.length%colors.length];
    saveFolders([...folders,{id:'f_'+Date.now()+Math.random().toString(36).slice(2,6),name:name.trim(),color,order:folders.length}]);
  };
  const renameFolder=(fid)=>{
    const f=folders.find(x=>x.id===fid);
    if(!f)return;
    if(f.id==='_root'){alert('"기본" 폴더는 이름을 변경할 수 없습니다');return;}
    const name=prompt('폴더 이름:',f.name);
    if(!name||!name.trim())return;
    saveFolders(folders.map(x=>x.id===fid?{...x,name:name.trim()}:x));
  };
  const deleteFolder=(fid)=>{
    if(fid==='_root'){alert('"기본" 폴더는 삭제할 수 없습니다');return;}
    const count=hqItems.filter(h=>h.folder===fid).length;
    const msg=count>0?'이 폴더에 '+count+'개 품목이 있습니다.\n폴더를 삭제하면 품목들은 "기본" 폴더로 이동합니다.\n계속할까요?':'폴더를 삭제할까요?';
    if(!confirm(msg))return;
    /* 폴더에 속한 품목들을 _root로 이동 */
    hqItems.filter(h=>h.folder===fid).forEach(h=>onUpdHQ(h.id,'folder','_root'));
    saveFolders(folders.filter(x=>x.id!==fid));
    if(selectedFolder===fid)setSelectedFolder('_all');
  };
  const changeFolderColor=(fid)=>{
    const colors=['#6B7280','#3B82F6','#10B981','#F59E0B','#EC4899','#06B6D4','#7C3AED','#EF4444','#8B5CF6','#14B8A6'];
    const cur=folders.find(f=>f.id===fid);
    if(!cur)return;
    const curIdx=colors.indexOf(cur.color);
    const next=colors[(curIdx+1)%colors.length];
    saveFolders(folders.map(x=>x.id===fid?{...x,color:next}:x));
  };

  /* 드래그앤드롭 핸들러 */
  const onItemDragStart=(e,itemId)=>{
    setDraggedItem({type:'item',id:itemId});
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',itemId);
  };
  const onFolderDragOver=(e,fid)=>{
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    setDragOverFolder(fid);
  };
  const onFolderDragLeave=()=>setDragOverFolder(null);
  const onFolderDrop=(e,fid)=>{
    e.preventDefault();
    if(draggedItem&&draggedItem.type==='item'){
      onUpdHQ(draggedItem.id,'folder',fid);
    }
    setDraggedItem(null);
    setDragOverFolder(null);
  };
  const onItemDragEnd=()=>{setDraggedItem(null);setDragOverFolder(null);};

  /* 폴더별 행 그룹핑 */
  const fl=useMemo(()=>{if(!search)return[];const q=search.toLowerCase();return mats.filter(m=>m.n.toLowerCase().includes(q)||m.c.includes(search)).slice(0,12);},[search,mats]);
  const rowsAll=hqItems.map(h=>{
    const mat=mats.find(m=>m.c===h.matCode)||{};
    const totalStock=(+h.hqStock||0)+(+mat.s||0);
    return{...h,folder:h.folder||'_root',matName:mat.n||h.matName,unit:mat.u||'',fSt:mat.s||0,mu:mat.mu||0,totalStock,short:Math.max(0,(+mat.mu||0)-totalStock),matId:mat.id};
  });
  const shortItems=rowsAll.filter(r=>r.short>0).sort((a,b)=>b.short-a.short);
  const folderCounts=useMemo(()=>{const c={};rowsAll.forEach(r=>{c[r.folder]=(c[r.folder]||0)+1;});return c;},[rowsAll]);
  /* 표시할 행: 선택된 폴더 또는 전체 */
  const visibleRows=selectedFolder==='_all'?rowsAll:rowsAll.filter(r=>r.folder===selectedFolder);
  /* 폴더별 그룹 (전체 보기 모드에서) */
  const groupedByFolder=useMemo(()=>{
    const g={};
    folders.forEach(f=>{g[f.id]=[];});
    rowsAll.forEach(r=>{if(!g[r.folder])g[r.folder]=[];g[r.folder].push(r);});
    return g;
  },[rowsAll,folders]);

  /* 행 렌더링 함수 (재사용) */
  const renderRow=(row,folderColor)=>R('tr',{key:row.id,className:row.short>0?'dng':'',
    draggable:true,
    onDragStart:e=>onItemDragStart(e,row.id),
    onDragEnd:onItemDragEnd,
    style:{cursor:'move',background:draggedItem&&draggedItem.id===row.id?'#FEF3C7':undefined,opacity:draggedItem&&draggedItem.id===row.id?0.5:1}
  },
    R('td',{style:{width:24,textAlign:'center',color:'#cbd5e1',fontSize:14,cursor:'move'},title:'드래그로 폴더 이동'},'⋮⋮'),
    R('td',{style:{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:170,borderLeft:'3px solid '+(folderColor||'#E5E7EB')}},row.matName),
    R('td',{style:{textAlign:'right'}},R(EC,{rk:row.id+'hq'+rk,initVal:row.hqStock,type:'number',onSave:v=>onUpdHQ(row.id,'hqStock',+v),className:'ci',style:{textAlign:'right',fontWeight:700,color:'#0369a1'}})),
    R('td',{style:{textAlign:'right',fontSize:12,color:'#64748b'}},row.fSt),
    R('td',{style:{textAlign:'right',fontWeight:800,color:'var(--p)',background:'#fff5f0'}},row.totalStock.toFixed(1)),
    R('td',{style:{textAlign:'right'}},R(EC,{rk:(row.matId||0)+'mu'+rk,initVal:row.mu,type:'number',onSave:v=>row.matId&&onUpdMat(row.matId,'mu',+v),placeholder:'0',className:'ci',style:{textAlign:'right',color:'#7c3aed'}})),
    R('td',{style:{textAlign:'right',fontWeight:800,color:row.short>0?'#dc2626':'#059669',fontSize:13,background:row.short>0?'#fef2f2':'#f0fdf4'}},row.short>0?'-'+row.short.toFixed(1):'충분'),
    R('td',{style:{fontSize:11,color:'#94a3b8'}},row.unit),
    R('td',null,R(EC,{rk:row.id+'nt'+rk,initVal:row.note||'',onSave:v=>onUpdHQ(row.id,'note',v),placeholder:'메모',className:'ci',style:{fontSize:11}})),
    /* 폴더 선택 셀렉트 */
    R('td',null,R('select',{value:row.folder,onChange:e=>onUpdHQ(row.id,'folder',e.target.value),onClick:e=>e.stopPropagation(),style:{fontSize:10,border:'1px solid var(--bd)',borderRadius:5,padding:'3px 5px',background:'#fff',maxWidth:80,color:folderColor||'#6B7280',fontWeight:600}},
      ...folders.map(f=>R('option',{key:f.id,value:f.id},f.name))
    )),
    R('td',null,R('button',{onClick:()=>onDelHQ(row.id),style:{background:'none',border:'none',cursor:'pointer',color:'#fca5a5',fontSize:13,padding:2}},'✕'))
  );

  const tableHeader=R('thead',null,
    R('tr',null,
      R('th',{style:{width:24}}),
      R('th',{style:{width:'18%'}},'품목명'),
      R('th',{style:{width:75,textAlign:'right'}},'본사재고'),
      R('th',{style:{width:75,textAlign:'right'}},'공장재고'),
      R('th',{style:{width:80,textAlign:'right',background:'#fff5f0'}},'총재고'),
      R('th',{style:{width:78,textAlign:'right'}},'월사용량'),
      R('th',{style:{width:80,textAlign:'right',background:'#fef2f2'}},'부족수량'),
      R('th',{style:{width:34}},'단위'),
      R('th',{style:{width:80}},'메모'),
      R('th',{style:{width:90}},'폴더'),
      R('th',{style:{width:28}})
    )
  );

  return R('div',{className:'pg fa'},
    R('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}},
      R('div',{className:'pg-title',style:{margin:0}},'🏢 본사재고 관리'),
      R('div',{style:{display:'flex',gap:6}},
        R('button',{onClick:async()=>{
          if(!confirm('이 기기의 폴더 구성을 서버에 올립니다.\n다른 기기들도 이 구성을 보게 됩니다. 진행할까요?'))return;
          try{
            const{data}=await sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle();
            const existing=data&&data.state_data?data.state_data:{};
            await sbClient.from('app_state').upsert({id:1,state_data:{...existing,hq_folders:folders,hqItems:hqItems},updated_at:new Date().toISOString()});
            alert('✅ 서버 업로드 완료!\n다른 기기에서 새로고침하면 동일하게 보입니다.');
          }catch(e){alert('업로드 실패: '+e.message);}
        },style:{padding:'6px 12px',background:'#D94F1E',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'inherit'}},'↑ 이 기기 구성을 서버에 올리기'),
        R('button',{onClick:async()=>{
          if(!confirm('서버의 최신 구성을 이 기기로 받아옵니다. 진행할까요?'))return;
          try{
            const{data}=await sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle();
            const sd=data&&data.state_data?data.state_data:{};
            if(Array.isArray(sd.hq_folders)){setFolders(sd.hq_folders);localStorage.setItem('bnf_hq_folders',JSON.stringify(sd.hq_folders));}
            alert('✅ 서버에서 받아왔습니다.');
          }catch(e){alert('받기 실패: '+e.message);}
        },style:{padding:'6px 12px',background:'#fff',color:'#374151',border:'1px solid var(--bd)',borderRadius:8,cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:'inherit'}},'↓ 서버에서 받기')
      )
    ),
    /* 부족재고 알림 */
    shortItems.length>0&&R('div',{className:'card',style:{background:'linear-gradient(135deg,#fef2f2,#fee2e2)',border:'1px solid #fecaca',marginBottom:12}},
      R('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
        R('span',{style:{fontSize:13,fontWeight:700,color:'#991b1b'}},'⚠ 부족 재고 ',shortItems.length,'건'),
        R('span',{style:{fontSize:11,color:'#991b1b'}},'월사용량 - (본사재고+공장재고)')
      ),
      R('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:8}},
        ...shortItems.slice(0,8).map(r=>R('div',{key:r.id,style:{background:'#fff',borderRadius:8,padding:'8px 10px',display:'flex',justifyContent:'space-between',alignItems:'center',border:'1px solid #fecaca'}},
          R('div',null,R('div',{style:{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:140}},r.matName),R('div',{style:{fontSize:10,color:'#94a3b8'}},'재고 ',r.totalStock,'/월 ',r.mu,r.unit)),
          R('div',{style:{fontSize:14,fontWeight:800,color:'#dc2626'}},'-',r.short.toFixed(1),r.unit)
        ))
      )
    ),
    /* 검색 + 추가 */
    R('div',{className:'card',style:{marginBottom:12,position:'relative',zIndex:10}},
      R('input',{value:search,ref:searchRef,onChange:e=>{setSearch(e.target.value);setShowD(true);},onFocus:()=>setShowD(true),onBlur:()=>{if(ignoreBlur.current)return;setTimeout(()=>setShowD(false),200);},placeholder:'🔍 품목 검색해서 추가 (연속 클릭 가능)',style:{width:'100%',padding:'9px 12px',border:'1.5px solid #D94F1E',borderRadius:9,fontSize:13}}),
      showD&&fl.length>0&&R('div',{style:{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1px solid var(--bd)',borderRadius:10,boxShadow:'0 4px 20px rgba(0,0,0,.12)',zIndex:50,maxHeight:240,overflowY:'auto',marginTop:3}},
        fl.map(m=>{const already=hqItems.some(h=>h.matCode===m.c);return R('div',{key:m.c,style:{padding:'9px 13px',cursor:already?'default':'pointer',borderBottom:'1px solid #f0ebe8',display:'flex',gap:8,alignItems:'center',background:already?'#f0fdf4':'#fff',userSelect:'none'},onMouseDown:e=>{e.preventDefault();ignoreBlur.current=true;if(!already){const targetFolder=selectedFolder==='_all'?'_root':selectedFolder;onAddHQ({id:uid(),matCode:m.c,matName:m.n,hqStock:0,note:'',folder:targetFolder});}setTimeout(()=>{ignoreBlur.current=false;searchRef.current&&searchRef.current.focus();},0);}},
          R(Bdg,{g:m.g,sm:true}),R('div',{style:{flex:1,minWidth:0}},R('div',{style:{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},m.n),R('div',{style:{fontSize:10,color:'#94a3b8'}},m.c,' · 공장재고: ',m.s,m.u)),
          R('span',{style:{background:already?'#059669':'#D94F1E',color:'#fff',borderRadius:'50%',width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}},already?'✓':'＋'));})
      )
    ),
    /* 폴더 탭 */
    R('div',{className:'card',style:{marginBottom:12,padding:'10px 12px'}},
      R('div',{style:{display:'flex',gap:8,alignItems:'center',marginBottom:8,flexWrap:'wrap'}},
        R('div',{style:{fontSize:12,fontWeight:700,color:'#374151'}},'📁 폴더'),
        R('div',{style:{fontSize:10,color:'var(--tm)'}},'· 행 드래그(⋮⋮) → 폴더로 이동 · 폴더 우클릭 → 색 변경'),
        R('div',{style:{flex:1}}),
        R('button',{onClick:addFolder,style:{padding:'4px 10px',background:'#fff',border:'1px dashed #7C3AED',color:'#7C3AED',borderRadius:6,cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'inherit'}},'+ 새 폴더')
      ),
      R('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
        /* 전체 보기 */
        R('button',{onClick:()=>setSelectedFolder('_all'),
          onDragOver:e=>e.preventDefault(),
          style:{padding:'6px 12px',border:'1px solid '+(selectedFolder==='_all'?'#374151':'var(--bd)'),background:selectedFolder==='_all'?'#374151':'#fff',color:selectedFolder==='_all'?'#fff':'#374151',borderRadius:8,cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:'inherit'}
        },'📊 전체 ('+rowsAll.length+')'),
        /* 폴더 탭들 */
        ...folders.map(f=>{
          const cnt=folderCounts[f.id]||0;
          const isSelected=selectedFolder===f.id;
          const isDragOver=dragOverFolder===f.id;
          return R('div',{key:f.id,
            onDragOver:e=>onFolderDragOver(e,f.id),
            onDragLeave:onFolderDragLeave,
            onDrop:e=>onFolderDrop(e,f.id),
            style:{display:'flex',alignItems:'center',borderRadius:8,overflow:'hidden',border:'1.5px solid '+(isDragOver?'#7C3AED':isSelected?f.color:'var(--bd)'),background:isDragOver?'#F5F3FF':isSelected?f.color+'15':'#fff',transition:'all .1s',transform:isDragOver?'scale(1.05)':'none'}
          },
            R('button',{onClick:()=>setSelectedFolder(f.id),
              onContextMenu:e=>{e.preventDefault();changeFolderColor(f.id);},
              style:{padding:'6px 10px 6px 8px',background:'transparent',border:'none',color:f.color,cursor:'pointer',fontSize:11,fontWeight:isSelected?700:600,fontFamily:'inherit',display:'flex',alignItems:'center',gap:5}
            },
              R('span',{style:{width:9,height:9,borderRadius:'50%',background:f.color,display:'inline-block'}}),
              f.name,
              R('span',{style:{fontSize:9,color:'var(--tm)',marginLeft:2,fontWeight:500}},'('+cnt+')')
            ),
            R('button',{onClick:e=>{e.stopPropagation();renameFolder(f.id);},title:'이름 변경',style:{background:'transparent',border:'none',padding:'4px 6px',cursor:'pointer',fontSize:10,color:'var(--tm)'}},'✎'),
            f.id!=='_root'&&R('button',{onClick:e=>{e.stopPropagation();deleteFolder(f.id);},title:'폴더 삭제',style:{background:'transparent',border:'none',padding:'4px 8px 4px 2px',cursor:'pointer',fontSize:11,color:'#FCA5A5'}},'×')
          );
        })
      )
    ),
    rowsAll.length===0&&R('div',{className:'card',style:{textAlign:'center',padding:'30px',color:'var(--tm)',border:'2px dashed var(--bd)'}},'위에서 품목을 검색해 추가하세요'),
    /* 테이블 - 전체 보기 모드: 폴더별 그룹핑 / 특정 폴더 모드: 그 폴더만 */
    rowsAll.length>0&&(selectedFolder==='_all'
      ? R('div',{style:{display:'flex',flexDirection:'column',gap:10}},
          ...folders.filter(f=>(groupedByFolder[f.id]||[]).length>0).map(f=>{
            const rows=groupedByFolder[f.id]||[];
            const isCollapsed=collapsedFolders.has(f.id);
            const isDragOver=dragOverFolder===f.id;
            return R('div',{key:f.id,
              onDragOver:e=>onFolderDragOver(e,f.id),
              onDragLeave:onFolderDragLeave,
              onDrop:e=>onFolderDrop(e,f.id),
              style:{background:'#fff',border:'2px solid '+(isDragOver?'#7C3AED':f.color+'33'),borderRadius:12,overflow:'hidden',transition:'border .1s',boxShadow:isDragOver?'0 4px 12px rgba(124,58,237,0.2)':'none'}
            },
              R('div',{onClick:()=>toggleCollapse(f.id),style:{padding:'8px 14px',background:f.color+'15',display:'flex',alignItems:'center',gap:8,cursor:'pointer',userSelect:'none',borderBottom:isCollapsed?'none':'1px solid '+f.color+'33'}},
                R('span',{style:{fontSize:11,color:f.color,fontWeight:700}},isCollapsed?'▶':'▼'),
                R('span',{style:{width:11,height:11,borderRadius:'50%',background:f.color,display:'inline-block'}}),
                R('span',{style:{fontSize:13,fontWeight:700,color:f.color}},f.name),
                R('span',{style:{fontSize:10,color:'var(--tm)'}},'('+rows.length+'개)'),
                rows.filter(r=>r.short>0).length>0&&R('span',{style:{marginLeft:6,fontSize:10,background:'#FEE2E2',color:'#B91C1C',padding:'1px 8px',borderRadius:10,fontWeight:700}},'⚠ 부족 '+rows.filter(r=>r.short>0).length)
              ),
              !isCollapsed&&R('div',{style:{overflow:'auto'}},
                R('table',{style:{minWidth:790,width:'100%'}},
                  tableHeader,
                  R('tbody',null,...rows.map(row=>renderRow(row,f.color)))
                )
              )
            );
          })
        )
      : R('div',{style:{background:'#fff',border:'2px solid '+((folders.find(f=>f.id===selectedFolder)||{}).color||'#E5E7EB')+'33',borderRadius:12,overflow:'auto'}},
          visibleRows.length===0
            ? R('div',{style:{padding:'30px',textAlign:'center',color:'var(--tm)',fontSize:12}},'이 폴더에 품목이 없습니다. 다른 폴더의 행을 드래그해서 이동하거나 위에서 검색해 추가하세요.')
            : R('table',{style:{minWidth:790,width:'100%'}},
                tableHeader,
                R('tbody',null,...visibleRows.map(row=>renderRow(row,(folders.find(f=>f.id===selectedFolder)||{}).color)))
              )
        )
    )
  );
}

function PageInv({mats,cats,isAdmin,rk,onUpd,onAdd,onDel,parseXL,fRef}){
  const[monthlySales,setMonthlySales]=useState({});
  const[invTab,setInvTab]=useState('list');
  const[search,setSearch]=useState('');
  /* 완제품 폴더 시스템 */
  const[favFolders,setFavFolders]=useState(()=>{try{return JSON.parse(localStorage.getItem('bnf_fav_folders')||'null')||[{id:'_root',name:'기본',color:'#FBB024',order:0}];}catch(e){return[{id:'_root',name:'기본',color:'#FBB024',order:0}];}});
  /* 즐겨찾기 품목 → 폴더 매핑: {favId: folderId} */
  const[favItemFolder,setFavItemFolder]=useState(()=>{try{return JSON.parse(localStorage.getItem('bnf_fav_item_folder')||'{}');}catch(e){return{};}});
  const[selectedFavFolder,setSelectedFavFolder]=useState('_all'); /* _all | _root | folderId */
  const[draggedFavItem,setDraggedFavItem]=useState(null);
  const[dragOverFavFolder,setDragOverFavFolder]=useState(null);

  const saveFavFolders=(next)=>{
    setFavFolders(next);
    localStorage.setItem('bnf_fav_folders',JSON.stringify(next));
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle()
      .then(({data})=>{
        const existing=data&&data.state_data?data.state_data:{};
        sbClient.from('app_state').upsert({id:1,state_data:{...existing,bnf_fav_folders:next},updated_at:new Date().toISOString()});
      }).catch(()=>{});
  };
  const saveFavItemFolder=(next)=>{
    setFavItemFolder(next);
    localStorage.setItem('bnf_fav_item_folder',JSON.stringify(next));
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle()
      .then(({data})=>{
        const existing=data&&data.state_data?data.state_data:{};
        sbClient.from('app_state').upsert({id:1,state_data:{...existing,bnf_fav_item_folder:next},updated_at:new Date().toISOString()});
      }).catch(()=>{});
  };
  const addFavFolder=()=>{
    const name=prompt('새 폴더 이름:','폴더 '+(favFolders.length+1));
    if(!name||!name.trim())return;
    const colors=['#3B82F6','#10B981','#F59E0B','#EC4899','#06B6D4','#7C3AED','#EF4444','#8B5CF6','#14B8A6'];
    const used=new Set(favFolders.map(f=>f.color));
    const color=colors.find(c=>!used.has(c))||colors[favFolders.length%colors.length];
    saveFavFolders([...favFolders,{id:'ff_'+Date.now()+Math.random().toString(36).slice(2,6),name:name.trim(),color,order:favFolders.length}]);
  };
  const renameFavFolder=(fid)=>{
    const f=favFolders.find(x=>x.id===fid);
    if(!f)return;
    if(f.id==='_root'){alert('"기본" 폴더는 이름을 변경할 수 없습니다');return;}
    const name=prompt('폴더 이름:',f.name);
    if(!name||!name.trim())return;
    saveFavFolders(favFolders.map(x=>x.id===fid?{...x,name:name.trim()}:x));
  };
  const deleteFavFolder=(fid)=>{
    if(fid==='_root'){alert('"기본" 폴더는 삭제할 수 없습니다');return;}
    const count=Object.values(favItemFolder).filter(v=>v===fid).length;
    const msg=count>0?'이 폴더에 '+count+'개 제품이 있습니다.\n폴더를 삭제하면 제품들은 "기본" 폴더로 이동합니다.\n계속할까요?':'폴더를 삭제할까요?';
    if(!confirm(msg))return;
    /* 폴더에 속한 항목들을 _root로 이동 */
    const next={...favItemFolder};
    Object.keys(next).forEach(k=>{if(next[k]===fid)next[k]='_root';});
    saveFavItemFolder(next);
    saveFavFolders(favFolders.filter(x=>x.id!==fid));
    if(selectedFavFolder===fid)setSelectedFavFolder('_all');
  };
  const changeFavFolderColor=(fid)=>{
    const colors=['#FBB024','#3B82F6','#10B981','#F59E0B','#EC4899','#06B6D4','#7C3AED','#EF4444','#8B5CF6','#14B8A6'];
    const cur=favFolders.find(f=>f.id===fid);
    if(!cur)return;
    const curIdx=colors.indexOf(cur.color);
    const next=colors[(curIdx+1)%colors.length];
    saveFavFolders(favFolders.map(x=>x.id===fid?{...x,color:next}:x));
  };
  const moveFavToFolder=(favId,folderId)=>{
    saveFavItemFolder({...favItemFolder,[favId]:folderId});
  };
  /* 드래그앤드롭 */
  const onFavDragStart=(e,favId)=>{
    setDraggedFavItem(favId);
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',favId);
  };
  const onFavFolderDragOver=(e,fid)=>{
    e.preventDefault();e.dataTransfer.dropEffect='move';
    setDragOverFavFolder(fid);
  };
  const onFavFolderDrop=(e,fid)=>{
    e.preventDefault();
    if(draggedFavItem)moveFavToFolder(draggedFavItem,fid);
    setDraggedFavItem(null);setDragOverFavFolder(null);
  };

  const[catF,setCatF]=useState('전체');
  const[sortBy,setSortBy]=useState('cat');
  const[favorites,setFavorites]=useState(()=>{try{return JSON.parse(localStorage.getItem('bnf_fav_mats')||'[]');}catch(e){return [];}});
  const[semiItems,setSemiItems]=useState(()=>{try{return JSON.parse(localStorage.getItem('bnf_semi_items')||'[]');}catch(e){return [];}});
  /* 완제품 → 반제품 매핑: {완제품ID: [반제품ID, ...]} */
  const[prodSemiMap,setProdSemiMap]=useState(()=>{try{return JSON.parse(localStorage.getItem('bnf_prod_semi_map')||'{}');}catch(e){return {};}});
  /* 펼친 완제품 ID (한 번에 하나씩) */
  const[expandedFavId,setExpandedFavId]=useState(null);
  /* 완제품별 반제품 연결 검색 UI */
  const[semiPickerFor,setSemiPickerFor]=useState(null); /* 어느 완제품을 위한 picker인지 */
  const[semiPickerSearch,setSemiPickerSearch]=useState('');
  const[lastSyncAt,setLastSyncAt]=useState(0);
  const semiPickerInputRef=useRef(null);
  /* Supabase에서 favorites 복원 (다른 기기에서 설정한 값) */
  /* Supabase에서 favorites/semiItems/prodSemiMap 동기화 - Supabase가 source of truth */
  const syncFromSupabase=()=>{
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle()
      .then(({data})=>{
        setLastSyncAt(Date.now());
        if(!data||!data.state_data)return;
        const sd=data.state_data;
        /* 서버에 즐겨찾기/반제품/폴더가 하나도 없는데 이 기기 localStorage엔 있으면 → 자동 업로드 (유실 방지) */
        const favLs=JSON.parse(localStorage.getItem('bnf_fav_mats')||'[]');
        const semiLs=JSON.parse(localStorage.getItem('bnf_semi_items')||'[]');
        const ffLs=JSON.parse(localStorage.getItem('bnf_fav_folders')||'[]');
        const fifLs=JSON.parse(localStorage.getItem('bnf_fav_item_folder')||'{}');
        const serverEmpty=!(Array.isArray(sd.bnf_favorites)&&sd.bnf_favorites.length>0)&&!(Array.isArray(sd.bnf_semi_items)&&sd.bnf_semi_items.length>0);
        const localHas=favLs.length>0||semiLs.length>0||ffLs.filter(f=>f.id!=='_root').length>0;
        if(serverEmpty&&localHas){
          const psmLs=JSON.parse(localStorage.getItem('bnf_prod_semi_map')||'{}');
          sbClient.from('app_state').upsert({id:1,state_data:{...sd,bnf_favorites:favLs,bnf_semi_items:semiLs,bnf_prod_semi_map:psmLs,bnf_fav_folders:ffLs,bnf_fav_item_folder:fifLs},updated_at:new Date().toISOString()})
            .then(()=>console.log('[재고관리] 로컬 즐겨찾기를 서버에 자동 동기화 완료'));
          return; /* 이번 턴은 로컬 유지, 다음 동기화부터 서버 기준 */
        }
        /* favorites - Supabase에 데이터 있으면 무조건 적용 (localStorage 길이 체크 제거) */
        if(Array.isArray(sd.bnf_favorites)){
          const localStr=localStorage.getItem('bnf_fav_mats')||'[]';
          const remoteStr=JSON.stringify(sd.bnf_favorites);
          if(localStr!==remoteStr){
            setFavorites(sd.bnf_favorites);
            localStorage.setItem('bnf_fav_mats',remoteStr);
          }
        }
        /* semiItems */
        if(Array.isArray(sd.bnf_semi_items)){
          const localStr=localStorage.getItem('bnf_semi_items')||'[]';
          const remoteStr=JSON.stringify(sd.bnf_semi_items);
          if(localStr!==remoteStr){
            setSemiItems(sd.bnf_semi_items);
            localStorage.setItem('bnf_semi_items',remoteStr);
          }
        }
        /* prodSemiMap */
        if(sd.bnf_prod_semi_map&&typeof sd.bnf_prod_semi_map==='object'){
          const localStr=localStorage.getItem('bnf_prod_semi_map')||'{}';
          const remoteStr=JSON.stringify(sd.bnf_prod_semi_map);
          if(localStr!==remoteStr){
            setProdSemiMap(sd.bnf_prod_semi_map);
            localStorage.setItem('bnf_prod_semi_map',remoteStr);
          }
        }
        /* favFolders */
        if(Array.isArray(sd.bnf_fav_folders)){
          const localStr=localStorage.getItem('bnf_fav_folders')||'[]';
          const remoteStr=JSON.stringify(sd.bnf_fav_folders);
          if(localStr!==remoteStr){
            setFavFolders(sd.bnf_fav_folders);
            localStorage.setItem('bnf_fav_folders',remoteStr);
          }
        }
        /* favItemFolder */
        if(sd.bnf_fav_item_folder&&typeof sd.bnf_fav_item_folder==='object'){
          const localStr=localStorage.getItem('bnf_fav_item_folder')||'{}';
          const remoteStr=JSON.stringify(sd.bnf_fav_item_folder);
          if(localStr!==remoteStr){
            setFavItemFolder(sd.bnf_fav_item_folder);
            localStorage.setItem('bnf_fav_item_folder',remoteStr);
          }
        }
      }).catch(e=>console.warn('[Inv] sync error',e));
  };
  useEffect(()=>{
    /* 진입 시 즉시 강제 동기화 (localStorage 캐시보다 Supabase 우선) */
    syncFromSupabase();
    /* 1. Realtime 구독 - app_state 테이블 변경 즉시 push */
    let channel=null;
    try{
      channel=sbClient.channel('inv_sync_'+Date.now())
        .on('postgres_changes',{event:'*',schema:'public',table:'app_state',filter:'id=eq.1'},(payload)=>{
          console.log('[Inv Realtime] 변경 감지',payload.eventType);
          syncFromSupabase();
        })
        .subscribe((status)=>{
          if(status==='SUBSCRIBED')console.log('[Inv Realtime] 구독 성공');
        });
    }catch(e){console.warn('[Inv Realtime] 초기화 실패',e);}
    /* 2. 페이지 보일 때 동기화 */
    const onVis=()=>{if(!document.hidden)syncFromSupabase();};
    document.addEventListener('visibilitychange',onVis);
    window.addEventListener('focus',syncFromSupabase);
    /* 3. 백업 폴링 - 3초마다 */
    const poll=setInterval(()=>{if(!document.hidden)syncFromSupabase();},3000);
    return()=>{
      if(channel)try{sbClient.removeChannel(channel);}catch(e){}
      document.removeEventListener('visibilitychange',onVis);
      window.removeEventListener('focus',syncFromSupabase);
      clearInterval(poll);
    };
  },[]);
  const[semiSearch,setSemiSearch]=useState('');
  const[showSemiSearch,setShowSemiSearch]=useState(false);
  const semiSearchInputRef=useRef(null);
  const shortCnt=useMemo(()=>mats.filter(m=>m.mu>0&&m.s<m.mu).length,[mats]);
  /* ── DB 상태 ── */
  const[loading,setLoading]=useState(true);
  const[saveStatus,setSaveStatus]=useState('');
  const[dbReady,setDbReady]=useState(false);
  const saveTimerRef=useRef(null);
  const catCounts=useMemo(()=>{const m={};cats.forEach(c=>{m[c]=mats.filter(x=>x.g===c).length;});return m;},[mats,cats]);
  const sorted=useMemo(()=>{
    let b=[...mats];
    if(catF==='부족')b=b.filter(m=>m.mu>0&&m.s<m.mu);
    else if(catF!=='전체')b=b.filter(m=>m.g===catF);
    if(search){const q=search.toLowerCase();b=b.filter(m=>m.n.toLowerCase().includes(q)||m.c.includes(search));}
    if(sortBy==='name_asc')b.sort((a,x)=>a.n.localeCompare(x.n,'ko'));
    else if(sortBy==='name_desc')b.sort((a,x)=>x.n.localeCompare(a.n,'ko'));
    else if(sortBy==='stock_desc')b.sort((a,x)=>x.s-a.s);
    else if(sortBy==='stock_asc')b.sort((a,x)=>a.s-x.s);
    else b.sort((a,x)=>a.g.localeCompare(x.g,'ko')||a.n.localeCompare(x.n,'ko'));
    return b;
  },[mats,catF,search,sortBy]);
  /* ── 즐겨찾기/반제품 관리 (모든 탭 공통) ── */
  const toggleFav=(id)=>{
    setFavorites(prev=>{
      const next=prev.includes(id)?prev.filter(x=>x!==id):[...prev,id];
      localStorage.setItem('bnf_fav_mats',JSON.stringify(next));
      /* Supabase에 백업 (app_state에 favorites 키로) */
      sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle()
        .then(({data})=>{
          if(data&&data.state_data){
            const sd={...data.state_data,bnf_favorites:next,bnf_semi_items:JSON.parse(localStorage.getItem('bnf_semi_items')||'[]')};
            sbClient.from('app_state').upsert({id:1,state_data:sd,updated_at:new Date().toISOString()});
          }
        }).catch(()=>{});
      return next;
    });
  };
  const addSemi=(mat)=>{
    setSemiItems(prev=>{
      if(prev.find(x=>x.id===mat.id))return prev;
      const next=[...prev,{id:mat.id,n:mat.n,u:mat.u}];
      localStorage.setItem('bnf_semi_items',JSON.stringify(next));
      sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle()
        .then(({data})=>{
          if(data&&data.state_data){
            const sd={...data.state_data,bnf_semi_items:next,bnf_favorites:JSON.parse(localStorage.getItem('bnf_fav_mats')||'[]')};
            sbClient.from('app_state').upsert({id:1,state_data:sd,updated_at:new Date().toISOString()});
          }
        }).catch(()=>{});
      return next;
    });
    /* 검색어/검색창 모두 유지 - 같은 결과 목록에서 연속 클릭 가능 (이미 추가된 항목은 필터에서 자동 제외됨) */
  };
  const removeSemi=(id)=>{
    setSemiItems(prev=>{const next=prev.filter(x=>x.id!==id);localStorage.setItem('bnf_semi_items',JSON.stringify(next));return next;});
  };

  /* 완제품 ↔ 반제품 매핑 관리 */
  const saveProdSemiMap=(map)=>{
    localStorage.setItem('bnf_prod_semi_map',JSON.stringify(map));
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle()
      .then(({data})=>{
        if(data&&data.state_data){
          const sd={...data.state_data,bnf_prod_semi_map:map,bnf_favorites:JSON.parse(localStorage.getItem('bnf_fav_mats')||'[]'),bnf_semi_items:JSON.parse(localStorage.getItem('bnf_semi_items')||'[]')};
          sbClient.from('app_state').upsert({id:1,state_data:sd,updated_at:new Date().toISOString()});
        }
      }).catch(()=>{});
  };
  const linkSemi=(prodId,semiId)=>{
    setProdSemiMap(prev=>{
      const cur=prev[prodId]||[];
      if(cur.includes(semiId))return prev;
      const next={...prev,[prodId]:[...cur,semiId]};
      saveProdSemiMap(next);
      return next;
    });
  };
  const unlinkSemi=(prodId,semiId)=>{
    setProdSemiMap(prev=>{
      const cur=prev[prodId]||[];
      const filtered=cur.filter(x=>x!==semiId);
      const next={...prev};
      if(filtered.length>0)next[prodId]=filtered;else delete next[prodId];
      saveProdSemiMap(next);
      return next;
    });
  };

  const favMats=mats.filter(m=>favorites.includes(m.id));
  const semiMatsData=semiItems.map(si=>{const m=mats.find(x=>x.id===si.id);return m?{...si,s:m.s}:{...si,s:0};});
  const semiSearchResults=semiSearch?mats.filter(m=>m.n&&m.n.includes(semiSearch)&&!semiItems.find(x=>x.id===m.id)).slice(0,8):[];
  /* 완제품별 연결된 반제품 (검색 picker용 - 이미 매핑된 것 제외) */
  const semiPickerResults=semiPickerFor?semiItems
    .filter(si=>!(prodSemiMap[semiPickerFor]||[]).includes(si.id))
    .filter(si=>!semiPickerSearch||si.n.includes(semiPickerSearch)):[];

  /* hook들은 항상 동일한 순서로 호출되어야 하므로 if return 이전에 선언 (ERP 탭에서도 hook 개수 일치) */
  const invMainRef=useRef(null);
  const invTblRef=useRef(null);
  const scrollToTable=()=>{
    setTimeout(()=>{
      if(invTblRef.current)invTblRef.current.scrollIntoView({behavior:'smooth',block:'start'});
    },50);
  };

  /* ERP 업로드 탭 */
  if(invTab==='erp'){
    return R('div',{className:'pg fa'},
      R('div',{className:'pg-hdr'},
        R('div',null,R('div',{className:'pg-title'},'📦 재고 관리'),R('div',{style:{fontSize:12,color:'var(--tm)',marginTop:2}},'이카운트 ERP 재고 관리 업로드')),
        R('div',{className:'tab-row',style:{margin:0}},
          R('button',{className:'tab',onClick:()=>setInvTab('list')},'재고목록'),
          R('button',{className:'tab act'},'ERP 업로드')
        )
      ),
      R('div',{
        onDragOver:ev=>{ev.preventDefault();ev.currentTarget.style.borderColor='#D94F1E';ev.currentTarget.style.background='#FFF0E8';},
        onDragLeave:ev=>{ev.currentTarget.style.borderColor='var(--bd)';ev.currentTarget.style.background='#fafafa';},
        onDrop:ev=>{ev.preventDefault();ev.currentTarget.style.borderColor='var(--bd)';ev.currentTarget.style.background='#fafafa';const f=ev.dataTransfer.files[0];if(f)parseXL(f);},
        onClick:()=>fRef&&fRef.current&&fRef.current.click(),

function BOMModal({mats,cats,editProd,onSave,onClose}){
  const searchRef=useRef(null);
  const ignoreBlur=useRef(false);
  const[pname,setPname]=useState(editProd?editProd.name:'');
  const[pcat,setPcat]=useState(editProd?editProd.cat:(cats[0]||'소스류'));
  const[bom,setBom]=useState(editProd?editProd.bom:[]);
  const[amts,setAmts]=useState(editProd?Object.fromEntries(editProd.bom.map(b=>[b.c,b.amt])):{});
  const[search,setSearch]=useState('');
  const[showD,setShowD]=useState(false);
  const[pSearch,setPSearch]=useState('');
  const[showPD,setShowPD]=useState(false);
  const[editIdx,setEditIdx]=useState(null);
  const fl=useMemo(()=>{
    if(!search)return[];
    const q=search.toLowerCase();
    return mats.filter(m=>m.n.toLowerCase().includes(q)||m.c.includes(search)).slice(0,12);
  },[search,mats]);
  const pfl=useMemo(()=>{
    if(!pSearch)return[];
    const q=pSearch.toLowerCase();
    return mats.filter(m=>m.g==='제품'&&(m.n.toLowerCase().includes(q)||m.c.includes(pSearch))).slice(0,8);
  },[pSearch,mats]);
  const addBom=m=>{
    if(bom.find(b=>b.c===m.c))return;
    setBom(p=>[...p,{c:m.c,name:m.n,unit:m.u,g:m.g,supplier:m.supplier||'',contact:m.contact||'',lead:m.lead||3}]);
    setAmts(p=>({...p,[m.c]:1}));
  };
  const save=()=>{
    if(!pname.trim()){alert('제품명을 입력하세요');return;}
    if(!bom.length){alert('원재료를 1개 이상 추가하세요');return;}
    onSave({id:editProd?editProd.id:uid(),name:pname,cat:pcat,bom:bom.map(b=>({...b,amt:parseFloat(amts[b.c])||0}))});
    onClose();
  };

            pfl.map(m=>R('div',{key:m.c,style:{padding:'9px 14px',cursor:'pointer',borderBottom:'1px solid #f8fafc',display:'flex',gap:8,alignItems:'center',fontSize:12},
              onMouseDown:()=>{setPname(m.n);setPSearch(m.n);setShowPD(false);}},
              R(Bdg,{g:m.g,sm:true}),

              },placeholder:'수량',style:{width:60,border:'1px solid #e2e8f0',borderRadius:6,padding:'3px 5px',fontSize:12,textAlign:'center'}}),
              R('span',{style:{fontSize:11,color:'#94a3b8'}},b.unit),
              R('span',{style:{fontSize:10,color:'#94a3b8',margin:'0 4px'}},editIdx===bi?'▲':'▼'),
              R('button',{onClick:e=>{e.stopPropagation();setBom(p=>p.filter((_,i)=>i!==bi));},style:{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:17,padding:'0 2px'}},'×')
            ),
            editIdx===bi&&R('div',{style:{padding:'7px 10px 10px',borderTop:'1px solid #f1f5f9',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:5}},
              [['매입처','supplier','text'],['연락처','contact','text'],['리드타임(일)','lead','number']].map(([lbl,k,t])=>R('div',{key:k},
                R('label',{style:{fontSize:10,color:'#94a3b8',display:'block',marginBottom:1}},lbl),
                R('input',{value:b[k]||'',type:t,onChange:e=>setBom(p=>p.map((x,i)=>i===bi?{...x,[k]:t==='number'?+e.target.value:e.target.value}:x)),style:{width:'100%',border:'1px solid #e2e8f0',borderRadius:6,padding:'4px 7px',fontSize:12}})
              ))
            )
          ))
        ),
        !bom.length&&R('div',{style:{padding:18,textAlign:'center',color:'#94a3b8',fontSize:12,background:'#f8fafc',borderRadius:8,border:'1px dashed #e2e8f0'}},'위에서 원재료를 검색해 추가하세요')
      ),
      R('div',{className:'mfoot'},
        R('button',{className:'btn bs',onClick:onClose,style:{flex:1,padding:10}},'취소'),
        R('button',{className:'btn bp',onClick:save,style:{flex:2,padding:10,fontSize:14}},'저장')
      )
    )
  );
}

/* ────── PAGE: 제품/BOM ────── */
function PageBOM({mats,prods,cats,isAdmin,onSetProds,onOpenModal}){
  const[prodSearch,setProdSearch]=useState('');
  const[expId,setExpId]=useState(null);
  const[editMod,setEditMod]=useState(null);
  /* ── 폴더 (생산계획과 동일 키 공유: prod_folders / prod_item_folder) ── */
  const[bomFolders,setBomFolders]=useState(()=>{try{return JSON.parse(localStorage.getItem('bnf_prod_folders')||'null')||[{id:'_root',name:'기본',color:'#D94F1E',order:0}];}catch(e){return[{id:'_root',name:'기본',color:'#D94F1E',order:0}];}});
  const[bomItemFolder,setBomItemFolder]=useState(()=>{try{return JSON.parse(localStorage.getItem('bnf_prod_item_folder')||'{}');}catch(e){return{};}});
  const[collapsedBF,setCollapsedBF]=useState({});
  const FOLDER_COLORS=['#D94F1E','#3B82F6','#22C55E','#A855F7','#EC4899','#06B6D4','#F59E0B','#64748B'];
  const saveBomFolders=(next)=>{
    setBomFolders(next);
    localStorage.setItem('bnf_prod_folders',JSON.stringify(next));
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle().then(({data})=>{
      const ex=data&&data.state_data?data.state_data:{};
      sbClient.from('app_state').upsert({id:1,state_data:{...ex,prod_folders:next},updated_at:new Date().toISOString()});
    });
  };
  const saveBomItemFolder=(next)=>{
    setBomItemFolder(next);
    localStorage.setItem('bnf_prod_item_folder',JSON.stringify(next));
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle().then(({data})=>{
      const ex=data&&data.state_data?data.state_data:{};
      sbClient.from('app_state').upsert({id:1,state_data:{...ex,prod_item_folder:next},updated_at:new Date().toISOString()});
    });
  };
  useEffect(()=>{
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle().then(({data})=>{
      const sd=data&&data.state_data?data.state_data:{};
      if(Array.isArray(sd.prod_folders)&&sd.prod_folders.filter(f=>f.id!=='_root').length>0){
        const rs=JSON.stringify(sd.prod_folders);
        if(JSON.stringify(bomFolders)!==rs){setBomFolders(sd.prod_folders);localStorage.setItem('bnf_prod_folders',rs);}
      }
      if(sd.prod_item_folder&&typeof sd.prod_item_folder==='object'){
        const rs=JSON.stringify(sd.prod_item_folder);
        if(JSON.stringify(bomItemFolder)!==rs){setBomItemFolder(sd.prod_item_folder);localStorage.setItem('bnf_prod_item_folder',rs);}
      }
    }).catch(()=>{});
  },[]);
  const addBomFolder=()=>{
    const name=prompt('새 폴더 이름:','폴더 '+(bomFolders.length));if(!name)return;
    const used=new Set(bomFolders.map(f=>f.color));
    const color=FOLDER_COLORS.find(c=>!used.has(c))||FOLDER_COLORS[bomFolders.length%FOLDER_COLORS.length];
    saveBomFolders([...bomFolders,{id:'pf_'+Date.now(),name,color,order:bomFolders.length}]);
  };
  const renameBomFolder=(fid)=>{const f=bomFolders.find(x=>x.id===fid);if(!f)return;const name=prompt('폴더 이름 변경:',f.name);if(!name)return;saveBomFolders(bomFolders.map(x=>x.id===fid?{...x,name}:x));};
  const cycleBomFolderColor=(fid)=>{const f=bomFolders.find(x=>x.id===fid);if(!f)return;const idx=FOLDER_COLORS.indexOf(f.color);saveBomFolders(bomFolders.map(x=>x.id===fid?{...x,color:FOLDER_COLORS[(idx+1)%FOLDER_COLORS.length]}:x));};
  const delBomFolder=(fid)=>{if(fid==='_root'){alert('기본 폴더는 삭제할 수 없습니다');return;}if(!confirm('이 폴더를 삭제할까요? 안의 제품은 기본 폴더로 이동합니다.'))return;const nm={...bomItemFolder};Object.keys(nm).forEach(pid=>{if(nm[pid]===fid)delete nm[pid];});saveBomItemFolder(nm);saveBomFolders(bomFolders.filter(f=>f.id!==fid));};
  const moveBomToFolder=(pid,fid)=>{const nm={...bomItemFolder};if(fid==='_root')delete nm[pid];else nm[pid]=fid;saveBomItemFolder(nm);};
  const getBomFolder=(pid)=>{const fid=bomItemFolder[pid];if(fid&&bomFolders.some(f=>f.id===fid))return fid;return '_root';};

  const filtered=useMemo(()=>{
    if(!prodSearch)return prods;
    const q=prodSearch.toLowerCase();
    return prods.filter(p=>(p.name||"").toLowerCase().includes(q)||p.cat.includes(q));
  },[prods,prodSearch]);
  /* 폴더별 그룹핑 (검색 결과 기준) */
  const bomByFolder=useMemo(()=>{
    const g={};bomFolders.forEach(f=>{g[f.id]=[];});
    filtered.forEach(p=>{const fid=getBomFolder(p.id);if(!g[fid])g[fid]=[];g[fid].push(p);});
    return g;
  },[filtered,bomFolders,bomItemFolder]);

  /* 제품 카드 렌더 함수 */
  const renderCard=(p)=>R('div',{key:p.id,className:'card',style:{marginBottom:8,padding:0,overflow:'hidden'}},
    R('div',{style:{padding:'12px 16px',display:'flex',alignItems:'center',gap:10}},
      R('div',{style:{flex:1,minWidth:120}},
        R('input',{value:p.name,onChange:e=>onSetProds(pp=>pp.map(x=>x.id===p.id?{...x,name:e.target.value}:x)),readOnly:!isAdmin,style:{border:'none',background:'transparent',fontWeight:700,fontSize:14,padding:0,width:'100%',cursor:isAdmin?'text':'default'}}),
        R('div',{style:{fontSize:11,color:'#64748b'}},p.cat,' · BOM ',p.bom.length,'종')
      ),
      isAdmin&&R('select',{value:getBomFolder(p.id),onChange:e=>moveBomToFolder(p.id,e.target.value),title:'폴더 이동',style:{padding:'5px 6px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:10,background:'#fff',cursor:'pointer',maxWidth:90}},
        ...bomFolders.map(f=>R('option',{key:f.id,value:f.id},f.name))
      ),
      isAdmin&&R('button',{className:'btn bw',style:{padding:'4px 10px',fontSize:11},onClick:()=>{setEditMod(p);setExpId(p.id);}},'수정'),
      isAdmin&&R('button',{className:'btn bd',style:{padding:'4px 10px',fontSize:11},onClick:()=>onSetProds(pp=>pp.filter(x=>x.id!==p.id))},'삭제'),
      R('button',{className:'btn bs',style:{padding:'4px 10px',fontSize:11},onClick:()=>{setExpId(expId===p.id?null:p.id);if(editMod&&editMod.id===p.id)setEditMod(null);}},expId===p.id?'▲':'▼')
    ),
    expId===p.id&&!editMod&&R('div',{style:{borderTop:'1px solid #f1f5f9',padding:'12px 16px',background:'#f8fafc',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:6}},
      p.bom.map(b=>{
        const mat=mats.find(m=>m.c===b.c);
        return R('div',{key:b.c,style:{padding:'7px 10px',background:'#fff',borderRadius:8,border:'1px solid #e2e8f0'}},
          R('div',{style:{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},b.name),
          R('div',{style:{fontSize:11,color:'#64748b'}},b.amt,b.unit,'/개 · 현재: ',(mat?mat.s:0),b.unit)
        );
      })
    ),
    editMod&&editMod.id===p.id&&R(BOMModal,{mats,cats,editProd:p,
      onSave:updated=>onSetProds(pp=>pp.map(x=>x.id===updated.id?updated:x)),
      onClose:()=>{setEditMod(null);setExpId(null);}
    })
  );

  return R('div',{className:'pg fa'},
    R('div',{style:{display:'flex',gap:8,alignItems:'center',marginBottom:14,flexWrap:'wrap'}},
      R('input',{value:prodSearch,onChange:e=>setProdSearch(e.target.value),placeholder:'🔍 제품명 검색',style:{flex:1,minWidth:140,padding:'7px 10px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:13}}),
      R('span',{style:{fontSize:11,color:'#94a3b8'}},filtered.length+'종'),
      isAdmin&&R('button',{onClick:addBomFolder,style:{padding:'7px 12px',border:'1px dashed var(--p)',background:'#FFF8F4',color:'var(--p)',borderRadius:8,cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'inherit'}},'+ 새 폴더'),
      isAdmin&&R('button',{className:'btn bp',onClick:()=>onOpenModal(null)},'+ 제품 + BOM 등록')
    ),
    !prods.length&&R('div',{className:'card',style:{textAlign:'center',padding:'32px',border:'2px dashed #e2e8f0',color:'#94a3b8'}},
      '등록된 제품 없음',
      isAdmin&&R('div',{style:{marginTop:10}},R('button',{className:'btn bp',onClick:()=>onOpenModal(null)},'등록하기'))
    ),
    /* 폴더별 그룹 */
    ...bomFolders.map(folder=>{
      const fProds=bomByFolder[folder.id]||[];
      if(folder.id==='_root'&&fProds.length===0&&bomFolders.length>1)return null;
      if(prods.length===0)return null;
      const isCol=collapsedBF[folder.id];
      return R('div',{key:folder.id,style:{marginBottom:12}},
        R('div',{style:{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',background:folder.color+'12',borderLeft:'4px solid '+folder.color,borderRadius:8,marginBottom:8}},
          R('button',{onClick:()=>setCollapsedBF(p=>({...p,[folder.id]:!p[folder.id]})),style:{background:'none',border:'none',cursor:'pointer',fontSize:11,color:folder.color,fontWeight:700,padding:0}},isCol?'▶':'▼'),
          R('span',{onClick:()=>isAdmin&&renameBomFolder(folder.id),style:{fontWeight:700,fontSize:13,color:folder.color,cursor:isAdmin?'pointer':'default'},title:isAdmin?'클릭하여 이름 변경':''},folder.name),
          R('span',{style:{fontSize:11,color:'#94a3b8'}},'('+fProds.length+')'),
          R('div',{style:{flex:1}}),
          isAdmin&&R('button',{onClick:()=>cycleBomFolderColor(folder.id),title:'색 변경',style:{width:18,height:18,borderRadius:'50%',background:folder.color,border:'none',cursor:'pointer'}}),
          isAdmin&&folder.id!=='_root'&&R('button',{onClick:()=>delBomFolder(folder.id),title:'폴더 삭제',style:{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'#fca5a5',padding:'0 4px'}},'✕')
        ),
        !isCol&&fProds.length===0&&R('div',{style:{padding:'12px',textAlign:'center',color:'#cbd5e1',fontSize:11,border:'1px dashed #e2e8f0',borderRadius:8,marginBottom:8}},'제품을 이 폴더로 옮기려면 제품의 폴더 드롭다운에서 "'+folder.name+'" 선택'),
        !isCol&&fProds.map(p=>renderCard(p))
      );
    })
  );
}

/* ────── 생산지시 확인 Modal ────── */
function ProdConfirmModal({data,mats,onConfirm,onClose}){
  const[note,setNote]=useState('');
  const shortages=useMemo(()=>{
    return (data.prod.bom||[]).map(b=>{
      const mat=mats.find(m=>m.c===b.c);
      const needed=b.amt*data.qty;
      const short=Math.max(0,needed-(mat?mat.s:0));
      return short>0?{mat,b,needed,short}:null;
    }).filter(Boolean);
  },[data,mats]);
  const confirm=()=>{
    const today=new Date();
    const newOrders=shortages.map(({mat,b,short})=>{
      const ld=mat?(mat.lead||3):(b.lead||3);
      const arr=new Date(today);
      arr.setDate(arr.getDate()+ld);
      return {
        id:uid(),matCode:b.c,matName:b.name||(mat?mat.n:''),
        amt:Math.ceil(short*100)/100,unit:b.unit||(mat?mat.u:'kg'),
        status:'발주요청',ordAt:today.toLocaleDateString('ko-KR'),
        expAt:arr.toLocaleDateString('ko-KR')+' 09:00',
        supplier:mat?(mat.supplier||''):(b.supplier||''),
        total:Math.round((mat?(mat.price||0):0)*short),
        contact:mat?(mat.contact||''):(b.contact||''),
        memo:'['+data.prod.name+'] '+data.qty+'개 생산 자동발주 (리드 '+ld+'일)'
      };
    });
    onConfirm(newOrders,note);
    onClose();
  };
  return R('div',{className:'mbg',onClick:e=>e.stopPropagation()},
    R('div',{className:'mbox',style:{maxWidth:560,margin:'auto',borderRadius:16}},
      R('div',{className:'mhdr'},
        R('div',null,
          R('div',{style:{fontSize:15,fontWeight:700}},'📝 생산지시 확인'),
          R('div',{style:{fontSize:12,color:'#64748b'}},data.prod.name+' | '+data.qty+'개')
        ),
        R('button',{onClick:onClose,style:{background:'none',border:'none',cursor:'pointer',fontSize:22,color:'#64748b'}},'×')
      ),
      R('div',{className:'mbody'},
        R('div',{style:{background:'#FFF5F0',borderRadius:10,padding:'12px 14px',marginBottom:12}},
          R('div',{style:{fontSize:12,fontWeight:700,color:'#D94F1E',marginBottom:5}},'생산 정보'),
          R('div',{style:{display:'flex',gap:16,fontSize:12,flexWrap:'wrap'}},
            R('span',null,'제품: ',R('strong',null,data.prod.name)),
            R('span',null,'수량: ',R('strong',null,data.qty+'개')),
            R('span',null,'일시: ',getNow())
          )
        ),
        R('div',{style:{marginBottom:12,background:'#FAFAFA',borderRadius:8,border:'1px solid #F1F5F9',overflow:'hidden'}},
          /* 헤더 - 부족 우선 정렬 안내 */
          R('div',{style:{padding:'6px 10px',background:'#fff',borderBottom:'1px solid #F1F5F9',display:'flex',gap:6,alignItems:'center',fontSize:9,fontWeight:700,color:'#94a3b8'}},
            R('span',{style:{flex:1,minWidth:0}},'품목'),
            R('span',{style:{width:74,textAlign:'right',flexShrink:0}},'필요'),
            R('span',{style:{width:74,textAlign:'right',flexShrink:0}},'재고'),
            R('span',{style:{width:84,textAlign:'right',flexShrink:0}},'부족')
          ),
          /* 행 리스트 (부족 우선 정렬) */
          ...(()=>{
            const sortedRows=[...data.rows].sort((a,b)=>{
              if(a.short>0&&b.short<=0)return -1;
              if(b.short>0&&a.short<=0)return 1;
              if(a.short>0&&b.short>0)return b.short-a.short;
              return 0;
            });
            return sortedRows.map((row,i)=>{
              const isShort=row.short>0;
              return R('div',{key:i,style:{display:'flex',gap:6,alignItems:'center',padding:'5px 10px',borderTop:'1px solid '+(isShort?'#FEE2E2':'#F1F5F9'),background:isShort?'#FEF8F7':'#fff',fontSize:11,flexWrap:'nowrap',overflow:'hidden'}},
                R('span',{style:{flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:isShort?700:500,color:isShort?'#991B1B':'#1F2937'},title:row.name},row.name),
                R('span',{style:{width:74,textAlign:'right',flexShrink:0,whiteSpace:'nowrap',color:'#1F2937',fontWeight:600}},row.needed.toFixed(2)+row.unit),
                R('span',{style:{width:74,textAlign:'right',flexShrink:0,whiteSpace:'nowrap',color:'#64748b'}},(row.stock||0)+row.unit),
                R('span',{style:{width:84,textAlign:'right',flexShrink:0,whiteSpace:'nowrap'}},
                  isShort
                    ?R('span',{style:{background:'#FEE2E2',color:'#B91C1C',padding:'2px 7px',borderRadius:8,fontWeight:700,fontSize:10}},'-'+row.short.toFixed(2)+row.unit)
                    :R('span',{style:{color:'#059669',fontWeight:600,fontSize:10}},'✓ 충분')
                )
              );
            });
          })()
        ),
        shortages.length>0&&R('div',{style:{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:10,padding:'12px 14px',marginBottom:12}},
          R('div',{style:{fontSize:12,fontWeight:700,color:'#dc2626',marginBottom:6}},'⚠ 자동 발주 예정 '+shortages.length+'건'),
          ...shortages.map(({mat,b,short})=>{
            const ld=mat?(mat.lead||3):(b.lead||3);
            const arr=new Date();
            arr.setDate(arr.getDate()+ld);
            return R('div',{key:b.c,style:{fontSize:11,padding:'3px 0',color:'#64748b'}},
              R('span',{style:{color:'#dc2626',fontWeight:600}},b.name||(mat?mat.n:'')),
              ' '+short.toFixed(2)+b.unit+' → 입고 '+arr.toLocaleDateString('ko-KR')+' (리드 '+ld+'일)'
            );
          })
        ),
        R('div',null,
          R('label',{style:{fontSize:11,fontWeight:700,color:'#64748b',display:'block',marginBottom:4}},'지시 메모'),
          R('textarea',{value:note,onChange:e=>setNote(e.target.value),placeholder:'생산 지시 내용...',style:{width:'100%',padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:12,resize:'vertical',minHeight:50}})
        )
      ),
      R('div',{className:'mfoot'},
        R('button',{className:'btn bs',onClick:onClose,style:{flex:1,padding:10}},'취소'),
        R('button',{className:'btn bp',onClick:confirm,style:{flex:2,padding:10,fontSize:14}},
          shortages.length>0?'지시 확인 + 자동 발주 ('+shortages.length+'건)':'지시 확인'
        )
      )
    )
  );
}

/* ────── 생산지시서 이미지 Modal ────── */

              [

                {l:'현재고',v:row.stock+row.unit,ro:true},

                {l:'리드타임',k:'lead'}
              ].map((col,ci)=>R('div',{key:ci},
                R('div',{style:{fontSize:10,color:'#94a3b8',marginBottom:1}},col.l),

                  ?R('div',{style:{fontSize:12,fontWeight:600,color:sh&&col.l==='부족수량'?'#dc2626':'#0f172a'}},col.v)
                  :R(EC,{rk:ri+'_'+col.k,initVal:row[col.k]||'',onSave:v=>upd(ri,col.k,v),style:{width:'100%',border:'1px solid #e2e8f0',borderRadius:5,padding:'4px 7px',fontSize:12,background:'#fff'}})
              ))
            )
          );
        })
      ),
      R('div',{className:'mfoot'},
        !img&&R('button',{className:'btn bp',style:{flex:2,padding:10},onClick:()=>setImg(genImg(data.prod,data.qty,rows))},'🖼 이미지 생성'),
        img&&R('a',{href:img,download:'생산지시서.png',style:{flex:2,background:'#D94F1E',color:'#fff',borderRadius:8,padding:'10px',textAlign:'center',fontSize:13,fontWeight:700,textDecoration:'none',display:'flex',alignItems:'center',justifyContent:'center'}},'💾 이미지 저장'),
        R('button',{className:'btn',style:{flex:1,padding:10,background:sent?'#ecfdf5':'#fee500',color:sent?'#059669':'#3c1e1e',fontWeight:700},onClick:()=>setSent(true)},sent?'✓':'💬 카카오'),
        R('button',{className:'btn bs',style:{padding:'10px 12px'},onClick:onClose},'닫기')
      )
    )
  );
}

/* ────── PAGE: 생산계획 ────── */
function PageProd({mats,prods,pqty,setPqty,isAdmin,onConfirmOrder,onOpenImg,onOpenBOM}){
  const[confirmData,setConfirmData]=useState(null);
  const[showAllFor,setShowAllFor]=useState({}); /* {prodId: true} - 충분한 원재료도 모두 보기 */
  const[showAllCombined,setShowAllCombined]=useState(false);
  /* ── 제품 폴더 (생산계획 정리용) ── */
  const[prodFolders,setProdFolders]=useState(()=>{try{return JSON.parse(localStorage.getItem('bnf_prod_folders')||'null')||[{id:'_root',name:'기본',color:'#D94F1E',order:0}];}catch(e){return[{id:'_root',name:'기본',color:'#D94F1E',order:0}];}});
  const[prodItemFolder,setProdItemFolder]=useState(()=>{try{return JSON.parse(localStorage.getItem('bnf_prod_item_folder')||'{}');}catch(e){return{};}});
  const[collapsedPF,setCollapsedPF]=useState({});
  const[dragPF,setDragPF]=useState(null);
  const FOLDER_COLORS=['#D94F1E','#3B82F6','#22C55E','#A855F7','#EC4899','#06B6D4','#F59E0B','#64748B'];

  const saveProdFolders=(next)=>{
    setProdFolders(next);
    localStorage.setItem('bnf_prod_folders',JSON.stringify(next));
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle().then(({data})=>{
      const existing=data&&data.state_data?data.state_data:{};
      sbClient.from('app_state').upsert({id:1,state_data:{...existing,prod_folders:next},updated_at:new Date().toISOString()});
    });
  };
  const saveProdItemFolder=(next)=>{
    setProdItemFolder(next);
    localStorage.setItem('bnf_prod_item_folder',JSON.stringify(next));
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle().then(({data})=>{
      const existing=data&&data.state_data?data.state_data:{};
      sbClient.from('app_state').upsert({id:1,state_data:{...existing,prod_item_folder:next},updated_at:new Date().toISOString()});
    });
  };
  /* Supabase 동기화 */
  useEffect(()=>{
    sbClient.from('app_state').select('state_data').eq('id',1).maybeSingle().then(({data})=>{
      const sd=data&&data.state_data?data.state_data:{};
      const localReal=prodFolders.filter(f=>f.id!=='_root').length>0;
      if(Array.isArray(sd.prod_folders)&&sd.prod_folders.filter(f=>f.id!=='_root').length>0){
        const rs=JSON.stringify(sd.prod_folders);
        if(JSON.stringify(prodFolders)!==rs){setProdFolders(sd.prod_folders);localStorage.setItem('bnf_prod_folders',rs);}
      }else if(localReal){
        sbClient.from('app_state').upsert({id:1,state_data:{...sd,prod_folders:prodFolders},updated_at:new Date().toISOString()});
      }
      if(sd.prod_item_folder&&typeof sd.prod_item_folder==='object'){
        const rs=JSON.stringify(sd.prod_item_folder);
        if(JSON.stringify(prodItemFolder)!==rs){setProdItemFolder(sd.prod_item_folder);localStorage.setItem('bnf_prod_item_folder',rs);}
      }
    }).catch(()=>{});
  },[]);
  const addProdFolder=()=>{
    const name=prompt('새 폴더 이름:','폴더 '+(prodFolders.length));
    if(!name)return;
    const used=new Set(prodFolders.map(f=>f.color));
    const color=FOLDER_COLORS.find(c=>!used.has(c))||FOLDER_COLORS[prodFolders.length%FOLDER_COLORS.length];
    saveProdFolders([...prodFolders,{id:'pf_'+Date.now(),name,color,order:prodFolders.length}]);
  };
  const renameProdFolder=(fid)=>{
    const f=prodFolders.find(x=>x.id===fid);if(!f)return;
    const name=prompt('폴더 이름 변경:',f.name);if(!name)return;
    saveProdFolders(prodFolders.map(x=>x.id===fid?{...x,name}:x));
  };
  const cycleProdFolderColor=(fid)=>{
    const f=prodFolders.find(x=>x.id===fid);if(!f)return;
    const idx=FOLDER_COLORS.indexOf(f.color);
    const next=FOLDER_COLORS[(idx+1)%FOLDER_COLORS.length];
    saveProdFolders(prodFolders.map(x=>x.id===fid?{...x,color:next}:x));
  };
  const delProdFolder=(fid)=>{
    if(fid==='_root'){alert('기본 폴더는 삭제할 수 없습니다');return;}
    if(!confirm('이 폴더를 삭제할까요? 안의 제품은 기본 폴더로 이동합니다.'))return;
    const nm={...prodItemFolder};
    Object.keys(nm).forEach(pid=>{if(nm[pid]===fid)delete nm[pid];});
    saveProdItemFolder(nm);
    saveProdFolders(prodFolders.filter(f=>f.id!==fid));
  };
  const moveProdToFolder=(pid,fid)=>{
    const nm={...prodItemFolder};
    if(fid==='_root')delete nm[pid];else nm[pid]=fid;
    saveProdItemFolder(nm);
  };
  const getProdFolder=(pid)=>{
    const fid=prodItemFolder[pid];
    if(fid&&prodFolders.some(f=>f.id===fid))return fid;
    return '_root';
  };

  /* ── 여러 제품 동시 생산 시 원재료 통합 합산 ── */
  const combined=useMemo(()=>{
    /* 수량이 입력된 제품들 */
    const activeProds=prods.filter(p=>(parseFloat(pqty[p.id])||0)>0);
    if(activeProds.length<2)return null; /* 2개 이상일 때만 합산 의미 있음 */
    const agg={}; /* matCode → {mat, name, unit, needed, prodCount} */
    activeProds.forEach(p=>{
      const qty=parseFloat(pqty[p.id])||0;
      (p.bom||[]).forEach(b=>{
        const mat=mats.find(m=>m.c===b.c);
        const needed=b.amt*qty;
        if(!agg[b.c]){
          agg[b.c]={mat,code:b.c,name:b.name||(mat?mat.n:b.c),unit:b.unit||(mat?mat.u:''),needed:0,stock:mat?mat.s:0,prods:[]};
        }
        agg[b.c].needed+=needed;
        agg[b.c].prods.push({name:p.name,qty,amt:b.amt});
      });
    });
    const rows=Object.values(agg).map(r=>({...r,short:Math.max(0,r.needed-r.stock)}));
    /* 부족 우선 → 부족량 큰 순 → 이름순 */
    rows.sort((a,b)=>(b.short>0?1:0)-(a.short>0?1:0)||b.short-a.short||a.name.localeCompare(b.name,'ko'));
    return{rows,prodCount:activeProds.length,prodNames:activeProds.map(p=>p.name),shortCount:rows.filter(r=>r.short>0).length};
  },[prods,pqty,mats]);

  /* 폴더별 제품 그룹핑 */
  const prodsByFolder=useMemo(()=>{
    const g={};
    prodFolders.forEach(f=>{g[f.id]=[];});
    prods.forEach(p=>{
      const fid=getProdFolder(p.id);
      if(!g[fid])g[fid]=[];
      g[fid].push(p);
    });
    return g;
  },[prods,prodFolders,prodItemFolder]);

  return R('div',{className:'pg fa'},
    !prods.length&&R('div',{className:'card',style:{textAlign:'center',padding:'28px',border:'2px dashed #e2e8f0',color:'#94a3b8',marginBottom:14}},
      '제품/BOM을 먼저 등록하세요',
      isAdmin&&R('div',{style:{marginTop:8}},R('button',{className:'btn bp',onClick:onOpenBOM},'등록하러 가기'))
    ),
    /* ── 통합 소요량 (2개 이상 제품에 수량 입력 시) ── */
    combined&&R('div',{className:'card',style:{marginBottom:14,padding:0,border:'2px solid var(--p)',borderRadius:12,overflow:'hidden'}},
      R('div',{style:{padding:'10px 14px',background:'linear-gradient(135deg,var(--p),var(--pd))',color:'#fff'}},
        R('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:6}},
          R('div',{style:{fontSize:14,fontWeight:800}},'📊 통합 소요량 ('+combined.prodCount+'개 제품 동시 생산)'),
          combined.shortCount>0
            ?R('span',{style:{fontSize:11,background:'rgba(255,255,255,0.25)',padding:'3px 10px',borderRadius:12,fontWeight:700}},'⚠ 부족 '+combined.shortCount+'종')
            :R('span',{style:{fontSize:11,background:'rgba(255,255,255,0.25)',padding:'3px 10px',borderRadius:12,fontWeight:700}},'✓ 전체 충분')
        ),
        R('div',{style:{fontSize:10,opacity:0.85,marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},combined.prodNames.join(' + '))
      ),
      R('div',{style:{padding:'6px 14px 4px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
        R('div',{style:{fontSize:11,fontWeight:700,color:'#64748b'}},'같은 원재료를 합산한 실제 필요량'),
        R('button',{onClick:()=>setShowAllCombined(v=>!v),style:{background:'none',border:'none',cursor:'pointer',fontSize:10,color:'var(--p)',fontWeight:700,fontFamily:'inherit'}},showAllCombined?'▲ 부족만':'▼ 전체 보기('+combined.rows.length+'종)')
      ),
      R('table',{style:{width:'100%',fontSize:11,borderCollapse:'collapse'}},
        R('thead',null,R('tr',{style:{background:'#FAFAFA'}},
          R('th',{style:{padding:'5px 12px',textAlign:'left',color:'#94a3b8',fontWeight:600,fontSize:10,borderBottom:'1px solid #F1F5F9'}},'원재료'),
          R('th',{style:{padding:'5px 8px',textAlign:'right',color:'#94a3b8',fontWeight:600,fontSize:10,borderBottom:'1px solid #F1F5F9',width:80}},'총 필요'),
          R('th',{style:{padding:'5px 8px',textAlign:'right',color:'#94a3b8',fontWeight:600,fontSize:10,borderBottom:'1px solid #F1F5F9',width:70}},'재고'),
          R('th',{style:{padding:'5px 12px',textAlign:'right',color:'#94a3b8',fontWeight:600,fontSize:10,borderBottom:'1px solid #F1F5F9',width:90}},'부족')
        )),
        R('tbody',null,
          ...combined.rows.filter(r=>showAllCombined||r.short>0).map(r=>R('tr',{key:r.code,style:{background:r.short>0?'#FFF7F4':'#fff'}},
            R('td',{style:{padding:'6px 12px',borderTop:'1px solid #F1F5F9',fontWeight:r.short>0?700:500,color:r.short>0?'#991B1B':'#374151',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:220}},
              r.name,
              r.prods.length>1&&R('span',{style:{fontSize:9,color:'#94a3b8',fontWeight:500,marginLeft:5}},'('+r.prods.length+'개 제품 공용)')
            ),
            R('td',{style:{padding:'6px 8px',borderTop:'1px solid #F1F5F9',textAlign:'right',fontWeight:700,color:'#374151'}},r.needed.toFixed(2),' ',r.unit),
            R('td',{style:{padding:'6px 8px',borderTop:'1px solid #F1F5F9',textAlign:'right',color:'#64748B'}},(+r.stock).toFixed(2),' ',r.unit),
            r.short>0
              ?R('td',{style:{padding:'6px 12px',borderTop:'1px solid #F1F5F9',textAlign:'right',fontWeight:800,color:'#DC2626'}},'-',r.short.toFixed(2),' ',r.unit)
              :R('td',{style:{padding:'6px 12px',borderTop:'1px solid #F1F5F9',textAlign:'right',color:'#059669',fontWeight:600,fontSize:10}},'✓ 충분')
          )),
          combined.shortCount===0&&!showAllCombined&&R('tr',null,R('td',{colSpan:4,style:{padding:'12px',textAlign:'center',color:'#059669',fontSize:12,fontWeight:600}},'✓ 동시 생산해도 모든 원재료가 충분합니다'))
        )
      )
    ),
    /* ── 폴더 바 ── */
    prods.length>0&&R('div',{style:{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',marginBottom:10,padding:'8px 4px'}},
      R('span',{style:{fontSize:11,color:'#94a3b8',fontWeight:600}},'📁 폴더'),
      R('span',{style:{fontSize:10,color:'#cbd5e1'}},'· 제품 우측 드롭다운으로 폴더 이동'),
      R('div',{style:{flex:1}}),
      R('button',{onClick:addProdFolder,style:{padding:'4px 12px',border:'1px dashed var(--p)',background:'#FFF8F4',color:'var(--p)',borderRadius:14,cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'inherit'}},'+ 새 폴더')
    ),
    /* ── 폴더별 제품 그룹 ── */
    ...prodFolders.map(folder=>{
      const folderProds=prodsByFolder[folder.id]||[];
      if(folder.id==='_root'&&folderProds.length===0&&prodFolders.length>1)return null;
      const isCollapsed=collapsedPF[folder.id];
      return R('div',{key:folder.id,style:{marginBottom:12}},
        /* 폴더 헤더 */
        R('div',{style:{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',background:folder.color+'12',borderLeft:'4px solid '+folder.color,borderRadius:8,marginBottom:8}},
          R('button',{onClick:()=>setCollapsedPF(p=>({...p,[folder.id]:!p[folder.id]})),style:{background:'none',border:'none',cursor:'pointer',fontSize:11,color:folder.color,fontWeight:700,padding:0}},isCollapsed?'▶':'▼'),
          R('span',{onClick:()=>renameProdFolder(folder.id),style:{fontWeight:700,fontSize:13,color:folder.color,cursor:'pointer'},title:'클릭하여 이름 변경'},folder.name),
          R('span',{style:{fontSize:11,color:'#94a3b8'}},'('+folderProds.length+')'),
          R('div',{style:{flex:1}}),
          R('button',{onClick:()=>cycleProdFolderColor(folder.id),title:'색 변경',style:{width:18,height:18,borderRadius:'50%',background:folder.color,border:'none',cursor:'pointer'}}),
          folder.id!=='_root'&&R('button',{onClick:()=>delProdFolder(folder.id),title:'폴더 삭제',style:{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'#fca5a5',padding:'0 4px'}},'✕')
        ),
        !isCollapsed&&folderProds.length===0&&R('div',{style:{padding:'12px',textAlign:'center',color:'#cbd5e1',fontSize:11,border:'1px dashed #e2e8f0',borderRadius:8,marginBottom:8}},'제품을 이 폴더로 옮기려면 제품 우측의 폴더 드롭다운에서 "'+folder.name+'" 선택'),
        !isCollapsed&&folderProds.map(p=>{
      const qty=parseFloat(pqty[p.id])||0;
      const needs=(p.bom||[]).map(b=>{
        const mat=mats.find(m=>m.c===b.c);
        const needed=b.amt*(qty||1);
        return{mat,b,needed,short:Math.max(0,needed-(mat?mat.s:0))};
      });
      const shortItems=needs.filter(n=>n.mat&&n.short>0);
      const okItems=needs.filter(n=>n.mat&&n.short<=0);
      const hasShort=qty>0&&shortItems.length>0;
      const rows=needs.map(({mat,b,needed,short})=>({
        name:b.name||(mat?mat.n:''),unit:b.unit||(mat?mat.u:''),
        needed,stock:mat?mat.s:0,short,
        supplier:mat?(mat.supplier||''):(b.supplier||''),
        contact:mat?(mat.contact||''):(b.contact||''),
        lead:mat?(mat.lead||3):(b.lead||3)
      }));
      const showAll=!!showAllFor[p.id];
      return R('div',{key:p.id,className:'card',style:{marginBottom:10,padding:12,border:hasShort?'1px solid #fecaca':'1px solid #e2e8f0'}},
        /* 헤더 */
        R('div',{style:{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}},
          R('div',{style:{flex:1,minWidth:160}},
            R('div',{style:{fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis'}},p.name),
            R('div',{style:{fontSize:11,color:'#64748b',display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',marginTop:1}},
              R('span',null,p.cat),
              R('span',null,'· BOM ',p.bom.length,'종'),
              hasShort&&R('span',{style:{background:'#FEE2E2',color:'#B91C1C',padding:'1px 7px',borderRadius:10,fontWeight:700,fontSize:10}},'⚠ 부족 '+shortItems.length+'건')
            )
          ),
          R('div',{style:{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}},
            R('input',{type:'number',min:'0',value:pqty[p.id]??'',onChange:e=>setPqty(pv=>({...pv,[p.id]:e.target.value})),placeholder:'수량',style:{width:78,padding:'7px 9px',border:'1.5px solid '+(qty>0?'#D94F1E':'#e2e8f0'),borderRadius:8,fontSize:13,textAlign:'center'}}),
            R('span',{style:{fontSize:11,color:'#64748b'}},'개'),
            R('button',{className:'btn',style:{background:'#475569',color:'#fff',padding:'7px 10px',fontSize:11},disabled:!qty,onClick:()=>qty&&setConfirmData({prod:p,qty,rows})},'📝 지시'),
            R('button',{className:'btn bp',style:{fontSize:11,padding:'7px 10px'},disabled:!qty,onClick:()=>qty&&onOpenImg({prod:p,qty,rows})},'📋 이미지'),
            qty>0&&R('button',{onClick:()=>setPqty(pv=>({...pv,[p.id]:''})),title:'초기화',style:{padding:'6px 8px',background:'#fef2f2',color:'#dc2626',border:'1px solid #fecaca',borderRadius:8,fontSize:11,cursor:'pointer'}},'✕'),
            R('select',{value:getProdFolder(p.id),onChange:e=>moveProdToFolder(p.id,e.target.value),title:'폴더 이동',style:{padding:'6px 6px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:10,background:'#fff',cursor:'pointer',maxWidth:90}},
              ...prodFolders.map(f=>R('option',{key:f.id,value:f.id},f.name))
            )
          )
        ),
        /* 원재료 컴팩트 테이블 */
        qty>0&&R('div',{style:{marginTop:10,background:'#FAFAFA',borderRadius:8,border:'1px solid #F1F5F9',overflow:'hidden'}},
          R('div',{style:{padding:'5px 10px',background:'#fff',borderBottom:'1px solid #F1F5F9',display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:10,fontWeight:700,color:'#64748b'}},
            R('div',null,hasShort?'⚠ 부족 원재료 '+shortItems.length+'건':'✓ 원재료 모두 충분 ('+okItems.length+'건)'),
            (shortItems.length>0||okItems.length>0)&&R('button',{onClick:()=>setShowAllFor(prev=>({...prev,[p.id]:!showAll})),style:{background:'none',border:'none',cursor:'pointer',fontSize:10,color:'var(--p)',fontWeight:700,fontFamily:'inherit'}},showAll?'▲ 부족만':'▼ 전체 보기('+needs.filter(n=>n.mat).length+')')
          ),
          R('table',{style:{width:'100%',fontSize:11,borderCollapse:'collapse'}},
            R('thead',null,R('tr',{style:{background:'#FAFAFA'}},
              R('th',{style:{padding:'4px 8px',textAlign:'left',color:'#94a3b8',fontWeight:600,fontSize:10,borderBottom:'1px solid #F1F5F9'}},'품목'),
              R('th',{style:{padding:'4px 8px',textAlign:'right',color:'#94a3b8',fontWeight:600,fontSize:10,borderBottom:'1px solid #F1F5F9',width:70}},'필요'),
              R('th',{style:{padding:'4px 8px',textAlign:'right',color:'#94a3b8',fontWeight:600,fontSize:10,borderBottom:'1px solid #F1F5F9',width:70}},'재고'),
              R('th',{style:{padding:'4px 8px',textAlign:'right',color:'#94a3b8',fontWeight:600,fontSize:10,borderBottom:'1px solid #F1F5F9',width:80}},'부족')
            )),
            R('tbody',null,
              /* 부족 항목 항상 표시 (빨강) */
              ...shortItems.map(({mat,b,needed,short})=>R('tr',{key:b.c,style:{background:'#FEF8F7'}},
                R('td',{style:{padding:'5px 8px',borderTop:'1px solid #FEE2E2',fontWeight:600,color:'#991B1B',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}},b.name||mat.n),
                R('td',{style:{padding:'5px 8px',borderTop:'1px solid #FEE2E2',textAlign:'right',color:'#64748B'}},needed.toFixed(2),' ',b.unit),
                R('td',{style:{padding:'5px 8px',borderTop:'1px solid #FEE2E2',textAlign:'right',color:'#64748B'}},mat.s,' ',b.unit),
                R('td',{style:{padding:'5px 8px',borderTop:'1px solid #FEE2E2',textAlign:'right',fontWeight:800,color:'#DC2626'}},'-',short.toFixed(2),' ',b.unit)
              )),
              /* 충분한 항목은 토글 시에만 (약한 회색) */
              showAll?okItems.map(({mat,b,needed,short})=>R('tr',{key:b.c},
                R('td',{style:{padding:'4px 8px',borderTop:'1px solid #F1F5F9',color:'#94a3b8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}},b.name||mat.n),
                R('td',{style:{padding:'4px 8px',borderTop:'1px solid #F1F5F9',textAlign:'right',color:'#cbd5e1'}},needed.toFixed(2),' ',b.unit),
                R('td',{style:{padding:'4px 8px',borderTop:'1px solid #F1F5F9',textAlign:'right',color:'#cbd5e1'}},mat.s,' ',b.unit),

/* ═══ 파일 공유 ═══════════════════════════════════ */
function PageFiles({user}){
  const[files,setFiles]=useState([]);
  const[currentFolder,setCurrentFolder]=useState('/');
  const[loading,setLoading]=useState(true);
  const[uploading,setUploading]=useState(false);
  const[search,setSearch]=useState('');
  const fileRef=useRef();
  
  useEffect(()=>{load();},[]);
  const load=async()=>{setLoading(true);try{const{data}=await sbClient.from('shared_files').select('*').order('created_at',{ascending:false});setFiles(data||[]);}catch(e){}setLoading(false);};
  
  const upload=async(file)=>{
    if(!file)return;
    if(file.size>50*1024*1024){alert('파일 크기는 50MB 이하만 가능합니다');return;}
    setUploading(true);
    try{
      const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      const path=Date.now()+'_'+Math.random().toString(36).slice(2,7)+'_'+safeName;
      const{error:upErr}=await sbClient.storage.from('bnf-files').upload(path,file);
      if(upErr)throw upErr;
      await sbClient.from('shared_files').insert({name:file.name,storage_path:path,size_bytes:file.size,mime_type:file.type||'',folder:currentFolder,uploader_id:user.id,uploader_name:user.name});
      load();
    }catch(e){alert('업로드 실패: '+e.message+'\n\n⚠️ Supabase Storage에서 "bnf-files" 버킷을 먼저 만들어주세요!');}
    setUploading(false);
  };
  
  const download=(f)=>{
    try{
      const{data}=sbClient.storage.from('bnf-files').getPublicUrl(f.storage_path);
      if(data&&data.publicUrl){
        const link=document.createElement('a');link.href=data.publicUrl;link.download=f.name;link.target='_blank';
        document.body.appendChild(link);link.click();document.body.removeChild(link);
        sbClient.from('shared_files').update({download_count:(f.download_count||0)+1}).eq('id',f.id).then(load);
      }
    }catch(e){alert('다운로드 실패: '+e.message);}
  };
  
  const del=async(f)=>{
    if(!confirm('"'+f.name+'" 삭제?'))return;
    try{
      await sbClient.storage.from('bnf-files').remove([f.storage_path]);
      await sbClient.from('shared_files').delete().eq('id',f.id);
      load();
    }catch(e){alert('삭제 실패: '+e.message);}
  };
  
  const visibleFiles=files.filter(f=>{if(f.folder!==currentFolder)return false;if(search&&!f.name.toLowerCase().includes(search.toLowerCase()))return false;return true;});
  const fSize=b=>{if(!b)return'-';const k=b/1024;if(k<1024)return k.toFixed(1)+' KB';const m=k/1024;if(m<1024)return m.toFixed(1)+' MB';return(m/1024).toFixed(2)+' GB';};
  const fIcon=(f)=>{const ext=(f.name.split('.').pop()||'').toLowerCase();if(['jpg','jpeg','png','gif','webp'].includes(ext))return'🖼️';if(['xlsx','xls','csv'].includes(ext))return'📊';if(['pptx','ppt'].includes(ext))return'📽️';if(['doc','docx','hwp'].includes(ext))return'📝';if(ext==='pdf')return'📕';if(['zip','rar'].includes(ext))return'🗜️';return'📄';};
  const totalSize=files.reduce((s,f)=>s+(+f.size_bytes||0),0);
  
  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},
      R('div',null,R('div',{className:'pg-title'},'📁 파일 공유'),R('div',{style:{fontSize:12,color:'var(--tm)',marginTop:2}},files.length+'개 · '+fSize(totalSize)+' 사용 중')),
      R('button',{className:'btn bp',onClick:()=>fileRef.current&&fileRef.current.click(),disabled:uploading},uploading?'⏳ 업로드 중...':'⬆️ 파일 업로드'),
      R('input',{ref:fileRef,type:'file',style:{display:'none'},onChange:e=>{if(e.target.files[0]){upload(e.target.files[0]);e.target.value='';}}})
    ),
    R('div',{style:{display:'flex',gap:8,marginBottom:14}},R('input',{className:'inp',value:search,onChange:e=>setSearch(e.target.value),placeholder:'🔍 파일 검색',style:{maxWidth:300}})),
    R('div',{className:'card',style:{padding:0,overflow:'hidden'},onDragOver:e=>{e.preventDefault();e.currentTarget.style.background='#FFF8F4';},onDragLeave:e=>{e.currentTarget.style.background='#fff';},onDrop:e=>{e.preventDefault();e.currentTarget.style.background='#fff';const f=e.dataTransfer.files[0];if(f)upload(f);}},
      loading?R('div',{style:{padding:30,textAlign:'center',color:'var(--tm)'}},'로딩 중...'):
