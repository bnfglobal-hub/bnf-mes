function PageInv({mats,cats,isAdmin,rk,onUpd,onAdd,onDel,parseXL,fRef,prods,onSetProds}){
  const[monthlySales,setMonthlySales]=useState({});
  const[autoSupplier,setAutoSupplier]=useState({});  /* 코드별 매입처 (purchases에서) */
  const[autoPrice,setAutoPrice]=useState({});         /* 코드별 매입단가 (purchases에서) */
  const[autoMU,setAutoMU]=useState({});               /* 코드별 월사용량 (sales에서) */
  const[invTab,setInvTab]=useState('list');
  const[search,setSearch]=useState('');
  const[catF,setCatF]=useState('전체');
  const[sortBy,setSortBy]=useState('cat');
  /* 즐겨찾기는 코드(c) 기준으로 저장 (mat.id가 ERP 업로드 시 바뀌어도 보존됨) */
  const[favoriteCodes,setFavoriteCodes]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('bnf_fav_mat_codes')||'[]');}catch(e){return [];}
  });
  /* favorites: 현재 mats 기준 id 배열 (코드를 id로 동적 변환) */
  const favorites=useMemo(()=>favoriteCodes.map(c=>{const m=mats.find(x=>x.c===c);return m?m.id:null;}).filter(Boolean),[favoriteCodes,mats]);
  
  /* 반제품 매핑도 코드 기반으로 저장 (완제품 코드 → 반제품 코드 배열) */
  const[semiItemsMapByCode,setSemiItemsMapByCode]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('bnf_semi_items_map_code')||'{}');}catch(e){return {};}
  });
  /* semiItemsMap: id 기반 view (UI 호환용) */
  const semiItemsMap=useMemo(()=>{
    const result={};
    Object.keys(semiItemsMapByCode).forEach(prodCode=>{
      const prodMat=mats.find(m=>m.c===prodCode);
      if(!prodMat)return;
      const items=semiItemsMapByCode[prodCode]||[];
      result[prodMat.id]=items.map(si=>{
        const semiMat=mats.find(m=>m.c===si.c);
        return{id:semiMat?semiMat.id:'__missing__'+si.c,n:si.n,u:si.u};
      });
    });
    return result;
  },[semiItemsMapByCode,mats]);
  
  /* 옛 데이터(id 기반)에서 코드 기반으로 일회성 자동 마이그레이션 - mats 로드 후 실행 */
  useEffect(()=>{
    if(!mats||mats.length===0)return;
    /* 즐겨찾기 마이그레이션 */
    try{
      const hasNew=localStorage.getItem('bnf_fav_mat_codes');
      const oldIds=JSON.parse(localStorage.getItem('bnf_fav_mats')||'[]');
      if(!hasNew&&oldIds.length>0){
        const codes=oldIds.map(id=>{const m=mats.find(x=>x.id===id);return m?m.c:null;}).filter(Boolean);
        if(codes.length>0){
          localStorage.setItem('bnf_fav_mat_codes',JSON.stringify(codes));
          setFavoriteCodes(codes);
        }
      }
    }catch(e){}
    /* 반제품 매핑 마이그레이션 */
    try{
      const hasNew=localStorage.getItem('bnf_semi_items_map_code');
      const oldMap=JSON.parse(localStorage.getItem('bnf_semi_items_map')||'{}');
      if(!hasNew&&Object.keys(oldMap).length>0){
        const newMap={};
        Object.keys(oldMap).forEach(prodId=>{
          const prodMat=mats.find(m=>m.id===prodId);
          if(!prodMat)return;
          const items=oldMap[prodId]||[];
          newMap[prodMat.c]=items.map(si=>{
            const semiMat=mats.find(m=>m.id===si.id);
            return{c:semiMat?semiMat.c:'',n:si.n,u:si.u};
          }).filter(x=>x.c);
        });
        if(Object.keys(newMap).length>0){
          localStorage.setItem('bnf_semi_items_map_code',JSON.stringify(newMap));
          setSemiItemsMapByCode(newMap);
        }
      }
    }catch(e){}
  },[mats]);
  
  const[selectedFav,setSelectedFav]=useState(null);
  const[semiSearch,setSemiSearch]=useState('');
  const[showSemiSearch,setShowSemiSearch]=useState(false);
  /* ERP 동기화 - 이카운트 OPEN API */
  const[erpSyncing,setErpSyncing]=useState(false);
  const[erpModalOpen,setErpModalOpen]=useState(false);
  const[erpStatus,setErpStatus]=useState('');
  const[erpCreds,setErpCreds]=useState(()=>{

  const[erpForm,setErpForm]=useState({com_code:'',user_id:'',api_cert_key:'',zone:'CA'});
  const shortCnt=useMemo(()=>mats.filter(m=>m.mu>0&&m.s<m.mu).length,[mats]);
  
  /* ── 매출/매입 DB로부터 자동 데이터 로드 ── */
  useEffect(()=>{
    (async()=>{
      try{
        /* 매출 데이터: 최근 30일 합산 → 월사용량 */
        const since30=new Date(Date.now()-30*86400000).toISOString().slice(0,10);
        const{data:salesRows}=await sbClient.from('sales').select('product_code,product_name,quantity').gte('sale_date',since30);
        const muMap={};
        (salesRows||[]).forEach(r=>{
          const key=(r.product_code||r.product_name||'').trim();
          if(!key)return;
          muMap[key]=(muMap[key]||0)+(parseFloat(r.quantity)||0);
        });
        setAutoMU(muMap);
        
        /* 매입 데이터: 최근 90일 → 매입처 + 평균 매입단가 */
        const since90=new Date(Date.now()-90*86400000).toISOString().slice(0,10);
        const{data:purchaseRows}=await sbClient.from('purchases').select('item_code,item_name,supplier_name,unit_price,quantity,amount,purchase_date').gte('purchase_date',since90).order('purchase_date',{ascending:false});
        const supMap={};
        const priceMap={};
        const tempPrice={};/* 코드별 가격 배열 */
        (purchaseRows||[]).forEach(r=>{
          const key=(r.item_code||r.item_name||'').trim();
          if(!key)return;
          /* 매입처 - 가장 최근 것 우선 (이미 desc 정렬) */
          if(r.supplier_name&&!supMap[key])supMap[key]=r.supplier_name;
          /* 매입단가 - 평균 계산 (amount/quantity 우선, 없으면 unit_price) */
          let p=parseFloat(r.unit_price)||0;
          if(!p&&r.amount&&r.quantity){p=parseFloat(r.amount)/parseFloat(r.quantity);}
          if(p>0){
            if(!tempPrice[key])tempPrice[key]=[];
            tempPrice[key].push(p);
          }
        });
        Object.keys(tempPrice).forEach(k=>{
          const arr=tempPrice[k];
          priceMap[k]=Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
        });
        setAutoSupplier(supMap);
        setAutoPrice(priceMap);
      }catch(e){console.warn('자동 데이터 로드 실패:',e);}
    })();

  /* ── DB 상태 ── */
  const[loading,setLoading]=useState(true);

  const catCounts=useMemo(()=>{const m={};cats.forEach(c=>{m[c]=mats.filter(x=>x.g===c).length;});return m;},[mats,cats]);

    let b=[...mats];

    else if(catF!=='전체')b=b.filter(m=>m.g===catF);

    else if(sortBy==='name_desc')b.sort((a,x)=>x.n.localeCompare(a.n,'ko'));
    else if(sortBy==='stock_desc')b.sort((a,x)=>x.s-a.s);
    else if(sortBy==='stock_asc')b.sort((a,x)=>a.s-x.s);

  /* 즐겨찾기/반제품 함수 & 데이터 (ERP 탭, 일반 탭 둘 다에서 사용) */

  const toggleFav=(id)=>{

  const addSemi=(mat)=>{
    if(!selectedFav){alert('먼저 좌측에서 완제품을 선택하세요');return;}

      const next={...prev,[prodCode]:[...cur,{c:mat.c,n:mat.n,u:mat.u}]};
      localStorage.setItem('bnf_semi_items_map_code',JSON.stringify(next));
      return next;
    });
  };
  const removeSemi=(id)=>{
    if(!selectedFav)return;

    const semiMat=mats.find(m=>m.id===id);
    const semiCode=semiMat?semiMat.c:null;
    /* 만약 mat이 이미 삭제된 경우 id에서 __missing__ 접두어로 추적 */
    let codeToRemove=semiCode;
    if(!codeToRemove&&typeof id==='string'&&id.startsWith('__missing__')){
      codeToRemove=id.replace('__missing__','');
    }
    if(!codeToRemove)return;
    setSemiItemsMapByCode(prev=>{
      const cur=prev[prodCode]||[];
      const next={...prev,[prodCode]:cur.filter(x=>x.c!==codeToRemove)};

  const semiSearchResults=useMemo(()=>{

  },[semiSearch,selectedFav,semiItemsMap,mats]);
  /* 등록된 재료를 분류별로 그룹핑 (반제품/원재료/포장지/부재료 등 자동 묶음) */
  const semiMatsGrouped=useMemo(()=>{
    const order=['반제품','원재료','부재료','포장지','제품','공정품'];
    const groups={};
    semiMatsData.forEach(m=>{
      const key=m.g||'기타';
      if(!groups[key])groups[key]=[];
      groups[key].push(m);
    });
    /* 우선순위 순서 → 그 외는 가나다순 뒤에 */
    const keys=Object.keys(groups);
    keys.sort((a,b)=>{
      const ia=order.indexOf(a),ib=order.indexOf(b);
      if(ia>=0&&ib>=0)return ia-ib;
      if(ia>=0)return -1;
      if(ib>=0)return 1;
      return a.localeCompare(b,'ko');
    });
    return keys.map(g=>({g,items:groups[g]}));
  },[semiMatsData]);

  /* ═══ 이카운트 ERP 동기화 함수 ═══ */

  const syncFromERP=async()=>{
    if(!erpCreds.com_code||!erpCreds.api_cert_key){
      alert('먼저 ERP 연동 설정을 해주세요.\n\n[⚙ ERP 설정] 버튼을 눌러 이카운트 인증 정보를 입력하세요.');
      openErpSettings();
      return;
    }
    setErpSyncing(true);
    setErpStatus('Edge Function 통해 이카운트 호출 중...');
    try{
      /* Supabase Edge Function 'ecount-sync'로 프록시 호출 (CORS 우회) */
      const SB_BASE=(typeof SB_URL!=='undefined'?SB_URL:'').replace(/\/$/,'');
      const EDGE_URL=SB_BASE+'/functions/v1/ecount-sync';
      const resp=await fetch(EDGE_URL,{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'apikey':SB_KEY||'',
          'Authorization':'Bearer '+(SB_KEY||'')
        },
        body:JSON.stringify({
          com_code:erpCreds.com_code,
          user_id:erpCreds.user_id,
          api_cert_key:erpCreds.api_cert_key,
          zone:erpCreds.zone||'CA'
        })
      });
      if(!resp.ok){
        const errTxt=await resp.text();
        if(resp.status===404){
          throw new Error('NO_EDGE_FUNCTION');
        }
        throw new Error('Edge Function 오류 ('+resp.status+'): '+errTxt.slice(0,200));
      }
      const result=await resp.json();
      
      /* 데이터 있으면 정상 동기화 */
      if(result&&result.items&&result.items.length>0){
        const items=result.items;
        setErpStatus('재고 정보 업데이트 중... ('+items.length+'개)');
        let matched=0,unmatched=0;
        const unmatchedList=[];
        items.forEach(it=>{
          const code=(it.PROD_CD||it.ITEM_CD||it.code||'').trim();
          const stock=parseFloat(it.BAL_QTY||it.STOCK||it.qty||0)||0;
          if(!code){unmatched++;return;}
          const mat=mats.find(m=>m.c===code);
          if(mat){
            onUpd&&onUpd(mat.id,{...mat,s:stock});
            matched++;
          }else{
            unmatched++;
            if(unmatchedList.length<5)unmatchedList.push(code);
          }
        });
        setErpStatus('');
        let msg='✅ 동기화 완료\n\n매칭: '+matched+'개\n미매칭: '+unmatched+'개';
        if(unmatchedList.length>0){
          msg+='\n\n미매칭 코드 예: '+unmatchedList.join(', ');
        }
        alert(msg);
        return;
      }
      
      /* 검증 모드 (테스트 인증키) 응답 처리 */
      if(result&&result.verification_progress){
        setErpStatus('');
        const v=result.verification_progress;
        let msg='⚠ 실 데이터 동기화 안 됨 (테스트 인증키 사용 중)\n\n';
        msg+='━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        msg+='【API 호출 상태】\n';
        msg+='  로그인: '+(v.login_called?'✓ 호출됨':'✗ 미호출');
        if(v.login_message)msg+=' ('+v.login_message+')';
        msg+='\n  재고조회: '+(v.inventory_called?'✓ 호출됨':'✗ 미호출');
        if(v.inventory_message)msg+=' ('+v.inventory_message+')';
        msg+='\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        msg+='📌 현재 상황\n';
        msg+='테스트 인증키로는 실제 재고 데이터를 받을 수 없습니다.\n';
        msg+='API 호출만 이뤄지고 이카운트 검증 카운트가 쌓이는 중입니다.\n\n';
        msg+='📌 다음 단계\n';
        msg+='1. 이카운트 → API 인증현황 페이지에서 "검증된 메뉴" 확인\n';
        msg+='2. 검증 완료 후 [키발급] 으로 운영 인증키 받기\n';
        msg+='3. 운영 키 받으면 사이트 ERP 설정에서 키 교체\n';
        msg+='4. 그 후 동기화 → 실제 재고 데이터 들어옴\n\n';
        msg+='💡 그 전까지는 엑셀 다운로드 → 업로드 방식 사용';
        alert(msg);
        return;
      }
      
      throw new Error(result.error||'재고 데이터 없음');
    }catch(e){

      if(msg==='NO_EDGE_FUNCTION'){

      }else if(msg.includes('Failed to fetch')||msg.includes('NetworkError')){

  /* ERP 업로드 탭 - 견고한 새 버전 */

    return R('div',{className:'pg fa'},

      /* 숨겨진 파일 input - 항상 렌더링 */

        onChange:handleFileChange
      }),

      /* ═══ 이카운트 ERP 자동 동기화 (최상단 배치) ═══ */

          R('div',null,
            R('div',{style:{fontSize:14,fontWeight:800,color:'#1E40AF',marginBottom:4}},'🔄 ERP 자동 동기화'),
            R('div',{style:{fontSize:11,color:'#3B82F6'}},
              erpCreds.com_code
                ?'연결됨: '+erpCreds.com_code+' / '+erpCreds.user_id+' (Zone: '+erpCreds.zone+')'
                :'이카운트 OPEN API로 재고 자동 동기화 (인증 정보 입력 필요)'

            R('button',{onClick:openErpSettings,disabled:erpSyncing,style:{background:'#fff',color:'#1E40AF',border:'1px solid #93C5FD',borderRadius:8,padding:'8px 14px',cursor:'pointer',fontSize:12,fontWeight:700}},'⚙ ERP 설정'),

                  });
                });
                const toDelete=mats.filter(m=>!usedCodes.has(m.c));
                const willKeep=mats.length-toDelete.length;
                if(toDelete.length===0){

/* ────── BOM Modal ────── */
function BOMModal({mats,cats,editProd,onSave,onClose}){
  const searchRef=useRef(null);
  const ignoreBlur=useRef(false);
  const[pname,setPname]=useState(editProd?editProd.name:'');
  const[pcat,setPcat]=useState(editProd?editProd.cat:(cats[0]||'소스류'));
  const[bom,setBom]=useState(editProd?editProd.bom:[]);
  const[amts,setAmts]=useState(editProd?Object.fromEntries(editProd.bom.map(b=>[b.c,b.amt])):{});
  const[search,setSearch]=useState('');
  const[showD,setShowD]=useState(false);
  const[pSearch,setPSearch]=useState('');
  const[showPD,setShowPD]=useState(false);
  const[editIdx,setEditIdx]=useState(null);
  const fl=useMemo(()=>{
    if(!search)return[];
    const q=search.toLowerCase();
    return mats.filter(m=>m.n.toLowerCase().includes(q)||m.c.includes(search)).slice(0,12);
  },[search,mats]);
  const pfl=useMemo(()=>{
    if(!pSearch)return[];
    const q=pSearch.toLowerCase();
    return mats.filter(m=>m.g==='제품'&&(m.n.toLowerCase().includes(q)||m.c.includes(pSearch))).slice(0,8);
  },[pSearch,mats]);
  const addBom=m=>{
    if(bom.find(b=>b.c===m.c))return;
    setBom(p=>[...p,{c:m.c,name:m.n,unit:m.u,g:m.g,supplier:m.supplier||'',contact:m.contact||'',lead:m.lead||3}]);
    setAmts(p=>({...p,[m.c]:1}));
  };
  const save=()=>{
    if(!pname.trim()){alert('제품명을 입력하세요');return;}
    if(!bom.length){alert('원재료를 1개 이상 추가하세요');return;}
    onSave({id:editProd?editProd.id:uid(),name:pname,cat:pcat,bom:bom.map(b=>({...b,amt:parseFloat(amts[b.c])||0}))});
    onClose();
  };
  return R('div',{className:'mbg'},
    R('div',{className:'mbox',style:{maxWidth:600,margin:'auto',borderRadius:16}},
      R('div',{className:'mhdr'},
        R('span',{style:{fontSize:15,fontWeight:700}},editProd?'BOM 수정':'제품 + BOM 등록'),
        R('button',{onClick:onClose,style:{background:'none',border:'none',cursor:'pointer',fontSize:22,color:'#64748b'}},'×')
      ),
      R('div',{className:'mbody'},
        R('div',{style:{marginBottom:10,position:'relative'}},
          R('label',{style:{fontSize:11,fontWeight:700,color:'#64748b',display:'block',marginBottom:3}},'완제품 재고 검색 (선택)'),
          R('input',{value:pSearch,onChange:e=>{setPSearch(e.target.value);setShowPD(true);},onFocus:()=>setShowPD(true),onBlur:()=>setTimeout(()=>setShowPD(false),200),placeholder:'🔍 제품명 검색 후 클릭하면 자동 입력',style:{width:'100%',padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:13}}),
          showPD&&pfl.length>0&&R('div',{style:{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,boxShadow:'0 4px 16px rgba(0,0,0,.12)',zIndex:60,maxHeight:180,overflowY:'auto',marginTop:3}},
            pfl.map(m=>R('div',{key:m.c,style:{padding:'9px 14px',cursor:'pointer',borderBottom:'1px solid #f8fafc',display:'flex',gap:8,alignItems:'center',fontSize:12},
              onMouseDown:()=>{setPname(m.n);setPSearch(m.n);setShowPD(false);}},
              R(Bdg,{g:m.g,sm:true}),
              R('div',null,
                R('div',{style:{fontWeight:600}},m.n),
                R('div',{style:{fontSize:10,color:'#94a3b8'}},m.c,' · 재고: ',m.s,m.u)
              )
            ))
          )
        ),
        R('div',{style:{display:'flex',gap:8,marginBottom:10}},
          R('div',{style:{flex:2}},
            R('label',{style:{fontSize:11,fontWeight:700,color:'#64748b',display:'block',marginBottom:3}},'제품명 *'),
            R('input',{value:pname,onChange:e=>setPname(e.target.value),style:{width:'100%',padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:13}})
          ),
          R('div',{style:{flex:1}},
            R('label',{style:{fontSize:11,fontWeight:700,color:'#64748b',display:'block',marginBottom:3}},'카테고리'),
            R('select',{value:pcat,onChange:e=>setPcat(e.target.value),style:{width:'100%',padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:8,background:'#fff',fontSize:13}},
              cats.map(c=>R('option',{key:c,value:c},c))
            )
          )
        ),
        R('div',{style:{fontSize:11,fontWeight:700,color:'#64748b',marginBottom:5}},'원재료 검색 (연속 추가 가능)'),
        R('div',{style:{position:'relative',marginBottom:8}},
          R('div',{style:{display:'flex',gap:6}},
            R('input',{value:search,onChange:e=>{setSearch(e.target.value);setShowD(true);},ref:searchRef,onFocus:()=>setShowD(true),onBlur:()=>{if(ignoreBlur.current)return;setTimeout(()=>setShowD(false),150);},placeholder:'🔍 원재료명 검색...',style:{flex:1,padding:'8px 10px',border:'1.5px solid #D94F1E',borderRadius:8,fontSize:13}}),
            search&&R('button',{onMouseDown:()=>{setSearch('');setShowD(false);},style:{padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:8,background:'#f1f5f9',color:'#64748b',cursor:'pointer',fontSize:12,flexShrink:0}},'✕')
          ),
          showD&&fl.length>0&&R('div',{style:{position:'absolute',top:'calc(100% + 3px)',left:0,right:0,background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,boxShadow:'0 4px 20px rgba(0,0,0,.12)',zIndex:50,maxHeight:220,overflowY:'auto'}},
            fl.map(m=>{
              const added=bom.some(b=>b.c===m.c);
              return R('div',{key:m.c,style:{padding:'9px 14px',cursor:added?'default':'pointer',borderBottom:'1px solid #f8fafc',display:'flex',gap:8,alignItems:'center',background:added?'#f0fdf4':'#fff'},
                onMouseDown:()=>{ignoreBlur.current=true;if(!added)addBom(m);setTimeout(()=>{ignoreBlur.current=false;searchRef.current&&searchRef.current.focus();},0);}},
                R(Bdg,{g:m.g,sm:true}),
                R('div',{style:{flex:1,minWidth:0}},
                  R('div',{style:{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},m.n),
                  R('div',{style:{fontSize:10,color:'#94a3b8'}},m.c,' · ',m.s,m.u)
                ),
                R('span',{style:{background:added?'#059669':'#D94F1E',color:'#fff',borderRadius:'50%',width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,flexShrink:0}},added?'✓':'＋')
              );
            })
          )
        ),
        bom.length>0&&R('div',null,
          R('div',{style:{fontSize:11,color:'#64748b',marginBottom:5}},'추가된 원재료 '+bom.length+'종'),
          bom.map((b,bi)=>R('div',{key:b.c,style:{background:'#f8fafc',borderRadius:8,marginBottom:5,border:'1px solid #e2e8f0',overflow:'hidden'}},
            R('div',{style:{display:'flex',alignItems:'center',gap:7,padding:'8px 10px',cursor:'pointer'},onClick:()=>setEditIdx(editIdx===bi?null:bi)},
              R(Bdg,{g:b.g,sm:true}),
              R('input',{value:b.name,onChange:e=>{e.stopPropagation();setBom(p=>p.map((x,i)=>i===bi?{...x,name:e.target.value}:x));},onClick:e=>e.stopPropagation(),style:{flex:1,border:'none',background:'transparent',fontSize:12,fontWeight:500,padding:0,minWidth:0}}),
              R('input',{type:'number',min:'0',step:'0.001',value:amts[b.c]||'',onChange:e=>setAmts(p=>({...p,[b.c]:e.target.value})),onClick:e=>e.stopPropagation(),placeholder:'수량',style:{width:60,border:'1px solid #e2e8f0',borderRadius:6,padding:'3px 5px',fontSize:12,textAlign:'center'}}),
              R('span',{style:{fontSize:11,color:'#94a3b8'}},b.unit),
              R('span',{style:{fontSize:10,color:'#94a3b8',margin:'0 4px'}},editIdx===bi?'▲':'▼'),
              R('button',{onClick:e=>{e.stopPropagation();setBom(p=>p.filter((_,i)=>i!==bi));},style:{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:17,padding:'0 2px'}},'×')
            ),
            editIdx===bi&&R('div',{style:{padding:'7px 10px 10px',borderTop:'1px solid #f1f5f9',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:5}},
              [['매입처','supplier','text'],['연락처','contact','text'],['리드타임(일)','lead','number']].map(([lbl,k,t])=>R('div',{key:k},
                R('label',{style:{fontSize:10,color:'#94a3b8',display:'block',marginBottom:1}},lbl),
                R('input',{value:b[k]||'',type:t,onChange:e=>setBom(p=>p.map((x,i)=>i===bi?{...x,[k]:t==='number'?+e.target.value:e.target.value}:x)),style:{width:'100%',border:'1px solid #e2e8f0',borderRadius:6,padding:'4px 7px',fontSize:12}})
              ))
            )
          ))
        ),
        !bom.length&&R('div',{style:{padding:18,textAlign:'center',color:'#94a3b8',fontSize:12,background:'#f8fafc',borderRadius:8,border:'1px dashed #e2e8f0'}},'위에서 원재료를 검색해 추가하세요')
      ),
      R('div',{className:'mfoot'},
        R('button',{className:'btn bs',onClick:onClose,style:{flex:1,padding:10}},'취소'),
        R('button',{className:'btn bp',onClick:save,style:{flex:2,padding:10,fontSize:14}},'저장')
      )
    )
  );
}

/* ────── PAGE: BOM 등록 ────── */
function PageBOM({mats,prods,cats,isAdmin,onSetProds,onOpenModal}){
  const[prodSearch,setProdSearch]=useState('');
  const[expId,setExpId]=useState(null);
  const[editMod,setEditMod]=useState(null);
  const filtered=useMemo(()=>{
    if(!prodSearch)return prods;
    const q=prodSearch.toLowerCase();
    return prods.filter(p=>p.name.toLowerCase().includes(q)||p.cat.includes(q));
  },[prods,prodSearch]);
  return R('div',{className:'pg fa'},
    R('div',{style:{display:'flex',gap:8,alignItems:'center',marginBottom:14,flexWrap:'wrap'}},
      R('input',{value:prodSearch,onChange:e=>setProdSearch(e.target.value),placeholder:'🔍 제품명 검색',style:{flex:1,minWidth:140,padding:'7px 10px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:13}}),
      R('span',{style:{fontSize:11,color:'#94a3b8'}},filtered.length+'종'),
      isAdmin&&R('button',{className:'btn bp',onClick:()=>onOpenModal(null)},'+ 제품 + BOM 등록')
    ),
    !prods.length&&R('div',{className:'card',style:{textAlign:'center',padding:'32px',border:'2px dashed #e2e8f0',color:'#94a3b8'}},
      '등록된 제품 없음',
      isAdmin&&R('div',{style:{marginTop:10}},R('button',{className:'btn bp',onClick:()=>onOpenModal(null)},'등록하기'))
    ),
    filtered.map(p=>R('div',{key:p.id,className:'card',style:{marginBottom:10,padding:0,overflow:'hidden'}},
      R('div',{style:{padding:'12px 16px',display:'flex',alignItems:'center',gap:10}},
        R('div',{style:{flex:1}},
          R('input',{value:p.name,onChange:e=>onSetProds(pp=>pp.map(x=>x.id===p.id?{...x,name:e.target.value}:x)),readOnly:!isAdmin,style:{border:'none',background:'transparent',fontWeight:700,fontSize:14,padding:0,width:'100%',cursor:isAdmin?'text':'default'}}),
          R('div',{style:{fontSize:11,color:'#64748b'}},p.cat,' · BOM ',p.bom.length,'종')
        ),
        isAdmin&&R('button',{className:'btn bw',style:{padding:'4px 10px',fontSize:11},onClick:()=>{setEditMod(p);setExpId(p.id);}},'수정'),
        isAdmin&&R('button',{className:'btn bd',style:{padding:'4px 10px',fontSize:11},onClick:()=>onSetProds(pp=>pp.filter(x=>x.id!==p.id))},'삭제'),
        R('button',{className:'btn bs',style:{padding:'4px 10px',fontSize:11},onClick:()=>{setExpId(expId===p.id?null:p.id);if(editMod&&editMod.id===p.id)setEditMod(null);}},expId===p.id?'▲':'▼')
      ),
      expId===p.id&&!editMod&&R('div',{style:{borderTop:'1px solid #f1f5f9',padding:'12px 16px',background:'#f8fafc',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:6}},
        p.bom.map(b=>{
          const mat=mats.find(m=>m.c===b.c);
          return R('div',{key:b.c,style:{padding:'7px 10px',background:'#fff',borderRadius:8,border:'1px solid #e2e8f0'}},
            R('div',{style:{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},b.name),
            R('div',{style:{fontSize:11,color:'#64748b'}},b.amt,b.unit,'/개 · 현재: ',(mat?mat.s:0),b.unit)
          );
        })
      ),
      editMod&&editMod.id===p.id&&R(BOMModal,{mats,cats,editProd:p,
        onSave:updated=>onSetProds(pp=>pp.map(x=>x.id===updated.id?updated:x)),
        onClose:()=>{setEditMod(null);setExpId(null);}
      })
    ))
  );
}

/* ────── 생산지시 확인 Modal ────── */
function ProdConfirmModal({data,mats,onConfirm,onClose}){
  const[note,setNote]=useState('');
  const shortages=useMemo(()=>{
    return (data.prod.bom||[]).map(b=>{
      const mat=mats.find(m=>m.c===b.c);
      const needed=b.amt*data.qty;
      const short=Math.max(0,needed-(mat?mat.s:0));
      return short>0?{mat,b,needed,short}:null;
    }).filter(Boolean);
  },[data,mats]);
  const confirm=()=>{
    const today=new Date();
    const newOrders=shortages.map(({mat,b,short})=>{
      const ld=mat?(mat.lead||3):(b.lead||3);
      const arr=new Date(today);
      arr.setDate(arr.getDate()+ld);
      return {
        id:uid(),matCode:b.c,matName:b.name||(mat?mat.n:''),
        amt:Math.ceil(short*100)/100,unit:b.unit||(mat?mat.u:'kg'),
        status:'발주요청',ordAt:today.toLocaleDateString('ko-KR'),
        expAt:arr.toLocaleDateString('ko-KR')+' 09:00',
        supplier:mat?(mat.supplier||''):(b.supplier||''),
        total:Math.round((mat?(mat.price||0):0)*short),
        contact:mat?(mat.contact||''):(b.contact||''),
        memo:'['+data.prod.name+'] '+data.qty+'개 생산 자동발주 (리드 '+ld+'일)'
      };
    });
    onConfirm(newOrders,note);
    onClose();
  };
  return R('div',{className:'mbg'},
    R('div',{className:'mbox',style:{maxWidth:560,margin:'auto',borderRadius:16}},
      R('div',{className:'mhdr'},
        R('div',null,
          R('div',{style:{fontSize:15,fontWeight:700}},'📝 생산지시 확인'),
          R('div',{style:{fontSize:12,color:'#64748b'}},data.prod.name+' | '+data.qty+'개')
        ),
        R('button',{onClick:onClose,style:{background:'none',border:'none',cursor:'pointer',fontSize:22,color:'#64748b'}},'×')
      ),
      R('div',{className:'mbody'},
        R('div',{style:{background:'#FFF5F0',borderRadius:10,padding:'12px 14px',marginBottom:12}},
          R('div',{style:{fontSize:12,fontWeight:700,color:'#D94F1E',marginBottom:5}},'생산 정보'),
          R('div',{style:{display:'flex',gap:16,fontSize:12,flexWrap:'wrap'}},
            R('span',null,'제품: ',R('strong',null,data.prod.name)),
            R('span',null,'수량: ',R('strong',null,data.qty+'개')),
            R('span',null,'일시: ',getNow())
          )
        ),
        R('div',{style:{marginBottom:12}},
          R('div',{style:{fontSize:12,fontWeight:700,color:'#64748b',marginBottom:6}},'소요 원재료'),
          ...data.rows.map((row,i)=>R('div',{key:i,style:{display:'flex',gap:8,padding:'5px 0',borderBottom:'1px solid #f8fafc',fontSize:12}},
            R('span',{style:{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},row.name),
            R('span',{style:{color:'#64748b',flexShrink:0}},row.needed.toFixed(2)+row.unit),
            row.short>0
              ?R('span',{style:{color:'#dc2626',fontWeight:700,flexShrink:0}},'부족 '+row.short.toFixed(2)+row.unit)
              :R('span',{style:{color:'#059669',flexShrink:0}},'✓ 충분')
          ))
        ),
        shortages.length>0&&R('div',{style:{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:10,padding:'12px 14px',marginBottom:12}},
          R('div',{style:{fontSize:12,fontWeight:700,color:'#dc2626',marginBottom:6}},'⚠ 자동 발주 예정 '+shortages.length+'건'),
          ...shortages.map(({mat,b,short})=>{
            const ld=mat?(mat.lead||3):(b.lead||3);
            const arr=new Date();
            arr.setDate(arr.getDate()+ld);
            return R('div',{key:b.c,style:{fontSize:11,padding:'3px 0',color:'#64748b'}},
              R('span',{style:{color:'#dc2626',fontWeight:600}},b.name||(mat?mat.n:'')),
              ' '+short.toFixed(2)+b.unit+' → 입고 '+arr.toLocaleDateString('ko-KR')+' (리드 '+ld+'일)'
            );
          })
        ),
        R('div',null,
          R('label',{style:{fontSize:11,fontWeight:700,color:'#64748b',display:'block',marginBottom:4}},'지시 메모'),
          R('textarea',{value:note,onChange:e=>setNote(e.target.value),placeholder:'생산 지시 내용...',style:{width:'100%',padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:12,resize:'vertical',minHeight:50}})
        )
      ),
      R('div',{className:'mfoot'},
        R('button',{className:'btn bs',onClick:onClose,style:{flex:1,padding:10}},'취소'),

          shortages.length>0?'지시 확인 + 자동 발주 ('+shortages.length+'건)':'지시 확인'
        )
      )
    )
  );
}

/* ────── PAGE: 생산 지시 ────── */
function PageProd({mats,prods,pqty,setPqty,isAdmin,onConfirmOrder,onOpenImg,onOpenBOM}){
  const[confirmData,setConfirmData]=useState(null);
  /* 1회 생산 수량 + 회수 - localStorage 저장으로 새로고침해도 유지 */
  const[runConfig,setRunConfig]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('bnf_run_config')||'{}');}catch(e){return {};}
  });
  /* perRun/runs 변경 시 pqty(총 수량) 자동 계산 */
  const updateRunConfig=(id,key,val)=>{
    setRunConfig(p=>{
      const cur=p[id]||{perRun:'',runs:''};
      const next={...cur,[key]:val};
      const np={...p,[id]:next};
      localStorage.setItem('bnf_run_config',JSON.stringify(np));
      const total=(parseFloat(next.perRun)||0)*(parseFloat(next.runs)||0);
      setPqty(pv=>({...pv,[id]:total>0?String(total):''}));
      return np;
    });
  };
  return R('div',{className:'pg fa'},
    !prods.length&&R('div',{className:'card',style:{textAlign:'center',padding:'28px',border:'2px dashed #e2e8f0',color:'#94a3b8',marginBottom:14}},
      'BOM을 먼저 등록하세요',
      isAdmin&&R('div',{style:{marginTop:8}},R('button',{className:'btn bp',onClick:onOpenBOM},'등록하러 가기'))
    ),
    prods.map(p=>{
      const cfg=runConfig[p.id]||{perRun:'',runs:''};
      const perRun=parseFloat(cfg.perRun)||0;
      const runs=parseFloat(cfg.runs)||0;
      /* qty = BOM에 곱하는 값 = 회수만 (1회 생산 수량은 단순 표시용) */
      const qty=runs;
      /* totalProduce = 화면 표시용 총 ea (perRun × runs) */
      const totalProduce=perRun*runs;
      const needs=(p.bom||[]).map(b=>{
        const mat=mats.find(m=>m.c===b.c);
        const needed=b.amt*(qty||1);
        return{mat,b,needed,short:Math.max(0,needed-(mat?mat.s:0))};
      });
      const hasShort=qty>0&&needs.some(n=>n.short>0);
      const rows=needs.map(({mat,b,needed,short})=>({
        name:b.name||(mat?mat.n:''),unit:b.unit||(mat?mat.u:''),
        needed,stock:mat?mat.s:0,short,
        supplier:mat?(mat.supplier||''):(b.supplier||''),
        contact:mat?(mat.contact||''):(b.contact||''),
        lead:mat?(mat.lead||3):(b.lead||3)
      }));
      const clearRun=()=>{
        setRunConfig(prev=>{const np={...prev,[p.id]:{perRun:'',runs:''}};localStorage.setItem('bnf_run_config',JSON.stringify(np));return np;});
        setPqty(pv=>({...pv,[p.id]:''}));
      };
      return R('div',{key:p.id,className:'card',style:{marginBottom:12,border:hasShort?'1px solid #fecaca':'1px solid #e2e8f0'}},
        R('div',{style:{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}},
          R('div',{style:{flex:1,minWidth:160}},
            R('div',{style:{fontWeight:700,fontSize:14}},p.name),
            R('div',{style:{fontSize:11,color:'#64748b'}},p.cat,' · BOM ',p.bom.length,'종')
          ),
          R('div',{style:{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}},
            /* 1회 생산 수량 (단순 메모용 - BOM에 영향 X) */
            R('span',{style:{fontSize:11,color:'#64748b',fontWeight:600}},'1회 생산 수량'),
            R('input',{type:'number',min:'0',value:cfg.perRun,onChange:e=>updateRunConfig(p.id,'perRun',e.target.value),placeholder:'수량',style:{width:70,padding:'7px 8px',border:'1.5px solid '+(perRun>0?'#D94F1E':'#e2e8f0'),borderRadius:8,fontSize:13,textAlign:'center'}}),
            R('span',{style:{fontSize:12,color:'#64748b',fontWeight:600}},'ea ×'),
            /* 회수 (BOM에 곱하는 값) */
            R('input',{type:'number',min:'0',value:cfg.runs,onChange:e=>updateRunConfig(p.id,'runs',e.target.value),placeholder:'회',style:{width:56,padding:'7px 8px',border:'1.5px solid '+(runs>0?'#D94F1E':'#e2e8f0'),borderRadius:8,fontSize:13,textAlign:'center'}}),
            R('span',{style:{fontSize:12,color:'#64748b',fontWeight:600}},'회'),
            /* 총 ea 표시 (메모용 - BOM 계산과 무관) */
            totalProduce>0&&R('span',{style:{fontSize:12,color:'#D94F1E',fontWeight:800,padding:'4px 8px',background:'#FFF5F0',borderRadius:6,border:'1px solid #FCC8B0'}},'= 총 ',totalProduce,' ea'),
            /* 액션 버튼 */
            R('button',{className:'btn',style:{background:'#475569',color:'#fff',padding:'8px 11px',fontSize:11},disabled:!qty,onClick:()=>qty&&setConfirmData({prod:p,qty,perRun,runs,totalProduce,rows})},'📝 생산지시'),
            R('button',{className:'btn bp',style:{fontSize:11,padding:'8px 11px'},disabled:!qty,onClick:()=>qty&&onOpenImg({prod:p,qty,perRun,runs,totalProduce,rows})},'📋 이미지'),
            (perRun>0||runs>0)&&R('button',{onClick:clearRun,style:{padding:'7px 8px',background:'#fef2f2',color:'#dc2626',border:'1px solid #fecaca',borderRadius:8,fontSize:11,cursor:'pointer'}},'✕')
          )
        ),
        qty>0&&R('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(165px,1fr))',gap:6,marginTop:10}},
          needs.map(({mat,b,needed,short})=>mat&&R('div',{key:b.c,style:{padding:'8px 10px',borderRadius:8,background:short>0?'#fef2f2':'#FFF5F0',border:'1px solid '+(short>0?'#fecaca':'#FCC8B0')}},
            R('div',{style:{fontSize:12,fontWeight:600,color:short>0?'#dc2626':'#D94F1E',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},b.name||mat.n),
            R('div',{style:{fontSize:11,color:'#64748b'}},'필요 ',needed.toFixed(2),b.unit,' / 현재 ',mat.s,b.unit),
            short>0&&R('div',{style:{fontSize:11,color:'#dc2626',fontWeight:700}},'부족 ',short.toFixed(2),b.unit)
          ))
        ),
        confirmData&&confirmData.prod.id===p.id&&R(ProdConfirmModal,{
          data:confirmData,mats,
          onConfirm:(newOrders,note)=>{onConfirmOrder(newOrders);setConfirmData(null);},
          onClose:()=>setConfirmData(null)
        })
      );
    }),
    isAdmin&&R('button',{className:'btn bp',style:{width:'100%',padding:12,marginTop:4,fontSize:14},onClick:onOpenBOM},'+ 제품 + BOM 등록')
  );
}

function PageOrders({orders,isAdmin,onSetOrders}){

    if(!nO.matName.trim())return;
    const ld=3;const arr=new Date();arr.setDate(arr.getDate()+ld);
    onSetOrders(p=>[...p,{id:uid(),matCode:'',matName:nO.matName,amt:parseFloat(nO.amt)||0,unit:nO.unit,status:'발주요청',ordAt:getDate(),expAt:addDays(ld),supplier:nO.supplier,total:parseFloat(nO.total)||0,contact:nO.contact,memo:nO.memo}]);
    setShowForm(false);setNO({matName:'',amt:'',unit:'kg',supplier:'',contact:'',total:'',memo:''});

  const stepColors=['#f59e0b','#3b82f6','#8b5cf6','#10b981'];

        )

    })
  );

/* ═══ 공장 가동률 ═══════════════════════════════ */
function PageOperation({user}){
  const[records,setRecords]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[editRec,setEditRec]=useState(null);
  const now=new Date();
  const[form,setForm]=useState({year:now.getFullYear(),month:now.getMonth()+1,total_days:22,actual_days:0,target_rate:80,notes:''});
  
  useEffect(()=>{load();},[]);
  const load=async()=>{setLoading(true);try{const{data}=await sbClient.from('operation_rate').select('*').order('year',{ascending:false}).order('month',{ascending:false});setRecords(data||[]);}catch(e){}setLoading(false);};
  
  const save=async()=>{
    if(!form.total_days)return alert('총 영업일을 입력하세요');
    try{
      if(editRec){
        await sbClient.from('operation_rate').update(Object.assign({},form,{updated_at:now2()})).eq('id',editRec.id);
      }else{
        await sbClient.from('operation_rate').upsert(Object.assign({},form,{updated_at:now2()}),{onConflict:'year,month'});
      }
      setShowForm(false);setEditRec(null);load();
    }catch(e){alert('저장 실패: '+e.message);}
  };
  
  const del=async(id)=>{if(!confirm('삭제?'))return;await sbClient.from('operation_rate').delete().eq('id',id);load();};
  const editRecord=(r)=>{setEditRec(r);setForm({year:r.year,month:r.month,total_days:r.total_days,actual_days:r.actual_days,target_rate:r.target_rate,notes:r.notes||''});setShowForm(true);};
  
  const thisMonth=records.find(r=>r.year===now.getFullYear()&&r.month===now.getMonth()+1);
  const thisRate=thisMonth&&thisMonth.total_days>0?(thisMonth.actual_days/thisMonth.total_days*100):0;
  const thisTarget=thisMonth?.target_rate||80;
  const avgRate=records.length>0?records.reduce((s,r)=>s+(r.total_days>0?r.actual_days/r.total_days*100:0),0)/records.length:0;
  
  const chartRef=useRef();
  useEffect(()=>{
    if(!window.Chart||loading||records.length===0||!chartRef.current)return;
    const ex=Chart.getChart(chartRef.current);if(ex)ex.destroy();
    const sorted=records.slice().sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month).slice(-12);
    new Chart(chartRef.current,{type:'bar',data:{
      labels:sorted.map(r=>r.year+'.'+String(r.month).padStart(2,'0')),

/* ═══ 파일 공유 ═══════════════════════════════════ */
function PageFiles({user}){
  const[files,setFiles]=useState([]);
  const[currentFolder,setCurrentFolder]=useState('/');
  const[loading,setLoading]=useState(true);
  const[uploading,setUploading]=useState(false);
  const[search,setSearch]=useState('');
  const fileRef=useRef();
  
  useEffect(()=>{load();},[]);
  const load=async()=>{setLoading(true);try{const{data}=await sbClient.from('shared_files').select('*').order('created_at',{ascending:false});setFiles(data||[]);}catch(e){}setLoading(false);};
  
  const upload=async(file)=>{
    if(!file){console.warn('파일이 없습니다');return;}
    if(file.size>50*1024*1024){alert('❌ 파일 크기 초과\n\n현재: '+(file.size/1024/1024).toFixed(1)+'MB\n제한: 50MB 이하');return;}
    setUploading(true);
    try{
      const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      const path=Date.now()+'_'+Math.random().toString(36).slice(2,7)+'_'+safeName;
      console.log('📤 업로드 시작:',{path,size:file.size,type:file.type});
      
      /* Storage 업로드 */
      const{data:upData,error:upErr}=await sbClient.storage.from('bnf-files').upload(path,file,{
        cacheControl:'3600',
        upsert:false,
        contentType:file.type||'application/octet-stream'
      });
      
      if(upErr){
        console.error('Storage 업로드 실패:',upErr);
        const msg=upErr.message||'';
        let hint='';
        if(msg.includes('Bucket not found')||msg.includes('not found')){
          hint='\n\n💡 [원인] Supabase Storage에 "bnf-files" 버킷이 없습니다.\n\n[해결 방법]\n1. Supabase Dashboard → Storage\n2. New Bucket → 이름: bnf-files\n3. Public 옵션 체크 (다운로드 가능하게)\n4. Create 클릭';
        }else if(msg.includes('row-level security')||msg.includes('RLS')||msg.includes('policy')){
          hint='\n\n💡 [원인] Storage 정책(Policy)이 막혀있습니다.\n\n[해결]\n1. Supabase → Storage → bnf-files 버킷\n2. Policies 탭 → "New Policy"\n3. "For full customization" → 모든 작업 허용';
        }else if(msg.includes('duplicate')){
          hint='\n\n💡 동일 이름의 파일이 이미 있습니다.';
        }else if(msg.includes('exceeded')||msg.includes('size')){
          hint='\n\n💡 Storage 용량 초과 가능성. Supabase 무료는 1GB 제한.';
        }
        alert('❌ 파일 업로드 실패\n\n'+msg+hint);
        setUploading(false);
        return;
      }
      
      console.log('✅ Storage 업로드 성공:',upData);
      
      /* DB에 메타 저장 */
      const{error:dbErr}=await sbClient.from('shared_files').insert({
        name:file.name,
        storage_path:path,
        size_bytes:file.size,
        mime_type:file.type||'',
        folder:currentFolder,
        uploader_id:user.id,
        uploader_name:user.name||user.email||'-'
      });
      
      if(dbErr){
        console.error('DB 저장 실패:',dbErr);
        const msg=dbErr.message||'';
        let hint='';
        if(msg.includes('does not exist')||msg.includes('relation')){
          hint='\n\n💡 [원인] shared_files 테이블이 없습니다.\n\nSupabase SQL Editor에서 실행:\n\nCREATE TABLE shared_files (\n  id BIGSERIAL PRIMARY KEY,\n  name TEXT, storage_path TEXT,\n  size_bytes BIGINT, mime_type TEXT,\n  folder TEXT DEFAULT \'/\',\n  uploader_id TEXT, uploader_name TEXT,\n  download_count INTEGER DEFAULT 0,\n  created_at TIMESTAMPTZ DEFAULT NOW()\n);\nALTER TABLE shared_files DISABLE ROW LEVEL SECURITY;';
        }
        alert('⚠️ 파일은 업로드됐지만 목록에 추가 실패:\n\n'+msg+hint);
        /* 업로드된 Storage 파일 롤백 */
        try{await sbClient.storage.from('bnf-files').remove([path]);}catch(e){}
        setUploading(false);
        return;
      }
      
      alert('✅ 업로드 완료: '+file.name);
      load();
    }catch(e){
      console.error('업로드 예외:',e);
      alert('❌ 업로드 오류\n\n'+e.message);
    }
    setUploading(false);
  };
  
  const download=(f)=>{
    try{
      const{data}=sbClient.storage.from('bnf-files').getPublicUrl(f.storage_path);
      if(data&&data.publicUrl){
        const link=document.createElement('a');link.href=data.publicUrl;link.download=f.name;link.target='_blank';
        document.body.appendChild(link);link.click();document.body.removeChild(link);
        sbClient.from('shared_files').update({download_count:(f.download_count||0)+1}).eq('id',f.id).then(load);
      }
    }catch(e){alert('다운로드 실패: '+e.message);}
  };
  
  const del=async(f)=>{
    if(!confirm('"'+f.name+'" 삭제?'))return;
    try{
      await sbClient.storage.from('bnf-files').remove([f.storage_path]);
      await sbClient.from('shared_files').delete().eq('id',f.id);
      load();
    }catch(e){alert('삭제 실패: '+e.message);}
  };
  
  const visibleFiles=files.filter(f=>{if(f.folder!==currentFolder)return false;if(search&&!f.name.toLowerCase().includes(search.toLowerCase()))return false;return true;});
  const fSize=b=>{if(!b)return'-';const k=b/1024;if(k<1024)return k.toFixed(1)+' KB';const m=k/1024;if(m<1024)return m.toFixed(1)+' MB';return(m/1024).toFixed(2)+' GB';};
  const fIcon=(f)=>{const ext=(f.name.split('.').pop()||'').toLowerCase();if(['jpg','jpeg','png','gif','webp'].includes(ext))return'🖼️';if(['xlsx','xls','csv'].includes(ext))return'📊';if(['pptx','ppt'].includes(ext))return'📽️';if(['doc','docx','hwp'].includes(ext))return'📝';if(ext==='pdf')return'📕';if(['zip','rar'].includes(ext))return'🗜️';return'📄';};
  const totalSize=files.reduce((s,f)=>s+(+f.size_bytes||0),0);
  
  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},
      R('div',null,R('div',{className:'pg-title'},'📁 파일 공유'),R('div',{style:{fontSize:12,color:'var(--tm)',marginTop:2}},files.length+'개 · '+fSize(totalSize)+' 사용 중')),
      R('button',{className:'btn bp',onClick:()=>fileRef.current&&fileRef.current.click(),disabled:uploading},uploading?'⏳ 업로드 중...':'⬆️ 파일 업로드'),
      R('input',{ref:fileRef,type:'file',style:{display:'none'},onChange:e=>{if(e.target.files[0]){upload(e.target.files[0]);e.target.value='';}}})
    ),
    R('div',{style:{display:'flex',gap:8,marginBottom:14}},R('input',{className:'inp',value:search,onChange:e=>setSearch(e.target.value),placeholder:'🔍 파일 검색',style:{maxWidth:300}})),
    R('div',{className:'card',style:{padding:0,overflow:'hidden'},onDragOver:e=>{e.preventDefault();e.currentTarget.style.background='#FFF8F4';},onDragLeave:e=>{e.currentTarget.style.background='#fff';},onDrop:e=>{e.preventDefault();e.currentTarget.style.background='#fff';const f=e.dataTransfer.files[0];if(f)upload(f);}},
      loading?R('div',{style:{padding:30,textAlign:'center',color:'var(--tm)'}},'로딩 중...'):
      visibleFiles.length===0?R('div',{style:{padding:'48px 20px',textAlign:'center',color:'var(--tm)'}},R('div',{style:{fontSize:48,marginBottom:10}},'📂'),R('div',{style:{fontSize:14,fontWeight:600,marginBottom:4}},'파일이 없습니다'),R('div',{style:{fontSize:12}},'위 [⬆️ 파일 업로드] 버튼 또는 이 영역에 드래그')):
      R('table',null,
        R('thead',null,R('tr',null,R('th',{style:{width:38}}),R('th',null,'이름'),R('th',{style:{width:90}},'크기'),R('th',{style:{width:90}},'업로드'),R('th',{style:{width:60,textAlign:'center'}},'받기'),R('th',{style:{width:50}}))),
        R('tbody',null,...visibleFiles.map(f=>R('tr',{key:f.id},
          R('td',{style:{fontSize:18}},fIcon(f)),
          R('td',null,R('div',{style:{fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:280}},f.name)),
          R('td',{style:{fontSize:11,color:'var(--tm)'}},fSize(f.size_bytes)),
          R('td',{style:{fontSize:11,color:'var(--tm)'}},f.uploader_name||'-',R('div',{style:{fontSize:10}},fDate(f.created_at))),
          R('td',{style:{textAlign:'center'}},R('button',{className:'btn bp btn-sm',onClick:()=>download(f),style:{padding:'4px 10px'}},'⬇️')),
          R('td',null,(f.uploader_id===user.id||['superadmin','admin'].includes(user.role))&&R('button',{onClick:()=>del(f),style:{background:'none',border:'none',cursor:'pointer',color:'#fca5a5',fontSize:14,padding:4}},'✕'))
        )))
      )
    ),
    R('div',{style:{marginTop:10,fontSize:11,color:'var(--tm)'}},'💡 영역에 파일 드래그&드롭으로 업로드 · 50MB 이하 · Supabase Storage 1GB 무료')
  );
}

/* ═══ 바로가기 링크 ═════════════════════════════ */
function PageLinks({user}){
  const[myLinks,setMyLinks]=useState([]);
  const[sharedLinks,setSharedLinks]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[editLink,setEditLink]=useState(null);
  const ICON_PRESETS=['🔗','🏢','📊','📦','💰','📋','🚀','⚙️','📝','🌐','💻','📱','🎯','📈','🛒','💼','🔑','📂'];
  const defaultForm={title:'',url:'',icon:'🔗',color:'#D94F1E',category:'업무',favicon_url:'',login_id:'',login_pw:'',memo:'',use_favicon:true};
  const[form,setForm]=useState(defaultForm);
  const isAdmin=['superadmin','admin'].includes(user.role);

  useEffect(()=>{load();},[]);

  const load=async()=>{
    setLoading(true);
    try{
      const[{data:my},{data:sh}]=await Promise.all([
        sbClient.from('user_links').select('*').eq('user_id',user.id).order('created_at'),
        sbClient.from('shared_links').select('*').order('created_at')
      ]);
      setMyLinks(my||[]);setSharedLinks(sh||[]);
    }catch(e){console.warn(e);}
    setLoading(false);
  };

  const save=async()=>{
    if(!form.title.trim()||!form.url.trim()){alert('이름과 URL을 입력해주세요');return;}
    let url=form.url.trim();
    if(!url.startsWith('http'))url='https://'+url;

    try{
      const payload={
        title:form.title.trim(),
        url,
        icon:form.icon,
        color:form.color,
        category:form.category,
        favicon_url:form.favicon_url||'',
        login_id:form.login_id||'',
        login_pw:form.login_pw||'',
        memo:form.memo||'',
        use_favicon:form.use_favicon!==false
      };
      
      const saveWithFallback=async(insertOrUpdate)=>{
        let data=payload;
        let resp=await insertOrUpdate(data);
        /* 컬럼 누락 시 자동 제외하고 재시도 */
        while(resp.error&&resp.error.message){
          const m=resp.error.message.match(/Could not find the '([^']+)' column/);
          if(!m)break;
          console.warn('컬럼 누락:',m[1]);
          delete data[m[1]];
          resp=await insertOrUpdate(data);
        }
        return resp;
      };
      
      let resp;
      if(editLink){
        resp=await saveWithFallback((d)=>sbClient.from('user_links').update(d).eq('id',editLink.id));
      }else{
        resp=await saveWithFallback((d)=>sbClient.from('user_links').insert({user_id:user.id,...d}));
      }
      if(resp.error)throw resp.error;
      setShowForm(false);setEditLink(null);setForm(defaultForm);
      await load();
    }catch(e){
      if(e.message&&(e.message.includes('does not exist')||e.message.includes('schema cache'))){
        alert('⚠️ user_links 테이블이 없습니다.\n_통합SQL_한번에실행.sql을 실행해주세요.');
      }else alert('저장 실패: '+(e.message||e));
    }
  };

  const del=async(id,tbl)=>{
    if(!confirm('삭제할까요?'))return;
    await sbClient.from(tbl).delete().eq('id',id);
    await load();
  };

  const openLink=(url)=>{

/* ═══ 자동 발주 제안 ════════════════════════════ */
function PageAutoOrder({user,mats,onCreateOrder}){
  const[rules,setRules]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState('');
  
  useEffect(()=>{load();},[]);
  const load=async()=>{setLoading(true);try{const{data}=await sbClient.from('auto_order_rules').select('*');setRules(data||[]);}catch(e){}setLoading(false);};
  
  const suggestions=useMemo(()=>{
    return mats.map(mat=>{
      const rule=rules.find(r=>r.item_code===mat.c);
      const safety=rule&&rule.safety_stock?rule.safety_stock:(mat.mu||0)*0.5;
      const reorder=rule&&rule.reorder_point?rule.reorder_point:(mat.mu||0)*0.7;
      const need=safety>0&&mat.s<reorder;
      const recommendQty=rule&&rule.reorder_qty?rule.reorder_qty:Math.max(0,(mat.mu||0)*1.5-mat.s);
      return Object.assign({},mat,{rule,safety,reorder,need,recommendQty,supplier:(rule&&rule.preferred_supplier)||mat.supplier||''});
    }).filter(s=>s.need).sort((a,b)=>(a.s/a.reorder)-(b.s/b.reorder));
  },[mats,rules]);
  
  const filtered=suggestions.filter(s=>!search||s.n.includes(search));
  
  const updRule=async(itemCode,changes)=>{
    const existing=rules.find(r=>r.item_code===itemCode);
    if(existing){await sbClient.from('auto_order_rules').update(changes).eq('id',existing.id);}
    else{await sbClient.from('auto_order_rules').insert(Object.assign({item_code:itemCode},changes));}
    load();
  };
  
  const createOrder=(s)=>{
    if(!s.supplier)return alert('매입처를 먼저 설정하세요');
    if(onCreateOrder){onCreateOrder({matCode:s.c,matName:s.n,qty:s.recommendQty,supplier:s.supplier,unit:s.u});alert('✅ 발주현황 페이지에 추가되었습니다');}
  };
  
  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},R('div',null,R('div',{className:'pg-title'},'🤖 자동 발주 제안'),R('div',{style:{fontSize:12,color:'var(--tm)',marginTop:2}},'안전재고 기준 자동 추천'))),
    R('div',{className:'card',style:{background:'linear-gradient(135deg,#fff,#FFF5F0)',border:'1px solid #FCC8B0',marginBottom:14}},
      R('div',{style:{display:'flex',gap:14,alignItems:'center'}},
        R('div',{style:{fontSize:32}},'🤖'),
        R('div',null,R('div',{style:{fontSize:13,fontWeight:700,marginBottom:4}},'AI 발주 제안 시스템'),R('div',{style:{fontSize:11,color:'var(--tm)',lineHeight:1.6}},'• 재발주점 = 월사용량 × 0.7',R('br'),'• 안전재고 = 월사용량 × 0.5',R('br'),'• 추천 주문량 = 월사용량 × 1.5 - 현재고'))
      )
    ),
    R('div',{style:{display:'flex',gap:8,marginBottom:14}},R('input',{className:'inp',value:search,onChange:e=>setSearch(e.target.value),placeholder:'🔍 품목 검색',style:{maxWidth:280}})),
    loading?R('div',{style:{textAlign:'center',padding:30}},'로딩 중...'):
    filtered.length===0?R('div',{className:'empty'},R('div',{className:'empty-ic'},'✅'),'발주 필요 품목 없음'):
    R('div',{className:'tw'},
      R('table',null,
        R('thead',null,R('tr',null,R('th',null,'품목'),R('th',{style:{textAlign:'right',width:70}},'현재고'),R('th',{style:{textAlign:'right',width:75}},'안전재고'),R('th',{style:{textAlign:'right',width:75}},'재발주점'),R('th',{style:{textAlign:'right',width:90,background:'#FFF5F0'}},'추천량'),R('th',{style:{width:130}},'매입처'),R('th',{style:{width:75}}))),
        R('tbody',null,
          ...filtered.map(s=>R('tr',{key:s.c,className:s.s===0?'dng':''},
            R('td',null,R('div',{style:{fontSize:12,fontWeight:600}},s.n),R('div',{style:{fontSize:10,color:'var(--tm)'}},s.c)),
            R('td',{style:{textAlign:'right',fontWeight:700,color:s.s===0?'#dc2626':'#1a1a1a'}},s.s,s.u),
            R('td',{style:{textAlign:'right'}},R('input',{type:'number',defaultValue:s.safety,onBlur:e=>updRule(s.c,{safety_stock:+e.target.value,item_name:s.n}),className:'ci',style:{textAlign:'right'}})),
            R('td',{style:{textAlign:'right'}},R('input',{type:'number',defaultValue:s.reorder,onBlur:e=>updRule(s.c,{reorder_point:+e.target.value,item_name:s.n}),className:'ci',style:{textAlign:'right'}})),
            R('td',{style:{textAlign:'right',fontWeight:800,color:'var(--p)',background:'#FFF5F0'}},R('input',{type:'number',defaultValue:s.recommendQty,onBlur:e=>updRule(s.c,{reorder_qty:+e.target.value,item_name:s.n}),className:'ci',style:{textAlign:'right',fontWeight:800,color:'var(--p)'}})),
            R('td',null,R('input',{defaultValue:s.supplier,onBlur:e=>updRule(s.c,{preferred_supplier:e.target.value,item_name:s.n}),className:'ci',placeholder:'매입처'})),
            R('td',null,R('button',{className:'btn bp btn-sm',onClick:()=>createOrder(s),style:{padding:'4px 10px'}},'발주생성'))
          ))
        )
      )
    )
  );

function PagePurchaseAnalysis({mats,variant='hq'}){
  const[purchases,setPurchases]=useState([]);
  const[loading,setLoading]=useState(true);
  const[yearFilter,setYearFilter]=useState(new Date().getFullYear());
  const[searchItem,setSearchItem]=useState('');
  const[searchSupplier,setSearchSupplier]=useState('');  /* 매입처 검색 */
  const[selectedSupplier,setSelectedSupplier]=useState(null);  /* 클릭한 매입처 */
  const[selectedItem,setSelectedItem]=useState(null);  /* 클릭한 품목 */
  const[viewMode,setViewMode]=useState('supplier');
  const[showImport,setShowImport]=useState(false);
  const[showDelete,setShowDelete]=useState(false);

  const reload=async()=>{
    setLoading(true);
    const{data}=await sbClient.from('purchases').select('*').eq('source',variant).gte('purchase_date',yearFilter+'-01-01').lte('purchase_date',yearFilter+'-12-31').order('purchase_date');
    setPurchases(data||[]);
    setLoading(false);
  };
  useEffect(()=>{reload();},[yearFilter]);

  /* 품목별 집계 */
  const itemStats=useMemo(()=>{
    const map={};
    purchases.forEach(p=>{
      const k=p.item_code||p.item_name;
      if(!k)return;
      if(!map[k])map[k]={code:p.item_code||'',name:p.item_name||'',suppliers:{},monthly:Array(12).fill(0),totalQty:0,totalAmt:0};
      const s=map[k];
      s.totalQty+=(+p.quantity||0);s.totalAmt+=(+p.amount||0);
      const mo=new Date(p.purchase_date).getMonth();if(mo>=0)s.monthly[mo]+=(+p.quantity||0);
      const sup=p.supplier_name||'미상';
      if(!s.suppliers[sup])s.suppliers[sup]={name:sup,qty:0,amt:0,prices:[]};
      s.suppliers[sup].qty+=(+p.quantity||0);s.suppliers[sup].amt+=(+p.amount||0);
      if(+p.unit_price>0)s.suppliers[sup].prices.push(+p.unit_price);
    });
    return Object.values(map).sort((a,b)=>b.totalAmt-a.totalAmt);
  },[purchases]);

  /* 거래처별 집계 */
  const supplierStats=useMemo(()=>{
    const map={};
    purchases.forEach(p=>{
      const sup=p.supplier_name||'미상';
      if(!map[sup])map[sup]={name:sup,items:new Set(),totalAmt:0,totalQty:0,monthly:Array(12).fill(0)};
      map[sup].totalAmt+=(+p.amount||0);map[sup].totalQty+=(+p.quantity||0);
      if(p.item_code||p.item_name)map[sup].items.add(p.item_code||p.item_name);
      const mo=new Date(p.purchase_date).getMonth();if(mo>=0)map[sup].monthly[mo]+=(+p.amount||0);
    });
    return Object.values(map).map(s=>({...s,items:s.items.size})).sort((a,b)=>b.totalAmt-a.totalAmt);
  },[purchases]);

  const filtered=searchItem?itemStats.filter(x=>x.name.includes(searchItem)||x.code.includes(searchItem)):itemStats;
  const totalAmt=purchases.reduce((s,p)=>s+(+p.amount||0),0);
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  if(loading)return R('div',{className:'pg fa',style:{display:'flex',alignItems:'center',justifyContent:'center'}},'⏳ 로딩 중...');

  return R('div',{className:'pg fa'},
    R('div',{className:'pg-hdr'},
      R('div',null,R('div',{className:'pg-title'},(variant==='adm'?'⚙️':'🏢')+' 매입 분석'),R('div',{style:{fontSize:12,color:'var(--tm)',marginTop:2}},yearFilter+'년 · 거래처별/품목별/월별 비교')),
      R('div',{style:{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}},
        R('button',{className:'btn bp btn-sm',onClick:()=>setShowImport(true)},'📥 Import'),R('button',{className:'btn bs btn-sm',onClick:()=>setShowDelete(true),style:{color:'#EF4444',border:'1px solid #EF4444'}},'🗑 삭제'),
        R('button',{className:'btn bs btn-sm',onClick:()=>setYearFilter(yearFilter-1)},'◀'),
        R('span',{style:{fontSize:13,fontWeight:700,padding:'0 8px'}},yearFilter+'년'),
        R('button',{className:'btn bs btn-sm',onClick:()=>setYearFilter(yearFilter+1)},'▶')
      )

/* ═══ 매입처 상세 모달 ═════════════════════════════ */
function SupplierDetailModal({supplier,allPurchases,onClose}){
  /* 이 매입처의 거래만 필터 */
  const txs=useMemo(()=>allPurchases.filter(p=>(p.supplier_name||'미상')===supplier.name),[allPurchases,supplier]);
  
  /* 통계 */
  const totalAmt=txs.reduce((s,x)=>s+(+x.amount||0),0);
  const totalQty=txs.reduce((s,x)=>s+(+x.quantity||0),0);
  
  /* 품목별 집계 */
  const itemBreakdown=useMemo(()=>{
    const m=new Map();
    txs.forEach(p=>{
      const k=p.item_name||p.item_code||'미상';
      if(!m.has(k))m.set(k,{name:k,code:p.item_code||'',amount:0,qty:0,count:0,prices:[],lastDate:''});
      const v=m.get(k);
      v.amount+=(+p.amount||0);
      v.qty+=(+p.quantity||0);
      v.count+=1;
      if(+p.unit_price>0)v.prices.push(+p.unit_price);
      if(p.purchase_date>v.lastDate)v.lastDate=p.purchase_date;
    });
    return Array.from(m.values()).sort((a,b)=>b.amount-a.amount);
  },[txs]);
  
  /* 월별 추이 */
  const monthly=useMemo(()=>{
    const m=Array(12).fill(0);
    txs.forEach(p=>{
      const mo=new Date(p.purchase_date).getMonth();
      if(mo>=0)m[mo]+=(+p.amount||0);
    });
    return m;
  },[txs]);
  const maxMonth=Math.max(...monthly,1);
  
  /* 최근 거래 */
  const recentTx=useMemo(()=>[...txs].sort((a,b)=>(b.purchase_date||'').localeCompare(a.purchase_date||'')).slice(0,30),[txs]);
  
  /* 최초/최종 거래일 */
  const firstDate=txs.length>0?txs.reduce((min,p)=>p.purchase_date&&(!min||p.purchase_date<min)?p.purchase_date:min,''):'';
  const lastDate=txs.length>0?txs.reduce((max,p)=>p.purchase_date>max?p.purchase_date:max,''):'';

      /* 헤더 */
      R('div',{style:{padding:'18px 22px',borderBottom:'1px solid var(--bd)',display:'flex',alignItems:'center',justifyContent:'space-between',background:'linear-gradient(135deg,#FFF8F4,#FFE5DA)',flexShrink:0}},
        R('div',null,
          R('div',{style:{fontSize:10,color:'#9A3412',fontWeight:600,letterSpacing:1,marginBottom:4}},'🏢 매입처 상세 정보'),
          R('div',{style:{fontSize:18,fontWeight:900,color:'#1A1A1A'}},supplier.name)
        ),
        R('button',{onClick:onClose,style:{background:'rgba(0,0,0,0.05)',border:'none',width:32,height:32,borderRadius:8,cursor:'pointer',fontSize:16,fontWeight:700}},'✕')
      ),
      
      /* 스크롤 영역 */
      R('div',{style:{flex:1,overflow:'auto',padding:'18px 22px'}},
        
        /* KPI 카드 */
        R('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10,marginBottom:18}},
          R('div',{style:{padding:12,background:'#FFF8F4',borderRadius:10,border:'1px solid #FED7AA'}},
            R('div',{style:{fontSize:10,color:'#9A3412',fontWeight:600,marginBottom:4}},'총 매입금액'),
            R('div',{style:{fontSize:18,fontWeight:900,color:'var(--p)'}},fN(Math.round(totalAmt/10000)),'만원')
          ),
          R('div',{style:{padding:12,background:'#EFF6FF',borderRadius:10,border:'1px solid #BFDBFE'}},
            R('div',{style:{fontSize:10,color:'#1E40AF',fontWeight:600,marginBottom:4}},'거래 건수'),
            R('div',{style:{fontSize:18,fontWeight:900,color:'#3B82F6'}},txs.length,'건')
          ),
          R('div',{style:{padding:12,background:'#F5F3FF',borderRadius:10,border:'1px solid #DDD6FE'}},
            R('div',{style:{fontSize:10,color:'#6D28D9',fontWeight:600,marginBottom:4}},'취급 품목'),

          R('div',{style:{padding:12,background:'#ECFDF5',borderRadius:10,border:'1px solid #A7F3D0'}},

              R('div',{style:{fontSize:9,color:'var(--tm)',fontWeight:600}},(i+1)+'월')
            ))
          )
        ),
        
        /* 품목별 집계 */
        R('div',{style:{marginBottom:18}},
          R('div',{style:{fontSize:13,fontWeight:700,marginBottom:10}},'📦 매입 품목별 집계 ',R('span',{style:{fontSize:10,fontWeight:500,color:'var(--tm)'}},'('+itemBreakdown.length+'종)')),
          R('div',{style:{maxHeight:280,overflow:'auto',border:'1px solid var(--bd)',borderRadius:10}},
            R('table',{style:{width:'100%',fontSize:11}},
              R('thead',null,R('tr',{style:{background:'#FAFAFA',position:'sticky',top:0}},
                R('th',{style:{padding:'8px 10px',textAlign:'left'}},'품목명'),
                R('th',{style:{padding:'8px 10px',textAlign:'right'}},'거래수'),
                R('th',{style:{padding:'8px 10px',textAlign:'right'}},'수량'),
                R('th',{style:{padding:'8px 10px',textAlign:'right'}},'매입금액'),

              R('tbody',null,...itemBreakdown.map((b,i)=>{
